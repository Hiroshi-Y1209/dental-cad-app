}

function Game({ t }) {
    const [answers, setAnswers] = useState({});
    const [showResult, setShowResult] = useState(false);

    const handleAnswer = (qIdx, optIdx) => {
        if (answers[qIdx] !== undefined) return;
        const next = { ...answers, [qIdx]: optIdx };
        setAnswers(next);
        if (Object.keys(next).length === t.questions.length) {
            setTimeout(() => setShowResult(true), 400);
        }
    };

    const score = Object.entries(answers).filter(([qi, ai]) => t.questions[parseInt(qi)].ans === ai).length;

    const getRank = (s) => {
        for (const r of t.gRankings) {
            if (s >= r.min) return r;
        }
        return t.gRankings[t.gRankings.length - 1];
    };

    const handleRetry = () => {
        setAnswers({});
        setShowResult(false);
    };

    const answeredCount = Object.keys(answers).length;

    if (showResult) {
        const rank = getRank(score);
        return (
            <div>
                <div className="section-title">🎯 {t.gResult}</div>
                <div className="result-card">
                    <div className="result-emoji">{rank.emoji}</div>
                    <div className="result-score">{score}</div>
                    <div className="result-label">{t.gScore}</div>
                    <div style={{ fontSize: '14px', color: '#374151', marginBottom: '20px', fontWeight: '500' }}>{rank.label}</div>
                    <button className="retry-btn" onClick={handleRetry}>{t.gRetry}</button>
                </div>

                <div style={{ marginTop: '16px' }}>
                    {t.questions.map((q, qi) => {
                        const userAns = answers[qi];
                        const isCorrect = userAns === q.ans;
                        return (
                            <div key={qi} className="card" style={{ borderColor: isCorrect ? '#059669' : '#dc2626' }}>
                                <div className="question-number">{t.gQ} {qi + 1}</div>
                                <div className="question-text">{q.q}</div>
                                <div style={{ display: 'flex', gap: '6px', flexWrap: 'wrap', marginBottom: '8px' }}>
                                    {q.opts.map((opt, oi) => (
                                        <span key={oi} style={{
                                            padding: '3px 8px',
                                            borderRadius: '4px',
                                            fontSize: '12px',
                                            backgroundColor: oi === q.ans ? '#d1fae5' : oi === userAns && !isCorrect ? '#fee2e2' : '#f3f4f6',
                                            color: oi === q.ans ? '#065f46' : oi === userAns && !isCorrect ? '#991b1b' : '#6b7280',
                                            fontWeight: oi === q.ans ? '700' : '400',
                                        }}>{opt}</span>
                                    ))}
                                </div>
                                <div className={`explanation-box ${isCorrect ? 'correct-bg' : 'wrong-bg'}`}>
                                    {isCorrect ? '✓ ' : '✗ '}{t.gExplain}{q.exp}
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );
    }

    return (
        <div>
            <div className="quiz-header">
                <h3>🎯 {t.gTitle}</h3>
                <div className="quiz-progress-text">{t.gSubtitle} — {answeredCount} / {t.questions.length}</div>
                <div className="quiz-score-bar">
                    <div className="quiz-score-fill" style={{ width: `${(answeredCount / t.questions.length) * 100}%` }}></div>
                </div>
            </div>

            {t.questions.map((q, qi) => {
                const userAns = answers[qi];
                const answered = userAns !== undefined;
                return (
                    <div key={qi} className="question-card">
                        <div className="question-number">{t.gQ} {qi + 1} / {t.questions.length}</div>
                        <div className="question-text">{q.q}</div>
                        <div className="options-list">
                            {q.opts.map((opt, oi) => {
                                let cls = 'option-btn';
                                if (answered) {
                                    if (oi === q.ans) cls += ' correct';
                                    else if (oi === userAns) cls += ' wrong';
                                    else cls += ' dimmed';
                                }
                                return (
                                    <button
                                        key={oi}
                                        className={cls + (answered ? ' answered' : '')}
                                        onClick={() => handleAnswer(qi, oi)}
                                    >
                                        <span className="option-letter">{String.fromCharCode(97 + oi)}</span>
                                        {opt}
                                    </button>
                                );
                            })}
                        </div>
                        {answered && (
                            <div className={`explanation-box ${userAns === q.ans ? 'correct-bg' : 'wrong-bg'}`}>
                                {userAns === q.ans ? `✓ ${t.gCorrect}` : `✗ ${t.gWrong}`} — {t.gExplain}{q.exp}
                            </div>
                        )}
                    </div>
                );
            })}
        </div>
    );
}

function App() {
    const [lang, setLang] = useState('ja');
    const [activeTab, setActiveTab] = useState(0);
    const t = translations[lang];

    const tabComponents = [
        <Step1 t={t} />,
        <Step2 t={t} />,
        <Step3 t={t} />,
        <Step4 t={t} />,
        <Game t={t} key={lang} />,
    ];

    return (
        <div className="container">
            <div className="header">
                <h1>{t.appTitle}</h1>
                <p>{t.appSubtitle}</p>
                <div className="language-toggle">
                    <button
                        className={`lang-btn ${lang === 'ja' ? 'active' : ''}`}
                        onClick={() => setLang('ja')}
                    >日本語</button>
                    <button
                        className={`lang-btn ${lang === 'id' ? 'active' : ''}`}
                        onClick={() => setLang('id')}
                    >Bahasa Indonesia</button>
                </div>
            </div>

            <div className="progress-bar-header">
                {t.tabs.map((_, i) => (
                    <div key={i} className={`progress-dot ${i <= activeTab ? 'active' : ''}`}></div>
                ))}
            </div>

            <div className="tabs">
                {t.tabs.map((tab, i) => (
                    <button
                        key={i}
                        className={`tab-btn ${activeTab === i ? 'active' : ''}`}
                        onClick={() => setActiveTab(i)}
                    >
                        <div>{tab}</div>
                        <div style={{ fontSize: '9px', opacity: 0.7, marginTop: '1px' }}>{t.tabLabels[i]}</div>
                    </button>
                ))}
            </div>

            <div className="content">
                {tabComponents[activeTab]}
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
