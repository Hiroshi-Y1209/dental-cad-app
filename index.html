                {
                    id: "9-5",
                    title: "ミリングマシンと3Dプリンター",
                    whatYouLearn: "ミリングマシンと3Dプリンターの詳細な操作と管理方法を学びます。",
                    learningObjectives: "各機器の操作手順、メンテナンス、トラブル対応を習得します。",
                    goodExample: "機器操作が正確で、適切なメンテナンスと問題対応ができる。",
                    badExample: "操作ミスが多く、メンテナンスの知識が不足している。",
                    evaluationCriteria: "機器操作、メンテナンス知識、トラブルシューティング。",
                    teaching: "",
                    teachingId: "[TABLE]\nMesin|Metode Pemrosesan|Bahan yang Didukung\nPenggilingan|Pemrosesan Pengambilan|Zirkonia, Keramik, Logam\nPrinter|Fotolitografi|Resin, Pola Penuangan\n[/TABLE]\n【Part7③~⑧ Milling Machine dan 3D Printer】\n\n■ Dasar Milling Machine\n\n【Struktur】\n・Spindle (sumbu utama): Bagian yang memutar milling bar dengan kecepatan tinggi. Adalah kunci akurasi.\n・Work clamp: Bagian yang mengikat material (disk/block).\n・Motor: Mengontrol pergerakan sumbu. 3-axis hanya pergerakan X/Y/Z, 5-axis memiliki 2 sumbu rotasi tambahan.\n・Tool box: Menyimpan milling bar pengganti. Beberapa mendukung penggantian otomatis.\n\n【Perbedaan 3-axis hingga 5-axis】\n・3-axis: Hanya pergerakan X/Y/Z. Area undercut tidak dapat dipotong. Cocok untuk bentuk sederhana.\n・4-axis: 3-axis + 1 sumbu rotasi. Proses undercut terbatas menjadi mungkin.\n・5-axis: 3-axis + 2 sumbu rotasi. Bentuk kompleks dan area undercut juga dapat dipotong. Versatilitas tertinggi.\n\n【Dry Machining dan Wet Machining】\n・Dry machining: Tidak menggunakan cutting fluid. Digunakan untuk material yang relatif lembut seperti zirconia (semi-sintered) dan PMMA.\n・Wet machining: Menggunakan cutting fluid (air atau minyak). Digunakan untuk material keras seperti logam dan glass ceramic. Tujuannya menghilangkan panas pemotongan dan pembuangan chips.\n\n■ Maintenance Milling Machine\nMaintenance harian sangat penting untuk mempertahankan akurasi.\n\n【Maintenance Harian】\n・Pembersihan interior: Penyingkiran chips, debu. Pembersihan dengan air tekan.\n・Pembersihan spindle: Penyingkiran chips di dalam spindle. Operasi penting yang langsung mempengaruhi akurasi.\n・Verifikasi tool box: Verifikasi kondisi bar, verifikasi penempatan yang benar.\n\n【Maintenance Berkala】\n・Manajemen minyak: Verifikasi jumlah dan kualitas minyak pelumas. Penggantian berkala.\n・Maintenance sistem sirkulasi (mesin wet machining): Pembersihan sistem sirkulasi cutting fluid. Penggantian filter. Verifikasi degradasi cutting fluid.\n・Manajemen tekanan udara: Verifikasi bahwa tekanan suplai udara dalam jangkauan yang tepat.\n・Pengeluaran air: Pengeluaran uap air dari tangki udara. Uap air adalah penyebab karat bar dan malfungsi.\n・Calibration: Melakukan calibration akurasi proses secara berkala. Menggunakan calibration block yang ditunjuk oleh produsen.\n\n■ Manajemen Milling Bar\n\n【Jenis】\n・Milling bar: Untuk pemotongan. Digunakan untuk pemotongan metal dan material sistem resin.\n・Grinding bar: Untuk grinding. Digunakan untuk material rapuh seperti glass ceramic. Dilapisi dengan partikel diamond.\n\n【Pre-Use Check】\nVerifikasi kondisi ujung bar menggunakan microscope (pembesaran):\n・Patah: Apakah ujung patah.\n・Chip: Apakah ada chip pada edge.\n・Wear: Apakah ada rounding dari edge, delamination coating akibat wear.\nJika ada abnormalitas, segera ganti. Proses dengan bar yang wear langsung menyebabkan penurunan akurasi dan unfitting.\n\n【Manajemen Waktu Penggantian】\nCatat jumlah proses atau jam penggunaan, dan lakukan penggantian secara berkala. Kecepatan wear berbeda tergantung material (wear cepat pada proses metal).\n\n■ Fiksasi Material\n・Fiksasi block: Verifikasi posisi penempatan block (orientasi vertikal-horizontal) dan ikat ke clamp.\n・Fiksasi disk: Ikat dengan torque yang seragam. Pengikat yang tidak seragam menyebabkan deflection disk atau proses menyimpang.\n\n■ 3D Printer\n\n【Jenis Resin Cetak】\n・Untuk cetakan kerja: Cetakan model kerja. Hardness dan akurasi diperlukan.\n・Untuk pola casting: Pembuatan pola untuk lost-wax casting. Karakteristik residue rendah selama pembakaran.\n・Untuk crown & bridge: Pembuatan prosthetic sementara.\n・Untuk individual tray: Cetakan individual tray.\n・Untuk denture base: Cetakan denture bed.\nPenggunaan resin yang tidak sesuai dengan tujuan menyebabkan masalah properti atau akurasi, jadi selalu pilih resin yang sesuai.\n\n【Faktor yang Mempengaruhi Akurasi Cetak】\n・Posisi penempatan pada platform: Pada metode DLP, aberasi distorsi projector mempengaruhi akurasi; pusat platform memiliki akurasi tertinggi. Semakin jauh dari pusat, semakin mudah terjadi distorsi.\n・Hubungan antara waktu print, jumlah, dan tinggi: Semakin banyak object, semakin tinggi object, semakin lama waktu print. Arah stacking dan sudut juga mempengaruhi akurasi.\n\n【Manajemen, Operasi, Post-Processing Resin Cetak】\n・Manajemen: Penyimpanan light-protected. Verifikasi tanggal kedaluwarsa. Agitasi sebelum digunakan.\n・Persiapan: Pengisian resin yang tepat ke resin vat. Verifikasi level platform.\n・Operasi: Verifikasi parameter cetak (layer thickness, exposure time dll). Monitoring selama printing.\n・Post-processing: Pembersihan (IPA dll)→penyingkiran support pin→secondary hardening (light curing). Secondary hardening dengan 300 kali penyinaran pada sisi mukosa dan 300 kali pada sisi oklusal adalah standar.\n\n[KEY: Memahami karakteristik mesin penggiling dan printer 3D serta memilih mesin yang tepat mempengaruhi efisiensi produksi]\n[TIP: Memproses banyak produk secara bersamaan mengurangi waktu pemrosesan]\n[WARN: Pemeliharaan berkala mesin yang diabaikan mengurangi akurasi pemrosesan]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Kriteria Pemilihan Mesin Milling\nDalam pemilihan mesin milling, pertimbangkan akurasi pengolahan (plus minus 10-20μm), material yang dapat diproses (zirkonia, logam, wax, PMMA, dll.), jumlah aksis (3, 4, 5), fungsi changer (penggantian blok otomatis), dan dukungan pengolahan wet/dry. Laboratorium kecil cocok dengan model kompak 4-aksis, laboratorium besar cocok dengan model produksi massal 5-aksis.\n\n◆ Pemilihan dan Operasi Printer 3D\nPrinter 3D dental dipilih berdasarkan akurasi (resolusi XY di bawah 50μm), kecepatan pencetakan, biaya material, dan kemudahan pasca-proses. Metode DLP (Asiga, SprintRay, dll.) memiliki akurasi tinggi dan cepat, cocok untuk restorasi sementara, panduan bedah, dan model. Metode LCD memiliki rasio biaya-kinerja baik namun sedikit kurang akurat dibanding DLP.\n\n◆ Penyimpanan dan Manajemen Material\nPenyimpanan yang tepat sangat penting untuk menjaga kualitas material CAM. Blok zirkonia sensitif terhadap kelembaban, segera gunakan setelah membuka kemasan. Resin cetak 3D mengeras dengan sinar UV, jadi simpan dalam wadah pelindung cahaya. Kelola tanggal kedaluwarsa dengan FIFO (first in, first out). Kontrol suhu ruangan juga penting - banyak material direkomendasikan disimpan pada 15-25 derajat C.\n\n◆ Verifikasi Kualitas Pasca-pengolahan\nUntuk verifikasi dimensi produk olahan, digunakan jangka sorong digital, mikroskop, dan mesin pengukur koordinat (CMM). Di tingkat laboratorium, jangka sorong (akurasi 0,01mm) dan mikroskop (10-40x) praktis. Metode paling efektif untuk evaluasi kuantitatif adalah memindai produk dan membandingkan overlay dengan data CAD asli."
                },
                {
                    id: "9-6",
                    title: "適合確認とレジン系材料の仕上げ",
                    whatYouLearn: "加工後の適合確認方法と、レジン系材料の仕上げ工程を学びます。",
                    learningObjectives: "適合の確認手順を理解し、レジン系材料を正確に仕上げられるようにします。",
                    goodExample: "適合が正確で、レジンの仕上げ品質が高い。",
                    badExample: "適合に問題があり、仕上げが雑。",
                    evaluationCriteria: "適合精度、仕上げ品質、表面処理。",
                    teaching: "",
                    teachingId: "[TABLE]\nItem Inspeksi|Standar|Metode Penyesuaian\nAdaptasi Bentuk|Akurasi Margin ±0,1mm|Poles dengan Penggosok\nNada Warna|Standar Warna|Cat Porselen\nCahaya|Kilau Alami|Penyelesaian Akhir\n[/TABLE]\n【Part8①②③ Verifikasi Kecocokan dan Finishing Material Sistem Resin】\n\n■ Prosedur Verifikasi Kecocokan\nProses try-fitting prosthetic yang telah dipotong pada model, verifikasi keadaan kecocokan・adjust. Jika desain CAD tepat, adjustment minimal diperlukan, namun adjustment mungkin diperlukan karena presisi proses atau karakteristik material.\n\n【Step1: Verifikasi Permukaan Internal】\n・Verifikasi apakah chip pemotongan (sisa pemotongan atau chip dari waktu proses) menempel pada permukaan internal. Jika ada, prosthetic tidak dapat fit dengan benar pada model.\n・Pembersihan permukaan internal dengan air tekan atau ultrasonic cleaning.\n・Setelah pembersihan, try-fitting pada model.\n\n【Step2: Identifikasi dan Adjustment Early Contact】\n・Verifikasi apakah ada floating (prosthetic tidak sepenuhnya duduk) saat prosthetic ditempatkan pada model.\n・Jika ada floating, early contact (area yang kontak secara lokal dan kuat) pada permukaan internal adalah penyebabnya.\n・Gunakan fit checker (material pemeriksaan kecocokan) untuk mengidentifikasi area early contact.\n・Gunakan diamond point untuk menghilangkan early contact area.\n・Urutan adjustment: Pertama area puncak pilar→selanjutnya axial surface→terakhir margin area. Area margin harus paling hati-hati.\n\n【Step3: Verifikasi pada Model (4 Pengecekan)】\n①Rotasi: Verifikasi bahwa prosthetic tidak berputar pada pilar. Rotasi mengindikasikan unfitting permukaan internal.\n②Pitching: Verifikasi tidak ada goyangan (pitching) ke depan-belakang atau kiri-kanan. Jika ada pitching, ada early contact lokal pada permukaan internal.\n③Unfitting margin: Verifikasi tidak ada gap pada area margin. Jika ada gap, ada risiko cement leakage atau secondary caries.\n④Sealing: Verifikasi bahwa sealing seragam di seluruh margin.\n\n【Step4: Kriteria Penghentian Adjustment】\nTitik di mana prosthetic jatuh ke dalam formation limit (completely seated) saat ditekan ringan pada permukaan oklusal adalah goal dari adjustment kecocokan. Ideal adalah self-seating tanpa tekanan.\n\n【Verifikasi Kecocokan pada Model Print】n3D print model memiliki karakteristik presisi yang berbeda dari model stone (surface roughness, dimensional accuracy). Pertimbangkan perbedaan ini saat verifikasi kecocokan pada print model.\n\n【Verifikasi Kecocokan Titanium Base】\nDalam kasus implant, verifikasi kecocokan dengan titanium base sangat penting.\n・Mekanisme anti-rotasi sangat penting: Verifikasi bahwa superstructure tidak berputar pada titanium base.\n・Verifikasi tidak ada gap pada interface junction antara titanium base dan superstructure.\n\n■ Finishing Hybrid Resin\n\n【Step1: Adjustment Proximal Surface・Early Occlusal Contact】\nGunakan rubber wheel atau diamond point untuk adjustment proximal contact dan early occlusal contact. Jika desain tepat, hanya micro-adjustment diperlukan.\n\n【Step2: Adjustment Margin】\nGunakan silicone wheel untuk menghilangkan bur atau overhang kecil pada margin area. Area margin adalah boundary dengan gingiva, dan finishing halus penting untuk mempertahankan kesehatan gingiva.\n\n【Step3: Polishing】\nPolish dengan Robinson brush No.9, No.10 ditambah polishing agent. Lakukan tahapan dengan jenis brush (coarse polishing→finish polishing). Dapatkan akhir high-gloss halus.\n\n■ Finishing PMMA Resin\nPMMA lebih lembut dibanding hybrid resin, jadi gunakan carbide bar untuk modifikasi bentuk. Urutan selanjutnya sama dengan hybrid resin (silicone wheel→cloth buff polishing).\n\n【Penanggulangan Area Sulit Dipolish】\nArea yang tidak terjangkau oleh alat polish seperti bagian terdalam dari groove, dapat diolesi dengan smoothing material khusus resin (coating material) untuk memastikan smoothness permukaan.\n\n[KEY: Pemeriksaan adaptasi dan penyelesaian adalah langkah penting terakhir yang menentukan kualitas akhir prostetik]\n[TIP: Pemeriksaan detail dengan lup sambil melepas memastikan akurasi]\n[WARN: Penimbunan berlebihan menyebabkan hilangnya akurasi margin]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Metode Evaluasi Kesesuaian Margin\nKesesuaian margin adalah salah satu faktor terpenting yang menentukan prognosis jangka panjang protesa. Silicone fit checker (bahan uji kesesuaian) banyak digunakan sebagai metode evaluasi. Bahan cetak silikon dioleskan pada permukaan dalam, dipasang pada model, dan setelah mengeras ketebalan film tipis diukur. Rentang yang dapat diterima umumnya di bawah 50μm untuk bagian margin dan di bawah 100μm untuk permukaan dalam.\n\n◆ Teknik Penyelesaian Material Berbasis Resin\nPenyelesaian resin CAD/CAM (PMMA, hybrid resin, dll.) dilakukan dalam urutan pemotongan → pemolesan → pengilatan. Bur karbida untuk koreksi bentuk kasar → poin silikon (kasar → sedang → halus) untuk pemolesan → pasta pengkilat (pasta berlian 1μm) untuk kilap akhir. Arah pemolesan diseragamkan satu arah, kecepatan alat putar diatur 5000-15000rpm sesuai material.\n\n◆ Konfirmasi dan Koreksi Warna\nKonfirmasi warna material resin atau keramik dilakukan di bawah cahaya alami (atau LED suhu warna 5500K). Bandingkan dengan shade guide (Vita Classical, Vita 3D-Master, dll.) dan evaluasi 3 elemen: saturasi, kecerahan, dan hue. Jika warna tidak cocok, untuk resin oleskan stain (cairan pewarna) pada permukaan dan fiksasi dengan polimerisasi cahaya.\n\n◆ Perlakuan Permukaan dan Pra-perawatan Adhesi\nPerlakuan permukaan dalam protesa sangat mempengaruhi kekuatan adhesi. Untuk zirkonia: sandblast (alumina 50μm, 2bar) + primer (mengandung MDP). Untuk lithium disilikat: etsa asam fluorida (5%, 20 detik) + perlakuan silane coupling adalah protokol standar."

                {
                    id: "9-7",
                    title: "メタル・ジルコニア・ニケイ酸リチウムの仕上げ",
                    whatYouLearn: "メタル、ジルコニア、ニケイ酸リチウムそれぞれの仕上げ方法を学びます。",
                    learningObjectives: "各材料の特性に合った仕上げ手順を理解し、実践できるようにします。",
                    goodExample: "材料ごとに適切な仕上げができ、品質が安定している。",
                    badExample: "材料の違いを無視した仕上げで、品質にばらつきがある。",
                    evaluationCriteria: "材料別仕上げ技術、品質安定性、表面品質。",
                    teaching: "",
                    teachingId: "[TABLE]\nBahan|Metode Pembakaran|Penyelesaian Akhir\nZirkonia|Penembakan Suhu Tinggi|Glasir\nSilikat Litium|Penembakan→Penyesuaian Warna|Pewarnaan\nLogam|Penggosok|Pemolesan\n[/TABLE]\n【Part8④⑤⑥⑦ Finishing Metal, Zirconia, dan Lithium Disilicate】\n\n■ Finishing Metal (Logam)\nFinishing prosthetic metal (metal crown, metal frame dll) adalah proses bertahap dari adjustment proximal surface・occlusal hingga akhir polishing.\n\n【Step1: Adjustment Proximal Surface・Occlusal Contact Point】\nGunakan crosscut fine carbide bar untuk adjustment proximal contact dan occlusal contact point. Carbide bar cocok untuk metal cutting dan dapat memodifikasi bentuk secara efisien.\n\n【Step2: Polishing Menengah】\nGunakan silicone point untuk menghilangkan cutting mark dari carbide bar. Lakukan beberapa kali bolak-balik dalam satu arah; dapatkan permukaan seragam. Arah polishing yang konstan menghasilkan finish seragam.\n\n【Step3: Akhir Polishing】\n①High-speed lathe (cloth wheel) untuk coarse polishing→②Robinson brush dengan polishing agent untuk shine polishing→③cloth buff untuk final gloss finishing. Setiap tahap menggunakan polishing agent yang semakin halus.\n\n■ Finishing Wax Pattern\nVerifikasi kecocokan dan finishing wax pattern untuk casting.\n\n【Prosedur】\n①Verifikasi contact point: Verifikasi posisi dan kekuatan area kontak.\n②Adjustment dengan cutting: Adjustment bagian tidak perlu dengan wax instrument.\n③Verifikasi margin: Verifikasi kecocokan margin; jika ada kekurangan, tambahkan wax.\n④Spruing: Tanam sprue (gating) untuk casting. Atur posisi dan ketebalan main sprue dan auxiliary sprue dengan tepat.\n\n■ Finishing Zirconia\nZirconia diproses dalam kondisi semi-sintered, lalu melalui coloring→sintering→final adjustment untuk finishing.\n\n【Step1: Polishing dalam Kondisi Semi-Sintered】\nZirconia semi-sintered (pre-sintered) relatif lembut namun mudah chipping.\n・Gunakan silicone point.\n・Low-speed rotation (jauh lebih rendah dari polishing resin normal).\n・Soft touch (aplikasi dengan gaya ringan).\n・Tekanan berlebihan atau rotasi tinggi adalah penyebab langsung chipping dan harus dihindari sepenuhnya.\n\n【Step2: Coloring (Pewarna)】\nMewarnai zirconia sesuai dengan warna gigi alami.\n・Bagian enamel (edge/occlusal side)→Rendam dalam larutan pewarna blue system (warna transparan).\n・Daerah cervical→Aplikasikan larutan pewarna cervical (warna warm).\n・Masking: Lindungi area yang tidak perlu pewarna (area margin dll) dengan masking material.\n\n【Step3: Sintering】\nPerformasikan final sintering di sintering furnace. Atur sintering program sesuai dengan spesifikasi material producer. Penyusutan sekitar 20% terjadi selama sintering, dan dimensi・hardness・warna akhir ditentukan.\n\n【Step4: Adjustment Setelah Sintering】\nSetelah sintering, zirconia sangat keras. Adjustment harus minimal.\n・Verifikasi kecocokan: Try-fitting pada model untuk verifikasi kecocokan permukaan internal.\n・Adjustment oklusi: Lakukan adjustment minimal diperlukan dengan diamond bar.\n・Adjustment berlebihan adalah penyebab penurunan strength dan surface defect.\n\n【Step5: Stain/Glaze (Opsional)】\nAplikasi stain/glaze paste adalah untuk reproduction warna yang lebih natural jika diperlukan. Namun, untuk memanfaatkan material properties zirconia (strength, durability), seringkali dilakukan hanya finishing dengan polishing tanpa stain/glaze.\n\n■ Finishing Lithium Disilicate (e.max dll)\nLithium disilicate diproses dalam blue state (uncrystallized state), lalu melalui crystallization sintering, kemudian final finishing.\n\n【Step1: Modifikasi Bentuk dalam Blue State】\nLakukan modifikasi bentuk besar dalam kondisi blue state (warna biru pucat semi-transparent). Setelah crystallization, material menjadi sangat keras, jadi lakukan modifikasi pada tahap ini. Gunakan diamond bar (fine).\n\n【Step2: Crystallization (Crystallization Sintering)】\nPerformasikan crystallization sintering di furnace dedicated. Mengikuti sintering program, bentuk kristal lithium disilicate terbentuk. Ini meningkatkan strength dan aesthetics secara signifikan.\n\n【Step3: Adjustment Setelah Sintering】\nLakukan adjustment diperlukan setelah crystallization. Material keras memerlukan adjustment minimal.\n\n【Step4: Aplikasi Stain/Glaze Paste】\nSesuaikan warna dengan stain paste, berikan gloss permukaan dengan glaze paste.\n\n【Step5: Polishing Akhir】\nPolish dengan Robinson brush yang dilengkapi diamond-containing polishing agent, soft touch. Tekanan berlebihan adalah penyebab crack atau chipping.\n\n[KEY: Pemahaman akurat tentang metode pembakaran dan penyelesaian spesifik bahan melengkapi tekstur prostetik estetik]\n[TIP: Mengikuti jadwal pembakaran pabrikan dengan ketat memastikan reproduksi nada warna]\n[WARN: Penyimpangan suhu pembakaran atau waktu menyebabkan perubahan warna dan kilau]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Ilmu Pembakaran Zirkonia\nSintering zirkonia dilakukan pada 1350-1600 derajat C, memanfaatkan transformasi fase dari tetragonal ke monoklinik untuk mendapatkan kekuatan mekanis tinggi. Program suhu tungku sintering (kecepatan pemanasan, suhu maksimum, waktu penahanan, kecepatan pendinginan) dikontrol secara ketat. Perubahan suhu mendadak menyebabkan retak, sehingga kontrol suhu terutama selama proses pendinginan sangat penting.\n\n◆ Teknik Staining dan Glazing\nUntuk penyesuaian warna zirkonia dan lithium disilikat, ada metode staining (pewarnaan permukaan) dan metode cutback + layering. Metode staining mengaplikasikan pasta stain (cairan warna) pada permukaan zirkonia yang telah disinter dan membakarnya pada suhu khusus (800-900 derajat C). Translucency bagian insisivus disesuaikan dengan konsentrasi warna stain dan jumlah pembakaran.\n\n◆ Manajemen Proses Penyelesaian Logam\nPemolesan protesa logam mengikuti pemolesan bertahap: #120 → #400 → #800 → #1500 → buff. Paduan Co-Cr memiliki kekerasan tinggi dan memakan waktu untuk dipoles, sedangkan titanium lunak dan reaktif tinggi sehingga menggunakan bahan poles khusus. Pemolesan elektrolit menghasilkan penyelesaian permukaan yang seragam, cocok untuk komponen presisi seperti abutment implan.\n\n◆ Catatan Kualitas dan Manajemen Dokumen\nCatatan kualitas protesa penting dari perspektif traceability. Catat dan simpan nomor lot material yang digunakan, kondisi pengolahan (parameter CAM, program suhu pembakaran), hasil inspeksi kualitas, dan nama teknisi penanggung jawab. Pembangunan sistem manajemen dokumen sesuai ISO 13485 diharapkan."

                {
                    id: "9-8",
                    title: "デジタルメタルフレームと個人トレーの仕上げ",
                    whatYouLearn: "デジタルメタルフレームと個人トレーの仕上げ工程を学びます。",
                    learningObjectives: "メタルフレームとトレーそれぞれの仕上げ要件を理解し、実践できるようにします。",
                    goodExample: "仕上げが丁寧で、適合と機能を満たしている。",
                    badExample: "仕上げが不十分で、適合に問題がある。",
                    evaluationCriteria: "仕上げ品質、適合性、機能性。",
                    teaching: "",
                    teachingId: "[TABLE]\nProstetik|Metode Penyelesaian|Jaminan Kualitas\nKerangka Logam Digital|Penggosok Buff|Penyesuaian Kekasaran Permukaan\nNampan Individual|Penggosok Buff→Pewarnaan|Reproduksi Warna\n[/TABLE]\n【Part8⑧⑨ Finishing Digital Metal Frame dan Individual Tray】\n\n■ Finishing Digital Metal Frame\nProses finishing metal frame dari resin pattern tercetak. Alur: desain CAD→printing resin pattern dengan 3D printer→final metal frame dengan casting.\n\n【Step1: Pemotongan Support Pin】\n・Gunakan Fisherbar 699. Fisherbar 699 sangat cocok untuk pemotongan support pin resin pattern karena memiliki efisiensi cutting baik dan sedikit lilitan.\n・Dalam kasus pin ladder (multiple support pins terhubung dalam struktur kisi), potong sebagai satu kesatuan dari area major connector. Jika dipotong individual, frame mengalami beban.\n\n【Step2: Verifikasi Retentive Force・Kecocokan】\n・Verifikasi rebound resin pattern: Resin 3D print mengalami slight deformation (rebound) seiring waktu. Setelah pemotongan, coba-fitkan segera pada model untuk verifikasi kecocokan.\n・Perbandingan dengan design line CAD: Verifikasi bahwa design line CAD (running clasp, connector position dll) sesuai dengan completed resin pattern. Cocokan posisi design line pada model dengan pattern.\n・Verifikasi retentive force: Verifikasi bahwa clasp menggigit pilar dengan retentive force yang sesuai.\n\n【Step3: Modifikasi Bentuk dan Spruing】\n・Polishing clasp upper margin/major connector margin: Hilangkan bur dan step dengan big point (polishing point), selesaikan margin dengan halus.\n・Wax filling rest area: Isi area undercut rest atau micro void dengan wax untuk mencegah bubble formation selama casting.\n・Spruing: Tanam sprue (gating) untuk casting.\n  - Main sprue: Rute utama aliran metal casting. Atur ketebalan dan panjang dengan tepat.\n  - Auxiliary sprue: Ditambahkan pada area di mana main sprue tidak mencapai. Tempatkan pada bagian tipis atau area jauh.\n\n【Step4: Casting (Embedding・Casting)】\n・Expansion control: Resin 3D printer mengalami slight shrinkage selama casting, jadi gunakan embedding material khusus 3D printer untuk mengontrol jumlah ekspansi. Koefisien ekspansi berbeda dari embedding material untuk wax pattern normal, jadi penting menggunakan material khusus.\n\n【Step5: Metal Polishing hingga Finishing】\nFinishing metal frame setelah casting sama dengan metal finishing procedure di Day27 (carbide bar→silicone point→Robinson brush→cloth buff).\n\n■ Finishing Individual Tray\nFinishing akhir individual tray tercetak dari 3D printer.\n\n【Step1: Penyingkiran Support Pin】\nPotong support pin dengan Fisherbar 699. Selesaikan permukaan pemotongan dengan halus.\n\n【Step2: Try-Fitting Model】\nCoba-fitkan individual tray pada model untuk verifikasi kecocokan. Verifikasi bahwa relief seragam (gap) terjaga di seluruh keliling.\n\n【Step3: Verifikasi Outline】\nVerifikasi bahwa design outline line CAD sesuai dengan actual tray margin. Verifikasi panjang margin, posisi takik frenum area, posisi handle.\n\n【Step4: Modifikasi Bentuk】\nGunakan carbide bar (30,000 rpm rotation) untuk menghilangkan bagian tidak perlu atau margin bur. Selesaikan margin dengan halus dan bulat.\n\n【Step5: Polishing】\nPolish permukaan dengan big point atau silicone point. Selesaikan permukaan mukosa dengan smooth (untuk tidak mengganggu aliran impression material).\n\n【Step6: Verifikasi Pembersihan・Persiapan Pengiriman】\nLakukan final washing untuk verifikasi tidak ada material asing menempel. Lakukan adjustment stopper atau relief refinement jika diperlukan, selesaikan persiapan pengiriman.\n\n[KEY: Penyelesaian presisi penggalian kerangka dan pewarnaan nampan melengkapi kualitas akhir pembuatan gigi palsu]\n[TIP: Menggunakan berbagai jenis kain gosok menciptakan tekstur yang berbeda]\n[WARN: Penggosok berlebihan mengorbankan akurasi dimensi]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Penyelesaian Logam Cetak 3D\nFrame logam yang diproduksi dengan cetak 3D (SLM/DMLS) memiliki karakteristik permukaan berbeda dari logam cor konvensional. Terdapat anisotropi sesuai arah lapisan, dan permukaan support memiliki kekasaran permukaan yang besar. Proses penyelesaian yang direkomendasikan: penghapusan support → sandblast (alumina 110μm) → pemolesan elektrolit → pemolesan buff akhir.\n\n◆ Penyelesaian dan Pembentukan Tepi Sendok Cetak Individual\nDalam penyelesaian sendok cetak individual yang dicetak 3D, tepi yang tajam dibulatkan untuk mencegah ketidaknyamanan di dalam mulut. Tepi diperpanjang/dimodifikasi dengan modeling compound atau utility wax, dan bentuk tepi akhir ditentukan melalui border molding. Pendekatan hybrid - mengatur posisi tepi perkiraan pada tahap desain digital, lalu finalisasi dengan penyesuaian analog secara klinis - sangat praktis.\n\n◆ Pemolesan Gigi Tiruan dan Pelapisan Fluor\nDalam pemolesan gigi tiruan (denture), kehalusan permukaan basis langsung berkaitan dengan kebersihan mulut. Permukaan kasar mendorong perlekatan bakteri dan menyebabkan bau mulut serta mukositis. Basis resin direkomendasikan dipoles hingga kekasaran permukaan Ra 0,2μm atau kurang. Baru-baru ini, teknologi modifikasi permukaan seperti ion plating dan perlakuan plasma juga sedang diteliti.\n\n◆ Otomatisasi Proses Penyelesaian\nProses penyelesaian yang secara konvensional bergantung pada kerja manual, sebagian mulai diotomatisasi dengan mesin poles otomatis dan kabinet sandblast. Pemolesan barrel cocok untuk pemrosesan batch komponen kecil (abutment, dll.). Sistem poles otomatis dengan lengan robot masih mahal namun mulai diterapkan di laboratorium besar."

                {
                    id: "9-9",
                    title: "スキルマップと最終試験対策",
                    whatYouLearn: "自己のスキルマップを確認し、最終試験に向けた対策を行います。",
                    learningObjectives: "弱点を把握し、最終試験で必要な全スキルを確認・強化します。",
                    goodExample: "弱点が明確で、対策が具体的にできている。",
                    badExample: "弱点の自覚がなく、対策が不十分。",
                    evaluationCriteria: "自己評価能力、弱点把握、対策の具体性。",

ent, titanium base, gingival margin, implant bridge dll. Sesuai dengan konten Day 17-18.\n\n【Kategori 6: CAD/CAM Denture (18 item)】\nNomor skill map 6-1~6-18. Metal frame design, clasp library, individual tray design・print, full denture dll. Sesuai dengan konten Day 19, 21-23.\n\n【Kategori 7: Software CAM・Mesin Proses (20 item)】\nNomor skill map 7-1~7-20. Operasi software CAM, proses per material, maintenance milling machine, bar management, operasi 3D printer dll. Sesuai dengan konten Day 24-25.\n\n【Kategori 8: Verifikasi Kecocokan・Finishing (20 item)】\nNomor skill map 8-1~8-20. Prosedur verifikasi kecocokan, finishing setiap material (hybrid resin/PMMA/metal/zirconia/lithium disilicate/digital metal frame/individual tray). Sesuai dengan konten Day 26-28.\n\n■ Analisis Kelemahan dan Comprehensive Review\nIdentifikasi item dengan evaluasi 2 atau lebih rendah sebagai \"field kelemahan\". Melalui konsultasi dengan instruktur, tentukan field prioritas untuk comprehensive review, dan lakukan concentrated practice dengan fokus pada item kelemahan. Untuk skill upgrade efisien dalam waktu terbatas, conduct focused practice khusus item kelemahan.\n\n■ Mock Exam\nBuat mock exam dalam format sama dengan final exam:\n・Mock written (30 pertanyaan dari seluruh range, 45 menit)\n・Mock practical (crown design 30 menit + fit verification 20 menit)\nBerdasarkan hasil mock exam, verifikasi poin yang perlu dikoreksi sebelum final exam.\n\n[KEY: Peta keterampilan secara sistematis mengatur hasil pembelajaran 30 hari dan memvisualisasikan status penguasaan]\n[TIP: Mengidentifikasi item lemah dan melakukan peninjauan ulang terkonsentrasi meningkatkan tingkat lulus tes final]\n[WARN: Penguasaan seimbang di semua area adalah persyaratan untuk lulus tes final]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Cara Memanfaatkan Peta Keterampilan\nPeta keterampilan bukan sekadar daftar periksa, melainkan alat untuk manajemen progres pembelajaran dan evaluasi diri. Evaluasi setiap item keterampil                     teachingId: "[FLOW: Ikuti Tes Final → Jalankan Tugas Praktik → Penentuan Sertifikat Penyelesaian]\n【Ujian Akhir dan Sertifikasi Kelulusan】\n\n■ Konstruksi Ujian Akhir\nEvaluasi hasil pembelajaran 30 hari secara komprehensif melalui ujian tertulis dan ujian praktik.\n\n■ Ujian Tertulis (50 pertanyaan・60 menit)\nDiambil dari seluruh 8 bagian. Persentase soal setiap bagian sebagai berikut:\n\n【Part 1: Dasar Teknologi Digital (5 pertanyaan)】\nWorkflow digital, karakteristik file format (STL/PLY/OBJ dll), jenis dan karakteristik software CAD, perbedaan milling machine dan 3D printer, lingkungan kerja.\n\n【Part 2: Scanning (7 pertanyaan)】\nStruktur dan prinsip scanner, tujuan dan metode aplikasi powder, operasi scan (urutan・range・precautions), data matching (reference point・4 metode penanganan), implant scan (pemilihan scan body・pemasangan・arah).\n\n【Part 3: IOS (6 pertanyaan)】\nTechnical report (reporting dalam unit 10μm), 3 metode verifikasi design, 4 metode penerimaan data, 6 item verifikasi data IOS, prosedur pengaturan margin, re-matching bite data, troubleshooting.\n\n【Part 4: CAD Design Crown・Bridge (12 pertanyaan)】\n11 langkah CAD design, parameter cement space, 3 metode pemilihan crown form, prinsip positioning, tooth continuity, pengaturan occlusal contact, proximal contact, tissue harmony, anterior design, cutback, connector design, model builder.\n\n【Part 5: CAD Design Implant (5 pertanyaan)】\nCustom abutment (arah・taper reference value・margin), titanium base (mekanisme anti-rotasi), gingival margin design, implant bridge (arrangement・cleansibility・access hole).\n\n【Part 6: CAD/CAM Denture (5 pertanyaan)】\nMetal frame design (blockout・clasp・connector・rest), clasp library, individual tray design・print, full denture scan・design.\n\n【Part 7: Software CAM・Mesin Proses (5 pertanyaan)】\nOperasi software CAM (sequence・nesting・support pin), kondisi proses per material, maintenance milling machine, bar management, operasi 3D printer.\n\n【Part 8: Verifikasi Kecocokan・Finishing (5 pertanyaan)】\nProsedur verifikasi kecocokan (4 pengecekan), prosedur finishing setiap material (hybrid resin/PMMA/metal/zirconia/lithium disilicate), finishing digital metal frame, individual tray finishing.\n\n■ Ujian Praktik (Total 105 menit)\n\n【①Crown Design (30 menit)】\nCAD design single crown (molar atau anterior). Margin setting→pemilihan crown form→positioning→occlusal・contact setting→completion. Evaluasi berdasarkan quality checklist (margin fit・cement space・occlusal contact・contact・continuity・cleansibility).\n\n【②Bridge Design (45 menit)】\nCAD design 3-tooth bridge. Margin setting pilar→design pontic→connector design→occlusal・contact setting→overall verification. Cross-sectional area and position dari connector juga termasuk kriteria evaluasi.\n\n【③Fit Verification・Finishing (30 menit)】\nFit verification dan finishing prosthetic yang telah dipotong. Verifikasi permukaan internal→identifikasi dan adjustment early contact→verifikasi pada model (tanpa rotasi・pitching)→polishing.\n\n■ Kriteria Kelulusan\n・Ujian tertulis: 70% keatas (35 pertanyaan atau lebih benar)\n・Ujian praktik: Semua item quality checklist tercapai\n・Evaluasi skill map akhir: Rata-rata 153 item 3.0 atau lebih\nKelulusan ditentukan dengan clear semua 3 kriteria.\n\n■ Evaluasi Skill Map Akhir\nInstruktur melakukan evaluasi 5-level dan membandingkan dengan evaluasi awal Day 1 (atau evaluasi mid-term) untuk verifikasi pertumbuhan. Hitung nilai rata-rata setiap kategori dan nilai rata-rata overall.\n\n■ Setelah Kelulusan\nSertifikat kelulusan diterbitkan. Berikan advisory tentang rencana pembelajaran di masa depan (continuing education, adaptasi material baru, deep dive spesialisasi dll).\n\n[KEY: Tes final dan sertifikat penyelesaian merangkum pembelajaran 30 hari dan memverifikasi penguasaan teknik tingkat praktik]\n[TIP: Sebelum ujian, periksa peta keterampilan untuk mengetahui kelemahan dan fokus ulasan terakhir]\n[WARN: Tidak menguasai satu area mengakibatkan kegagalan untuk mendapatkan sertifikat penyelesaian]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Persiapan Mental Hari Ujian Akhir\nPada hari ujian, manajemen kondisi fisik dan waktu paling penting. Dalam ujian tulis, baca soal dengan cermat dan jawab dari soal yang pasti bisa mendapat nilai. Dalam ujian praktik, lihat keseluruhan kasus sebelum mulai bekerja, buat rencana desain, lalu mulai operasi. Kesalahan operasi akibat panik adalah pola kegagalan paling umum.\n\n◆ Langkah Peningkatan Setelah Kelulusan\nSetelah sertifikasi kelulusan, mengumpulkan pengalaman kasus klinis nyata menjadi prioritas utama. 3 bulan pertama menangani kasus di bawah bimbingan instruktur, mulai pemrosesan kasus mandiri setelah 6 bulan. Mulai dari kasus tingkat kesulitan rendah (mahkota tunggal, inlay) dan secara bertahap ke kasus lebih kompleks (jembatan span panjang, protesa implan, full mouth).\n\n◆ Prospek Masa Depan Pemrosesan Digital\nKemajuan teknologi AI mempercepat otomatisasi desain CAD. Saat ini, pembuatan otomatis bentuk permukaan oklusal dan deteksi otomatis garis margin sudah pada tingkat praktis. Di masa depan, AI mungkin dapat secara otomatis merancang dari scan intraoral hingga protesa akhir, dan teknisi akan fokus pada kontrol kualitas dan penyesuaian akhir. Namun untuk kasus estetik kompleks dan kasus sulit, penilaian dan kreativitas manusia tetap tidak tergantikan.\n\n◆ Teknisi Gigi sebagai Pembelajar Seumur Hidup\nProgram pendidikan 30 hari ini hanyalah garis start sebagai teknisi gigi digital. Sikap terus belajar mengikuti kemajuan teknologi meningkatkan nilai sebagai profesional. Buat rencana pembelajaran tahunan dan seimbangkan: penguasaan teknologi baru (seminar 2-3 kali/tahun), pendalaman keterampilan yang ada (evaluasi diri bulanan), dan perluasan wawasan bidang terkait (ilmu material gigi, anatomi oral, kedokteran gigi estetik)."

apkan untuk mengidentifikasi area dengan risiko fraktur tinggi sebelumnya. Teknologi ini masih dalam tahap penelitian namun berpotensi diintegrasikan ke perangkat lunak CAD di masa depan.",

        // Format teaching content into styled React elements with diagrams
        function formatTeaching(text) {
            if (!text) return React.createElement('p', {style:{color:'#9ca3af'}}, '（教材は利用できません）');
            const lines = text.split('\n');
            const elements = [];
            let key = 0;
            let i = 0;

            while (i < lines.length) {
                const line = lines[i];
                const trimmed = line.trim();
                if (!trimmed) { i++; continue; }

                // FLOW diagram: [FLOW: A → B → C → D]
                if (/^\[FLOW:/.test(trimmed)) {
                    const content = trimmed.replace(/^\[FLOW:\s*/, '').replace(/\]$/, '');
                    const steps = content.split('→').map(s => s.trim());
                    const flowItems = [];
                    steps.forEach((step, idx) => {
                        flowItems.push(React.createElement('div', {key: 'fs'+idx, style:{
                            background: 'linear-gradient(135deg, #3b82f6, #2563eb)', color: 'white',
                            padding: '8px 14px', borderRadius: '8px', fontSize: '12px', fontWeight: '600',
                            textAlign: 'center', minWidth: '70px', boxShadow: '0 2px 4px rgba(37,99,235,0.3)'
                        }}, step));
                        if (idx < steps.length - 1) {
                            flowItems.push(React.createElement('div', {key: 'fa'+idx, style:{
                                color: '#3b82f6', fontSize: '18px', fontWeight: '700', display: 'flex', alignItems: 'center'
                            }}, '→'));
                        }
                    });
                    elements.push(React.createElement('div', {key: key++, style:{
                        display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap',
                        justifyContent: 'center', padding: '16px 12px', margin: '12px 0',
                        background: '#f0f7ff', borderRadius: '10px', border: '1px solid #bfdbfe'
                    }}, flowItems));
                    i++; continue;
                }

                // TABLE: [TABLE] header1|header2 \n row1|row2 \n ... [/TABLE]
                if (/^\[TABLE\]/.test(trimmed)) {
                    const tableRows = [];
                    i++;
                    while (i < lines.length && !/^\[\/TABLE\]/.test(lines[i].trim())) {
                        tableRows.push(lines[i].trim());
                        i++;
                    }
                    if (i < lines.length) i++; // skip [/TABLE]
                    if (tableRows.length > 0) {
                        const headerCells = tableRows[0].split('|').map(c => c.trim());
                        const bodyRows = tableRows.slice(1).map(r => r.split('|').map(c => c.trim()));
                        const thead = React.createElement('thead', null,
                            React.createElement('tr', null, headerCells.map((h, ci) =>
                                React.createElement('th', {key: ci, style:{
                                    padding: '8px 12px', background: '#1e40af', color: 'white',
                                    fontSize: '12px', fontWeight: '600', textAlign: 'left',
                                    borderBottom: '2px solid #1e3a8a'
                                }}, h)
                            ))
                        );
                        const tbody = React.createElement('tbody', null, bodyRows.map((row, ri) =>
                            React.createElement('tr', {key: ri, style:{background: ri % 2 === 0 ? '#f8fafc' : 'white'}},
                                row.map((cell, ci) =>
                                    React.createElement('td', {key: ci, style:{
                                        padding: '7px 12px', fontSize: '12px', borderBottom: '1px solid #e2e8f0',
                                        color: '#374151', lineHeight: '1.5'
                                    }}, cell)
                                )
                            )
                        ));
                        elements.push(React.createElement('div', {key: key++, style:{
                            margin: '12px 0', borderRadius: '8px', overflow: 'hidden',
                            border: '1px solid #bfdbfe', boxShadow: '0 1px 4px rgba(0,0,0,0.06)'
                        }}, React.createElement('table', {style:{
                            width: '100%', borderCollapse: 'collapse'
                        }}, thead, tbody)));
                    }
                    continue;
                }

                // KEY point: [KEY: text]
                if (/^\[KEY:/.test(trimmed)) {
                    const content = trimmed.replace(/^\[KEY:\s*/, '').replace(/\]$/, '');
                    elements.push(React.createElement('div', {key: key++, style:{
                        background: 'linear-gradient(135deg, #fef3c7, #fde68a)', border: '1px solid #f59e0b',
                        borderRadius: '8px', padding: '12px 16px', margin: '12px 0',
                        display: 'flex', gap: '10px', alignItems: 'flex-start'
                    }},
                        React.createElement('span', {style:{fontSize: '18px', flexShrink: 0}}, '⭐'),
                        React.createElement('div', {style:{fontSize: '13px', color: '#92400e', fontWeight: '600', lineHeight: '1.6'}}, content)
                    ));
                    i++; continue;
                }

                // TIP: [TIP: text]
                if (/^\[TIP:/.test(trimmed)) {
                    const content = trimmed.replace(/^\[TIP:\s*/, '').replace(/\]$/, '');
                    elements.push(React.createElement('div', {key: key++, style:{
                        background: '#f0fdf4', border: '1px solid #86efac',
                        borderRadius: '8px', padding: '12px 16px', margin: '10px 0',
                        display: 'flex', gap: '10px', alignItems: 'flex-start'
                    }},
                        React.createElement('span', {style:{fontSize: '16px', flexShrink: 0}}, '💡'),
                        React.createElement('div', {style:{fontSize: '12px', color: '#166534', lineHeight: '1.6'}}, content)
                    ));
                    i++; continue;
                }

                // WARN: [WARN: text]
                if (/^\[WARN:/.test(trimmed)) {
                    const content = trimmed.replace(/^\[WARN:\s*/, '').replace(/\]$/, '');
                    elements.push(React.createElement('div', {key: key++, style:{
                        background: '#fef2f2', border: '1px solid #fca5a5',
                        borderRadius: '8px', padding: '12px 16px', margin: '10px 0',
                        display: 'flex', gap: '10px', alignItems: 'flex-start'
                    }},
                        React.createElement('span', {style:{fontSize: '16px', flexShrink: 0}}, '⚠️'),
                        React.createElement('div', {style:{fontSize: '12px', color: '#991b1b', lineHeight: '1.6'}}, content)
                    ));
                    i++; continue;
                }

                // IMG emoji diagram: [IMG: emoji_text]
                if (/^\[IMG:/.test(trimmed)) {
                    const content = trimmed.replace(/^\[IMG:\s*/, '').replace(/\]$/, '');
                    elements.push(React.createElement('div', {key: key++, style:{
                        textAlign: 'center', padding: '16px', margin: '12px 0',
                        background: '#f8fafc', borderRadius: '10px', border: '1px dashed #cbd5e1',
                        fontSize: '28px', letterSpacing: '8px', lineHeight: '1.8'
                    }}, content));
                    i++; continue;
                }

                // Day separator ---
                if (/^-{3,}$/.test(trimmed)) {
                    elements.push(React.createElement('hr', {key: key++, style:{
                        border: 'none', borderTop: '2px dashed #cbd5e1', margin: '24px 0'
                    }}));
                    i++; continue;
                }

                // Main section header 【...】 standalone
                if (/^【[^】]*】$/.test(trimmed)) {
                    elements.push(React.createElement('div', {key: key++, style:{
                        background: 'linear-gradient(135deg, #1e40af, #3b82f6)',
                        color: 'white', padding: '12px 16px', borderRadius: '8px',
                        fontSize: '15px', fontWeight: '700', marginTop: elements.length > 0 ? '20px' : '0',
                        marginBottom: '12px', boxShadow: '0 2px 8px rgba(59,130,246,0.3)'
                    }}, trimmed));
                    i++; continue;
                }

                // Subsection ■
                if (trimmed.startsWith('■')) {
                    elements.push(React.createElement('div', {key: key++, style:{
                        fontSize: '14px', fontWeight: '700', color: '#1e40af',
                        marginTop: '18px', marginBottom: '6px', paddingBottom: '5px',
                        borderBottom: '2px solid #bfdbfe', display: 'flex', alignItems: 'center', gap: '6px'
                    }}, React.createElement('span', {style:{
                        display: 'inline-block', width: '4px', height: '18px',
                        background: '#3b82f6', borderRadius: '2px', flexShrink: 0
                    }}), trimmed.substring(1).trim()));
                    i++; continue;
                }

                // Step markers 【Step...】
                if (/^【Step\d+[：:]/.test(trimmed) || /^【ステップ/.test(trimmed)) {
                    const match = trimmed.match(/^(【[^】]+】)(.*)/);
                    if (match) {
                        elements.push(React.createElement('div', {key: key++, style:{
                            background: '#eff6ff', border: '1px solid #bfdbfe',
                            borderRadius: '6px', padding: '10px 14px', marginTop: '8px', marginBottom: '4px'
                        }},
                            React.createElement('span', {style:{color: '#1d4ed8', fontWeight: '700', fontSize: '13px'}}, match[1]),
                            React.createElement('span', {style:{color: '#374151', fontSize: '13px', marginLeft: '4px'}}, match[2])
                        ));
                        i++; continue;
                    }
                }

                // Inline 【...】 headers
                if (/^【[^】]+】/.test(trimmed) && !/^【Part/.test(trimmed)) {
                    const match = trimmed.match(/^(【[^】]+】)(.*)/);
                    if (match) {
                        elements.push(React.createElement('div', {key: key++, style:{
                            background: '#f0fdf4', border: '1px solid #bbf7d0',
                            borderRadius: '6px', padding: '10px 14px', marginTop: '8px', marginBottom: '4px'
                        }},
                            React.createElement('span', {style:{color: '#166534', fontWeight: '700', fontSize: '13px'}}, match[1]),
                            match[2] ? React.createElement('span', {style:{color: '#374151', fontSize: '13px', marginLeft: '4px'}}, match[2]) : null
                        ));
                        i++; continue;
                    }
                }

                // Bullet ・
                if (trimmed.startsWith('・')) {
                    elements.push(React.createElement('div', {key: key++, style:{
                        display: 'flex', gap: '8px', paddingLeft: '8px',
                        marginTop: '3px', marginBottom: '3px', fontSize: '13px', lineHeight: '1.6', color: '#374151'
                    }},
                        React.createElement('span', {style:{color: '#3b82f6', fontWeight: '700', flexShrink: 0}}, '•'),
                        React.createElement('span', null, trimmed.substring(1).trim())
                    ));
                    i++; continue;
                }

                // Numbered ①②③...
                if (/^[①②③④⑤⑥⑦⑧⑨⑩]/.test(trimmed)) {
                    const numMatch = trimmed.match(/^([①②③④⑤⑥⑦⑧⑨⑩])(.*)/);
                    if (numMatch) {
                        elements.push(React.createElement('div', {key: key++, style:{
                            display: 'flex', gap: '8px', paddingLeft: '4px',
                            marginTop: '5px', marginBottom: '3px', fontSize: '13px', lineHeight: '1.6', color: '#374151'
                        }},
                            React.createElement('span', {style:{color: '#1d4ed8', fontWeight: '700', fontSize: '14px', flexShrink: 0}}, numMatch[1]),
                            React.createElement('span', null, numMatch[2])
                        ));
                        i++; continue;
                    }
                }

                // Regular paragraph
                elements.push(React.createElement('p', {key: key++, style:{
                    fontSize: '13px', lineHeight: '1.7', color: '#374151', margin: '5px 0'
                }}, trimmed));
                i++;
            }

            return React.createElement('div', {style:{padding: '4px 0'}}, elements);
        }

            const [currentAnswers, setCurrentAnswers] = React.useState({});

                const key = `${partIdx}-${qIdx}`;
                setCurrentAnswers(prev => ({...prev, [key]: answer}));

                            }
                        }
                    });
                });

                                                    </label>
                                                    <textarea
                                                        placeholder={language === 'ja' ? '例：マージンラインの位置が合っているか自信がない、コンタクトの強さの調整が難しかった...' : 'Contoh: Tidak yakin posisi garis margin sudah tepat, sulit menyesuaikan kekuatan kontak...'}
                                                        value={submissionData.comment}
                                                        onChange={(e) => handleSubmissionChange('comment', e.target.value)}
                                                        style={{minHeight: '80px'}}
                                                    />
                                                </div>
                                            )}

                                            <button 
                                                className="submit-btn"
                                                onClick={() => {
                                                    localStorage.setItem(`submission_${selectedLevel}`, JSON.stringify(submissionData));
                                                    alert(language === 'ja' ? '提出が完了しました' : 'Pengajuan selesai');
                                                }}
                                            >
                                                {language === 'ja' ? '提出する' : 'Kirim'}
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {activeTab === 3 && (
                            <div>
                                <div className="card">
                                    <h3>{t.evaluation}</h3>
                                    <div className="info-row">
                                        <span className="info-label">{language === 'ja' ? '評価対象課題' : 'Tugas Dinilai'}</span>
                                        <span className="info-value">Level 2: インレー</span>
                                    </div>
                                </div>

                                <h3 className="section-title">{t.evaluationCriteria}</h3>

                                <div className="card">
                                    <div className="form-group">
                                        <label className="form-label">{t.margin}</label>
                                        <select
                                            value={evaluationData.margin}
                                            onChange={(e) => handleEvaluationChange('margin', e.target.value)}
                                        >
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">{t.contact}</label>
                                        <select
                                            value={evaluationData.contact}
                                            onChange={(e) => handleEvaluationChange('contact', e.target.value)}
                                        >
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">{t.occlusalmorphology}</label>
                                        <select
                                            value={evaluationData.morphology}
                                            onChange={(e) => handleEvaluationChange('morphology', e.target.value)}
                                        >
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">{t.smoothness}</label>
                                        <select
                                            value={evaluationData.smoothness}
                                            onChange={(e) => handleEvaluationChange('smoothness', e.target.value)}
                                        >
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">{t.instructionComprehension}</label>
                                        <select
                                            value={evaluationData.comprehension}
                                            onChange={(e) => handleEvaluationChange('comprehension', e.target.value)}
                                        >
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>
                                </div>

                                <div className="score-display">
                                    {totalScore} / 25
                                </div>

                                <div className={`pass-indicator ${isPassed ? 'pass' : 'fail'}`}>
                                    {isPassed ? `✓ ${t.pass}` : `✗ ${t.fail}`}
                                </div>

                                <div className="form-group">
                                    <label className="form-label">{t.instructorComment}</label>
                                    <textarea
                                        placeholder="講師コメント / Komentar Instruktur"
                                        value={evaluationData.instructorComment}
                                        onChange={(e) => handleEvaluationChange('instructorComment', e.target.value)}
                                    />
                                </div>

                                <div className="admin-info">
                                    <h4 style={{fontSize: '12px', marginBottom: '6px'}}>
                                        {language === 'ja' ? '管理情報' : 'Informasi Admin'}
                                    </h4>
                                    <div className="info-row">
                                        <span className="info-label">{t.availableLessons}</span>
                                        <span className="info-value">9</span>
                                    </div>
                                    <div className="info-row">
                                        <span className="info-label">{t.currentSelection}</span>
                                        <span className="info-value">Level 2</span>
                                    </div>
                                    <div className="info-row">
                                        <span className="info-label">{t.passedCount}</span>
                                        <span className="info-value">1</span>
                                    </div>
                                    <div className="info-row">
                                        <span className="info-label">{t.lastLogin}</span>
                                        <span className="info-value">2026-03-17</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Auth Wrapper
        function App() {
            const [session, setSession] = useState(null);
            const [checking, setChecking] = useState(true);

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('dental_cad_session');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        const found = REGISTERED_USERS.find(
                            u => u.email.toLowerCase() === (parsed.email || '').toLowerCase()
                        );
                        if (found) {
                            setSession(parsed);
                        } else {
                            localStorage.removeItem('dental_cad_session');
                        }
                    }
                } catch (e) {
                    localStorage.removeItem('dental_cad_session');
                }
                setChecking(false);
            }, []);

            const handleLogin = (newSession) => {
                setSession(newSession);
            };

            const handleLogout = () => {
                localStorage.removeItem('dental_cad_session');
                setSession(null);
            };

            if (checking) return null;

            if (!session) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return <DentalCADApp session={session} onLogout={handleLogout} />;
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
