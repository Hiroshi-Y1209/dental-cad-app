                    id: "7-3",
                    title: "デジタルメタルフレームの設計",
                    whatYouLearn: "デジタルでのメタルフレーム設計の基礎を学びます。",
                    learningObjectives: "メタルフレームのデジタル設計手順と、従来法との違いを理解します。",
                    goodExample: "メタルフレームの設計が正確で、適切な厚みと形態が確保されている。",
                    badExample: "フレームの厚みが不均一で、設計に不備がある。",
                    evaluationCriteria: "フレーム設計精度、厚み管理、全体構造。",
                    teaching: "[TABLE]\nコンポーネント|設計方法|強度確保\nメタルフレーム|CADで基本形状|リブ構造追加\nリテンションレール|レジンインサート用|アンダーカット形成\nメッシュ|レジン結着面|タッチ点設定\n[/TABLE]\n【Part6①② デジタルメタルフレームの設計】\n\n■ デジタルメタルフレームとは\n部分床義歯（パーシャルデンチャー）の金属骨格部分をCADで設計する技術。従来はワックスでの手作業パターン製作だったが、デジタル化により精度と効率が向上。CADで設計したパターンを3Dプリント→鋳造、またはミリングで金属フレームを製作する。\n\n■ ブロックアウト\n\n【アナログとデジタルのブロックアウトの違い】\n・アナログ：サベイヤーで模型の着脱方向を決定→アンダーカット部にワックスを塗布してブロックアウト。\n・デジタル：CADソフト上で着脱方向を設定→ソフトが自動的にアンダーカット部を検出→デジタルでブロックアウト処理。\n\n【着脱方向の設定】\nCADソフトで模型の着脱方向（挿入方向）を設定する。着脱方向はフレーム全体の設計に影響するため、最初に慎重に決定する。\n\n【ブロックアウトの角度】\n一般的なブロックアウト角度は4〜7°。この角度でアンダーカット部を滑らかに埋めて、義歯の着脱を容易にする。CADソフトではイレーサーツールを使ってブロックアウト領域を手動で調整することも可能。\n\n■ フレームデザインの各パーツ\n\n【クラスプ（Clasp：維持装置）】\nクラスプは残存歯に引っかけて義歯を維持する腕状の構造。\n・種類：RPI（レスト・近心プレート・I バークラスプ）、Akers（環状クラスプ）、バックアクション等。症例に応じて選択する。\n・設計パラメーター：維持腕の長さ・幅・厚み・先端位置・弾性。維持力が適切（着脱可能だが自然には外れない程度）になるよう設計する。\n\n【メジャーコネクター（Major Connector：大連結子）】\n義歯の片側と反対側を連結する金属の構造。上顎ではパラタルバー、パラタルプレート等、下顎ではリンガルバー、リンガルプレート等がある。\n・設計原則：十分な剛性、粘膜への適切な接触（圧迫しすぎない）、発音や舌運動を妨げない形態。\n・断面形態：半楕円形、半月形等。粘膜面側は平坦で磨きやすい形態にする。\n\n【レスト（Rest：咬合面支持）】\nレストは残存歯の咬合面やシンギュラム（前歯の舌面隆起）に載せる小さな突起。義歯の沈下を防ぎ、咬合力を支台歯に伝える。\n・形態：咬合面レストはスプーン状の凹みに入る形態。十分な厚み（約1mm以上）を確保。\n・位置：通常はクラスプの隣に配置し、クラスプと一体的に機能する。\n\n【脚（Minor Connector：小連結子）】\nクラスプとメジャーコネクターをつなぐ金属部分。十分な断面積で剛性を確保する。歯肉辺縁を横切る部分は鋭角を避け、粘膜を圧迫しない形態にする。\n\n【フィニッシュライン】\nメタルフレームとレジン床（義歯のピンク色の部分）の境界線。フィニッシュラインの位置と形態を適切に設定し、レジンとメタルの移行部が滑らかになるようにする。\n\n■ CADソフトの活用機能\n・マジックペン機能：フリーハンドでフレームの外形線を描画する機能。直感的な設計が可能。\n・シンメトリー設計：左右対称的なフレームを設計する際に、片側の設計を反対側にミラーコピーする機能。設計時間を短縮できる。\n・パラメトリック設計：各パーツ（クラスプ幅、コネクター厚み等）を数値入力で設定する。再現性が高い。\n\n[KEY: デジタルメタルフレーム設計がCAD-CAM義歯の強度と耐久性の根幹]\n[TIP: リブ構造の配置を工夫することでフレーム重量を軽減しながら強度を確保]\n[WARN: アンダーカット設計が不十分だと義歯の脱離が生じる]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ デジタルメタルフレームの進化\n従来のキャストメタルフレーム（鋳造金属）からデジタルメタルフレーム（3Dプリント+鋳造、またはミリング）への移行が進んでいる。SLM（Selective Laser Melting）やDMLS（Direct Metal Laser Sintering）による金属3Dプリントは、Co-Cr合金やチタン合金で高精度なフレームを直接製作できる。ただし、3Dプリント金属はポストプロセス（熱処理・サポート除去・研磨）が必要で、従来法とは異なる品質管理が求められる。\n\n◆ レジンインサートの設計\nメタルフレーム上のレジン部分（レジンインサート）は、リテンション機構（保持構造）によって機械的に固定される。ビーズリテンション、メッシュリテンション、マクロレテンション（レール構造）の3種類があり、それぞれの保持力特性が異なる。CAD設計では、リテンション構造の形状・位置・数量を材料の特性に合わせて最適化する。\n\n◆ 義歯のデジタル設計\nデジタル技工の応用範囲は、固定式補綴物（クラウン・ブリッジ）から可撤式補綴物（義歯）にも急速に拡大している。部分床義歯のメタルフレーム（金属床）は、CADで精密に設計し、3Dプリントしたレジンパターンからロストワックス法で鋳造するのが現在の主流である。将来的には、金属の直接3Dプリントも普及すると予想される。\n\n◆ 多職種連携におけるデジタルの役割\nデジタル技工は、歯科医師・歯科技工士・歯科衛生士の多職種連携を促進する。3Dデータの共有により、治療計画の段階から技工士が設計提案を行えるようになった。症例カンファレンスではCADデータを共有しながらディスカッションを行い、最適な治療方針を決定する。この協働モデルは、患者アウトカムの向上に寄与する。",
                    teachingId: "[TABLE]\nKomponen|Metode Desain|Jaminan Kekuatan\nRangka Logam|Bentuk Dasar di CAD|Tambahkan Struktur Rusuk\nRel Retensi|Sisipan Resin|Pembentukan Undercut\nJaringan|Permukaan Ikatan Resin|Pengaturan Titik Sentuh\n[/TABLE]\n【Part6①② Desain Kerangka Kerja Logam Digital】\n\n■ Apa Itu Kerangka Kerja Logam Digital\nTeknologi merancang struktur kerangka logam dentur parsial (partial denture) dengan CAD. Sebelumnya pekerjaan manual dengan lilin, tetapi digitalisasi meningkatkan presisi dan efisiensi. Data yang dirancang dengan CAD dicetak 3D → dituang, atau diproduksi kerangka logam dengan milling.\n\n■ Blocking Out\n\n【Perbedaan Blocking Out Analog dan Digital】\n・Analog: Tentukan arah pelepasan dengan surveyor → hapus undercut dengan aplikasi lilin pada model.\n・Digital: Atur arah pelepasan dengan CAD → perangkat lunak secara otomatis mendeteksi area undercut → lakukan blocking out digital.\n\n【Pengaturan Arah Pelepasan】\nAtur arah pelepasan (arah penyisipan) di perangkat lunak CAD. Arah pelepasan mempengaruhi desain seluruh kerangka kerja, jadi ditentukan dengan hati-hati di awal.\n\n【Sudut Blocking Out】\nSudut blocking out umum adalah 4-7°. Dengan sudut ini, isi area undercut dengan halus dan memudahkan pemakaian dan pelepasan dentur. Perangkat lunak CAD memungkinkan penyesuaian manual area blocking out dengan eraser tool.\n\n■ Setiap Bagian Desain Kerangka Kerja\n\n【Clasp (Clasp: Perangkat Retensi)】\nClasp adalah struktur berbentuk lengan yang mengait ke gigi sisa untuk mempertahankan dentur.\n・Jenis: RPI (rest, proximal plate, I bar clasp), Akers (clasp melingkar), back action, dll. Pilih sesuai kasus.\n・Parameter desain: Panjang lengan retensi, lebar, ketebalan, posisi ujung, elastisitas. Rancang sehingga daya retensi tepat (dapat dipasang/dilepas tetapi tidak terlepas secara alami).\n\n【Major Connector (Major Connector: Koneksi Besar)】nStruktur logam yang menghubungkan satu sisi dentur dengan sisi berlawanan. Pada maxilla ada palatal bar, palatal plate, dll., pada mandibula ada lingual bar, lingual plate, dll.\n・Prinsip desain: Kekakuan yang cukup, kontak mukosa yang tepat (jangan menekan), bentuk yang tidak mengganggu pengucapan atau gerakan lidah.\n・Bentuk penampang: Semi-elips, semi-bulan, dll. Sisi mukosa datar dan mudah dipoles.\n\n【Rest (Rest: Dukungan Permukaan Oklusal)】\nRest adalah tonjolan kecil yang menempel pada permukaan oklusal gigi sisa atau singulum (tonjolan lingual gigi depan). Dentur mencegah penurunan dan mentransfer gaya gigitan ke gigi penyangga.\n・Bentuk: Rest permukaan oklusal masuk ke lekukan berbentuk sendok. Pastikan ketebalan yang cukup (sekitar 1mm atau lebih).\n・Posisi: Biasanya ditempatkan di sebelah clasp dan berfungsi terintegrasi.\n\n【Kaki (Minor Connector: Koneksi Kecil)】\nBagian logam yang menghubungkan clasp dan major connector. Pastikan luas penampang yang cukup untuk kekakuan. Bagian yang melintasi margin gingiva memiliki bentuk yang tidak tajam dan tidak menekan mukosa.\n\n【Finish Line】\nGaris batas antara kerangka logam dan basis resin (bagian pink dentur). Atur posisi dan bentuk finish line dengan tepat sehingga transisi antara resin dan logam halus.\n\n■ Penggunaan Fungsi Perangkat Lunak CAD\n・Magic Pen Function: Fungsi untuk menggambar garis luar kerangka kerja dengan tangan bebas. Desain intuitif memungkinkan.\n・Desain Simetri: Ketika mendesain kerangka kerja simetris kiri-kanan, mirror copy desain satu sisi ke sisi lainnya. Waktu desain dapat dipersingkat.\n・Desain Parametrik: Atur setiap bagian (lebar clasp, ketebalan connector, dll.) dengan input numerik. Reproduktifitas tinggi.\n\n[KEY: Desain kerangka logam digital adalah fondasi kekuatan dan daya tahan gigi palsu CAD-CAM]\n[TIP: Penyesuaian tata letak struktur rusuk mengurangi berat sambil mempertahankan kekuatan]\n[WARN: Desain undercut yang tidak memadai menyebabkan dislokasi gigi palsu]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Evolusi Frame Logam Digital\nTransisi dari frame logam cor konvensional ke frame logam digital (cetak 3D + cor, atau milling) terus berkembang. SLM (Selective Laser Melting) dan DMLS (Direct Metal Laser Sintering) memungkinkan pembuatan frame presisi tinggi langsung dari paduan Co-Cr atau titanium. Namun logam cetak 3D memerlukan pasca-proses (perlakuan panas, penghapusan support, pemolesan) dan memerlukan kontrol kualitas yang berbeda dari metode konvensional.\n\n◆ Desain Resin Insert\nBagian resin pada frame logam (resin insert) difiksasi secara mekanis melalui mekanisme retensi. Ada 3 jenis: retensi bead, retensi mesh, dan makroretensi (struktur rel), masing-masing dengan karakteristik daya tahan berbeda. Dalam desain CAD, bentuk, posisi, dan jumlah struktur retensi dioptimalkan sesuai karakteristik material.\n\n◆ Desain Digital Gigi Tiruan\nCakupan aplikasi pemrosesan digital berkembang pesat dari protesa cekat (mahkota, jembatan) ke protesa lepasan (gigi tiruan). Frame logam gigi tiruan sebagian (metal base) saat ini umumnya didesain secara presisi dengan CAD, kemudian diproduksi dengan metode lost wax dari pola resin cetak 3D. Di masa depan, cetak 3D langsung logam juga diharapkan menjadi umum.\n\n◆ Peran Digital dalam Kolaborasi Multi-Disiplin\nPemrosesan digital gigi mendorong kolaborasi multi-disiplin antara dokter gigi, teknisi gigi, dan ahli kebersihan gigi. Berbagi data 3D memungkinkan teknisi memberikan proposal desain dari tahap perencanaan perawatan. Dalam konferensi kasus, data CAD dibagikan untuk diskusi dan menentukan kebijakan perawatan optimal."

                    teaching: "[FLOW: テスト受験 → 知識確認 → スコア算出 → 結果確認]\n【中間テスト① Part1〜3の総合評価】\n\n■ 試験範囲\nスキルマップ番号1-1〜3-14の全範囲。Day1〜Day9で学んだ内容すべてが対象。\n\n■ 筆記試験の出題範囲\n\n【Part1：デジタル技工の基本（10問）】\n・デジタルワークフローの4ステップ（スキャン→CAD→CAM→仕上げ）\n・ファイル形式の違い：STL（モノクロ、三角形の集合体）、PLY/OBJ/3ox/DXD/DCM（カラー対応）\n・各CADソフトの特徴：exocad（汎用性高）、3Shape（3ox形式）、CEREC inLab（セレック専用）、Dental Wings（ストローマン系）\n・加工機の違い：ミリングマシン（切削加工、3-5軸）vs 3Dプリンター（光造形DLP/SLA/LCD）\n・ラボスキャナーとIOSの違い（撮影範囲、精度、使用場所）\n\n【Part2：スキャン（10問）】\n・スキャナーの構造（ライト・カメラ・モデルテーブル）と原理\n・スキャン準備：パウダー塗布の目的と方法、雲台固定、支台歯の確認事項（気泡・欠け・ワックス付着）\n・スキャン操作：推奨される順番（バイト→歯列→支台歯）、範囲設定、基底面の範囲\n・データマッチング：リファレンスポイントの設定方法（特徴的な凹凸に設定）、マッチングが合わない場合の4つの対処法\n・インプラントスキャン：スキャンボディの選択（メーカー・サイズ）、装着方向（スリット面を頬側）、浮き上がり確認\n\n【Part3：IOS（10問）】\n・テクニカルレポートの目的と内容（10μm単位の数値報告）\n・デザイン確認の3つの方法（3Dデータ/TeamViewer/スクリーンショット）\n・取り違え防止対策（シリコーンコア・3Dプリント模型）\n・IOSデータ受取時の6つの確認事項（クリアランス/アーチ変形/マージン鮮明度/咬合/着脱方向/スキャンボディ変形）\n・4つのデータ受取方法（IOSクラウド/汎用クラウド/メール/記録媒体）\n・マージン設定手順（モノクロ→カラー→裏側確認）\n・バイトデータのずれの原因と再マッチング手順\n・不適合の原因（ミリングバー消耗/アンダーカット/チタンベース回転防止機構/チッピング）\n\n■ 実技試験の内容\n\n【スキャン操作実技】\n①パウダー塗布（均一に薄く塗布できるか）\n②雲台への模型固定\n③支台歯のスキャン（角や穴がないデータを取得できるか）\n④隣在歯・参考模型のスキャン\n⑤データマッチング（リファレンスポイントを適切に設定し、正確なマッチングができるか）\n\n【IOSデータ確認実技】\n①マージンの鮮明さ確認（カラー・モノクロ切替で確認できるか）\n②クリアランス確認（数値で計測できるか）\n③咬合確認（多方向から確認できるか）\n④問題のあるデータの指摘と対処法の説明\n\n■ 評価基準\n筆記：各セクション70%以上で合格。\n実技：チェックリストの全項目をクリアで合格。\n弱点分析：スキルマップの自己評価と照合し、Day11以降の個別目標を設定する。\n\n[KEY: 中間テストはPart1～3の学習内容の習得状況を確認する重要な評価ポイント]\n[TIP: テスト前に実務ワークフローを復習することで得点が向上する]\n[WARN: スキャンからCAD初期段階までの理解が不十分だと後続学習が困難]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ 効果的な試験対策法\n中間テストに向けた効率的な学習法を紹介する。スキルマップに基づいた体系的な復習が最も効果的で、各スキル項目について「説明できるか」「実際に操作できるか」の2段階で自己評価する。特に、手順系の知識（スキャンの手順、CADデザインのステップなど）は、実際にソフトウェアを操作しながら復習すると記憶の定着率が上がる。\n\n◆ 症例分析のポイント\n実技試験で求められる症例分析能力を高めるためのポイントを解説する。提示された症例に対して、使用する材料の選択理由、設計上の注意点、予想されるリスクを論理的に説明できることが重要。過去の症例でよく出題されるパターン（小臼歯単冠・大臼歯インレー・前歯クラウン）について、それぞれの設計ポイントを整理しておく。\n\n◆ Part1-3の横断的知識整理\nここまでに学んだ内容を横断的に整理する。デジタル技工のワークフロー全体において、各工程がどのように連携しているかを理解する。例えば、スキャン精度がCADデザインの品質を左右し、CADデザインの設定がCAM加工の成否を決定する。この連鎖的な品質管理の考え方は、技工士としての総合力の基盤となる。\n\n◆ 自己評価チェックリスト\n以下の項目について自己評価を行う。デジタルワークフローの4ステップを説明できるか。主要なCADソフト3つの特徴を比較できるか。STL・PLY・OBJの違いを説明できるか。IOSデータの品質チェックポイントを5つ挙げられるか。スキャン失敗時の対処法を3つ説明できるか。これらの項目に自信を持って答えられることが中間テスト合格の目安となる。",
                    teachingId: "[FLOW: Ambil Tes → Verifikasi Pengetahuan → Hitung Skor → Tinjau Hasil]\n【Ujian Tengah ① Evaluasi Komprehensif Part1-3】\n\n■ Jangkauan Ujian\nSemua konten dari nomor peta keterampilan 1-1 hingga 3-14. Semua materi yang dipelajari dari Hari 1 hingga Hari 9 adalah target ujian.\n\n■ Jangkauan Pertanyaan Ujian Tertulis\n\n【Part1: Dasar Pemrosesan Gigi Digital (10 Pertanyaan)】\n・Empat langkah alur kerja digital (pemindaian → CAD → CAM → penyelesaian akhir)\n・Perbedaan format file: STL (monokrom, kumpulan segitiga), PLY/OBJ/3ox/DXD/DCM (mendukung warna)\n・Karakteristik setiap perangkat lunak CAD: exocad (versatile), 3Shape (format 3ox), CEREC inLab (khusus CEREC), Dental Wings (sistem Straumann)\n・Jenis mesin pengolahan: mesin milling (pemrosesan kering/basah), printer 3D (DLP/SLA/LCD)\n・Ergonomi dan pengaturan lingkungan meja kerja\n\n【Part2: Pemindaian dan Pencocokan (10 Pertanyaan)】\n・Karakteristik lab scanner: akurasi tinggi, dapat digunakan kembali, memerlukan model gipsum\n・Karakteristik IOS: tidak memerlukan kesan, dapat menangkap warna, akurasi sedikit lebih rendah\n・Prosedur persiapan pemindaian: penerapan bubuk, fiksasi model, verifikasi gigi penyangga\n・Prosedur pemindaian: urutan (penyangga → tetangga → lawan), jangkauan optimal\n・Konsep pencocokan dan metode pengaturan poin referensi\n・Pemindaian implant dengan scan body, pemilihan dan pemasangan scan body\n\n【Part3: IOS dan Data Gigitan (10 Pertanyaan)】\n・Empat metode penerimaan data IOS (cloud produsen, email, API integrasi, cloud hybrid)\n・Isi laporan teknis (ruang semen, kontak oklusi, kontak area, anatomi gingiva)\n・Poin inspeksi data IOS saat diterima: kelengkapan geometri, orientasi, kualitas permukaan, kontur gingiva, ketajaman margin\n・Pengaturan margin CAD IOS, pengaturan ruang semen, pengaturan kontak\n・Penyebab ketidaksesuaian IOS dan strategi perbaikan: keausan bur, undercut, ruang aman implant, chipping zirkonia\n・Identifikasi dan perbaikan deviasi data gigitan\n\n■ Format Ujian Tertulis\nUjian pilihan ganda dan esai pendek. Kombinasi pertanyaan pemahaman konsep dan pertanyaan aplikasi praktis.\n\n■ Ujian Praktis\n\n【Ujian Operasi Pemindaian Praktis】\nSiswa melakukan pemindaian nyata menggunakan peralatan lab:\n・Persiapan: penerapan bubuk, fiksasi model cloud\n・Pemindaian: operasi prosedur pemindaian (penyangga → tetangga → lawan)\n・Pencocokan: pencocokan dua data pemindaian menggunakan poin referensi\nEvaluasi: akurasi dan efisiensi operasi, kualitas hasil pemindaian akhir.\n\n【Ujian Verifikasi Data IOS Praktis】\nSiswa melakukan inspeksi data IOS nyata:\n・Inspeksi margin: periksa kejelasan margin dan posisi dengan benar\n・Inspeksi ruang terang: ukur nilai numerik dengan tools CAD\n・Inspeksi gigitan: periksa orientasi dan kualitas dari berbagai sudut\nEvaluasi: ketelitian inspeksi, identifikasi masalah data, kualitas laporan inspeksi.\n\n■ Standar Penilaian\n・Ujian tertulis: 10 poin × 3 kategori = 30 poin total\n・Ujian praktis operasi pemindaian: 20 poin\n・Ujian praktis verifikasi data IOS: 20 poin\n・Total: 70 poin\n・Nilai kelulusan: 50 poin atau lebih (70% kelulusan)\n\n■ Proses Setelah Ujian\nSetelah ujian ditandai:\n・Analisis kelemahan: Mengidentifikasi topik atau keterampilan yang lemah untuk setiap siswa.\n・Umpan balik rinci: Memberikan umpan balik terperinci tentang area perbaikan.\n・Pengaturan tujuan individual: Berdasarkan hasil ujian, menetapkan tujuan pembelajaran individual untuk Hari 11 dan seterusnya.\n・Sesi remediasi (jika diperlukan): Untuk siswa yang tidak lulus, memberikan sesi pelatihan tambahan sebelum melanjutkan ke Part4.\n\n[KEY: Tes menengah memverifikasi penguasaan materi pembelajaran Part 1-3]\n[TIP: Meninjau alur kerja praktis sebelum tes meningkatkan skor]\n[WARN: Pemahaman yang tidak cukup dari pemindaian hingga tahap awal CAD mempersulit pembelajaran selanjutnya]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Metode Persiapan Ujian yang Efektif\nMemperkenalkan metode belajar efisien untuk ujian tengah semester. Tinjauan sistematis berdasarkan peta keterampilan paling efektif, dengan evaluasi diri dua tahap untuk setiap item: \"Bisakah saya jelaskan?\" dan \"Bisakah saya mengoperasikan?\" Khususnya pengetahuan prosedural (langkah scan, langkah desain CAD) lebih mudah diingat jika ditinjau sambil mengoperasikan perangkat lunak.\n\n◆ Poin Analisis Kasus\nMenjelaskan poin-poin untuk meningkatkan kemampuan analisis kasus yang diperlukan dalam ujian praktik. Penting untuk dapat menjelaskan secara logis alasan pemilihan material, poin perhatian desain, dan risiko yang diprediksi untuk kasus yang disajikan. Susun poin desain untuk pola kasus yang sering muncul (mahkota tunggal premolar, inlay molar, mahkota anterior).\n\n◆ Penyusunan Pengetahuan Lintas Part 1-3\nMenyusun secara lintas materi yang telah dipelajari. Memahami bagaimana setiap proses saling terkait dalam keseluruhan alur kerja pemrosesan digital. Misalnya, akurasi scan mempengaruhi kualitas desain CAD, dan pengaturan desain CAD menentukan keberhasilan pengolahan CAM.\n\n◆ Daftar Periksa Evaluasi Diri\nLakukan evaluasi diri untuk item berikut: Bisakah menjelaskan 4 langkah alur kerja digital? Bisakah membandingkan karakteristik 3 perangkat lunak CAD utama? Bisakah menjelaskan perbedaan STL, PLY, OBJ? Bisakah menyebutkan 5 poin pemeriksaan kualitas data IOS? Bisakah menjelaskan 3 cara penanganan kegagalan scan? Kemampuan menjawab dengan percaya diri menjadi tolok ukur kelulusan ujian."

                {
                    id: "8-2",
                    title: "中間テスト② Part4〜6前半",
                    whatYouLearn: "Part4〜6前半の総合的な理解度を確認するテストです。",
                    learningObjectives: "CADデザインからインプラント・メタルフレームまで、中盤の学習内容を確実に習得します。",
                    goodExample: "全分野でバランスよく得点でき、設計の応用力がある。",
                    badExample: "特定分野に大きな理解不足があり、応用ができない。",
                    evaluationCriteria: "総合理解度、設計応用力、問題解決能力。",
                    teaching: "[FLOW: Part4～6の総合テスト → 複雑な設計技法の評価]\n【中間テスト② Part4〜6前半の総合評価】\n\n■ 試験範囲\nスキルマップ番号4-1〜6-2の全範囲。Day11〜Day19で学んだCADデザインの全内容が対象。\n\n■ 筆記試験の出題範囲（20問）\n\n【CADデザインの基本フロー】\n・11ステップの順序（オーダー入力→スキャンデータ読込→模型軸設定→支台歯/対合歯指定→マージンライン設定→挿入方向設定→歯冠形態選択→ポジショニング→形態調整→咬合チェック→完了/STL出力）\n・各ステップの目的と注意点\n\n【セメントスペース】\n・基本パラメーター（セメント間隙0.010mm、追加間隙0.045mm、マージンまでの距離0.80mm、スムージング距離0.20mm）\n・支台歯形状による調整原則（テーパーがきつい→スペース増加、鋭利部→リリーフ、アンダーカット→リリーフ必須）\n\n【歯冠概形とポジショニング】\n・3つの選択方法（ライブラリー/コピー/ミラー）の使い分け\n・臼歯のポジショニング原則（咬頭傾斜を歯列に合わせる）\n・前歯のポジショニング原則（口唇との調和、歯軸、歯頚部ライン連続性）\n\n【咬合接触・コンタクト】\n・咬合接触の基本原則（咬頭対窩、点接触、被覆）\n・隣接面コンタクトの設定（面接触、鼓形空隙との関係、歯科医院別基準値）\n・断面図での確認と手動微調整の重要性\n\n【連結部設計】\n・コネクターの断面形態（前歯：垂直楕円、臼歯：水平楕円）\n・最小断面積の基準（材料による）\n・カットバックの目的と手法\n\n【カスタムアバットメント】\n・テーパーの基準値（高さ別：2.5-4mm→2°、4-5mm→4°、5mm+→6°）\n・マージン位置・深度の設定原則\n・チタンベースの回転防止機構の重要性\n\n【インプラントブリッジ】\n・排列計画の立て方\n・清掃性の確保（下部鼓形空隙、基底面形態）\n・アクセスホール位置とスクリューホールのリリーフ\n\n【メタルフレーム設計】\n・ブロックアウトの目的と角度（4〜7°）\n・クラスプの種類（RPI/Akers等）と選択基準\n・メジャーコネクター、レスト、脚の役割と設計原則\n\n■ 実技試験の内容\n\n【クラウンまたは3歯ブリッジの設計（制限時間45分）】\n以下の品質チェック項目をすべてクリアすることが合格条件：\n①マージン適合：マージンライン全周で正確に設定されているか\n②セメントスペース：支台歯形状に適切な値が設定されているか\n③咬合接触：接触点の位置と強さが適切か\n④隣接面コンタクト：面接触で適切な強さか\n⑤歯の連続性：辺縁隆線・外形線が隣在歯と連続しているか\n⑥清掃性：鼓形空隙・エマージェンスプロファイルが適切か\n\n■ 評価基準\n筆記：70%以上で合格\n実技：品質チェックリスト全項目クリアで合格\n\n■ フィードバック\nスキルマップの中間評価を行い、Day1-10の結果と比較して成長を確認。弱点分野を特定し、Day21以降の個別目標を設定する。\n\n[KEY: 中間テスト②はPart4～6前半の複雑な設計技法の習得状況を確認する高度な評価]\n[TIP: インプラント補綴物とメタル義歯の設計ポイントを整理しておく]\n[WARN: 複雑な設計要素を理解していないと後続学習（CAM～仕上げ）が困難]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ 中間テスト②の重点対策\nPart4-6前半の内容は、CADデザインの核心部分である。特に重要なテーマは、セメントスペース設定の根拠説明、マージンライン設定の精度、咬合接触と隣接面コンタクトの設計原則、カットバックと連結の設計判断、インプラントアバットメントの設計要件である。各項目について「なぜそうするのか」を論理的に説明できることが合格の鍵となる。\n\n◆ 実技試験のタイムマネジメント\n実技試験では限られた時間内に品質の高いCADデザインを完成させる必要がある。効率的な時間配分の目安：症例分析（5分）→ マージンライン設定（5分）→ 挿入方向・セメントスペース（3分）→ 歯冠形態選択・ポジショニング（5分）→ 形態調整（10分）→ 咬合・コンタクト調整（7分）→ 最終チェック（5分）。合計40分を目標に練習する。\n\n◆ Part4-6の知識体系整理\nCADデザイン（Part4）→ インプラント設計（Part5）→ メタルフレーム・義歯設計（Part6前半）の流れは、単冠→連結→複合構造という複雑度の段階的増加を反映している。各パートで新しく加わった設計概念（インプラントのパッシブフィット、メタルフレームのリブ構造など）を整理し、相互の関連性を理解する。\n\n◆ 臨床写真の読解力\n実技試験では臨床写真（口腔内写真やX線写真）から必要な情報を読み取る能力も求められる。口腔内写真からは歯肉の状態・対合歯の形態・周囲歯列の特徴を、X線写真からは支台歯の根管治療の有無・歯周組織の状態・インプラントの埋入深度を読み取る。これらの情報をCADデザインの設計判断に活かせることが重要である。",
                    teachingId: "[FLOW: Tes Komprehensif Part 4-6 → Evaluasi Teknik Desain Kompleks]\n【Ujian Tengah 2 Evaluasi Komprehensif Part4-6 Awal】\n\n■ Jangkauan Ujian\nSeluruh jangkauan nomor skill map 4-1 hingga 6-2. Semua konten desain CAD yang dipelajari di Day11 hingga Day19 menjadi target.\n\n■ Jangkauan Soal Ujian Tertulis (20 Pertanyaan)\n\n【Alur Dasar Desain CAD】\n・Urutan 11 langkah (input pesanan → membaca data pindai → pengaturan sumbu model → penentuan gigi penyangga/berlawanan → pengaturan garis margin → pengaturan arah penyisipan → pemilihan bentuk mahkota → penentuan posisi → penyesuaian bentuk → pemeriksaan gigitan → penyelesaian/output STL)\n・Tujuan dan poin perhatian setiap langkah\n\n【Ruang Semen】\n・Parameter dasar (celah semen 0,010mm, celah tambahan 0,045mm, jarak ke margin 0,80mm, jarak pelancaran 0,20mm)\n・Prinsip penyesuaian berdasarkan bentuk gigi penyangga (kerucut ketat → peningkatan ruang, bagian tajam → relief, undercut → relief wajib)\n\n【Bentuk Mahkota dan Penentuan Posisi】\n・Penggunaan 3 metode pemilihan (perpustakaan/salinan/cermin)\n・Prinsip penentuan posisi molar (selaraskan kemiringan cuspid dengan barisan gigi)\n・Prinsip penentuan posisi gigi depan (harmoni dengan bibir, poros gigi, kontinuitas garis servical)\n\n【Kontak Gigitan dan Kontak Proksimal】\n・Prinsip dasar kontak gigitan (cuspid ke fossa, kontak titik, cakupan)\n・Pengaturan kontak proksimal (kontak permukaan, hubungan ruang fissure, nilai dasar per kantor gigi)\n・Pentingnya verifikasi gambar penampang dan penyesuaian manual mikro\n\n【Desain Bagian Penyambungan】\n・Bentuk penampang konektor (gigi depan: elips vertikal, molar: elips horizontal)\n・Standar luas penampang minimum (berdasarkan material)\n・Tujuan dan metode cutback\n\n【Abutmen Khusus】\n・Nilai dasar kerucut (nilai berdasarkan tinggi: 2,5-4mm → 2°, 4-5mm → 4°, 5mm+ → 6°)\n・Prinsip pengaturan posisi dan kedalaman margin\n・Pentingnya mekanisme anti-rotasi titanium base\n\n【Jembatan Implan】\n・Cara menetapkan perencanaan pengaturan\n・Memastikan kemampuan pembersihan (ruang fissure bawah, bentuk permukaan dasar)\n・Posisi akses hole dan reliefs screw hole\n\n【Desain Kerangka Kerja Logam】\n・Tujuan blocking out dan sudut (4-7°)\n・Jenis clasp (RPI/Akers, dll.) dan kriteria pemilihan\n・Peran dan prinsip desain major connector, rest, kaki\n\n■ Konten Ujian Praktikum\n\n【Desain Mahkota atau Jembatan 3 Gigi (Batas Waktu 45 Menit)】\nMemenuhi semua item verifikasi kualitas adalah persyaratan lulus:\n①Penyesuaian Margin: Apakah garis margin ditetapkan dengan akurat di seluruh keliling?\n②Ruang Semen: Apakah nilai yang sesuai dengan bentuk gigi penyangga telah ditetapkan?\n③Kontak Gigitan: Apakah posisi dan kekuatan titik kontak sesuai?\n④Kontak Proksimal: Apakah kontak permukaan dengan kekuatan yang sesuai?\n⑤Kontinuitas Gigi: Apakah ridge gingival dan garis luar berkelanjutan dengan gigi yang berdekatan?\n⑥Kemampuan Pembersihan: Apakah ruang fissure, profil kemunculan sesuai?\n\n■ Standar Evaluasi\nUjian Tertulis: 70% atau lebih untuk lulus\nUjian Praktikum: Semua item dalam checklist verifikasi kualitas lulus untuk lulus\n\n■ Umpan Balik\nEvaluasi tengah skill map dilakukan, dan pertumbuhan dibandingkan dengan hasil Day1-10. Area kelemahan diidentifikasi dan target individu ditetapkan untuk Day21 dan seterusnya.\n\n[KEY: Tes menengah 2 adalah penilaian tingkat lanjut yang memverifikasi penguasaan teknik desain kompleks Part 4-6 awal]\n[TIP: Mengorganisir poin desain untuk prostetik implan dan gigi palsu logam]\n[WARN: Tidak memahami elemen desain kompleks membuat pembelajaran selanjutnya (CAM hingga penyelesaian) sulit]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Fokus Persiapan Ujian Tengah Semester 2\nMateri Part 4-6 awal merupakan inti desain CAD. Tema yang sangat penting: penjelasan dasar pengaturan cement space, akurasi pengaturan garis margin, prinsip desain kontak oklusal dan proksimal, keputusan desain cutback dan konektor, persyaratan desain abutment implan. Kunci kelulusan adalah kemampuan menjelaskan secara logis \"mengapa demikian\" untuk setiap item.\n\n◆ Manajemen Waktu Ujian Praktik\nDalam ujian praktik, desain CAD berkualitas tinggi harus diselesaikan dalam waktu terbatas. Pedoman pembagian waktu efisien: analisis kasus (5 menit) → pengaturan garis margin (5 menit) → arah insersi/cement space (3 menit) → pemilihan bentuk mahkota/positioning (5 menit) → penyesuaian bentuk (10 menit) → penyesuaian oklusi/kontak (7 menit) → pemeriksaan akhir (5 menit). Target 40 menit untuk latihan.\n\n◆ Penyusunan Sistem Pengetahuan Part 4-6\nAlur Desain CAD (Part 4) → Desain Implan (Part 5) → Desain Frame Logam/Gigi Tiruan (Part 6 awal) mencerminkan peningkatan bertahap kompleksitas: mahkota tunggal → koneksi → struktur komposit. Susun konsep desain baru yang ditambahkan di setiap part dan pahami keterkaitan satu sama lain.\n\n◆ Kemampuan Membaca Foto Klinis\nDalam ujian praktik, kemampuan membaca informasi dari foto klinis (foto intraoral dan X-ray) juga diperlukan. Dari foto intraoral, baca kondisi gingiva, bentuk gigi antagonis, dan karakteristik lengkung gigi sekitar. Dari X-ray, baca ada/tidaknya perawatan saluran akar, kondisi jaringan periodontal, dan kedalaman pemasangan implan."

                    teaching: "[TABLE]\nクラスプ型|特徴|使用条件\nクラスプ|金属引っかかり部|残存歯多い場合\nハイジェニック|設計簡素化|部分欠損症例\nホック型|審美性重視|前歯欠損\n[/TABLE]\n【Part6③ CADクラスプライブラリーとフィニッシュライン】\n\n■ CADクラスプライブラリーの詳細\nCADソフトに内蔵されたクラスプのライブラリーには、各クラスプタイプのパラメーターがテーブル（一覧表）として整備されている。これらのパラメーターを理解し適切に設定することが、機能的なメタルフレーム設計の基本となる。\n\n【主要パラメーター一覧】\n・Offset（オフセット）：クラスプと歯面の間隔。歯面に沿った適切な距離を設定。\n・End（エンド）：クラスプの先端位置。アンダーカット量に応じた先端の到達位置を設定。\n・Texture（テクスチャー）：クラスプ表面の質感。粘膜面側の仕上げに影響。\n・OverTHK（オーバーシックネス）：クラスプの厚み。維持力と弾性に直接影響。太すぎると維持力過大で歯への負担増、細すぎると維持力不足や破折リスク。\n・Hole（ホール）：レジン床との結合のための維持孔。適切な位置と大きさを設定。\n・3-axis（3軸）：3軸加工対応の設計制約。3軸ミリングの場合はアンダーカット部の加工制限がある。\n・Outline grid（アウトライングリッド）：クラスプの外形線のグリッド設定。デザインの基準線。\n・Round saddle（ラウンドサドル）：鞍部（サドル部）の丸み設定。粘膜への圧迫を軽減する。\n・Section（セクション）：クラスプの断面形態。半円形、三角形、楕円形等。\n・Orientation（オリエンテーション）：クラスプの配置方向。歯軸に対する角度。\n\n【各クラスプタイプのパラメーター調整】\n・RPIクラスプ：近心レスト＋近心プレート＋Iバー。遊離端義歯に適する。Iバーの弾性と先端位置が重要。\n・Akersクラスプ：環状型。中間欠損に多用。維持腕と拮抗腕のバランス設定が重要。\n・バックアクションクラスプ：遠心から近心へ回り込む形態。審美性を考慮した設計が可能。\n\n■ フィニッシュラインの設定\nフィニッシュラインはメタルフレームとレジン床の境界線。適切な設定が義歯の強度と清掃性に影響する。\n\n【フィニッシュラインのパラメーター】\n・幅：レジンとメタルの境界部の幅。通常1〜1.5mm程度。\n・厚み：フィニッシュライン部のメタルの厚み。薄すぎると強度不足、厚すぎると舌感が悪い。\n・終端形態：ナイフエッジ、ラウンド等。レジンとの移行が滑らかであることが重要。\n\n■ レストの詳細設計\n・形態：スプーン状（咬合面レスト）、クレセント状（シンギュラムレスト）。\n・深さ：支台歯の咬合面に準備されたレストシート（凹み）に適合する深さ。通常1〜1.5mm。\n・幅：レストの近遠心幅。咬合面の1/3程度が基準。\n\n■ 脚（小連結子）の設計\n・幅：十分な剛性を確保する幅。通常2mm以上。\n・角度：歯面に対する角度。歯肉辺縁を横切る部分は垂直に近い角度で通過させ、食物停滞を防ぐ。\n\n■ メジャーコネクターの断面形態選択\n・パラタルバー（上顎）：U字型またはT字型断面。口蓋粘膜に適度に接触。\n・リンガルバー（下顎）：半楕円形断面。舌側歯肉辺縁から十分に離す（通常3mm以上）。\n\n■ 全パーツの統合チェック\nすべてのパーツが設計された後、フレーム全体の整合性をチェックする：\n・各パーツ間の連結が滑らか（段差やバリがない）\n・フレーム全体の剛性が十分（たわみがない）\n・着脱方向にアンダーカットがない\n・清掃性を妨げる形態がない\n・粘膜面の適合が均一\n\n[KEY: クラスプライブラリの正確な選択とフィニッシュラインの精密設定が部分義歯の維持安定を決定]\n[TIP: 複数のクラスプ形態を比較して患者の解剖学的特性に合わせる]\n[WARN: フィニッシュライン位置が不正確だと義歯の維持が失われる]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ 部分床義歯の維持装置の分類\n部分床義歯の維持装置（クラスプ）は、機能的に維持（Retention）・支持（Support）・把持（Bracing）の3要素を果たす。環状クラスプ（Akers clasp）は最も基本的で、鋳造クラスプとワイヤークラスプがある。CAD設計では鋳造クラスプをデジタルで設計し、金属3Dプリントまたはミリングで製作する。RPI（Rest-Proximal plate-I bar）システムは遠心延長ケースで有効な設計である。\n\n◆ フィニッシュラインの設計原則\nクラスプのフィニッシュライン（金属縁の終端）は、段差のない滑らかな移行（フェザーエッジ）が口腔衛生上重要である。CAD設計では、フィニッシュラインの位置を歯肉縁から1mm以上離し、金属の厚さを終端に向けて漸減させる。レストの設計では、エナメル質内に留まる深さ（0.5-1.0mm）で、応力分散のための十分な幅（頬舌幅の1/3以上）を確保する。\n\n◆ サベイラインとガイドプレーン\nサベイライン（最大豊隆線）は義歯の挿入方向を決定する基準となる。デジタルサベイヤー機能により、任意の挿入方向でのサベイラインを即座に表示でき、最適な挿入方向の検討が容易になった。ガイドプレーンは挿入方向と平行な面で、義歯の着脱のガイドとなる。CAD上でガイドプレーンの位置と高さを設計し、残存歯への前処置（歯冠形態修正）の要否を判断する。\n\n◆ デジタルクラスプ設計の自由度\nCAD設計ではクラスプの断面形状を自由にカスタマイズできる利点がある。従来の鋳造法では再現困難だった複雑な断面形態（楕円断面、テーパー断面など）が可能になり、維持力の精密なコントロールが実現する。アンダーカット量の設定は0.25mm（Co-Cr）から0.50mm（金合金）が一般的だが、CADでは0.01mm単位での調整が可能である。",
                    teachingId: "[TABLE]\nJenis Klasp|Fitur|Kondisi Penggunaan\nKlasp|Bagian Kait Logam|Banyak Gigi Sisa\nHigienis|Desain Sederhana|Kasus Kehilangan Sebagian\nTipe Kait|Prioritas Estetika|Kehilangan Gigi Depan\n[/TABLE]\n【Part6③ Library Clasp CAD dan Finish Line】\n\n■ Detail Library Clasp CAD\nLibrary clasp yang tertanam dalam software CAD memiliki parameter setiap tipe clasp yang tersusun dalam tabel (daftar). Memahami parameter-parameter ini dan mengaturnya dengan tepat adalah dasar desain metal frame yang berfungsi.\n\n【Daftar Parameter Utama】\n・Offset (Offset): Jarak antara clasp dan permukaan gigi. Atur jarak yang sesuai mengikuti permukaan gigi.\n・End (End): Posisi ujung clasp. Atur posisi ujung yang mencapai sesuai dengan jumlah undercut.\n・Texture (Tekstur): Tekstur permukaan clasp. Mempengaruhi finishing sisi mukosa.\n・OverTHK (Overticknessness): Ketebalan clasp. Langsung mempengaruhi gaya retensi dan elastisitas. Terlalu tebal menyebabkan gaya retensi berlebihan dan beban gigi meningkat; terlalu tipis menyebabkan kurangnya gaya retensi atau risiko fraktur.\n・Hole (Hole): Lubang retensi untuk penyambungan dengan dasar resin. Atur posisi dan ukuran yang sesuai.\n・3-axis (3-axis): Batasan desain untuk 3-axis machining. Dalam kasus milling 3-axis, ada batasan proses untuk bagian undercut.\n・Outline grid (Grid outline): Pengaturan grid garis outline clasp. Garis dasar desain.\n・Round saddle (Saddle bulat): Pengaturan kelengkungan bagian saddle. Mengurangi tekanan pada mukosa.\n・Section (Bagian): Bentuk penampang clasp. Setengah lingkaran, segitiga, elips, dll.\n・Orientation (Orientasi): Arah penempatan clasp. Sudut terhadap sumbu gigi.\n\n【Penyesuaian Parameter Setiap Tipe Clasp】\n・RPI clasp: Rest mesial + plate mesial + I bar. Sesuai untuk gigi geligi sebagian distal. Elastisitas I bar dan posisi ujung adalah penting.\n・Akers clasp: Tipe annular. Banyak digunakan untuk kehilangan gigi jarak menengah. Penyeimbangan antara arm retensi dan arm oposisi adalah penting.\n・Back action clasp: Bentuk yang membungkus dari distal ke mesial. Desain yang mempertimbangkan estetika dimungkinkan.\n\n■ Pengaturan Finish Line\nFinish line adalah garis perbatasan antara metal frame dan dasar resin. Pengaturan yang tepat mempengaruhi kekuatan dan kemudahan pembersihan gigi geligi.\n\n【Parameter Finish Line】\n・Lebar: Lebar bagian perbatasan resin dan metal. Biasanya sekitar 1-1.5mm.\n・Ketebalan: Ketebalan metal di bagian finish line. Terlalu tipis menyebabkan kurangnya kekuatan; terlalu tebal menyebabkan rasa lidah yang buruk.\n・Bentuk akhir: Knife edge, round, dll. Penting agar transisi dengan resin lancar.\n\n■ Desain Detail Rest\n・Bentuk: Bentuk sendok (occlusal rest), bentuk crescent (cingulum rest).\n・Kedalaman: Kedalaman yang sesuai dengan rest seat (lekukan) yang disiapkan pada permukaan oklusal gigi pilar. Biasanya 1-1.5mm.\n・Lebar: Lebar mesio-distal rest. Standarnya sekitar 1/3 dari permukaan oklusal.\n\n■ Desain Minor Connector (kaki)\n・Lebar: Lebar untuk memastikan kekakuan yang cukup. Biasanya 2mm atau lebih.\n・Sudut: Sudut terhadap permukaan gigi. Bagian yang melintasi margin gingival harus melewati dengan sudut hampir vertikal untuk mencegah retensi makanan.\n\n■ Pemilihan Bentuk Penampang Major Connector\n・Palatal bar (maxilla): Penampang U-shape atau T-shape. Kontak yang sesuai dengan mukosa palatal.\n・Lingual bar (mandibula): Penampang semi-ellipse. Jarak yang cukup dari margin gingival lingual (biasanya 3mm atau lebih).\n\n■ Pengecekan Integrasi Semua Bagian\nSetelah semua bagian dirancang, periksa konsistensi keseluruhan frame:\n・Sambungan antara setiap bagian halus (tanpa step atau bur)\n・Kekakuan frame secara keseluruhan cukup (tanpa defleksi)\n・Tidak ada undercut dalam arah insersi/remosi\n・Tidak ada bentuk yang mengganggu kemudahan pembersihan\n・Adaptasi mukosa permukaan merata\n\n[KEY: Pilihan akurat perpustakaan klasp dan pengaturan presisi finishing line menentukan retensi dan stabilitas gigi palsu sebagian]\n[TIP: Membandingkan berbagai bentuk klasp untuk menyesuaikan dengan karakteristik anatomis pasien]\n[WARN: Posisi finishing line yang tidak akurat mengakibatkan hilangnya retensi gigi palsu]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Klasifikasi Alat Retensi Gigi Tiruan Sebagian\nAlat retensi (clasp) gigi tiruan sebagian secara fungsional memenuhi 3 elemen: retensi, dukungan, dan bracing. Circumferential clasp (Akers clasp) paling dasar, terdiri dari cast clasp dan wire clasp. Dalam desain CAD, cast clasp didesain secara digital dan diproduksi melalui cetak 3D logam atau milling. Sistem RPI (Rest-Proximal plate-I bar) efektif untuk kasus ekstensi distal.\n\n◆ Prinsip Desain Finish Line\nFinish line clasp (ujung tepi logam) harus memiliki transisi mulus tanpa undakan (feather edge) yang penting untuk kebersihan mulut. Dalam desain CAD, posisi finish line ditempatkan minimal 1mm dari tepi gingiva, dan ketebalan logam dikurangi secara bertahap menuju ujung. Desain rest memastikan kedalaman dalam enamel (0,5-1,0mm) dengan lebar yang cukup (1/3 atau lebih dari lebar bukolingual).\n\n◆ Garis Survey dan Guide Plane\nGaris survey (garis konveksitas maksimum) menjadi dasar untuk menentukan arah insersi gigi tiruan. Fungsi surveyor digital memungkinkan tampilan instan garis survey untuk arah insersi yang diinginkan. Guide plane adalah permukaan paralel dengan arah insersi, berfungsi sebagai panduan pemasangan dan pelepasan gigi tiruan.\n\n◆ Kebebasan Desain Clasp Digital\nDalam desain CAD, keuntungannya adalah bentuk penampang clasp dapat dikustomisasi secara bebas. Bentuk penampang kompleks (elips, taper, dll.) yang sulit direproduksi dengan metode cor konvensional menjadi mungkin, mewujudkan kontrol presisi daya retensi. Pengaturan jumlah undercut umumnya 0,25mm (Co-Cr) hingga 0,50mm (paduan emas), dan dengan CAD penyesuaian dimungkinkan per 0,01mm."

                    id: "9-2",
                    title: "個人トレーのデザインとCAM〜プリント",
                    whatYouLearn: "個人トレーのデジタルデザインと、CAMからプリントまでの流れを学びます。",
                    learningObjectives: "個人トレーを正確にデザインし、CAM→プリントの工程を理解します。",
                    goodExample: "トレーの形態が適切で、プリント設定が正確。",
                    badExample: "トレーの形態が不適切、プリント結果が期待通りでない。",
                    evaluationCriteria: "トレーデザイン、CAM設定、プリント品質。",
                    teaching: "[TABLE]\n工程|説明|重要度\nトレー設計|個人トレーの輪郭|重要\nCAM設定|加工パラメータ|最重要\nプリント|光造形実行|必須\n[/TABLE]\n【Part6④⑤ 個人トレーのデザインとCAM〜プリント】\n\n■ 個人トレー（Individual Tray）とは\n個人トレーは患者の口腔に合わせて製作するカスタムメイドの印象トレー。既製トレーでは対応できない正確な印象採得に使用する。デジタル技工では、スキャンデータからCADで設計し、3Dプリンターで造形する。\n\n■ 個人トレーのCADデザイン手順\n\n【Step1：模型スキャンデータの読込】\n概形印象から製作した模型のスキャンデータ（STL）をCADソフトに読み込む。\n\n【Step2：模型軸の設定】\n模型の方向（上下左右）を正しく設定する。これが以降の設計の基準になる。\n\n【Step3：挿入方向の設定】\nトレーの着脱方向を設定する。この方向にアンダーカットがあると、トレーが模型（＝口腔内）にはまらないため、次のブロックアウトが重要になる。\n\n【Step4：ブロックアウト】\nアンダーカット部をブロックアウトして、トレーがスムーズに着脱できるようにする。適切なリリーフ量（印象材が入るスペース）も設定する。\n\n【Step5：外形線の描記】\nトレーの外形線（辺縁の位置）を模型上に描記する。筋（フレナム）の動きに合わせた切り欠きを設けるか確認。印象材の種類に適した辺縁のデザイン（長さや形態）を考慮する。\n\n【Step6：ハンドルの設置】\nトレーのハンドル（取っ手）を適切な位置に設置する。ハンドルの位置は口腔内での操作性に影響する。\n\n【Step7：ストッパーの設置（必要な場合）】\n印象材の厚みを均一にするためのストッパー（突起）を設置する。\n\n【Step8：インプラントチャンネル（必要な場合）】\nインプラント症例で、スキャンボディやインプレッションコーピングが通る穴を設ける。\n\n【Step9：STL出力】\n完成したトレーデザインをSTL形式で出力する。\n\n■ CAM〜3Dプリントの手順\n\n【Step1：CAMソフトでの配置】\nSTLデータをCAMソフト（例：CHITUBOX等のスライサーソフト）に読み込む。プラットフォーム上の配置位置を設定する。造形精度はプラットフォーム中央が最も高いため、中央付近に配置するのが理想。回転45°の角度で配置すると、造形品質と時間のバランスが良い。\n\n【Step2：サポートピンの設定】\nサポートピン（造形物をプラットフォームに固定する支柱）を設定する。接触直径は1.0mmが標準。サポートピンの位置は、印象面（粘膜面）を避け、咬合面側に配置することで、印象精度への影響を最小限にする。\n\n【Step3：造形（プリント）】\n3Dプリンターで造形を実行する。個人トレー用の造形レジンを使用する。\n\n【Step4：洗浄】\n造形後、未硬化レジンを洗浄する。専用洗浄液（IPA等）で十分に洗浄する。\n\n【Step5：サポートピンの除去】\nフィッシャーバー699を使用してサポートピンを切断する。フィッシャーバー699は巻き込みが少なく切削効率が良いため、サポートピンの切断に最適。\n\n【Step6：二次硬化（ポストキュア）】\n光重合器で二次硬化を行う。粘膜面側300回、咬合面側300回の照射で十分な硬化を得る。二次硬化が不十分だと物性が低下し、使用中の変形や破損の原因になる。\n\n【Step7：外形確認】\n模型に試適し、描記した外形線との照合を行う。辺縁の長さ、フレナム部の切り欠き、リリーフの適切さ、全体のフィット感を確認する。\n\n【Step8：形態修正】\n不要な部分やバリを半丸タイプカーバイドバー（回転数30,000回転）で修正する。辺縁を滑らかに整え、粘膜面の不整を除去する。\n\n【Step9：研磨】\nビッグポイントやシリコーンポイントで表面を研磨し、滑沢な仕上がりにする。\n\n[KEY: 個人トレー設計とCAM設定がシームレスなデジタルワークフローの完成]\n[TIP: テンプレートトレーを基準に微調整することで時間短縮]\n[WARN: プリント前の設定確認を怠ると加工失敗率が高まる]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ 個人トレーの設計理論\n個人トレーの目的は、概形印象で得られた情報をもとに、より精密な最終印象を採得するための器具を製作することである。トレーの辺縁設計は、機能的な筋肉の動きを考慮して決定する。上顎では口蓋後縁の位置（アーライン）、下顎では舌側の顎舌骨筋線の位置が重要なランドマークとなる。\n\n◆ CAMパラメータの最適化\n個人トレーの加工パラメータはトレー材料によって異なる。光造形（SLA/DLP）レジンでは、層厚50-100μm、露光時間は材料のデータシート値に従う。FDM方式ではノズル温度230-250℃、積層ピッチ0.1-0.2mm、インフィル率は15-25%で十分な強度が得られる。サポート構造の配置はトレーの変形を最小化するよう工夫する。\n\n◆ 3Dプリントの後処理\nプリント後の処理工程を詳しく解説する。まずサポート構造の除去（ニッパー・リューターで慎重に）→ 残留レジンの洗浄（IPA=イソプロピルアルコール浸漬5-10分）→ 二次硬化（UV照射10-30分）→ 研磨（#400-800サンドペーパー）→ 適合チェック。二次硬化の条件（波長・時間・温度）は最終強度に大きく影響するため、メーカー推奨値を厳守する。\n\n◆ 印象材との適合性\n個人トレーと印象材の組み合わせも考慮が必要である。シリコーン印象材を使用する場合、トレー表面にトレーアドヒーシブを塗布して接着性を確保する。アルジネート印象材を使用する場合は、トレーにリテンション（穴やビーズ構造）を設けて機械的保持を利用する。デジタル設計では、これらの保持構造もCAD上で設計できる。",
                    teachingId: "[TABLE]\nProses|Penjelasan|Tingkat Kepentingan\nDesain Tray|Garis Besar Tray Individual|Penting\nPengaturan CAM|Parameter Pemrosesan|Paling Penting\nCetak|Eksekusi Fotolitografi|Wajib\n[/TABLE]\n【Part6④⑤ Desain Individual Tray dan CAM~Printing】\n\n■ Apa itu Individual Tray\nIndividual tray adalah custom-made impression tray yang diproduksi sesuai dengan rongga mulut pasien. Digunakan untuk impression yang akurat yang tidak dapat dipenuhi dengan tray ready-made. Dalam teknologi digital, dirancang dengan CAD dari data scan dan dibentuk dengan 3D printer.\n\n■ Prosedur Desain CAD Individual Tray\n\n【Step1: Pembacaan Data Scan Model】\nData scan STL model yang diproduksi dari impression awal dibaca ke dalam software CAD.\n\n【Step2: Pengaturan Model Axis】\nArah model (atas/bawah/kiri/kanan) diatur dengan benar. Ini menjadi standar untuk desain berikutnya.\n\n【Step3: Pengaturan Arah Insersi】\nArah insersi/remosi tray diatur. Jika ada undercut dalam arah ini, tray tidak dapat masuk ke dalam model (= mulut), oleh karena itu blockout berikutnya menjadi penting.\n\n【Step4: Blockout】nUndercut diblokir sehingga tray dapat disisipkan dan dilepas dengan halus. Relief amount yang sesuai (ruang untuk material impression) juga diatur.\n\n【Step5: Menggambar Garis Outline】\nGaris outline (posisi tepi) tray digambar pada model. Periksa apakah perlu menyediakan takik sesuai dengan gerakan frenum. Pertimbangkan desain tepi (panjang dan bentuk) yang sesuai dengan jenis material impression.\n\n【Step6: Pemasangan Handle】\nHandle (pegangan) tray dipasang pada posisi yang sesuai. Posisi handle mempengaruhi operabilitas di dalam mulut.\n\n【Step7: Pemasangan Stopper (jika diperlukan)】\nStopper (tonjolan) dipasang untuk membuat ketebalan material impression seragam.\n\n【Step8: Implant Channel (jika diperlukan)】\nDalam kasus implant, buat lubang agar scan body atau impression coping dapat melewati.\n\n【Step9: Output STL】\nDesain tray yang selesai dioutput dalam format STL.\n\n■ Prosedur CAM~3D Printing\n\n【Step1: Penempatan di Software CAM】\nData STL dibaca ke dalam software CAM (contoh: CHITUBOX dan software slicer lainnya). Posisi penempatan pada platform diatur. Akurasi printing tertinggi di pusat platform, jadi penempatan di dekat pusat ideal. Penempatan pada sudut 45° memberikan keseimbangan yang baik antara kualitas dan waktu.\n\n【Step2: Pengaturan Support Pin】\nSupport pin (pilar yang menahan benda cetak pada platform) diatur. Diameter kontak standar adalah 1.0mm. Posisi support pin menghindari permukaan impression (permukaan mukosa) dan ditempatkan pada sisi oklusal untuk meminimalkan pengaruh pada akurasi impression.\n\n【Step3: Printing (Cetakan)】n3D printer menjalankan printing. Resin cetakan untuk individual tray digunakan.\n\n【Step4: Pembersihan】\nSetelah printing, resin yang tidak terkeras dibersihkan. Dibersihkan sepenuhnya dengan larutan pembersih khusus (IPA dll).\n\n【Step5: Penyingkiran Support Pin】\nSupport pin dipotong menggunakan Fisherbar 699. Fisherbar 699 sangat cocok untuk pemotongan support pin karena memiliki efisiensi pemotongan yang baik dan sedikit lilitan.\n\n【Step6: Secondary Hardening (Post Cure)】\nSecondary hardening dilakukan dengan light curing unit. Penyinaran 300 kali pada sisi mukosa dan 300 kali pada sisi oklusal cukup untuk hardening yang memadai. Hardening yang tidak memadai menyebabkan penurunan sifat material dan dapat menjadi penyebab deformasi atau kerusakan selama penggunaan.\n\n【Step7: Verifikasi Bentuk】\nTray individual dicoba pada model dan dilakukan pencocokan dengan garis outline yang telah digambar. Verifikasi panjang tepi, takik frenum, kesesuaian relief, dan fit secara keseluruhan.\n\n【Step8: Modifikasi Bentuk】\nBagian yang tidak perlu dan bur dimodifikasi dengan half-round type carbide bur (kecepatan 30,000 rpm). Tepi diselesaikan dengan halus dan ketidakrataan permukaan mukosa dihilangkan.\n\n【Step9: Polishing】\nPermukaan dipolish dengan big point atau silicone point untuk finishing yang halus.\n\n[KEY: Desain tray individual dan pengaturan CAM menyelesaikan alur kerja digital yang mulus]\n[TIP: Menyesuaikan tray template referensi menghemat waktu]\n[WARN: Mengabaikan verifikasi pengaturan sebelum cetak meningkatkan tingkat kegagalan]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Teori Desain Sendok Cetak Individual\nTujuan sendok cetak individual adalah membuat alat untuk mengambil kesan akhir yang lebih presisi berdasarkan informasi dari kesan awal. Desain tepi sendok ditentukan dengan mempertimbangkan gerakan otot fungsional. Pada rahang atas, posisi tepi posterior palatal (ah-line) penting, dan pada rahang bawah, posisi garis mylohyoid di sisi lingual menjadi landmark penting.\n\n◆ Optimalisasi Parameter CAM\nParameter pengolahan sendok cetak individual berbeda tergantung material. Untuk resin fotopolimerisasi (SLA/DLP), ketebalan lapisan 50-100μm, waktu eksposur mengikuti lembar data material. Untuk FDM, suhu nozzle 230-250 derajat C, pitch lapisan 0,1-0,2mm, tingkat infill 15-25% memberikan kekuatan yang cukup.\n\n◆ Pasca-proses Cetak 3D\nMenjelaskan secara detail proses setelah pencetakan. Penghapusan struktur support → Pencucian resin sisa (perendaman IPA 5-10 menit) → Pengerasan sekunder (penyinaran UV 10-30 menit) → Pemolesan (amplas #400-800) → Pemeriksaan kesesuaian. Kondisi pengerasan sekunder (panjang gelombang, waktu, suhu) sangat mempengaruhi kekuatan akhir.\n\n◆ Kompatibilitas dengan Bahan Cetak\nKombinasi sendok cetak individual dan bahan cetak juga perlu dipertimbangkan. Saat menggunakan bahan cetak silikon, oleskan tray adhesive pada permukaan sendok untuk memastikan adhesi. Saat menggunakan alginat, berikan retensi (lubang atau struktur bead) pada sendok untuk memanfaatkan retensi mekanis. Dalam desain digital, struktur retensi ini juga dapat didesain pada CAD."

                    id: "9-3",
                    title: "フルデンチャーのスキャンとデザイン",
                    whatYouLearn: "フルデンチャーのスキャン方法とデジタルデザインを学びます。",
                    learningObjectives: "フルデンチャーの特殊なスキャン要件と、デジタルデザインの手順を習得します。",
                    goodExample: "スキャンデータが正確で、デンチャーデザインの基本を押さえている。",
                    badExample: "スキャンに問題があり、デザインの基本が理解できていない。",
                    evaluationCriteria: "スキャン品質、デンチャーデザイン、適合性。",
                    teaching: "[TABLE]\n処理|説明|特別な準備\nスキャン|全顎走査|咬合記録\n基準点|上下顎位置確定|咬合높이\nデータ統合|全歯データ結合|大容量ファイル\n[/TABLE]\n【Part6⑥⑦ フルデンチャーのスキャンとデザイン】\n\n■ フルデンチャー（総義歯）のデジタル製作\nフルデンチャーのデジタル製作は、従来のアナログ製作と比較して再現性が高く、製作時間の短縮が期待できる。ただし、すべての工程をデジタル化できるわけではなく、印象採得や咬合採得にはアナログの技術が依然として必要。\n\n■ フルデンチャーのスキャン手順\n\n【Step1：印象面のスキャン】\n精密印象の印象面（粘膜面の再現面）をラボスキャナーでスキャンする。印象面全体を漏れなくスキャンし、辺縁部の形態も正確に取り込む。\n\n【Step2：咬合関係のスキャン】\n咬合床またはゴシックアーチ記録から得られた咬合関係をスキャンする。上下顎の位置関係（垂直的・水平的）を正確にデジタルデータとして記録する。\n\n【Step3：旧義歯のスキャン】\n旧義歯がある場合は、その形態をスキャンする。旧義歯の人工歯排列や歯肉形態を参考にして新義歯を設計できる。旧義歯の良い点は維持し、問題点を改善する設計が可能。\n\n【Step4：トリミング】\nスキャンデータの不要な部分（撮影範囲外のノイズ、不要なデータ）をトリミング（除去）する。データを整理して軽量化する。\n\n【代替法：模型スキャン】\n印象ではなく、石膏模型をスキャンする方法もある。石膏模型の方がスキャナーでの取り込みが安定する場合がある。\n\n■ フルデンチャーのCADデザイン\n\n【Step1：外形設定】\n義歯の外形線（辺縁の位置）を設定する。口腔前庭の深さ、筋付着部の位置、後方の限界点を考慮して辺縁を設定。上顎はポストダム（後方の封鎖帯）の位置も設定する。\n\n【Step2：ランドマークの配置】\nデザインの基準となるランドマーク（解剖学的基準点）を配置する：\n・切歯乳頭：上顎中切歯の排列位置の基準。通常、上顎中切歯の唇面は切歯乳頭の8〜10mm前方。\n・正中線：上顎中切歯間の正中。顔面の正中線と一致させる。\n・口角線：口角の位置を結ぶ線。犬歯の位置の参考になる。\n・スマイルライン：笑顔の時に見える歯の範囲の基準。\n\n【Step3：人工歯の排列】\nライブラリーから人工歯を選択し、排列する。\n・前歯の排列：審美性を重視。正中線との整合、リップサポート（口唇の支え）、スマイルラインとの調和を確認。\n・臼歯の排列：機能性を重視。咬頭嵌合位での安定、偏心運動時のバランスを確認。\n・人工歯の選択：サイズ（大・中・小）、形態（方型・卵型・尖型）、色調を症例に合わせて選択する。\n\n【Step4：歯肉形成】\n義歯の歯肉部分の形態をデザインする：\n・豊隆：歯槽堤の豊隆を自然に再現する。特に前歯部の唇側豊隆は口唇のサポートに影響。\n・スティップリング：自然な歯肉表面のスティップリング（点状の凹凸）を再現して、審美性を向上させる。\n・歯間部の歯肉形態：歯間乳頭の形態を自然に再現する。\n\n【Step5：CAM操作（STL変換・加工データ作成）】\n完成したデザインをSTL形式に変換し、加工方法に応じたデータを作成する：\n・ミリング（ディスクからの切削）：PMMAやハイブリッドレジンのディスクからデンチャーベースを切削する方法。\n・3Dプリント：デンチャーベース用レジンで造形する方法。\n・人工歯と床の結合：分割してそれぞれ加工し、最後に接着する方法が一般的。\n\n[KEY: フルデンチャーのスキャンから設計開始までの流れの正確性が全体の成功を左右する]\n[TIP: 複数回の咬合記録で咬合位の信頼性を確保]\n[WARN: スキャンデータ量が大きいためシステムメモリの余裕を確認しておく]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ フルデンチャーのデジタル化の現状\nフルデンチャー（総義歯）のデジタル製作は急速に進歩している。従来のアナログ法では7-10回の来院が必要だったが、デジタル法では3-5回に短縮できる。IOSによる無歯顎のスキャンは依然として精度面での課題があるが、ラボスキャナーで概形印象をスキャンし、デジタルで義歯を設計するハイブリッドアプローチが実用的である。\n\n◆ 人工歯配列の原則\nフルデンチャーの人工歯配列では、リンガライズドオクルージョン（Lingualized Occlusion）が推奨される場合が多い。これは上顎舌側咬頭のみが下顎人工歯の咬合窩に接触する咬合様式で、義歯の安定性と咬合力の効率を両立する。CADソフトでは、人工歯のライブラリーから選択した歯を自動配列し、咬合平面に合わせて微調整する。\n\n◆ 義歯床の設計\nデジタル設計では義歯床の厚さを部位ごとに最適化できる。口蓋部は2.0-2.5mm、辺縁部は厚めに設計し（3.0-3.5mm）、フランジ部は適切な形態で唇頬粘膜を支持する。メタルプレート（金属床）を併用する場合は、CADでメタルプレートの形状を設計し、レジン床との接合部にリテンション構造を設ける。\n\n◆ デジタルデンチャーの材料\nCAD/CAM義歯に使用される材料は、従来の加熱重合レジンとは異なる特性を持つ。ミリングブロック型レジン（イボカップ・ルシトーンHCRなど）は高密度で気泡が少なく、機械的強度に優れる。3Dプリント用レジン（NextDent・DETAX等）は形状の自由度が高いが、強度面では劣ることがある。最近ではモノリシック（一体型）のデジタルデンチャーも登場し、人工歯と床を一体で加工する技術が注目されている。",
                    teachingId: "[TABLE]\nPemrosesan|Penjelasan|Persiapan Khusus\nPemindaian|Pemindaian Lengkap Rahang|Pencatatan Gigitan\nTitik Referensi|Penetapan Posisi Rahang Atas Bawah|Ketinggian Gigitan\nIntegrasi Data|Kombinasi Data Gigi Lengkap|File Berukuran Besar\n[/TABLE]\n【Part6⑥⑦ Scan dan Desain Full Denture】\n\n■ Pembuatan Digital Full Denture\nPembuatan digital full denture memiliki reproducibility yang lebih tinggi dibandingkan pembuatan analog dan pengurangan waktu produksi yang diharapkan. Namun, tidak semua proses dapat di-digitalisasi; impression dan bite recording masih memerlukan teknik analog.\n\n■ Prosedur Scan Full Denture\n\n【Step1: Scan Permukaan Impression】\nPermukaan impression (permukaan representasi permukaan mukosa) dari impression presisi di-scan dengan lab scanner. Seluruh permukaan impression di-scan tanpa kelalaian, dan bentuk tepi juga ditangkap dengan akurat.\n\n【Step2: Scan Relasi Oklusi】\nRelasi oklusi yang diperoleh dari bite rim atau gothic arch record di-scan. Posisi relasi rahang atas-bawah (vertikal/horizontal) dicatat dengan akurat sebagai data digital.\n\n【Step3: Scan Gigi Geligi Lama】\nJika ada gigi geligi lama, bentuknya di-scan. Susunan gigi buatan dan bentuk gingiva gigi geligi lama dapat direferensikan saat merancang gigi geligi baru. Titik positif gigi geligi lama dipertahankan, dan titik masalah diperbaiki dalam desain.\n\n【Step4: Trimming】\nBagian data scan yang tidak perlu (noise di luar area pemotretan, data yang tidak perlu) di-trimming (dihapus). Data diatur dan dilakukan optimasi ukuran.\n\n【Metode Alternatif: Scan Model】\nImpression tidak di-scan, tetapi scan model stone. Model stone mungkin lebih stabil dalam pengambilan scanner.\n\n■ Desain CAD Full Denture\n\n【Step1: Pengaturan Outline】\nGaris outline gigi geligi (posisi tepi) diatur. Pertimbangkan kedalaman vestibule, posisi perlekatan otot, dan titik batas posterior saat mengatur tepi. Untuk maxilla, posisi post dam (zona sealing posterior) juga diatur.\n\n【Step2: Penempatan Landmark】\nLandmark (titik acuan anatomi) yang menjadi standar desain ditempatkan:\n・Incisive papilla: Acuan untuk posisi susunan insisif maxilla. Biasanya, permukaan labial insisif sentral maxilla adalah 8-10mm di depan incisive papilla.\n・Midline: Midline antara insisif sentral maxilla. Keselarasan dengan midline wajah.\n・Commissure line: Garis yang menghubungkan posisi commissure. Referensi untuk posisi canine.\n・Smile line: Standar untuk rentang gigi yang terlihat saat tersenyum.\n\n【Step3: Susunan Gigi Buatan】\nGigi buatan dipilih dari library dan disusun.\n・Susunan gigi depan: Penekanan pada estetika. Verifikasi keselarasan dengan midline, lip support, dan harmoni dengan smile line.\n・Susunan gigi belakang: Penekanan pada fungsi. Verifikasi stabilitas pada intercuspal position dan keseimbangan pada gerakan eksentrik.\n・Pemilihan gigi buatan: Pilih ukuran (besar/sedang/kecil), bentuk (persegi/oval/runcing), dan warna sesuai dengan kasus.\n\n【Step4: Pembentukan Gingiva】\nBentuk bagian gingiva gigi geligi dirancang:\n・Prominence (Tonjolan): Tonjolan ridge alveolar direproduksi secara alami. Terutama, tonjolan labial di daerah gigi depan mempengaruhi support bibir.\n・Stippling: Mereproduksi stippling (cekungan bertitik) alami permukaan gingiva untuk meningkatkan estetika.\n・Bentuk gingiva interdental: Bentuk papilla interdental direproduksi secara alami.\n\n【Step5: CAM Operation (Konversi STL・Pembuatan Data Proses)】\nDesain yang selesai dikonversi ke format STL, dan data sesuai dengan metode proses dibuat:\n・Milling (pemotongan dari disk): Metode pemotongan denture base dari disk PMMA atau hybrid resin.\n・3D Printing: Metode cetakan dengan denture base resin.\n・Penyambungan gigi buatan dan bed: Umumnya, diproses terpisah kemudian disematkan bersama di akhir.\n\n[KEY: Akurasi alur dari pemindaian gigi palsu lengkap hingga awal desain menentukan kesuksesan keseluruhan]\n[TIP: Beberapa pencatatan gigitan memastikan keandalan posisi gigitan]\n[WARN: Volume data pemindaian besar, pastikan memori sistem cukup]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Status Terkini Digitalisasi Full Denture\nPembuatan digital full denture (gigi tiruan penuh) berkembang pesat. Metode analog konvensional memerlukan 7-10 kunjungan, namun metode digital dapat mempersingkat menjadi 3-5 kunjungan. Scan IOS untuk rahang tanpa gigi masih memiliki tantangan akurasi, namun pendekatan hybrid - scan kesan awal dengan scanner laboratorium lalu desain gigi tiruan secara digital - sudah praktis.\n\n◆ Prinsip Susunan Gigi Tiruan\nDalam susunan gigi tiruan penuh, Lingualized Occlusion sering direkomendasikan. Ini adalah pola oklusi di mana hanya cusp palatal rahang atas yang berkontak dengan fossa oklusal gigi tiruan rahang bawah, menyeimbangkan stabilitas gigi tiruan dan efisiensi gaya oklusal. Dalam perangkat lunak CAD, gigi dipilih dari library dan disusun otomatis, lalu disesuaikan halus sesuai bidang oklusal.\n\n◆ Desain Basis Gigi Tiruan\nDalam desain digital, ketebalan basis gigi tiruan dapat dioptimalkan per area. Bagian palatal 2,0-2,5mm, bagian tepi lebih tebal (3,0-3,5mm), dan bagian flange mendukung mukosa labiobuccal dengan bentuk yang tepat. Saat menggunakan metal plate (basis logam), bentuk metal plate didesain di CAD dan struktur retensi disediakan di bagian sambungan dengan basis resin.\n\n◆ Material Gigi Tiruan Digital\nMaterial yang digunakan untuk gigi tiruan CAD/CAM memiliki karakteristik berbeda dari resin heat-cured konvensional. Resin tipe blok milling memiliki densitas tinggi dengan sedikit gelembung dan kekuatan mekanis unggul. Resin cetak 3D memiliki kebebasan bentuk tinggi namun mungkin kurang dalam kekuatan. Baru-baru ini, gigi tiruan digital monolitik (satu bagian) juga muncul, dengan teknologi pengolahan gigi tiruan dan basis secara terintegrasi."

                    id: "9-4",
                    title: "CAMソフトと材料別加工",
                    whatYouLearn: "CAMソフトの使い方と、材料ごとの加工パラメーターの違いを学びます。",
                    learningObjectives: "各材料に適した加工パラメーターを設定でき、CAMソフトを正しく操作できるようにします。",
                    goodExample: "材料に応じた適切な加工設定ができ、効率的に加工できる。",
                    badExample: "加工パラメーターが不適切で、材料の特性を活かせていない。",
                    evaluationCriteria: "CAMソフト操作、材料知識、加工パラメーター設定。",
                    teaching: "[TABLE]\nCAMソフト|特徴|対応材料\nhyperDENT|高精度パス生成|ジルコニア、セラミック\nDental CAM|多様な材料対応|金属、レジン、セラミック\nProtat|複雑形状対応|チタン、ガラス化セラミック\n[/TABLE]\n【Part7①② CAMソフトと材料別加工】\n\n■ CAMソフトの基本\nCAMソフトはCADデザインデータ（STL）を加工機（ミリングマシン）が理解できる加工プログラム（ツールパス）に変換するソフトウェア。\n\n【作業工程と順序】\n①STLデータの読込→②材料の選択→③ディスク/ブロック上への配置（ネスティング）→④シーケンスの設定→⑤サポートピンの設定→⑥加工シミュレーション（確認）→⑦加工プログラムの出力→⑧ミリングマシンへ送信→⑨加工実行\n\n【シーケンス（加工順序）の設定】\nシーケンスとは切削加工の順序と条件のこと。通常3段階で行う：\n・粗削り（Roughing）：大きなバーで大まかに形態を削り出す。切削量が多いため送り速度は速め。\n・中削り（Semi-finishing）：中サイズのバーで粗削り面を整える。\n・仕上げ（Finishing）：細いバーで最終的な表面を仕上げる。送り速度は遅め、精度重視。\n切削方向（等高線切削/往復切削/スパイラル切削等）も材料と形態に合わせて設定する。\n\n【ネスティング（配置最適化）】\nディスク上への補綴物の配置を最適化する作業。\n・配置効率の最大化：ディスクのスペースを無駄なく使い、材料ロスを最小化する。\n・配置位置の注意：ディスクの端は固定部に近く応力がかかるため、重要な部分を中央寄りに配置する。\n・ミスの防止：補綴物同士が重なったり、サポートピンが干渉したりしないよう確認する。\n\n【サポートピンの設定】\nサポートピンはディスクと補綴物をつなぐ支柱。加工完了後に切断して補綴物を取り出す。\n・位置：咬合面やコンタクト部を避け、補綴物の機能に影響しない位置に配置。通常は咬合面の反対側やマージン付近。\n・太さ：太すぎると切断跡が大きい。細すぎると加工中に補綴物が脱落するリスク。材料に応じた適切な太さを設定。\n\n■ 材料別加工条件\n\n【ジルコニア】\n・半焼結（プレシンタード）状態で加工→焼結炉で最終焼結。\n・半焼結状態は柔らかいためドライ加工（水なし）で切削可能。\n・焼結時に約20%収縮するため、CAMソフトで収縮率を設定し、拡大して加工する。\n・4ユニット以上の長大ブリッジでは、焼結時の変形を防ぐためスタビライザー（安定装置）の使用を検討。\n・グラデーション材料（上下で色が異なる多層ディスク）は配置位置が色調に影響するため注意。\n\n【PMMA（アクリルレジン）】\n・硬度が低く粘りがある材料。ドライ加工。\n・削りくずが粘着しやすいため、バーの清掃が重要。\n・暫間補綴物（テンポラリークラウン）やデンチャーベースに使用。\n\n【ハイブリッドレジン】\n・PMMAより硬度が高い。\n・3軸加工が多い（5軸の必要性が低い）。\n・最終補綴物として使用可能。\n\n【金属（コバルトクロム合金等）】\n・硬度が高く、加工負荷が大きい。ウェット加工（切削液使用）。\n・バーの消耗が速い。切削条件（回転数・送り速度・切込み量）の最適化が重要。\n・たわみ（加工中の材料の弾性変形）に注意。仕上げパスで精度を追い込む。\n\n【ガラスセラミック（e.max等）】\n・ミリングバーではなくグラインディングバー（研削バー）を使用。ウェット加工。\n・脆い材料のため、加工条件が不適切だとチッピングやクラックが発生する。\n・繊細な取り扱いが必要。送り速度は遅め、切込み量は少なめ。\n\n【ジルコニアインレー】\n・小さな補綴物のため精密加工が必要。\n・3軸加工優先（小さいためアンダーカット部が少ない）。\n\n[KEY: CAMソフトの正確な選択と材料別パラメータ設定が加工品質を決定する]\n[TIP: メーカー推奨パラメータから開始して最適値を見つける]\n[WARN: 材料に合わないパラメータを使うと工具破損や加工品不良が生じる]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ CAMソフトの加工戦略\nCAMソフトの核心機能は「ツールパス生成」である。荒加工（Roughing）→ 中仕上げ（Semi-finishing）→ 仕上げ（Finishing）の3段階で、材料ブロックから目的の形状を削り出す。各段階でのツール選択（径・形状）、回転速度（rpm）、送り速度（mm/min）、切込み深さ（mm）を材料に応じて最適化する。\n\n◆ 材料別の加工パラメータ\nジルコニアは焼結前の「グリーン体」状態で加工し、焼結後に約20%収縮する。収縮率はロットごとに異なるため、CAMソフトで正確な拡大率を設定する必要がある。ニケイ酸リチウム（e.max CAD）は結晶化焼成前のブルーステートで加工し、焼成後に約0.2%収縮する。PMMA・ワックスなどの軟材料は高速で加工でき、湿式冷却は不要だが、切削熱による変形に注意する。\n\n◆ 5軸加工と3軸加工の違い\n3軸加工機（X-Y-Z軸）は基本的な形態の切削が可能だが、アンダーカット部分の加工ができない。5軸加工機（3軸+A-B回転軸）は複雑な形態やインプラントのスクリューチャンネル（角度付き）の加工が可能である。5軸加工はプログラミングが複雑で加工時間も長いが、設計の自由度が格段に向上する。\n\n◆ 工具管理とメンテナンス\nミリングバー（切削工具）の寿命管理は加工品質に直結する。ダイヤモンドコートバーは通常100-200ユニットで交換が必要。工具の摩耗は表面粗さの悪化、寸法精度の低下、加工時間の増加として現れる。加工機のメンテナンスとして、スピンドルのグリスアップ（毎日）、コレットのクリーニング（毎日）、リニアガイドの潤滑（毎月）、キャリブレーション（毎月）が推奨される。",
                    teachingId: "[TABLE]\nPerangkat Lunak CAM|Fitur|Bahan yang Didukung\nhyperDENT|Pembuatan Jalur Presisi Tinggi|Zirkonia, Keramik\nGigi CAM|Dukungan Bahan Beragam|Logam, Resin, Keramik\nProtat|Dukungan Bentuk Kompleks|Titanium, Keramik Kaca\n[/TABLE]\n【Part7①② Software CAM dan Proses Pembuatan per Material】\n\n■ Dasar Software CAM\nSoftware CAM mengubah data desain CAD (STL) menjadi program proses (tool path) yang dapat dipahami mesin proses (milling machine).\n\n【Proses Kerja dan Urutan】\n①Pembacaan data STL→②Pemilihan material→③Penempatan pada disk/block (nesting)→④Pengaturan sequence→⑤Pengaturan support pin→⑥Simulasi proses (verifikasi)→⑦Output program proses→⑧Pengiriman ke milling machine→⑨Eksekusi proses\n\n【Pengaturan Sequence (Urutan Proses)】\nSequence adalah urutan dan kondisi proses pemotongan. Biasanya dilakukan dalam 3 tahap:\n・Rough cutting (Roughing): Menghilangkan bentuk kasar dengan bar besar. Karena jumlah pemotongan banyak, kecepatan umpan cepat.\n・Semi-finishing (Semi-finishing): Selesaikan permukaan rough cutting dengan bar berukuran menengah.\n・Finishing (Finishing): Selesaikan permukaan akhir dengan bar tipis. Kecepatan umpan lambat, penekanan pada akurasi.\nArah pemotongan (contour cutting/reciprocal cutting/spiral cutting dll) juga diatur sesuai dengan material dan bentuk.\n\n【Nesting (Optimasi Penempatan)】\nOptimalkan penempatan supplementary product pada disk.\n・Maksimalkan efisiensi penempatan: Gunakan ruang disk tanpa pemborosan, minimalkan waste material.\n・Perhatian penempatan: Tepi disk dekat dengan area fiksasi dan mengalami stress, jadi tempatkan bagian penting di dekat pusat.\n・Pencegahan kesalahan: Verifikasi bahwa product tidak saling tumpang tindih dan support pin tidak mengganggu.\n\n【Pengaturan Support Pin】nSupport pin adalah pilar yang menghubungkan disk dengan product. Setelah proses selesai, dipotong untuk mengeluarkan product.\n・Posisi: Hindari permukaan oklusal dan area kontak; tempatkan pada posisi yang tidak mempengaruhi fungsi product. Biasanya di sisi sebaliknya dari oklusal atau dekat margin.\n・Ketebalan: Terlalu tebal menyisakan bekas pemotongan besar. Terlalu tipis mengakibatkan risiko product terlepas selama proses. Atur ketebalan yang sesuai dengan material.\n\n■ Kondisi Proses per Material\n\n【Zirconia】\n・Proses dalam kondisi semi-sintered (pre-sintered)→final sintering di sintering furnace.\n・Kondisi semi-sintered lunak sehingga dapat dipotong dengan dry machining (tanpa air).\n・Selama sintering terjadi penyusutan sekitar 20%, jadi atur expansion rate di software CAM dan proses dengan ukuran yang diperbesar.\n・Untuk long-span bridge 4 unit atau lebih, pertimbangkan penggunaan stabilizer (perangkat stabilisasi) untuk mencegah deformasi saat sintering.\n・Material gradient (disk berlapis dengan warna berbeda atas-bawah) - perhatikan bahwa posisi penempatan mempengaruhi warna.\n\n【PMMA (Acrylic Resin)】\n・Hardness rendah dan material yang lengket. Dry machining.\n・Cutting chips mudah menempel, jadi pembersihan bar sangat penting.\n・Digunakan untuk temporary prosthetics (temporary crown) dan denture base.\n\n【Hybrid Resin】\n・Hardness lebih tinggi dari PMMA.\n・3-axis machining banyak digunakan (kebutuhan akan 5-axis rendah).\n・Dapat digunakan sebagai final prosthetic.\n\n【Metal (Cobalt-Chrome Alloy dll)】\n・Hardness tinggi, beban proses besar. Wet machining (menggunakan cutting fluid).\n・Konsumsi bar cepat. Optimasi kondisi pemotongan (rpm/kecepatan umpan/cutting depth) sangat penting.\n・Perhatikan deflection (deformasi elastis material selama proses). Kejar akurasi dengan finishing pass.\n\n【Glass Ceramic (e.max dll)】\n・Gunakan grinding bar (bukan milling bar). Wet machining.\n・Material fragile, jika kondisi proses tidak tepat, chipping atau crack dapat terjadi.\n・Diperlukan penanganan yang teliti. Kecepatan umpan lambat, cutting depth minimal.\n\n【Zirconia Inlay】\n・Prosthetic kecil memerlukan precision machining.\n・Prioritaskan 3-axis machining (undercut sedikit karena ukuran kecil).\n\n[KEY: Pemilihan akurat perangkat lunak CAM dan pengaturan parameter spesifik bahan menentukan kualitas pemrosesan]\n[TIP: Mulai dari parameter yang direkomendasikan pabrikan dan temukan nilai optimal]\n[WARN: Parameter yang tidak sesuai dengan bahan menyebabkan kerusakan alat dan produk cacat]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Strategi Pengolahan Perangkat Lunak CAM\nFungsi inti perangkat lunak CAM adalah \"pembuatan toolpath\". Dalam 3 tahap - roughing (kasar) → semi-finishing (setengah halus) → finishing (halus), bentuk target diukir dari blok material. Pemilihan alat (diameter, bentuk), kecepatan rotasi (rpm), kecepatan umpan (mm/min), dan kedalaman potong (mm) dioptimalkan sesuai material.\n\n◆ Parameter Pengolahan per Material\nZirkonia diproses dalam keadaan \"green body\" sebelum sintering dan menyusut sekitar 20% setelah sintering. Rasio penyusutan berbeda per lot, sehingga rasio pembesaran yang akurat harus diatur di perangkat lunak CAM. Lithium disilikat (e.max CAD) diproses dalam blue state sebelum kristalisasi dan menyusut sekitar 0,2% setelah pembakaran.\n\n◆ Perbedaan Pengolahan 5-Aksis dan 3-Aksis\nMesin 3-aksis (X-Y-Z) dapat memotong bentuk dasar namun tidak dapat memproses bagian undercut. Mesin 5-aksis (3 aksis + rotasi A-B) dapat memproses bentuk kompleks dan saluran sekrup implan (bersudut). Pengolahan 5-aksis memiliki pemrograman lebih kompleks dan waktu lebih lama, namun kebebasan desain meningkat drastis.\n\n◆ Manajemen Alat dan Pemeliharaan\nManajemen umur pakai bur milling (alat potong) langsung berkaitan dengan kualitas pengolahan. Bur berlapis berlian umumnya perlu diganti setiap 100-200 unit. Keausan alat muncul sebagai kemerosotan kekasaran permukaan, penurunan akurasi dimensi, dan peningkatan waktu pengolahan. Pemeliharaan mesin yang direkomendasikan: pelumasan spindel (harian), pembersihan collet (harian), pelumasan linear guide (bulanan), kalibrasi (bulanan)."

                    id: "9-5",
                    title: "ミリングマシンと3Dプリンター",
                    whatYouLearn: "ミリングマシンと3Dプリンターの詳細な操作と管理方法を学びます。",
                    learningObjectives: "各機器の操作手順、メンテナンス、トラブル対応を習得します。",
                    goodExample: "機器操作が正確で、適切なメンテナンスと問題対応ができる。",
                    badExample: "操作ミスが多く、メンテナンスの知識が不足している。",
                    evaluationCriteria: "機器操作、メンテナンス知識、トラブルシューティング。",
                    teaching: "[TABLE]\n機械|処理方法|対応材料\nミリング|切削加工|ジルコニア、セラミック、金属\nプリンター|光造形|レジン、鋳造パターン\n[/TABLE]\n【Part7③〜⑧ ミリングマシンと3Dプリンター】\n\n■ ミリングマシンの基本\n\n【構造】\n・スピンドル（主軸）：ミリングバーを高速回転させる部分。精度の要。\n・ワーククランプ：材料（ディスク/ブロック）を固定する部分。\n・モーター：軸の移動を制御する。3軸はX/Y/Z方向、5軸はさらに2つの回転軸を持つ。\n・ツールボックス：交換用ミリングバーを格納する部分。自動交換対応のものもある。\n\n【3軸〜5軸の違い】\n・3軸：X/Y/Z方向の移動のみ。アンダーカット部は加工できない。シンプルな形態に適する。\n・4軸：3軸＋1回転軸。限定的なアンダーカット加工が可能。\n・5軸：3軸＋2回転軸。複雑な形態やアンダーカット部も加工可能。最も汎用性が高い。\n\n【ドライ加工とウェット加工】\n・ドライ加工：切削液を使用しない。ジルコニア（半焼結）、PMMA等の比較的柔らかい材料に使用。\n・ウェット加工：切削液（水やオイル）を使用。金属、ガラスセラミック等の硬い材料に使用。切削熱の除去と切り粉の排出が目的。\n\n■ ミリングマシンのメンテナンス\n精度維持のために日常メンテナンスが不可欠。\n\n【日次メンテナンス】\n・内部清掃：切り粉、粉塵の除去。エアブローで清掃。\n・スピンドル清掃：スピンドル内部の切り粉を除去。精度に直結する重要な作業。\n・ツールボックスの確認：バーの状態確認、正しい位置へのセット確認。\n\n【定期メンテナンス】\n・オイル管理：潤滑オイルの量と品質を確認。定期的に交換。\n・循環メンテナンス（ウェット加工機）：切削液の循環系統の清掃。フィルター交換。切削液の劣化確認。\n・気圧管理：エアー供給の圧力が適正範囲内であることを確認。\n・水抜き：エアータンク内の水分を排出する。水分はバーの錆や動作不良の原因。\n・キャリブレーション：定期的に加工精度の校正を行う。メーカー指定の校正ブロックを使用。\n\n■ ミリングバーの管理\n\n【種類】\n・ミリングバー：切削用。金属やレジン系材料の切削に使用。\n・グラインディングバー：研削用。ガラスセラミック等の脆性材料に使用。ダイヤモンド粒子がコーティングされている。\n\n【使用前チェック】\nマイクロスコープ（顕微鏡）でバーの先端状態を確認する：\n・折れ：先端が折れていないか。\n・欠け：刃先に欠けがないか。\n・消耗：摩耗による刃先の丸まり、コーティングの剥離がないか。\n異常があれば即座に交換する。消耗したバーでの加工は精度低下と不適合の直接原因。\n\n【交換時期管理】\n加工回数や使用時間を記録し、定期的に交換する。材料によって消耗速度が異なる（金属加工は消耗が速い）。\n\n■ 材料の固定\n・ブロック固定：ブロックの配置位置（縦横の向き）を確認してクランプに固定。\n・ディスク固定：均一なトルクで固定する。偏った締め付けはディスクのたわみや加工ズレの原因。\n\n■ 3Dプリンター\n\n【造形レジンの種類】\n・模型製作用：作業用模型の造形。硬度と精度が必要。\n・鋳造パターン用：ロストワックス鋳造のパターン製作。燃焼時に残渣が少ない特性。\n・クラウン・ブリッジ用：暫間補綴物の製作。\n・個人トレー用：個人トレーの造形。\n・デンチャーベース用：義歯床の造形。\n用途に合わないレジンを使用すると物性や精度の問題が発生するため、必ず適切なレジンを選択する。\n\n【造形精度に影響する要因】\n・プラットフォーム上の配置位置：DLP方式ではプロジェクターの歪曲収差の影響で、プラットフォーム中央が最も精度が高い。端に行くほど歪みが生じやすい。\n・プリント時間と数・高さの関係：造形物の数が多いほど、高さが高いほどプリント時間が長くなる。積層方向と角度も精度に影響する。\n\n【造形レジンの管理・操作・後処理】\n・管理：遮光保管。使用期限の確認。使用前の攪拌。\n・準備：レジンバットへの適量充填。プラットフォームの水平確認。\n・操作：造形パラメーターの確認（層厚、露光時間等）。造形中の監視。\n・後処理：洗浄（IPA等）→サポートピン除去→二次硬化（光重合）。二次硬化は粘膜面・咬合面側各300回が基準。\n\n[KEY: ミリングマシンと3Dプリンターの特性の理解と正確な機械選択が生産効率を左右する]\n[TIP: ロット加工で複数製品を同時処理することで加工時間を短縮]\n[WARN: 機械の定期メンテナンスを怠ると加工精度が低下する]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ ミリングマシンの選定基準\nミリングマシンの選定では、加工精度（±10-20μm）、加工可能な材料（ジルコニア・メタル・ワックス・PMMA等）、軸数（3軸・4軸・5軸）、チェンジャー機能（ブロック自動交換）、ウェット/ドライ加工の対応を考慮する。小規模技工所では4軸のコンパクトモデル（DWX-52D等）、大規模ラボでは5軸の量産モデル（Datron D5等）が適する。\n\n◆ 3Dプリンターの選定と運用\n歯科用3Dプリンターは、精度（XY解像度50μm以下）、造形速度、材料コスト、後処理の容易さで選定する。DLP方式（Asiga、SprintRay等）は高精度・高速で、クラウン・ブリッジの暫間修復物、サージカルガイド、模型に適する。LCD方式（Phrozen等）はコストパフォーマンスに優れるが、精度面ではDLPにやや劣る。造形プラットフォームの水平出し（レベリング）は精度に直結するため、毎日確認する。\n\n◆ 材料の保管と管理\nCAM材料の品質維持には適切な保管が不可欠である。ジルコニアブロックは湿気に敏感で、密封された包装から出した後は早めに使用する。3Dプリント用レジンは紫外線で硬化するため、遮光容器で保管する。使用期限の管理はFIFO（先入先出）で行い、期限切れの材料は使用しない。室温管理も重要で、多くの材料は15-25℃の環境で保管することが推奨される。\n\n◆ 加工後の品質検証\n加工品の寸法検証にはデジタルノギス、マイクロスコープ、三次元測定機（CMM）が使用される。技工所レベルでは、ノギス（精度0.01mm）とマイクロスコープ（10-40倍）が実用的。加工品をスキャンして元のCADデータと重ね合わせ比較（オーバーレイ分析）する手法は、加工精度の定量的評価に最も有効である。",
                    teachingId: "[TABLE]\nMesin|Metode Pemrosesan|Bahan yang Didukung\nPenggilingan|Pemrosesan Pengambilan|Zirkonia, Keramik, Logam\nPrinter|Fotolitografi|Resin, Pola Penuangan\n[/TABLE]\n【Part7③~⑧ Milling Machine dan 3D Printer】\n\n■ Dasar Milling Machine\n\n【Struktur】\n・Spindle (sumbu utama): Bagian yang memutar milling bar dengan kecepatan tinggi. Adalah kunci akurasi.\n・Work clamp: Bagian yang mengikat material (disk/block).\n・Motor: Mengontrol pergerakan sumbu. 3-axis hanya pergerakan X/Y/Z, 5-axis memiliki 2 sumbu rotasi tambahan.\n・Tool box: Menyimpan milling bar pengganti. Beberapa mendukung penggantian otomatis.\n\n【Perbedaan 3-axis hingga 5-axis】\n・3-axis: Hanya pergerakan X/Y/Z. Area undercut tidak dapat dipotong. Cocok untuk bentuk sederhana.\n・4-axis: 3-axis + 1 sumbu rotasi. Proses undercut terbatas menjadi mungkin.\n・5-axis: 3-axis + 2 sumbu rotasi. Bentuk kompleks dan area undercut juga dapat dipotong. Versatilitas tertinggi.\n\n【Dry Machining dan Wet Machining】\n・Dry machining: Tidak menggunakan cutting fluid. Digunakan untuk material yang relatif lembut seperti zirconia (semi-sintered) dan PMMA.\n・Wet machining: Menggunakan cutting fluid (air atau minyak). Digunakan untuk material keras seperti logam dan glass ceramic. Tujuannya menghilangkan panas pemotongan dan pembuangan chips.\n\n■ Maintenance Milling Machine\nMaintenance harian sangat penting untuk mempertahankan akurasi.\n\n【Maintenance Harian】\n・Pembersihan interior: Penyingkiran chips, debu. Pembersihan dengan air tekan.\n・Pembersihan spindle: Penyingkiran chips di dalam spindle. Operasi penting yang langsung mempengaruhi akurasi.\n・Verifikasi tool box: Verifikasi kondisi bar, verifikasi penempatan yang benar.\n\n【Maintenance Berkala】\n・Manajemen minyak: Verifikasi jumlah dan kualitas minyak pelumas. Penggantian berkala.\n・Maintenance sistem sirkulasi (mesin wet machining): Pembersihan sistem sirkulasi cutting fluid. Penggantian filter. Verifikasi degradasi cutting fluid.\n・Manajemen tekanan udara: Verifikasi bahwa tekanan suplai udara dalam jangkauan yang tepat.\n・Pengeluaran air: Pengeluaran uap air dari tangki udara. Uap air adalah penyebab karat bar dan malfungsi.\n・Calibration: Melakukan calibration akurasi proses secara berkala. Menggunakan calibration block yang ditunjuk oleh produsen.\n\n■ Manajemen Milling Bar\n\n【Jenis】\n・Milling bar: Untuk pemotongan. Digunakan untuk pemotongan metal dan material sistem resin.\n・Grinding bar: Untuk grinding. Digunakan untuk material rapuh seperti glass ceramic. Dilapisi dengan partikel diamond.\n\n【Pre-Use Check】\nVerifikasi kondisi ujung bar menggunakan microscope (pembesaran):\n・Patah: Apakah ujung patah.\n・Chip: Apakah ada chip pada edge.\n・Wear: Apakah ada rounding dari edge, delamination coating akibat wear.\nJika ada abnormalitas, segera ganti. Proses dengan bar yang wear langsung menyebabkan penurunan akurasi dan unfitting.\n\n【Manajemen Waktu Penggantian】\nCatat jumlah proses atau jam penggunaan, dan lakukan penggantian secara berkala. Kecepatan wear berbeda tergantung material (wear cepat pada proses metal).\n\n■ Fiksasi Material\n・Fiksasi block: Verifikasi posisi penempatan block (orientasi vertikal-horizontal) dan ikat ke clamp.\n・Fiksasi disk: Ikat dengan torque yang seragam. Pengikat yang tidak seragam menyebabkan deflection disk atau proses menyimpang.\n\n■ 3D Printer\n\n【Jenis Resin Cetak】\n・Untuk cetakan kerja: Cetakan model kerja. Hardness dan akurasi diperlukan.\n・Untuk pola casting: Pembuatan pola untuk lost-wax casting. Karakteristik residue rendah selama pembakaran.\n・Untuk crown & bridge: Pembuatan prosthetic sementara.\n・Untuk individual tray: Cetakan individual tray.\n・Untuk denture base: Cetakan denture bed.\nPenggunaan resin yang tidak sesuai dengan tujuan menyebabkan masalah properti atau akurasi, jadi selalu pilih resin yang sesuai.\n\n【Faktor yang Mempengaruhi Akurasi Cetak】\n・Posisi penempatan pada platform: Pada metode DLP, aberasi distorsi projector mempengaruhi akurasi; pusat platform memiliki akurasi tertinggi. Semakin jauh dari pusat, semakin mudah terjadi distorsi.\n・Hubungan antara waktu print, jumlah, dan tinggi: Semakin banyak object, semakin tinggi object, semakin lama waktu print. Arah stacking dan sudut juga mempengaruhi akurasi.\n\n【Manajemen, Operasi, Post-Processing Resin Cetak】\n・Manajemen: Penyimpanan light-protected. Verifikasi tanggal kedaluwarsa. Agitasi sebelum digunakan.\n・Persiapan: Pengisian resin yang tepat ke resin vat. Verifikasi level platform.\n・Operasi: Verifikasi parameter cetak (layer thickness, exposure time dll). Monitoring selama printing.\n・Post-processing: Pembersihan (IPA dll)→penyingkiran support pin→secondary hardening (light curing). Secondary hardening dengan 300 kali penyinaran pada sisi mukosa dan 300 kali pada sisi oklusal adalah standar.\n\n[KEY: Memahami karakteristik mesin penggiling dan printer 3D serta memilih mesin yang tepat mempengaruhi efisiensi produksi]\n[TIP: Memproses banyak produk secara bersamaan mengurangi waktu pemrosesan]\n[WARN: Pemeliharaan berkala mesin yang diabaikan mengurangi akurasi pemrosesan]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Kriteria Pemilihan Mesin Milling\nDalam pemilihan mesin milling, pertimbangkan akurasi pengolahan (plus minus 10-20μm), material yang dapat diproses (zirkonia, logam, wax, PMMA, dll.), jumlah aksis (3, 4, 5), fungsi changer (penggantian blok otomatis), dan dukungan pengolahan wet/dry. Laboratorium kecil cocok dengan model kompak 4-aksis, laboratorium besar cocok dengan model produksi massal 5-aksis.\n\n◆ Pemilihan dan Operasi Printer 3D\nPrinter 3D dental dipilih berdasarkan akurasi (resolusi XY di bawah 50μm), kecepatan pencetakan, biaya material, dan kemudahan pasca-proses. Metode DLP (Asiga, SprintRay, dll.) memiliki akurasi tinggi dan cepat, cocok untuk restorasi sementara, panduan bedah, dan model. Metode LCD memiliki rasio biaya-kinerja baik namun sedikit kurang akurat dibanding DLP.\n\n◆ Penyimpanan dan Manajemen Material\nPenyimpanan yang tepat sangat penting untuk menjaga kualitas material CAM. Blok zirkonia sensitif terhadap kelembaban, segera gunakan setelah membuka kemasan. Resin cetak 3D mengeras dengan sinar UV, jadi simpan dalam wadah pelindung cahaya. Kelola tanggal kedaluwarsa dengan FIFO (first in, first out). Kontrol suhu ruangan juga penting - banyak material direkomendasikan disimpan pada 15-25 derajat C.\n\n◆ Verifikasi Kualitas Pasca-pengolahan\nUntuk verifikasi dimensi produk olahan, digunakan jangka sorong digital, mikroskop, dan mesin pengukur koordinat (CMM). Di tingkat laboratorium, jangka sorong (akurasi 0,01mm) dan mikroskop (10-40x) praktis. Metode paling efektif untuk evaluasi kuantitatif adalah memindai produk dan membandingkan overlay dengan data CAD asli."

                    id: "9-6",
                    title: "適合確認とレジン系材料の仕上げ",
                    whatYouLearn: "加工後の適合確認方法と、レジン系材料の仕上げ工程を学びます。",
                    learningObjectives: "適合の確認手順を理解し、レジン系材料を正確に仕上げられるようにします。",
                    goodExample: "適合が正確で、レジンの仕上げ品質が高い。",
                    badExample: "適合に問題があり、仕上げが雑。",
                    evaluationCriteria: "適合精度、仕上げ品質、表面処理。",
                    teaching: "[TABLE]\n検査項目|基準|調整方法\n形態適合|マージン精度±0.1mm|グラインダーで研磨\n色調|シェード基準|ポーセリンペイント\nツヤ|自然な光沢|最終研磨\n[/TABLE]\n【Part8①②③ 適合確認とレジン系材料の仕上げ】\n\n■ 適合確認の手順\n加工された補綴物を模型に試適し、適合状態を確認・調整する工程。CADデザインが適切であれば最小限の調整で済むが、加工精度や材料の特性により調整が必要になる場合がある。\n\n【Step1：内面の確認】\n・切削片（加工時の削り残しや切り粉）が内面に付着していないか確認する。付着があると模型に正しく適合できない。\n・エアブローや超音波洗浄で内面を清掃する。\n・清掃後、模型に試適する。\n\n【Step2：早期接触の特定と調整】\n・模型に補綴物を載せた際に浮き上がり（完全に座りきらない状態）がないか確認する。\n・浮き上がりがある場合は、内面の早期接触（局所的に強く当たっている部分）が原因。\n・フィットチェッカー（適合検査材）を使用して早期接触部位を特定する。\n・ダイヤモンドポイントで早期接触部を削合する。\n・調整の順序：まず支台先端部→次に軸面→最後にマージン部の順で調整する。マージン部は最も慎重に。\n\n【Step3：模型上での確認（4つのチェック）】\n①回転：補綴物が支台歯上で回転しないか確認。回転する場合は内面の適合不良。\n②ピッチング：前後や左右に揺れ（ピッチング）がないか確認。ピッチングがある場合は内面の局所的な接触。\n③辺縁の適合不足：マージン部に隙間がないか確認。隙間があるとセメント溶出や二次齲蝕のリスク。\n④封鎖性：マージン全周で均一な封鎖がされているか確認。\n\n【Step4：調整終了の判断基準】\n咬合面を軽く指で押さえた時に、形成限界に補綴物がストンと落ちる（完全に着座する）時点が適合調整のゴール。押さなくても自重で着座するのが理想。\n\n【プリント模型での適合確認】\n3Dプリント模型は石膏模型と精度特性が異なる（表面粗さ、寸法精度）。プリント模型での適合確認時はこの差異を考慮する。\n\n【チタンベースの適合確認】\nインプラント症例では、チタンベースとの適合確認が特に重要。\n・回転防止機構の再現が最重要：チタンベース上で上部構造が回転しないか確認する。\n・チタンベースと上部構造の接合面に隙間がないか確認する。\n\n■ ハイブリッドレジンの仕上げ\n\n【Step1：隣接面・咬合接触点の調整】\nラバーホイールやダイヤモンドポイントを使用して、隣接面コンタクトと咬合接触点を調整する。デザインが適切であれば微量の調整で済む。\n\n【Step2：マージン調整】\nシリコーンホイールを使用してマージン部のバリやわずかなオーバーハングを除去する。マージン部は歯肉との境界であり、滑沢な仕上げが歯肉の健康維持に重要。\n\n【Step3：研磨】\nロビンソンブラシNo.9、No.10に艶出し研磨材を付けて研磨する。ブラシの種類で粗研磨→仕上げ研磨と段階を踏む。最終的に高光沢の滑沢面を得る。\n\n■ PMMAレジンの仕上げ\nPMMAはハイブリッドレジンに比べて柔らかいため、カーバイドバーを使用して形態修正を行う。その後の手順はハイブリッドレジンと同様（シリコーンホイール→布バフ研磨）。\n\n【研磨困難部への対応】\n溝の最深部など研磨器具が届かない部分は、レジン用の滑沢材（コーティング材）を塗布して表面の滑沢性を確保する。\n\n[KEY: 適合確認と仕上げが補綴物の最終品質を決定する最後の重要ステップ]\n[TIP: ルーペで詳細を確認しながら研磨することで精度が確保される]\n[WARN: 過度な研磨はマージン精度を失わせる]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ マージン適合の評価法\nマージン適合性は補綴物の長期予後を左右する最も重要な因子の一つである。適合精度の評価法として、シリコーンフィットチェッカー（適合試験材）が広く使用されている。内面にシリコーン印象材を塗布して模型に装着し、硬化後に薄膜の厚さを測定する。許容範囲はマージン部で50μm以下、内面で100μm以下が一般的な基準である。\n\n◆ レジン系材料の仕上げテクニック\nCAD/CAMレジン（PMMA、ハイブリッドレジン等）の仕上げは、切削→研磨→艶出しの順で進める。カーバイドバーで大まかな形態修正→シリコーンポイント（粗→中→細）で研磨→艶出しペースト（ダイヤモンドペースト1μm）で最終光沢仕上げ。研磨方向は一方向で統一し、回転工具の速度は材料に応じて5000-15000rpmに設定する。\n\n◆ 色調確認と修正\nレジン系材料やセラミックスの色調確認は、自然光（または色温度5500KのLED）下で行う。シェードガイド（Vita Classical、Vita 3D-Master等）と比較し、彩度・明度・色相の3要素で評価する。色調が合わない場合、レジン材料では表面にステイン（着色液）を塗布し、光重合で固定する。セラミックスではステイニングペーストを塗布し、焼成温度で焼き付ける。\n\n◆ 表面処理と接着前処理\n補綴物の内面処理は接着強度に大きく影響する。ジルコニアにはサンドブラスト（50μmアルミナ、2bar）+プライマー（MDP含有）、ニケイ酸リチウムにはフッ酸エッチング（5%、20秒）+シランカップリング処理が標準的なプロトコルである。これらの処理は技工所で行い、歯科医院での装着をスムーズにする。",
                    teachingId: "[TABLE]\nItem Inspeksi|Standar|Metode Penyesuaian\nAdaptasi Bentuk|Akurasi Margin ±0,1mm|Poles dengan Penggosok\nNada Warna|Standar Warna|Cat Porselen\nCahaya|Kilau Alami|Penyelesaian Akhir\n[/TABLE]\n【Part8①②③ Verifikasi Kecocokan dan Finishing Material Sistem Resin】\n\n■ Prosedur Verifikasi Kecocokan\nProses try-fitting prosthetic yang telah dipotong pada model, verifikasi keadaan kecocokan・adjust. Jika desain CAD tepat, adjustment minimal diperlukan, namun adjustment mungkin diperlukan karena presisi proses atau karakteristik material.\n\n【Step1: Verifikasi Permukaan Internal】\n・Verifikasi apakah chip pemotongan (sisa pemotongan atau chip dari waktu proses) menempel pada permukaan internal. Jika ada, prosthetic tidak dapat fit dengan benar pada model.\n・Pembersihan permukaan internal dengan air tekan atau ultrasonic cleaning.\n・Setelah pembersihan, try-fitting pada model.\n\n【Step2: Identifikasi dan Adjustment Early Contact】\n・Verifikasi apakah ada floating (prosthetic tidak sepenuhnya duduk) saat prosthetic ditempatkan pada model.\n・Jika ada floating, early contact (area yang kontak secara lokal dan kuat) pada permukaan internal adalah penyebabnya.\n・Gunakan fit checker (material pemeriksaan kecocokan) untuk mengidentifikasi area early contact.\n・Gunakan diamond point untuk menghilangkan early contact area.\n・Urutan adjustment: Pertama area puncak pilar→selanjutnya axial surface→terakhir margin area. Area margin harus paling hati-hati.\n\n【Step3: Verifikasi pada Model (4 Pengecekan)】\n①Rotasi: Verifikasi bahwa prosthetic tidak berputar pada pilar. Rotasi mengindikasikan unfitting permukaan internal.\n②Pitching: Verifikasi tidak ada goyangan (pitching) ke depan-belakang atau kiri-kanan. Jika ada pitching, ada early contact lokal pada permukaan internal.\n③Unfitting margin: Verifikasi tidak ada gap pada area margin. Jika ada gap, ada risiko cement leakage atau secondary caries.\n④Sealing: Verifikasi bahwa sealing seragam di seluruh margin.\n\n【Step4: Kriteria Penghentian Adjustment】\nTitik di mana prosthetic jatuh ke dalam formation limit (completely seated) saat ditekan ringan pada permukaan oklusal adalah goal dari adjustment kecocokan. Ideal adalah self-seating tanpa tekanan.\n\n【Verifikasi Kecocokan pada Model Print】n3D print model memiliki karakteristik presisi yang berbeda dari model stone (surface roughness, dimensional accuracy). Pertimbangkan perbedaan ini saat verifikasi kecocokan pada print model.\n\n【Verifikasi Kecocokan Titanium Base】\nDalam kasus implant, verifikasi kecocokan dengan titanium base sangat penting.\n・Mekanisme anti-rotasi sangat penting: Verifikasi bahwa superstructure tidak berputar pada titanium base.\n・Verifikasi tidak ada gap pada interface junction antara titanium base dan superstructure.\n\n■ Finishing Hybrid Resin\n\n【Step1: Adjustment Proximal Surface・Early Occlusal Contact】\nGunakan rubber wheel atau diamond point untuk adjustment proximal contact dan early occlusal contact. Jika desain tepat, hanya micro-adjustment diperlukan.\n\n【Step2: Adjustment Margin】\nGunakan silicone wheel untuk menghilangkan bur atau overhang kecil pada margin area. Area margin adalah boundary dengan gingiva, dan finishing halus penting untuk mempertahankan kesehatan gingiva.\n\n【Step3: Polishing】\nPolish dengan Robinson brush No.9, No.10 ditambah polishing agent. Lakukan tahapan dengan jenis brush (coarse polishing→finish polishing). Dapatkan akhir high-gloss halus.\n\n■ Finishing PMMA Resin\nPMMA lebih lembut dibanding hybrid resin, jadi gunakan carbide bar untuk modifikasi bentuk. Urutan selanjutnya sama dengan hybrid resin (silicone wheel→cloth buff polishing).\n\n【Penanggulangan Area Sulit Dipolish】\nArea yang tidak terjangkau oleh alat polish seperti bagian terdalam dari groove, dapat diolesi dengan smoothing material khusus resin (coating material) untuk memastikan smoothness permukaan.\n\n[KEY: Pemeriksaan adaptasi dan penyelesaian adalah langkah penting terakhir yang menentukan kualitas akhir prostetik]\n[TIP: Pemeriksaan detail dengan lup sambil melepas memastikan akurasi]\n[WARN: Penimbunan berlebihan menyebabkan hilangnya akurasi margin]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Metode Evaluasi Kesesuaian Margin\nKesesuaian margin adalah salah satu faktor terpenting yang menentukan prognosis jangka panjang protesa. Silicone fit checker (bahan uji kesesuaian) banyak digunakan sebagai metode evaluasi. Bahan cetak silikon dioleskan pada permukaan dalam, dipasang pada model, dan setelah mengeras ketebalan film tipis diukur. Rentang yang dapat diterima umumnya di bawah 50μm untuk bagian margin dan di bawah 100μm untuk permukaan dalam.\n\n◆ Teknik Penyelesaian Material Berbasis Resin\nPenyelesaian resin CAD/CAM (PMMA, hybrid resin, dll.) dilakukan dalam urutan pemotongan → pemolesan → pengilatan. Bur karbida untuk koreksi bentuk kasar → poin silikon (kasar → sedang → halus) untuk pemolesan → pasta pengkilat (pasta berlian 1μm) untuk kilap akhir. Arah pemolesan diseragamkan satu arah, kecepatan alat putar diatur 5000-15000rpm sesuai material.\n\n◆ Konfirmasi dan Koreksi Warna\nKonfirmasi warna material resin atau keramik dilakukan di bawah cahaya alami (atau LED suhu warna 5500K). Bandingkan dengan shade guide (Vita Classical, Vita 3D-Master, dll.) dan evaluasi 3 elemen: saturasi, kecerahan, dan hue. Jika warna tidak cocok, untuk resin oleskan stain (cairan pewarna) pada permukaan dan fiksasi dengan polimerisasi cahaya.\n\n◆ Perlakuan Permukaan dan Pra-perawatan Adhesi\nPerlakuan permukaan dalam protesa sangat mempengaruhi kekuatan adhesi. Untuk zirkonia: sandblast (alumina 50μm, 2bar) + primer (mengandung MDP). Untuk lithium disilikat: etsa asam fluorida (5%, 20 detik) + perlakuan silane coupling adalah protokol standar."
