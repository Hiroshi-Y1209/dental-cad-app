                        background: '#f8fafc', borderRadius: '10px', border: '1px dashed #cbd5e1',
                        fontSize: '28px', letterSpacing: '8px', lineHeight: '1.8'
                    }}, content));
                    i++; continue;
                }

                // Day separator ---
                if (/^-{3,}$/.test(trimmed)) {
                    elements.push(React.createElement('hr', {key: key++, style:{
                        border: 'none', borderTop: '2px dashed #cbd5e1', margin: '24px 0'
                    }}));
                    i++; continue;
                }

                // Main section header 【...】 standalone
                if (/^【[^】]*】$/.test(trimmed)) {
                    elements.push(React.createElement('div', {key: key++, style:{
                        background: 'linear-gradient(135deg, #1e40af, #3b82f6)',
                        color: 'white', padding: '12px 16px', borderRadius: '8px',
                        fontSize: '15px', fontWeight: '700', marginTop: elements.length > 0 ? '20px' : '0',
                        marginBottom: '12px', boxShadow: '0 2px 8px rgba(59,130,246,0.3)'
                    }}, trimmed));
                    i++; continue;
                }

                // Subsection ■
                if (trimmed.startsWith('■')) {
                    elements.push(React.createElement('div', {key: key++, style:{
                        fontSize: '14px', fontWeight: '700', color: '#1e40af',
                        marginTop: '18px', marginBottom: '6px', paddingBottom: '5px',
                        borderBottom: '2px solid #bfdbfe', display: 'flex', alignItems: 'center', gap: '6px'
                    }}, React.createElement('span', {style:{
                        display: 'inline-block', width: '4px', height: '18px',
                        background: '#3b82f6', borderRadius: '2px', flexShrink: 0
                    }}), trimmed.substring(1).trim()));
                    i++; continue;
                }

                // Step markers 【Step...】
                if (/^【Step\d+[：:]/.test(trimmed) || /^【ステップ/.test(trimmed)) {
                    const match = trimmed.match(/^(【[^】]+】)(.*)/);
                    if (match) {
                        elements.push(React.createElement('div', {key: key++, style:{
                            background: '#eff6ff', border: '1px solid #bfdbfe',
                            borderRadius: '6px', padding: '10px 14px', marginTop: '8px', marginBottom: '4px'
                        }},
                            React.createElement('span', {style:{color: '#1d4ed8', fontWeight: '700', fontSize: '13px'}}, match[1]),
                            React.createElement('span', {style:{color: '#374151', fontSize: '13px', marginLeft: '4px'}}, match[2])
                        ));
                        i++; continue;
                    }
                }

                // Inline 【...】 headers
                if (/^【[^】]+】/.test(trimmed) && !/^【Part/.test(trimmed)) {
                    const match = trimmed.match(/^(【[^】]+】)(.*)/);
                    if (match) {
                        elements.push(React.createElement('div', {key: key++, style:{
                            background: '#f0fdf4', border: '1px solid #bbf7d0',
                            borderRadius: '6px', padding: '10px 14px', marginTop: '8px', marginBottom: '4px'
                        }},
                            React.createElement('span', {style:{color: '#166534', fontWeight: '700', fontSize: '13px'}}, match[1]),
                            match[2] ? React.createElement('span', {style:{color: '#374151', fontSize: '13px', marginLeft: '4px'}}, match[2]) : null
                        ));
                        i++; continue;
                    }
                }

                // Bullet ・
                if (trimmed.startsWith('・')) {
                    elements.push(React.createElement('div', {key: key++, style:{
                        display: 'flex', gap: '8px', paddingLeft: '8px',
                        marginTop: '3px', marginBottom: '3px', fontSize: '13px', lineHeight: '1.6', color: '#374151'
                    }},
                        React.createElement('span', {style:{color: '#3b82f6', fontWeight: '700', flexShrink: 0}}, '•'),
                        React.createElement('span', null, trimmed.substring(1).trim())
                    ));
                    i++; continue;
                }

                // Numbered ①②③...
                if (/^[①②③④⑤⑥⑦⑧⑨⑩]/.test(trimmed)) {
                    const numMatch = trimmed.match(/^([①②③④⑤⑥⑦⑧⑨⑩])(.*)/);
                    if (numMatch) {
                        elements.push(React.createElement('div', {key: key++, style:{
                            display: 'flex', gap: '8px', paddingLeft: '4px',
                            marginTop: '5px', marginBottom: '3px', fontSize: '13px', lineHeight: '1.6', color: '#374151'
                        }},

                            React.createElement('span', null, numMatch[2])
                        ));
                        i++; continue;
                    }
                }

                // Regular paragraph
                elements.push(React.createElement('p', {key: key++, style:{
                    fontSize: '13px', lineHeight: '1.7', color: '#374151', margin: '5px 0'
                }}, trimmed));
                i++;
            }

            return React.createElement('div', {style:{padding: '4px 0'}}, elements);
        }

        // Main App Component
        
        // Quiz Component
        function QuizComponent({ lesson, quizData, language, onSubmit, submitted, score, results }) {
            const [currentAnswers, setCurrentAnswers] = React.useState({});
            
            const handleAnswerChange = (partIdx, qIdx, answer) => {
                const key = `${partIdx}-${qIdx}`;
                setCurrentAnswers(prev => ({...prev, [key]: answer}));
            };
            
            const calculateScore = () => {
                let correct = 0;
                quizData.parts.forEach((part, partIdx) => {
                    part.questions.forEach((q, qIdx) => {
                        const key = `${partIdx}-${qIdx}`;
                        const answer = currentAnswers[key];
                        if (q.type === 'choice' && answer === q.answer) {
                            correct++;
                        } else if (q.type === 'fill') {
                            const normAns = (answer || '').toLowerCase().trim();
                            const normCorrect = q.answer.toLowerCase().trim();
                            if (normAns.includes(normCorrect.substring(0, 3)) || normCorrect.includes(normAns.substring(0, 3))) {
                                correct++;
                            }
                        }
                    });
                });
                const total = quizData.parts.reduce((sum, p) => sum + p.questions.length, 0);
                const percentage = Math.round((correct / total) * 100) / 100;
                onSubmit(percentage, {correct, total, passed: percentage >= quizData.passingScore});
            };
            
            if (submitted && results) {
                const passed = results.passed;
                return React.createElement('div', null,
                    React.createElement('div', {className: 'card'},
                        React.createElement('h3', null, quizData.title),
                        React.createElement('div', {style: {textAlign: 'center', padding: '20px'}},
                            React.createElement('div', {style: {fontSize: '36px', fontWeight: 'bold', marginBottom: '10px', color: passed ? '#10b981' : '#ef4444'}},
                                Math.round(results.correct * 100 / results.total) + '%'
                            ),
                            React.createElement('p', {style: {fontSize: '14px', marginBottom: '10px'}},
                                results.correct + ' / ' + results.total + ' ' + (language === 'ja' ? '問正解' : 'Benar')
                            ),
                            React.createElement('p', {style: {fontSize: '16px', fontWeight: 'bold', color: passed ? '#10b981' : '#ef4444'}},
                                passed ? (language === 'ja' ? '合格！' : 'Lulus!') : (language === 'ja' ? '不合格 (80%以上が必要)' : 'Tidak Lulus (diperlukan 80% atau lebih)')
                            ),
                            React.createElement('button', 
                                {className: 'submit-btn', style: {marginTop: '15px'}, onClick: () => window.location.reload()},
                                language === 'ja' ? 'リセット' : 'Reset'
                            )
                        )
                    )
                );
            }
            
            return React.createElement('div', null,
                React.createElement('div', {className: 'card'},
                    React.createElement('h3', null, quizData.title),
                    React.createElement('p', {style: {fontSize: '12px', color: '#6b7280'}},
                        language === 'ja' ? '合格ライン：80%（16/20問）' : 'Batas Lulus: 80% (16/20 soal)'
                    )
                ),
                quizData.parts.map((part, partIdx) =>
                    React.createElement('div', {key: `part-${partIdx}`, className: 'card'},
                        React.createElement('h4', null, part.title),
                        part.questions.map((q, qIdx) => {
                            const key = `${partIdx}-${qIdx}`;
                            return React.createElement('div', {key: key, style: {marginBottom: '15px', paddingBottom: '15px', borderBottom: '1px solid #e5e7eb'}},
                                React.createElement('p', {style: {fontSize: '13px', fontWeight: '500', marginBottom: '8px'}},
                                    `${partIdx * 10 + qIdx + 1}. ${q.q}`
                                ),
                                q.type === 'choice' ? (
                                    React.createElement('div', null,
                                        q.options.map((opt, idx) =>
                                            React.createElement('label', {key: idx, style: {display: 'block', marginBottom: '6px', cursor: 'pointer'}},
                                                React.createElement('input', {
                                                    type: 'radio',
                                                    name: key,
                                                    value: idx,
                                                    checked: currentAnswers[key] == idx,
                                                    onChange: (e) => handleAnswerChange(partIdx, qIdx, parseInt(e.target.value)),
                                                    style: {marginRight: '8px', cursor: 'pointer'}
                                                }),
                                                opt
                                            )
                                        )
                                    )
                                ) : (
                                    React.createElement('input', {
                                        type: 'text',
                                        placeholder: language === 'ja' ? '答えを入力' : 'Masukkan jawaban',
                                        value: currentAnswers[key] || '',
                                        onChange: (e) => handleAnswerChange(partIdx, qIdx, e.target.value),
                                        style: {width: '100%', padding: '8px', border: '1px solid #d1d5db', borderRadius: '4px', fontSize: '13px'}
                                    })
                                )
                            );
                        })
                    )
                ),
                React.createElement('button', 
                    {className: 'submit-btn', onClick: calculateScore, style: {marginTop: '20px'}},
                    language === 'ja' ? '採点する' : 'Periksa Jawaban'
                )
            );
        }

                                                                flex: 1,
                                                                display: 'flex',
                                                                alignItems: 'center',
                                                                justifyContent: 'center',
                                                                padding: '10px 8px',
                                                                borderRadius: '8px',
                                                                cursor: 'pointer',
                                                                fontSize: '18px',
                                                                fontWeight: '600',
                                                                border: submissionData[item.key] === mark ? '2px solid #2563eb' : '2px solid #e5e7eb',
                                                                background: submissionData[item.key] === mark
                                                                    ? (mark === '⚪' ? '#f0fdf4' : mark === '△' ? '#fffbeb' : '#fef2f2')
                                                                    : 'white',
                                                                color: mark === '⚪' ? '#16a34a' : mark === '△' ? '#d97706' : '#dc2626',
                                                                transition: 'all 0.15s'
                                                            }}>
                                                                <input
                                                                    type="radio"
                                                                    name={`eval-${item.key}`}
                                                                    value={mark}
                                                                    checked={submissionData[item.key] === mark}
                                                                    onChange={(e) => handleSubmissionChange(item.key, e.target.value)}
                                                                    style={{display: 'none'}}
                                                                />
                                                                {mark}
                                                                <span style={{fontSize: '11px', marginLeft: '4px', color: '#6b7280'}}>
                                                                    {mark === '⚪' ? (language === 'ja' ? 'できた' : 'Bisa') : mark === '△' ? (language === 'ja' ? '微妙' : 'Ragu') : (language === 'ja' ? 'できなかった' : 'Tidak')}
                                                                </span>
                                                            </label>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}

                                            {(submissionData.margin === '△' || submissionData.margin === '×' ||
                                              submissionData.contact === '△' || submissionData.contact === '×' ||
                                              submissionData.morphology === '△' || submissionData.morphology === '×') && (
                                                <div className="form-group" style={{
                                                    marginTop: '12px',
                                                    padding: '12px',
                                                    background: '#fffbeb',
                                                    borderRadius: '8px',
                                                    border: '1px solid #fde68a'
                                                }}>
                                                    <label className="form-label" style={{color: '#92400e', fontSize: '13px', fontWeight: '600'}}>
                                                        {language === 'ja' ? '💬 △・×を付けた項目について、不安だった点や難しかった点を教えてください' : '💬 Untuk item yang ditandai △・×, jelaskan poin yang Anda rasa sulit atau tidak yakin'}
                                                    </label>
                                                    <textarea
                                                        placeholder={language === 'ja' ? '例：マージンラインの位置が合っているか自信がない、コンタクトの強さの調整が難しかった...' : 'Contoh: Tidak yakin posisi garis margin sudah tepat, sulit menyesuaikan kekuatan kontak...'}
                                                        value={submissionData.comment}
                                                        onChange={(e) => handleSubmissionChange('comment', e.target.value)}
                                                        style={{minHeight: '80px'}}
                                                    />
                                                </div>
                                            )}

                                            <button 
                                                className="submit-btn"
                                                onClick={() => {
                                                    localStorage.setItem(`submission_${selectedLevel}`, JSON.stringify(submissionData));
                                                    alert(language === 'ja' ? '提出が完了しました' : 'Pengajuan selesai');
                                                }}
                                            >
                                                {language === 'ja' ? '提出する' : 'Kirim'}
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {activeTab === 3 && (
                            <div>
                                <div className="card">
                                    <h3>{t.evaluation}</h3>
                                    <div className="info-row">
                                        <span className="info-label">{language === 'ja' ? '評価対象課題' : 'Tugas Dinilai'}</span>
                                        <span className="info-value">Level 2: インレー</span>
                                    </div>
                                </div>

                                <h3 className="section-title">{t.evaluationCriteria}</h3>

                                <div className="card">
                                    <div className="form-group">
                                        <label className="form-label">{t.margin}</label>
                                        <select
                                            value={evaluationData.margin}
                                            onChange={(e) => handleEvaluationChange('margin', e.target.value)}
                                        >
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">{t.contact}</label>
                                        <select
                                            value={evaluationData.contact}
                                            onChange={(e) => handleEvaluationChange('contact', e.target.value)}
                                        >
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">{t.occlusalmorphology}</label>
                                        <select
                                            value={evaluationData.morphology}
                                            onChange={(e) => handleEvaluationChange('morphology', e.target.value)}
                                        >
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">{t.smoothness}</label>
                                        <select
                                            value={evaluationData.smoothness}
                                            onChange={(e) => handleEvaluationChange('smoothness', e.target.value)}
                                        >
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>

                                    <div className="form-group">
                                        <label className="form-label">{t.instructionComprehension}</label>
                                        <select
                                            value={evaluationData.comprehension}
                                            onChange={(e) => handleEvaluationChange('comprehension', e.target.value)}
                                        >
                                            <option value="0">0</option>
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>
                                </div>

                                <div className="score-display">
                                    {totalScore} / 25
                                </div>

                                <div className={`pass-indicator ${isPassed ? 'pass' : 'fail'}`}>
                                    {isPassed ? `✓ ${t.pass}` : `✗ ${t.fail}`}
                                </div>

                                <div className="form-group">
                                    <label className="form-label">{t.instructorComment}</label>
                                    <textarea
                                        placeholder="講師コメント / Komentar Instruktur"
                                        value={evaluationData.instructorComment}
                                        onChange={(e) => handleEvaluationChange('instructorComment', e.target.value)}
                                    />
                                </div>

                                <div className="admin-info">
                                    <h4 style={{fontSize: '12px', marginBottom: '6px'}}>
                                        {language === 'ja' ? '管理情報' : 'Informasi Admin'}
                                    </h4>
                                    <div className="info-row">
                                        <span className="info-label">{t.availableLessons}</span>
                                        <span className="info-value">9</span>
                                    </div>
                                    <div className="info-row">
                                        <span className="info-label">{t.currentSelection}</span>
                                        <span className="info-value">Level 2</span>
                                    </div>
                                    <div className="info-row">
                                        <span className="info-label">{t.passedCount}</span>
                                        <span className="info-value">1</span>
                                    </div>
                                    <div className="info-row">
                                        <span className="info-label">{t.lastLogin}</span>
                                        <span className="info-value">2026-03-17</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Auth Wrapper
        function App() {
            const [session, setSession] = useState(null);
            const [checking, setChecking] = useState(true);

            useEffect(() => {
                try {
                    const saved = localStorage.getItem('dental_cad_session');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        const found = REGISTERED_USERS.find(
                            u => u.email.toLowerCase() === (parsed.email || '').toLowerCase()
                        );
                        if (found) {
                            setSession(parsed);
                        } else {
                            localStorage.removeItem('dental_cad_session');
                        }
                    }
                } catch (e) {
                    localStorage.removeItem('dental_cad_session');
                }
                setChecking(false);
            }, []);

            const handleLogin = (newSession) => {
                setSession(newSession);
            };

            const handleLogout = () => {
                localStorage.removeItem('dental_cad_session');
                setSession(null);
            };

            if (checking) return null;

            if (!session) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return <DentalCADApp session={session} onLogout={handleLogout} />;
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
