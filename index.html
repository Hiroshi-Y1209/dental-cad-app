            background-color: #fee2e2;
            color: #7f1d1d;
            border-left: 4px solid #ef4444;
        }

        // Lesson data - 30 sub-level lectures
        const lessonData = {
            ja: [
                {
                    id: "1-1",
                    title: "デジタル技工の作業フロー",
                    whatYouLearn: "デジタル技工の全体像を学びます。アナログとデジタルの違い、ワークフローの流れを理解します。",
                    learningObjectives: "デジタル技工の基本的なワークフローを説明でき、各工程の役割を理解している状態を目指します。",
                    goodExample: "ワークフローの各段階を正確に説明でき、アナログとの違いが明確。",
                    badExample: "工程の順番が曖昧で、デジタルとアナログの違いを説明できない。",
                    evaluationCriteria: "ワークフロー理解、用語の正確さ、全体像の把握。",
                    teaching: "【Part1① デジタル技工の作業フロー】\n\n■ デジタル技工とは\nデジタル技工とは、従来の手作業（アナログ技工）で行っていた歯科補綴物の製作工程を、スキャナー・CADソフト・CAM加工機などのデジタル機器を使って行う技工法である。従来法では石膏模型上でワックスアップ→鋳造→研磨という流れだったが、デジタル技工ではスキャン→CADデザイン→CAM加工→仕上げという流れに変わる。\n\n■ デジタルワークフローの全体像\n[FLOW: スキャン → CADデザイン → CAM加工 → 仕上げ]\n【Step1：スキャン】石膏模型をラボスキャナーで3Dデータ化する。または歯科医院で口腔内スキャナー（IOS）を使い、口腔内を直接3Dデータとして撮影する。スキャンによって得られるデータはSTL、PLY、OBJなどの3Dファイル形式で保存される。\n【Step2：CADデザイン】スキャンデータをCADソフト（exocad、3Shape等）に読み込み、補綴物をPC上でデザインする。マージンライン設定、歯冠形態の選択、セメントスペースの設定、咬合接触・隣接面コンタクトの調整などを行う。\n【Step3：CAM加工】完成したデザインデータ（STL形式）をCAMソフトに読み込み、加工機で実際の補綴物を製作する。ミリングマシン（切削加工）または3Dプリンター（光造形）を使用する。\n【Step4：仕上げ】加工された補綴物の適合確認、研磨、カラーリング（ジルコニアの場合）、グレーズなどの最終仕上げを行い、歯科医院に納品する。\n\n■ アナログ技工との比較\nアナログ技工：印象採得→石膏模型製作→ワックスアップ→埋没・鋳造→研磨・調整。手作業の熟練技術が必要で、再現性は術者の技量に依存する。\nデジタル技工：スキャン→CADデザイン→CAM加工→仕上げ。数値管理が可能で再現性が高い。セメントスペースや咬合接触を数値で設定でき、データとして記録・共有が容易。ただし機器の初期投資が大きく、材料や加工条件の知識も必要。\n\n■ デジタル技工に必要な機器\n①ラボスキャナー：石膏模型を3Dデータ化する装置。ライト・カメラ・モデルテーブルから構成される。\n②口腔内スキャナー（IOS）：歯科医院で口腔内を直接撮影する装置。iTero、TRIOS、CEREC Primescan等。\n③CADソフト：3Dデータ上で補綴物を設計するソフトウェア。exocad DentalCAD、3Shape Dental Designer、CEREC inLab SW等。\n④CAMソフト：加工プログラムを作成するソフトウェア。hyperDENT、Dental CAM等。\n⑤ミリングマシン：ディスクやブロックからの切削加工機。3〜5軸。ドライ加工（ジルコニア等）とウェット加工（金属・ガラスセラミック等）がある。\n⑥3Dプリンター：光造形方式（DLP/SLA/LCD）で造形する装置。模型製作、個人トレー、鋳造パターン等に使用。\n\n■ この日の到達目標\nデジタル技工の4つのステップ（スキャン→CAD→CAM→仕上げ）を説明でき、アナログ技工との違いを理解していること。各工程で使用する機器の名称と役割を把握していること。\n\n[KEY: マージンライン設定と咬合接触の調整がすべての適合精度の基本]\n[TIP: ステップを順序通りに実行することで、再現性の高い補綴物が製作できる]\n[WARN: スキャンの品質が低いと後続工程の精度が大きく低下する]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ デジタル技工の歴史的背景\nデジタル技工の起源は1980年代にさかのぼる。1985年にスイスのDr. Werner Möhrmannが世界初の歯科用CAD/CAMシステム「CEREC」を開発し、歯科医院内で直接セラミック修復物を製作する「チェアサイドCAD/CAM」の概念が誕生した。当初は単純なインレー程度しか製作できなかったが、2000年代にはexocadや3Shapeなどのラボ用CADソフトが登場し、クラウン・ブリッジ・インプラント上部構造など幅広い補綴物の設計が可能となった。\n\n◆ デジタルワークフローの国際標準\n現在の歯科デジタルワークフローは、ISO 6873（歯科用石膏）からISO 13485（医療機器品質マネジメントシステム）へと管理基準が進化している。STLファイルの精度基準は一般的に20μm以内とされ、口腔内スキャナーのTrue Accuracyは30-50μm程度が標準である。各メーカーのスキャナーは異なるアルゴリズムでデータを処理するため、同じ口腔内でもスキャン結果に差が出ることがある。\n\n◆ 材料科学の基礎知識\nデジタル技工で使用される主要材料について理解を深める。ジルコニア（ZrO₂）は高い曲げ強度（900-1200MPa）を持ち、後方歯の単冠やブリッジに適する。二ケイ酸リチウム（Li₂Si₂O₅）は透明性に優れ（360-400MPa）、前歯部の審美修復に理想的である。PMMA（ポリメチルメタクリレート）は暫間補綴物やサージカルガイドに使用される。材料選択は強度・審美性・加工性・コストのバランスで決定する。\n\n◆ 実際の技工所での1日の流れ\n朝：メール確認（歯科医院からの依頼書・IOSデータ受信）→ データ確認・模型スキャン → CADデザイン（午前中に2-3ケース）→ 昼食 → CAM加工・3Dプリント開始 → 仕上げ作業（研磨・グレージング）→ 適合確認・品質チェック → 梱包・出荷。デジタル化により、1日の処理ケース数は従来の1.5-2倍に増加している。",
                    teachingId: "[FLOW: Pemindaian → Desain CAD → Pemrosesan CAM → Penyelesaian]\n【Part1① Alur Kerja Pemrosesan Gigi Digital】\n\n■ Apa itu Pemrosesan Gigi Digital\nPemrosesan gigi digital adalah metode pemrosesan gigi yang menggunakan perangkat digital seperti scanner, perangkat lunak CAD, dan mesin pengolahan CAM untuk melakukan proses pembuatan protesa gigi yang secara tradisional dilakukan melalui pekerjaan manual (pemrosesan analog). Sedangkan metode konvensional mengikuti alur: model gipsum → pencatuan lilin → penuangan logam → pemolesan, pemrosesan digital berubah menjadi: pemindaian → desain CAD → pengolahan CAM → penyelesaian akhir.\n\n■ Gambaran Keseluruhan Alur Kerja Digital\n【Step1：Pemindaian】Model gipsum di-3D scanning menggunakan lab scanner. Atau menggunakan Intra Oral Scanner (IOS) di klinik gigi untuk memindai rongga mulut secara langsung sebagai data 3D. Data yang diperoleh dari pemindaian disimpan dalam format file 3D seperti STL, PLY, OBJ.\n【Step2：Desain CAD】Data pemindaian dimuat ke perangkat lunak CAD (exocad, 3Shape, dll) dan protesa dirancang di PC. Pengaturan garis margin, pemilihan bentuk mahkota gigi, pengaturan ruang semen, serta penyesuaian kontak oklusi dan kontak titik kontak tetangga dilakukan.\n【Step3：Pengolahan CAM】Data desain yang sudah selesai (format STL) dimuat ke perangkat lunak CAM dan protesa nyata dibuat dengan mesin pengolah. Mesin milling (pengolahan pemotongan) atau printer 3D (fotopolimerisasi) digunakan.\n【Step4：Penyelesaian Akhir】Verifikasi adaptasi protesa yang telah diproses, pemolesan, pewarnaan (untuk zirkonia), penglaseran dan penyelesaian akhir lainnya dilakukan, kemudian dikirimkan ke klinik gigi.\n\n■ Perbandingan dengan Pemrosesan Analog\nPemrosesan Analog: pengambilan kesan → pembuatan model gipsum → pencatuan lilin → penyisipan dan penuangan → pemolesan dan penyesuaian. Memerlukan keahlian teknis manual yang tinggi, dan reproduktibilitas tergantung pada keterampilan operator.\nPemrosesan Digital: pemindaian → desain CAD → pengolahan CAM → penyelesaian akhir. Manajemen numerik menjadi mungkin dengan reproduktibilitas yang lebih tinggi. Ruang semen dan kontak oklusi dapat diatur dengan nilai numerik, dan data mudah dicatat dan dibagikan. Namun investasi awal perangkat sangat besar, dan pengetahuan tentang material dan kondisi pengolahan juga diperlukan.\n\n■ Perangkat yang Diperlukan untuk Pemrosesan Gigi Digital\n① Lab Scanner: Perangkat yang mengubah model gipsum menjadi data 3D. Terdiri dari cahaya (sumber cahaya), kamera, dan meja model.\n② Intra Oral Scanner (IOS): Perangkat untuk memindai rongga mulut secara langsung di klinik gigi. Contoh: iTero, TRIOS, CEREC Primescan, dll.\n③ Perangkat Lunak CAD: Perangkat lunak untuk mendesain protesa pada data 3D. Contoh: exocad DentalCAD, 3Shape Dental Designer, CEREC inLab SW, dll.\n④ Perangkat Lunak CAM: Perangkat lunak untuk membuat program pengolahan. Contoh: hyperDENT, Dental CAM, dll.\n⑤ Mesin Milling: Mesin pengolahan pemotongan dari disk atau blok. 3-5 sumbu. Ada pemrosesan kering (untuk zirkonia, dll) dan pemrosesan basah (untuk logam, seramik kaca, dll).\n⑥ Printer 3D: Perangkat pembentukan dengan metode fotopolimerisasi (DLP/SLA/LCD). Digunakan untuk pembuatan model, nampan perorangan, pola penuangan, dll.\n\n■ Target Pencapaian untuk Hari Ini\nMampu menjelaskan 4 langkah pemrosesan gigi digital (pemindaian → CAD → CAM → penyelesaian akhir) dan memahami perbedaan dengan pemrosesan analog. Memahami nama dan peran perangkat yang digunakan dalam setiap tahap.\n\n[KEY: Pengaturan margin dan kontak oklusal adalah dasar dari semua akurasi adaptasi]\n[TIP: Mengikuti langkah-langkah secara berurutan menghasilkan prostetik yang dapat direproduksi dengan tinggi]\n[WARN: Kualitas pemindaian yang rendah akan mengurangi akurasi proses selanjutnya secara signifikan]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Latar Belakang Sejarah Pemrosesan Digital\nAsal-usul pemrosesan digital gigi dapat ditelusuri hingga tahun 1980-an. Pada tahun 1985, Dr. Werner Moehrmann dari Swiss mengembangkan sistem CAD/CAM gigi pertama di dunia \"CEREC\", melahirkan konsep \"chairside CAD/CAM\" yang memungkinkan pembuatan restorasi keramik langsung di klinik gigi. Awalnya hanya bisa membuat inlay sederhana, namun pada tahun 2000-an, perangkat lunak CAD laboratorium seperti exocad dan 3Shape muncul, memungkinkan desain berbagai protesa termasuk mahkota, jembatan, dan suprastruktur implan.\n\n◆ Standar Internasional Alur Kerja Digital\nAlur kerja digital gigi saat ini telah berkembang dari ISO 6873 (gipsum gigi) ke ISO 13485 (sistem manajemen mutu perangkat medis). Standar akurasi file STL umumnya dalam 20μm, dan True Accuracy scanner intraoral adalah sekitar 30-50μm. Setiap produsen scanner memproses data dengan algoritma berbeda, sehingga hasil scan dapat berbeda meskipun dari rongga mulut yang sama.\n\n◆ Dasar-dasar Ilmu Material\nMemahami lebih dalam tentang material utama yang digunakan dalam pemrosesan digital. Zirkonia (ZrO2) memiliki kekuatan lentur tinggi (900-1200MPa), cocok untuk mahkota tunggal dan jembatan gigi posterior. Lithium disilikat (Li2Si2O5) memiliki transparansi sangat baik (360-400MPa), ideal untuk restorasi estetik gigi anterior. PMMA digunakan untuk protesa sementara dan panduan bedah.\n\n◆ Alur Kerja Harian di Laboratorium\nPagi: Periksa email (pesanan dari klinik, data IOS) → Verifikasi data/scan model → Desain CAD (2-3 kasus di pagi hari) → Makan siang → Mulai pemrosesan CAM/cetak 3D → Penyelesaian (pemolesan, glazing) → Pemeriksaan kesesuaian/kontrol kualitas → Pengemasan dan pengiriman. Digitalisasi telah meningkatkan jumlah kasus harian 1,5-2 kali lipat dari metode konvensional."

                    id: "1-2",
                    title: "スキャナー・IOS・ファイル形式",
                    whatYouLearn: "ラボスキャナーとIOSの違い、3Dファイル形式の種類を学びます。",
                    learningObjectives: "スキャナーの種類と特徴、各ファイル形式の用途を正しく理解します。",
                    goodExample: "各スキャナーの特徴とファイル形式の使い分けを正確に説明できる。",
                    badExample: "スキャナーの種類が混同している、ファイル形式の違いが不明確。",
                    evaluationCriteria: "スキャナー知識、ファイル形式理解、用途の把握。",
                    teaching: "[TABLE]\n機器|特徴|用途\nラボスキャナー|石膏模型を3D化|技工所での処理\n口腔内スキャナー（IOS）|口腔内を直接撮影|歯科医院での直接スキャン\n[/TABLE]\n[FLOW: STL形式 → PLY形式 → OBJ形式]\n【Part1②③ スキャナー・IOS・ファイル形式】\n\n■ ラボスキャナー（技工所用スキャナー）\nラボスキャナーは石膏模型を3Dデータ化する装置である。ライト（光源）・カメラ・モデルテーブルの3つから構成される。ライトが被写体に繰り返し照射され、反射光をカメラが撮影し、3Dデータを構築する。撮影範囲がIOSより大きいため、位置ズレが起こりにくく高精度なデータが得られる。石膏模型があれば何度でも再スキャン可能。\n\n■ IOS（口腔内スキャナー）\nIOSは歯科医院で口腔内を直接撮影する装置。印象採得が不要になり、患者の負担軽減と時間短縮が可能。アンダーカット部分も撮影できる。連動時には咬合（バイト）も撮影可能。主なIOS：iTero（Align Technology）、TRIOS（3Shape）、CEREC Primescan（Dentsply Sirona）、MEDIT i700等。IOSの普及により、石膏模型なし（モデルレス）での補綴製作が増加している。\n\n■ ファイル形式の種類と特徴\nスキャンデータはファイル形式によって情報量が異なる。大きく分けてカラー対応とモノクロの2種類がある。\n\n【モノクロファイル形式】\n・STL（Standard Triangulation Language）：三角形の集合体で3D形状を表現。カラー情報を含まない。最も汎用性が高く、ほぼすべてのCAD/CAMソフトで読み込み可能。ファイルサイズが小さい。\n\n【カラーファイル形式】\n・PLY（Polygon File Format）：カラー情報を含む。複数のCADソフトで対応。\n・OBJ（Wavefront OBJ）：カラー情報を含む汎用3D形式。テクスチャマッピングも可能。\n・3ox/3oxz：3Shape専用形式。3Shape Dental Designerで使用。カラー情報を含む。\n・DXD：Dentsply Sirona（CEREC）専用形式。\n・DCM：MEDIT専用形式。カラー情報を含む。\n\n■ カラーとモノクロの使い分け\nカラーデータはマージンライン（支台歯と歯肉の境界）の判別に有利。歯質の色と歯肉の色を区別できる。一方、モノクロ（STL）データでは色情報がないため、形状の変化のみでマージンを判別する必要がある。IOS症例ではカラーとモノクロを切り替えて確認することが重要。\n\n■ 対応CADとスキャナーの関係\n各IOSメーカーのデータはそのメーカーのクラウドを経由してラボに送られることが多い。CADソフトによって読み込めるファイル形式が異なるため、使用するCADソフトとIOSの互換性を事前に確認する必要がある。exocadは多くのファイル形式に対応しており汎用性が高い。\n\n■ その他のデジタルデータ\n・フェイススキャン：顔面の3Dデータ。前歯の審美設計で口唇との調和を確認する際に使用。\n・CTデータ（DICOM形式）：インプラントの埋入位置計画に使用。骨の3Dデータと口腔内データを重ね合わせてサージカルガイドを製作する。\n\n[KEY: スキャナーの選択とファイル形式の理解がデータ品質を決定する]\n[TIP: ファイル形式の変換時は品質ロスを最小化するためにSTL形式を推奨]\n[WARN: 低解像度スキャンデータはCAD設計で補正できない]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ スキャナーの精度を左右する要因\nスキャナーの精度は、光源の種類（レーザー vs 構造化光）、カメラの解像度、三角測量のベースライン長、ソフトウェアのアルゴリズムに依存する。ラボスキャナーは一般的に5-10μmの精度を持ち、IOSは30-50μm程度である。精度に影響する環境要因として、温度変化（石膏模型の膨張収縮）、振動、周囲光の干渉がある。\n\n◆ ファイル形式の詳細比較\nSTL（Standard Tessellation Language）は三角メッシュで表面を記述する最も一般的な形式だが、色情報を持たない。PLY（Polygon File Format）は頂点ごとに色情報を含められるため、テクスチャ付きスキャンに適する。OBJ形式はテクスチャマッピング情報（MTLファイル）を別途持てる。3MF形式はMicrosoftが推進する新しい規格で、色・材質・メタデータを一つのファイルに格納できる。DCM形式は3Shapeの独自規格で、マージンライン情報等を含む。\n\n◆ IOSの臨床的ポイント\n口腔内スキャナーの使用時に技工士が知っておくべき臨床知識：スキャンの品質は印象採得時の状況に大きく依存する。唾液や血液がスキャン範囲に入るとノイズの原因となる。排歯圧排（コードパッキング）の状態が不十分だとマージンラインの読み取りが困難になる。パウダーフリースキャナーでも、高度に反射する金属修復物やインプラントスキャンボディは精度が低下することがある。\n\n◆ データセキュリティと患者情報保護\n歯科デジタルデータは患者の個人情報に該当するため、適切な管理が必要である。クラウドストレージの利用時はSSL/TLS暗号化を確認する。データ転送にはHIPAA（米国）やGDPR（EU）、個人情報保護法（日本）に準拠したサービスを選択する。USB・SDカードでの物理的な受け渡しも、紛失リスクに注意が必要である。",
                    teachingId: "[TABLE]\nPerangkat|Fitur|Kegunaan\nScanner Lab|Mengubah model gips menjadi 3D|Pemrosesan di laboratorium\nScanner Intraoral (IOS)|Pemotretan langsung intraoral|Pemindaian langsung di klinik\n[/TABLE]\n【Part1②③ Scanner, IOS, dan Format File】\n\n■ Lab Scanner (Scanner untuk Laboratorium Teknis)\nLab scanner adalah perangkat yang mengubah model gipsum menjadi data 3D. Terdiri dari tiga bagian: cahaya (sumber cahaya), kamera, dan meja model. Cahaya berulang kali disorot pada objek, kamera menangkap cahaya pantul, dan data 3D dibangun. Karena area pengambilan gambar lebih besar dari IOS, perpindahan posisi jarang terjadi dan data berkualitas tinggi dapat diperoleh. Model gipsum dapat di-scan kembali berkali-kali.\n\n■ IOS (Intra Oral Scanner)\nIOS adalah perangkat untuk memindai rongga mulut secara langsung di klinik gigi. Pengambilan kesan menjadi tidak perlu, mengurangi beban pasien dan menghemat waktu. Bagian undercut juga dapat di-scan. Saat terhubung, scan gigitan dapat dilakukan...\n\n■ Perbandingan Lab Scanner dan IOS\nLab Scanner: Akurasi tinggi, dapat digunakan kembali (re-scan), namun memerlukan model gipsum, tidak dapat menangkap detail gingiva atau warna. Data yang diperoleh adalah monokrom.\nIOS: Pengambilan kesan tidak perlu, dapat menangkap warna gingiva dan mukosa oral secara rinci, data berwarna tersedia. Namun akurasi sedikit lebih rendah dibanding lab scanner, dan area cakupan lebih terbatas. Koneksi dengan perangkat lunak klinik gigi diperlukan.\n\n■ Format File 3D\n[FLOW: Format STL → Format PLY → Format OBJ] (STL, PLY, OBJ, 3ox, DXD, DCM)\n\n【STL (Stereolithography)】\nFormat file model 3D yang paling banyak digunakan. Struktur terdiri dari kumpulan segitiga kecil. Tidak mendukung informasi warna (monokrom). Kompatibilitas universal dengan berbagai perangkat lunak dan mesin pengolahan.\n\n【PLY/OBJ】\nFormat file yang mendukung warna. Cocok untuk data IOS karena dapat merepresentasikan warna gingiva dan mukosa oral. Daya kompresi lebih baik dari STL untuk data warna.\n\n【3ox/3oxz】\nFormat proprietary dari 3Shape untuk data TRIOS. Disertai dengan informasi metadata lengkap. Kompatibilitas optimal dengan perangkat lunak 3Shape Dental Designer.\n\n【DXD】\nFormat proprietary dari Dentsply Sirona untuk data CEREC Primescan. Disertai dengan informasi khusus tentang CEREC Primescan.\n\n【DCM】\nFormat file berkembang untuk pertukaran data universal. Dapat mengandung data geometri dan informasi warna.\n\n■ Karakteristik dan Perbedaan Monokrom vs Berwarna\nMonokrom (STL): Hanya informasi geometri, ukuran file lebih kecil, kompatibilitas universal.\nBerwarna (PLY/OBJ/3ox): Mengandung informasi warna gingiva dan struktur jaringan lembut, berguna untuk desain estheti, ukuran file lebih besar.\n\n[KEY: Pilihan pemindai dan pemahaman format file menentukan kualitas data]\n[TIP: Saat mengonversi format file, gunakan format STL untuk meminimalkan kehilangan kualitas]\n[WARN: Data pemindaian resolusi rendah tidak dapat diperbaiki dalam desain CAD]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Faktor yang Mempengaruhi Akurasi Scanner\nAkurasi scanner bergantung pada jenis sumber cahaya (laser vs cahaya terstruktur), resolusi kamera, panjang baseline triangulasi, dan algoritma perangkat lunak. Scanner laboratorium umumnya memiliki akurasi 5-10μm, sedangkan IOS sekitar 30-50μm. Faktor lingkungan yang mempengaruhi akurasi meliputi perubahan suhu (ekspansi/kontraksi model gipsum), getaran, dan interferensi cahaya sekitar.\n\n◆ Perbandingan Detail Format File\nSTL (Standard Tessellation Language) mendeskripsikan permukaan dengan mesh segitiga dan merupakan format paling umum, namun tidak memiliki informasi warna. PLY (Polygon File Format) dapat menyertakan informasi warna per vertex, cocok untuk scan bertekstur. Format OBJ dapat memiliki informasi pemetaan tekstur terpisah (file MTL). Format 3MF adalah standar baru dari Microsoft yang dapat menyimpan warna, material, dan metadata dalam satu file.\n\n◆ Poin Klinis IOS\nPengetahuan klinis yang harus diketahui teknisi tentang penggunaan scanner intraoral: kualitas scan sangat bergantung pada kondisi saat pengambilan kesan. Saliva atau darah yang masuk ke area scan menyebabkan noise. Retraksi gingiva yang tidak memadai membuat pembacaan garis margin sulit. Bahkan scanner tanpa bubuk dapat mengalami penurunan akurasi pada restorasi logam yang sangat reflektif atau scan body implan.\n\n◆ Keamanan Data dan Perlindungan Informasi Pasien\nData digital gigi termasuk informasi pribadi pasien dan memerlukan pengelolaan yang tepat. Saat menggunakan penyimpanan cloud, pastikan enkripsi SSL/TLS. Pilih layanan yang mematuhi HIPAA (AS), GDPR (UE), atau undang-undang perlindungan data pribadi yang berlaku. Pengiriman fisik melalui USB/kartu SD juga memerlukan perhatian terhadap risiko kehilangan."

                {
                    id: "1-3",
                    title: "CADソフト・加工機の種類",
                    whatYouLearn: "主要なCADソフトと加工機（ミリング・3Dプリンター）の種類と特徴を学びます。",
                    learningObjectives: "各CADソフトの特徴と、加工機の方式別の違いを理解します。",
                    goodExample: "ソフトと加工機の特徴を正しく分類・説明できる。",

                    teaching: "【Part1④⑤ CADソフト\n[TABLE]\nCADソフト|特徴|メーカー\nexocad DentalCAD|広く採用、豊富なライブラリ|Exocad\n3Shape Dental Designer|高精度、IoS連携|3Shape\nCEREC inLab|統合ワークフロー|Dentsply Sirona\n[/TABLE]・加工機の種類】\n\n■ 主要CADソフトウェア\n\n【exocad DentalCAD】\n最も汎用性が高いCADソフト。クラウン・ブリッジ、インプラント、デンチャーフレーム、個人トレーなど多品目に対応。多くのファイル形式を読み込め、様々なスキャナーやCAMソフトと連携可能。世界的にユーザーが多く、情報やサポートが充実している。ショートカットキーを活用した効率的な操作が可能。\n\n【3Shape Dental Designer】\n3ox/3oxz形式を使用する3Shape専用のCADソフト。3Shape TRIOSとの連携に優れる。直感的なUIで操作しやすい。バイトデータの再マッチング機能あり（準備タブ→咬合に位置合わせ→3点法位置合わせ）。\n\n【CEREC inLab SW】\nDentsply Sironaのセレックシステム専用CADソフト。CEREC Primescanとの連携に特化。DXD形式を使用。チェアサイドCAD/CAMに強い。\n\n【Dental Wings】\nストローマン系のCADソフト。インプラント症例に強い。CoDiagnostiXとの連携でインプラント計画からCADデザインまで一貫対応。バイトデータの再マッチングは別の手順で行う。\n\n【DIGISTELL】\nデンチャーのメタルフレーム設計に特化したCADソフト。クラスプ・メジャーコネクター・レストなどの設計をパラメトリックに行える。\n\n【Meshmixer（Autodesk）】\n無料で使える3Dデザインソフト。STLデータの編集・修正に便利。本格的なCADデザインには向かないが、データの確認や簡易修正に活用。\n\n■ 加工機の種類\n\n【ミリングマシン（切削加工機）】\n切削工具（ミリングバー）が高速回転し、ディスクやブロック状の材料から補綴物を削り出す装置。軸数により3軸・4軸・5軸があり、軸数が多いほどアンダーカット部や複雑な形態の加工が可能。ドライ加工（ジルコニア・PMMA等の乾式切削）とウェット加工（金属・ガラスセラミック等の湿式切削）がある。スピンドル（主軸）・ワーククランプ（材料固定部）・モーター・ツールボックス（バー収納）から構成される。\n\n【3Dプリンター（光造形方式）】\n液状の造形レジンに光を照射して硬化させ、一層ずつ積み上げて造形する装置。3つの方式がある：\n・DLP（Digital Light Processing）：プロジェクターで一層全体を一括照射。造形速度が速い。プラットフォーム中央が最も精度が高い（レンズの歪曲収差の影響）。\n・SLA（Stereolithography）：レーザーで一点ずつ描画して硬化。高精度だが造形速度はDLPより遅い。\n・LCD（Liquid Crystal Display）：液晶パネルで光をマスクして照射。DLPに近い方式だが、より安価。\n\n造形レジンの種類：模型製作用、鋳造パターン用、クラウン・ブリッジ用、個人トレー用、デンチャーベース用など目的別にレジンが異なる。造形後は洗浄→サポートピン除去→二次硬化の後処理が必要。\n\n■ ミリングマシンと3Dプリンターの比較\nミリングマシン：高精度、材料の物性が安定（工場製造のディスク/ブロック使用）、最終補綴物の製作に適する。\n3Dプリンター：複雑な形態も造形可能、同時に多数造形できる、模型製作や暫間補綴物・鋳造パターン製作に多用。精度はプラットフォーム位置や積層方向に影響される。\n\n[KEY: CADソフトと加工機の組み合わせが最終補綴物の品質を左右する]\n[TIP: メーカーの推奨する組み合わせを選択することで互換性問題を避けられる]\n[WARN: 異なるメーカーのソフトとハードの組み合わせはサポートが受けられない場合がある]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ CADソフトの詳細比較と選び方\nexocad DentalCADは世界シェアNo.1のオープンアーキテクチャCADソフトで、多数のスキャナーや加工機との互換性がある。モジュール式のライセンス体系で、必要な機能だけを購入できる。3Shape Dental Designerは直感的なUI設計に優れ、3Shape TRIOSとのシームレスな連携が特徴。CEREC inLabはDentsply Sironaの統合ワークフローに最適化されている。DentalWingsはインプラント設計に強みがあり、coDiagnostixとの連携でサージカルガイド設計も可能。\n\n◆ ソフトウェアのバージョン管理\nCADソフトのバージョン管理は技工所運営において重要な課題である。メジャーアップデートではファイル互換性が失われることがあり、バージョンアップのタイミングは慎重に判断する。特に複数の歯科医院と取引がある場合、各医院のIOSソフトウェアバージョンとの互換性も確認が必要である。アップデート前には必ず現在のプロジェクトのバックアップを取る。\n\n◆ ライブラリーのカスタマイズ\nCADソフトの歯冠ライブラリーは地域や人種によって異なる歯の形態を収録している。日本人の歯の特徴（シャベル型切歯など）に合わせたライブラリーの選択が重要である。多くのソフトでは独自のカスタムライブラリーを作成・追加できる。頻繁に使用する歯冠形態をカスタムライブラリーとして保存しておくと作業効率が大幅に向上する。\n\n◆ ネットワーク構成とデータ管理\n技工所のネットワーク構成として、NAS（ネットワークアタッチトストレージ）によるデータ共有が推奨される。RAID5またはRAID6構成でデータの冗長性を確保し、バックアップは3-2-1ルール（3つのコピー、2種類のメディア、1つはオフサイト）で管理する。大容量のCADデータ（1ケースで50-200MB）は、SSD搭載のワークステーションで快適に操作できる。",
                    teachingId: "【Part1④⑤ Jenis Perangkat Lunak CAD\n[TABLE]\nPerangkat Lunak CAD|Fitur|Pabrik\nexocad DentalCAD|Adopsi luas, perpustakaan kaya|Exocad\n3Shape Dental Designer|Presisi tinggi, integrasi IOS|3Shape\nCEREC inLab|Alur kerja terintegrasi|Dentsply Sirona\n[/TABLE] dan Mesin Fabrikasi】\n\n■ Perangkat Lunak CAD Utama\n\n【exocad DentalCAD】\nPerangkat lunak CAD paling versatile. Mendukung berbagai produk seperti mahkota, jembatan, kerangka gigi tiruan, dan nampan khusus. Dapat membaca berbagai format file dan kompatibel dengan berbagai scanner dan perangkat lunak CAM. Memiliki basis pengguna global yang besar dengan informasi dan dukungan berlimpah. Operasi yang efisien dapat dilakukan dengan menggunakan shortcut keyboard.\n\n【3Shape Dental Designer】\nPerangkat lunak CAD khusus 3Shape yang menggunakan format 3ox/3oxz. Integrasi superior dengan 3Shape TRIOS. Antarmuka pengguna intuitif dan mudah dioperasikan. Kompatibilitas optimal dengan sistem 3Shape.\n\n【CEREC inLab Software】\nPerangkat lunak CAD untuk sistem CEREC dari Dentsply Sirona. Terintegrasi sempurna dengan CEREC Primescan. Desain terpadu dari pemindaian hingga produksi di lab yang sama dengan sistem CEREC.\n\n【Dental Wings (IOS)】\nPerangkat lunak spesialis untuk sistem Straumann (Rostockin). Integrasi superior dengan data TRIOS dari Straumann.\n\n■ Mesin Milling (Mesin Pengolahan Pemotongan)\nMesin yang memotong blok atau disk material untuk membuat protesa. Terdapat mesin 3 sumbu (gerakan X, Y, Z), 4 sumbu (dengan rotasi), dan 5 sumbu (gerakan lebih kompleks).\n\n【Tipe Pemrosesan Kering (Dry Milling)】\nUntuk material keras seperti zirkonia. Tanpa cairan pendingin, menggunakan bantalan berputar. Kecepatan dan tekanan tinggi. Menghasilkan panas signifikan.\n\n【Tipe Pemrosesan Basah (Wet Milling)】\nUntuk logam, keramik kaca, dan bahan lunak. Menggunakan cairan pendingin untuk mendinginkan dan melumasi. Presisi lebih tinggi, produk berkualitas lebih baik.\n\n■ Printer 3D (Printer Fotopolimerisasi)\nPeningkatan terbaru dalam teknologi fabrikasi. Menggunakan pencahayaan (DLP/SLA/LCD) untuk mengokohkan resin fotosensitif lapis demi lapis.\n\n【Metode DLP (Digital Light Processing)】\nMenggunakan cermin mikro yang dapat diartikulasikan untuk memproyeksikan cahaya. Presisi tinggi, kecepatan cepat.\n\n【Metode SLA (Stereolithography Apparatus)】\nMenggunakan laser UV untuk menyapu permukaan resin. Presisi sangat tinggi, namun kecepatan lebih lambat dari DLP.\n\n【Metode LCD (Liquid Crystal Display)】\nMenggunakan panel LCD untuk memproyeksikan cahaya. Keseimbangan baik antara presisi dan kecepatan. Biaya awal lebih rendah dari DLP/SLA.\n\n■ Aplikasi Printer 3D\nPembuatan model, nampan khusus, pola penuangan untuk proses investasi (termasuk prototipe logam mulia), struktur penolong implant, penjaga gigitan.\n\n■ Perbandingan Mesin Milling vs Printer 3D\nMilling: Material keras (zirkonia, logam), akurasi dimensional tinggi, kecepatan sedang, biaya operasi tinggi karena material limbah.\nPrinter 3D: Material lembut (resin), akurasi dimensional sedang, kecepatan tinggi, limbah minimal, biaya operasi rendah.\n\n[KEY: Kombinasi perangkat lunak CAD dan mesin pemrosesan menentukan kualitas prostetik akhir]\n[TIP: Memilih kombinasi yang direkomendasikan oleh pabrikan menghindari masalah kompatibilitas]\n[WARN: Kombinasi perangkat lunak dan perangkat keras dari produsen berbeda mungkin tidak mendapat dukungan]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Perbandingan Detail dan Pemilihan Perangkat Lunak CAD\nexocad DentalCAD adalah perangkat lunak CAD dengan pangsa pasar terbesar di dunia dengan arsitektur terbuka, kompatibel dengan banyak scanner dan mesin pengolah. Sistem lisensi modular memungkinkan pembelian fitur yang diperlukan saja. 3Shape Dental Designer unggul dalam desain UI intuitif dan integrasi seamless dengan 3Shape TRIOS. CEREC inLab dioptimalkan untuk alur kerja terintegrasi Dentsply Sirona.\n\n◆ Manajemen Versi Perangkat Lunak\nManajemen versi perangkat lunak CAD merupakan masalah penting dalam operasional laboratorium. Pembaruan besar dapat mengakibatkan hilangnya kompatibilitas file, sehingga waktu upgrade harus diputuskan dengan hati-hati. Terutama jika bertransaksi dengan banyak klinik gigi, kompatibilitas dengan versi perangkat lunak IOS masing-masing klinik juga perlu diperiksa. Selalu buat cadangan proyek saat ini sebelum pembaruan.\n\n◆ Kustomisasi Library\nLibrary mahkota gigi dalam perangkat lunak CAD berisi bentuk gigi yang berbeda berdasarkan wilayah dan ras. Pemilihan library yang sesuai dengan karakteristik gigi pasien sangat penting. Banyak perangkat lunak memungkinkan pembuatan dan penambahan library kustom. Menyimpan bentuk mahkota yang sering digunakan sebagai library kustom akan sangat meningkatkan efisiensi kerja.\n\n◆ Konfigurasi Jaringan dan Manajemen Data\nUntuk konfigurasi jaringan laboratorium, berbagi data melalui NAS (Network Attached Storage) direkomendasikan. Pastikan redundansi data dengan konfigurasi RAID5 atau RAID6, dan kelola cadangan dengan aturan 3-2-1 (3 salinan, 2 jenis media, 1 di lokasi terpisah). Data CAD berukuran besar (50-200MB per kasus) dapat dioperasikan dengan nyaman pada workstation yang dilengkapi SSD."

                    teaching: "[FLOW: スキャナー設置 → ライト配置 → カメラ位置調整 → テスト撮影]\n【Part1⑥+Part2① 作業姿勢・デスク環境・スキャナー構造】\n\n■ 作業姿勢の基本\nデジタル技工はPC作業が中心となるため、正しい作業姿勢の維持が健康管理上きわめて重要である。\n・PCモニター：目線の高さに配置する。目線より低いと首が前傾し、肩こりや頚椎の問題を引き起こす。\n・椅子の高さ：座った状態で肘が机の高さと同じになる位置に調整する。肘が90度に曲がる高さが理想的。\n・姿勢のバランス：頭に対して体が直線になるバランスを保つ。背中を丸めず、骨盤を立てて座る。\n・作業スペース：机上にものを散乱させず、十分な作業スペースを確保する。\n・スキャナーの配置：利き手の反対側に配置する（右利きならスキャナーは左側に）。模型のセットやパウダー塗布を利き手で行いやすくするため。\n・休憩：同じ姿勢での長時間作業は健康リスクが高い。1時間に1回は立ち上がってストレッチすることを推奨。\n\n■ デスク環境のセットアップ\nモニターは正面に配置し、キーボードとマウスは手前の楽な位置に置く。マウス操作が多いため、マウスパッドのサイズや位置も重要。スキャナー、ミリングマシン、3Dプリンターはそれぞれ適切な位置に配置し、作業動線を効率化する。\n\n■ ラボスキャナーの構造\nラボスキャナーは主に3つの部分から構成される：\n\n【ライト（光源）】\nスキャナー内部の光源。被写体（石膏模型）に光を照射する。構造化光方式（ストライプパターンを投影）が主流。光の照射パターンと反射パターンの差異から3D形状を計算する。\n\n【カメラ】\nライトから照射された光の反射をカメラが撮影する。1回の撮影で得られる範囲は限られるため、モデルテーブルを回転させながら複数回撮影し、自動的にデータを合成する。\n\n【モデルテーブル】\n石膏模型を載せるテーブル。自動回転することで、模型を多方向から撮影する。被写体はカメラに対して中心に配置するのが基本。偏った配置では撮影範囲の端になり精度が低下する恐れがある。\n\n■ スキャン原理\n照射光が被写体に繰り返し照射→反射光をカメラが撮影→ソフトウェアが3D座標を計算→点群データ（ポイントクラウド）を生成→三角形メッシュ（ポリゴン）に変換→STL等のファイルとして出力。ラボスキャナーはIOSと比較して撮影範囲が大きいため、位置ズレが起こりにくく、安定した精度が得られる。\n\n■ スキャン範囲と位置の最適化\nカメラに対して被写体を中心に配置することが重要。撮影範囲の端では精度が低下する。スキャンする範囲は必要最低限にすることでデータ量を抑え、処理速度を確保する。ただし、デザイン時に隣在歯の形態を参考にするため、反対側同名歯までスキャンすることもある。\n\n[KEY: 正しい作業姿勢とデスク環境は長時間作業での疲労軽減と精密作業の品質を確保する基本]\n[TIP: 定期的にストレッチを取り、目を休めることで集中力を維持できる]\n[WARN: 不適切な姿勢での長時間作業は頸椎・腰椎への負担が蓄積する]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ エルゴノミクスの科学的根拠\n長時間のPC作業による身体負担を軽減するためのエビデンスに基づいた知見を紹介する。モニター位置は目線から15-20度下方が最適（ドイツBAuA規格準拠）。20-20-20ルール（20分ごとに20フィート=6m先を20秒見る）は眼精疲労の科学的エビデンスがある。椅子の座面高は大腿が水平になる高さに設定し、足裏全体が床につく状態が理想。マウスとキーボードは肘の角度が90-120度になる位置に配置する。\n\n◆ スキャナーのキャリブレーション\nラボスキャナーは定期的なキャリブレーション（較正）が精度維持に不可欠である。メーカー推奨のキャリブレーションブロック（既知の寸法を持つ基準器）を使い、週1回以上の較正を行う。環境温度が3度以上変化した場合も再キャリブレーションが必要。キャリブレーション結果はログとして記録し、精度の経時変化を監視する。\n\n◆ 光造形方式の原理\n3Dプリンターの主要方式であるDLP（Digital Light Processing）とSLA（Stereolithography）の原理を詳しく解説する。DLPはプロジェクターで面単位の露光を行い、SLAはレーザーで点描的に露光する。DLPは1層全体を同時硬化するため高速だが、解像度はプロジェクターのピクセル数に依存。SLAはレーザースポット径（50-100μm）で高精細だが、面積が広いと時間がかかる。LCD方式はDLPの低コスト版で、技工所での導入が急速に進んでいる。\n\n◆ 照明環境の整備\n色調を正確に評価するために、作業環境の照明は色温度5500K-6500K（デイライト）、演色性Ra90以上を推奨する。北向きの窓からの自然光が理想だが、LED照明で代替する場合は高演色LEDを選択する。シェードテイキング専用の光源（Vita Easyshadeなど）の活用も検討する。",
                    teachingId: "[FLOW: Pemasangan Scanner → Penempatan Cahaya → Penyesuaian Posisi Kamera → Uji Coba Pemotretan]\n【Part1⑥+Part2① Ergonomi, Lingkungan Meja Kerja, dan Struktur Scanner】\n\n■ Dasar Postur Kerja\nKarena pemrosesan gigi digital berpusat pada pekerjaan PC, mempertahankan postur kerja yang benar sangat penting untuk manajemen kesehatan.\n・Monitor PC: Tempatkan pada ketinggian garis pandang. Jika di bawah garis pandang, leher akan membungkuk ke depan, menyebabkan bahu dan masalah servikal.\n・Ketinggian kursi: Sesuaikan sehingga saat duduk siku berada pada ketinggian meja. Ketinggian di mana siku membengkok 90 derajat adalah ideal.\n・Keseimbangan postur: Pertahankan keseimbangan di mana tubuh membentuk garis lurus terhadap kepala. Jangan membungkuk, duduk dengan panggul tegak.\n・Ruang kerja: Pastikan tidak ada barang yang tersebar di meja kerja, dan sediakan ruang kerja yang cukup.\n・Penempatan scanner: Tempatkan di sisi yang berlawanan dengan tangan dominan untuk akses dan visibilitas yang mudah.\n・Penempatan mouse/keyboard: Letakkan di depan, hindari perpanjangan lengan yang tidak perlu.\n\n■ Risiko Kesehatan dari Pekerjaan Posisi Sama Lama\nMasalah mata: kelelahan mata, mata kering, ketegangan akomodasi.\nMasalah bahu dan leher: nyeri bahu, kaku leher, masalah servikal.\nMasalah pergelangan tangan: sindrom terowongan carpal dari gerakan mouse berulang.\nMasalah punggung: nyeri punggung bawah dari postur yang tidak benar.\nUntuk menghindarinya, lakukan peregangan setiap 1-2 jam, ubah posisi, dan istirahat mata.\n\n■ Memahami Struktur Scanner\nLab scanner terdiri dari tiga komponen utama:\n①Sumber cahaya: Sumber cahaya (LED atau laser) yang menerangi objek.\n②Kamera: Menangkap cahaya pantul dari objek untuk membuat data 3D.\n③Meja model: Tempat model gipsum ditempatkan, dapat berputar untuk memposisikan objek.\nProses pemindaian melibatkan pencahayaan berulang dan penangkapan cahaya pantul untuk membangun data 3D secara bertahap.\n\n■ Rentang dan Posisi Pemindaian yang Optimal\nKamera scanner memiliki area fokus spesifik. Tempatkan objek yang akan dipindai di pusat area fokus untuk hasil terbaik.\n・Jarak kerja: Jarak optimal antara kamera dan objek (biasanya 100-200mm tergantung spesifikasi).\n・Sudut pemindaian: Pemindaian dari berbagai sudut memastikan tidak ada bagian yang terlewatkan.\n・Pencahayaan: Hindari bayangan yang dalam; pencahayaan yang merata menghasilkan data yang lebih baik.\n・Penempatan background: Jangan tempatkan objek terlalu dekat dengan dinding atau background gelap yang dapat menciptakan bayangan.\n\n[KEY: Postur kerja yang tepat dan lingkungan meja kerja mengurangi kelelahan dalam pekerjaan jangka panjang dan menjamin kualitas pekerjaan presisi]\n[TIP: Melakukan peregangan secara berkala dan istirahat mata dapat mempertahankan konsentrasi]\n[WARN: Pekerjaan jangka panjang dengan postur yang tidak tepat menimbulkan beban kumulatif pada tulang belakang leher dan lumbar]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Bukti Ilmiah Ergonomi\nMemperkenalkan temuan berbasis bukti untuk mengurangi beban fisik dari kerja PC jangka panjang. Posisi monitor optimal adalah 15-20 derajat di bawah garis pandang (sesuai standar BAuA Jerman). Aturan 20-20-20 (setiap 20 menit melihat objek 6m jauhnya selama 20 detik) memiliki bukti ilmiah untuk kelelahan mata. Tinggi kursi diatur agar paha horizontal dan seluruh telapak kaki menyentuh lantai.\n\n◆ Kalibrasi Scanner\nKalibrasi berkala scanner laboratorium sangat penting untuk menjaga akurasi. Gunakan blok kalibrasi (alat referensi dengan dimensi yang diketahui) yang direkomendasikan produsen, lakukan kalibrasi minimal seminggu sekali. Kalibrasi ulang juga diperlukan jika suhu lingkungan berubah lebih dari 3 derajat. Catat hasil kalibrasi sebagai log dan pantau perubahan akurasi dari waktu ke waktu.\n\n◆ Prinsip Fotopolimerisasi\nMenjelaskan secara detail prinsip DLP (Digital Light Processing) dan SLA (Stereolithography) yang merupakan metode utama printer 3D. DLP melakukan eksposur per area menggunakan proyektor, sedangkan SLA mengekspos secara titik dengan laser. DLP mengeraskan seluruh lapisan secara bersamaan sehingga cepat, namun resolusinya bergantung pada jumlah piksel proyektor. SLA memiliki presisi tinggi dengan diameter spot laser 50-100μm namun memakan waktu untuk area yang luas.\n\n◆ Pengaturan Lingkungan Pencahayaan\nUntuk evaluasi warna yang akurat, pencahayaan area kerja direkomendasikan pada suhu warna 5500K-6500K (daylight) dengan indeks rendisi warna Ra90 atau lebih. Cahaya alami dari jendela menghadap utara ideal, namun jika menggunakan LED, pilih LED rendisi warna tinggi."

                    title: "スキャンの準備と操作",
                    whatYouLearn: "スキャン前の準備手順と、実際のスキャン操作方法を学びます。",
                    learningObjectives: "パウダー塗布からスキャン操作まで、正しい手順で実行できるようにします。",

                    teaching: "[FLOW: モデル準備 → 固定 → ライト調整 → スキャン開始]\n【Part2②③ スキャンの準備と操作】\n\n■ スキャン前の準備\n\n【パウダー・スプレーの塗布】\nスキャン前のパウダー（またはスプレー）塗布は、被写体表面の余分な反射を抑制し、均一な反射光を得るために行う。\n・目的：石膏模型の表面は部分的に光沢があったり、色にムラがあると、スキャナーのライトが正しく反射せず、データに穴（欠損）やノイズが発生する。パウダーを薄く均一に塗布することで、安定した反射が得られる。\n・塗布方法：支台歯を含む模型全体に、均一に薄くパウダーを塗布する。厚く塗りすぎると模型の形状が変わってしまうので注意。特に支台歯のマージン部分は精度が求められるため、薄く均一であることが重要。\n・金属面のスプレー：金属面（金属コーピング、インプラントアバットメント等）は光を強く反射して正しくスキャンできないため、スキャンスプレーを使用して反射を抑える。\n\n【雲台（模型台）の固定】\n模型を雲台に固定する方法は主に2種類：\n・ネジ固定：安定性が高い。大きなケースや長時間のスキャンに適する。\n・ブルタック（粘着材）：着脱が簡便。小さなケースの簡易固定に使用。\n・マウンティングプレート：雲台とスキャナーのモデルテーブルを接続するプレート。これにより模型の着脱が容易になり、セカンドスキャンの位置合わせも確実になる。\n\n【支台歯のスキャン前確認】\nスキャン前に支台歯の状態を確認することが重要：\n・気泡：石膏注入時の気泡が残っていないか。気泡はスキャンデータ上で穴や突起として現れ、マージンの判別を困難にする。\n・欠け：形成限界付近の石膏の欠けがないか。欠けがあるとマージンラインを正確に設定できない。\n・ワックス・不純物の付着：ワックスや異物が付着していないか確認する。\n・分割模型のピン浮き：分割模型の場合、ピンが浮いていないか確認する。ピンが浮いていると模型の位置がずれ、咬合のズレにつながる。\n\n■ スキャン操作\n\n【スキャン順番】\nスキャナーのソフトウェアには正規のスキャン順番が設定されているが、効率を考えて順番を変更することも可能。推奨される効率的な順番：\n①バイトスキャン（咬合関係）→②歯列スキャン→③支台歯スキャン\nこの順番にすると、模型の脱着やマウンティングプレートの付け替えを最小限にできる。\n\n【スキャン範囲】\n・支台歯：マージン全周に角（エッジ）や穴（データ欠損）がないことを確認する。少ない回数（追加スキャン回数を最小限）で完了するのが理想。追加スキャンが多いとデータの歪みが蓄積する可能性がある。\n・隣在歯：コンタクト部に穴（データ欠損）がないよう確認する。隣在歯の形態はデザイン時の参考になるため、正確にスキャンする。\n・基底面：歯頭部から1cm程度下までスキャンする。それ以上は不要。\n・参考模型：反対側同名歯までスキャンすると、デザイン時に歯の大きさや歯列の連続性を確認できる。\n\n【ガム模型・セカンド模型のスキャン】\nインプラント症例やブリッジ症例では、ガム模型（歯肉部分を再現した模型）のスキャンが必要。ガム模型は脱着可能な歯肉部分を取り外してスキャンし、装着した状態でもスキャンして、両方のデータを使い分ける。\n\n【維持孔つき支台の処理法】\nポスト維持孔がある支台歯は、孔をワックスやユーティリティワックスで埋めてからスキャンする。穴があるとスキャナーがデータを取得できず、内面形態が不正確になる。\n\n[KEY: スキャン準備の完全性がスキャンデータの品質と正確性を決定する最重要要因]\n[TIP: 複数回スキャンして品質を確認することで、後のCAD作業の効率が大幅に向上する]\n[WARN: 固定が不十分なモデルのスキャンはズレが発生し、設計精度が低下する]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ パウダー塗布の科学\nスキャンパウダーの粒子径は通常3-10μmで、スキャンデータへの影響は5-15μm程度である。パウダーフリースキャナーでは必要ないが、高反射面（金属・ジルコニア）や透明面（ガラスセラミック）ではパウダーが有効な場合がある。塗布が不均一だとスキャン精度に影響するため、エアロゾル方式のスプレーで均一に薄く塗布することが重要。過剰塗布は形態のぼやけの原因となる。\n\n◆ スキャンストラテジー\n効率的なスキャン手順のパターンを解説する。フルアーチスキャンでは、咬合面→頬側→舌側の順が一般的。支台歯部分は最低3方向からスキャンし、アンダーカット部分もカバーする。複雑な形態（ブリッジの窓状欠損部など）は角度を変えて複数回スキャンし、ソフトウェアのマッチング機能で統合する。\n\n◆ 模型のトリミングと固定方法\nスキャン前の模型準備として、トリミング（余分な石膏の除去）は平坦な基底面を作ることが重要。スキャナーの固定台に安定して載置できる形状に整える。ダウエルピンタイプの分割模型では、各パーツの取り外し・再装着の再現性を確認してからスキャンする。スキャン途中で模型が動くとデータの歪みが発生するため、固定方法には特に注意する。\n\n◆ スキャンデータの品質チェック\nスキャン完了後の品質チェックポイント：メッシュの穴（ホール）がないか確認。ノイズ（不要な突起）が多い場合はフィルタリング処理を行う。支台歯のマージンライン周辺は特に高精度が求められるため、この部分のメッシュ品質を重点的に確認する。データの三角メッシュの密度が均一であることも重要な品質指標である。",
                    teachingId: "[FLOW: Persiapan Model → Fiksasi → Penyesuaian Cahaya → Mulai Pemindaian]\n【Part2②③ Persiapan dan Operasi Pemindaian】\n\n■ Persiapan Sebelum Pemindaian\n\n【Penerapan Bubuk/Semprotan】\nPenerapan bubuk (atau semprotan) sebelum pemindaian dilakukan untuk menekan pantulan berlebihan dari permukaan objek dan mendapatkan cahaya pantul yang seragam.\n・Tujuan: Permukaan model gipsum bagian-bagian memiliki kilau atau variasi warna; jika cahaya scanner tidak terpantul dengan benar, data akan memiliki lubang (cacat) atau noise. Dengan menerapkan bubuk secara tipis dan merata, pantulan stabil dapat diperoleh.\n・Metode penerapan: Terapkan bubuk secara tipis dan merata ke seluruh model termasuk gigi penyangga. Jangan menerapkan terlalu tebal karena dapat mengubah bentuk model. Bagian margin gigi penyangga memerlukan akurasi tinggi, jadi terapkan tipis dan merata.\n・Jenis bubuk: Gunakan bubuk khusus pemindaian (titanium dioksida atau serupa) yang dapat dicuci dengan mudah.\n\n【Pengikat Cloud (Fiksasi Model)】\nModel dilekatkan ke cloud (penyangga model) untuk menjaga stabilitas posisi selama pemindaian.\n・Posisi: Pastikan model tidak bergeser atau berputar selama pemindaian.\n・Fiksasi: Gunakan wax atau adhesive khusus untuk fiksasi. Hindari fiksasi yang terlalu kuat yang dapat merusak model.\n\n【Verifikasi Kondisi Gigi Penyangga】\nSebelum pemindaian, verifikasi gigi penyangga untuk memastikan kualitas data.\n・Pemeriksaan gelembung: Periksa apakah ada gelembung udara di permukaan gigi penyangga atau di garis margin yang dapat mempengaruhi akurasi.\n・Pemeriksaan kerusakan: Periksa apakah ada kerusakan atau serpihan kecil pada model yang dapat mempengaruhi bentuk.\n・Pemeriksaan kontaminasi: Pastikan tidak ada kotoran, serbuk gipsum lepas, atau zat asing lainnya di permukaan.\n・Verifikasi model terpisah: Untuk model terpisah dengan pin, verifikasi bahwa pin-nya kokoh dan model tidak bergeser saat dipasang.\n\n■ Prosedur Pemindaian\n\n【Urutan Pemindaian】\n①Pemindaian gigi penyangga utama (gigi yang akan mendapat protesa).\n②Pemindaian gigi tetangga (gigi di samping gigi penyangga untuk referensi kontak).\n③Pemindaian gigi lawan (gigi di lengkung rahang yang berlawanan untuk referensi gigitan jika diperlukan).\n④Pemindaian model referensi (model sekunder, model wax, model perawatan)\n\n【Jangkauan Pemindaian Optimal】\nPindai hanya area yang diperlukan untuk mengurangi jumlah data dan waktu pemrosesan.\n・Cakupan minimal: Gigi penyangga + 2-3 gigi di setiap sisi (kiri-kanan).\n・Hindari cakupan berlebihan: Pemindaian seluruh lengkung rahang tidak perlu dalam banyak kasus dan memperlambat operasi.\n\n【Teknik Pemindaian untuk Presisi Tinggi】\n・Gigi penyangga: Pindai dari berbagai sudut untuk menangkap garis margin dengan akurat. Perhatikan area undercut dan cavity yang dapat menyebabkan lubang dalam data.\n・Gigi tetangga: Pindai kontak area dengan hati-hati untuk memastikan tidak ada lubang di zona kontak.\n・Pendeteksian otomatis: Gunakan fitur pendeteksian tepi otomatis scanner jika tersedia untuk mempercepat proses.\n\n[KEY: Kelengkapan persiapan pemindaian adalah faktor terpenting yang menentukan kualitas dan akurasi data pemindaian]\n[TIP: Mengscan berkali-kali dan memverifikasi kualitas secara signifikan meningkatkan efisiensi pekerjaan CAD berikutnya]\n[WARN: Pemindaian model dengan fiksasi yang tidak memadai menyebabkan misalignment dan mengurangi akurasi desain]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Ilmu Aplikasi Bubuk\nUkuran partikel bubuk scan biasanya 3-10μm, dengan dampak pada data scan sekitar 5-15μm. Meskipun tidak diperlukan untuk scanner tanpa bubuk, bubuk efektif pada permukaan reflektif tinggi (logam, zirkonia) atau transparan (keramik kaca). Aplikasi yang tidak merata mempengaruhi akurasi scan, sehingga penting untuk mengaplikasikan secara tipis dan merata menggunakan spray aerosol.\n\n◆ Strategi Pemindaian\nMenjelaskan pola prosedur scan yang efisien. Untuk scan full arch, urutan umum adalah permukaan oklusal → bukal → lingual. Bagian abutment di-scan minimal dari 3 arah untuk menutupi area undercut. Bentuk kompleks (seperti area jendela jembatan) di-scan beberapa kali dari sudut berbeda dan diintegrasikan dengan fungsi matching perangkat lunak.\n\n◆ Trimming dan Metode Fiksasi Model\nDalam persiapan model sebelum scan, trimming (pengangkatan gipsum berlebih) penting untuk menciptakan permukaan dasar yang rata. Bentuk model disesuaikan agar stabil di platform fiksasi scanner. Untuk model terpisah tipe dowel pin, pastikan reprodusibilitas pelepasan dan pemasangan kembali setiap bagian sebelum scanning.\n\n◆ Pemeriksaan Kualitas Data Scan\nPoin pemeriksaan kualitas setelah scan selesai: periksa apakah ada lubang (hole) pada mesh. Jika noise (tonjolan yang tidak diperlukan) banyak, lakukan pemrosesan filtering. Area sekitar garis margin abutment memerlukan presisi tinggi, jadi periksa kualitas mesh di bagian ini secara intensif. Keseragaman kepadatan mesh segitiga juga merupakan indikator kualitas penting."

                    title: "CADデザインフローとセメントスペース",

                    learningObjectives: "CADデザインの全体フローを理解し、セメントスペースを適切に設定できるようにします。",

                    teaching: "■ マージンラインとは\nマージンライン（Margin Line）とは、補綴物（クラウン・インレー・ブリッジなど）の辺縁ラインのことである。歯を削った境界線（支台歯の形成限界）に合わせて設定する。CADデザインの最初のステップであり、マージン設定の精度が補綴物全体の単適合に直結する。\n\n■ マージンラインの形態分類\n歯科医が歯を削る際のカット形態により、マージンの尺度・形態が異なる。以下に主要なマージン形態を示す。\n\n[TABLE]\n形態名|特徴|主な用途\nフェザーエッジ|薄い刃物状。接着力高いが強度低い|局部針装咬用（後方歯のメタルクラウンなど）\nシャンファー|45度斜面形成。最も一般的で汎用性が高い|ジルコニアクラウン・セラミックインレー\nショルダー|90度直角。強度高い。補綴物の壁厚確保が容易|全部陶材冠（オールセラミッククラウン）\n[/TABLE]\n\n■ マージン設定のポイント\nCADデザインにおけるマージンライン設定は、スキャンデータ上で支台歯の形成限界を正確にトレースする作業である。\n・自動検出：ソフトが形態の変化の激しい部分を自動検出するが、100%の精度はまず期待できない。\n・手動修正：自動検出後に必ず手動で全周を確認・修正する。\n・カラーデータの活用：カラーデータ（IOSスキャン）では歯肉色と歯質色の境界を目視で確認でき、マージン識別が容易。\n\n■ マージン設定のよくあるミスと対策\nマージンライン設定の失敗は完成蹄の不適合直結する最大の原因である。\n\n[TABLE]\nミスの種類|原因|対策\nマージンが深すぎる|歯根側へ通越、歯肉炎症|スキャンデータを再確認、歯界線を娘山側に戻す\nマージンが浅すぎる|歯冠部に通越、適合不良|マージン直上まで補綴物外形を引き下げる\nマージンに段差あり|不正確なトレース|山小屋ツールで横方向に滑らかに修正\nマージン不連続|スキャンデータの欠損|スキャン再撮影を歯界履歯医に依頼\n[/TABLE]\n\n[KEY: マージンライン設定は全咬合設定の「第一歩」であり、失敗すると後の全工程が差んでしまう]\n[TIP: スキャン時の排歯圧排状態を歯界履歯医に確認するとマージン判別正確度が向上する]\n[WARN: マージン領域と歯肉下齢第2層が侵襲する設定は歯肉炎症の原因となるため絶対に避ける]\n\n[TABLE]\nセメントスペース|厚さ|材料\n自動セメント|30-50μm|レジン系\nスクリュー保持|0-20μm|メタル系\n[/TABLE]\n【Part4①②③ CADデザインフローとセメントスペース】\n\n■ CADデザインの全体フロー（11ステップ）\nCADデザインは以下の順序で進める。各ステップを正しく理解し順番通りに進めることが、品質の高い補綴物製作の基本である。\n\n【Step1：オーダー入力】\n患者情報、歯式（補綴部位）、材料、歯科医院名を入力する。オーダー（指示書）と照合し、間違いがないことを確認。\n\n【Step2：スキャンデータの読込】\nスキャンしたSTL等のデータをCADソフトに読み込む。支台歯データ、対合歯データ、バイトデータをそれぞれ読み込む。\n\n【Step3：模型軸の設定】\n模型の方向（上下左右）を正しく設定する。これにより咬合面の方向が決まり、以降の作業の基準となる。\n\n【Step4：支台歯・対合歯の指定】\nどの歯が支台歯でどの歯が対合歯かをソフトに指示する。複数本の支台歯がある場合はすべて指定する。\n\n【Step5：マージンライン設定】\n支台歯の形成限界線（マージンライン）をソフト上でトレースする。自動検出→手動修正が一般的。マージン全周にわたって正確に設定することが適合精度の基本。\n\n【Step6：挿入方向（着脱方向）設定】\n補綴物が支台歯に装着される方向を設定する。この方向にアンダーカットがないことを確認する。ブリッジの場合は全支台歯に共通の挿入方向を設定する。\n\n【Step7：歯冠形態の選択】\nライブラリー（ソフト内蔵の歯冠形態）、コピー（参考模型からの形態コピー）、ミラー（反対側同名歯の反転）のいずれかから選択する。\n\n【Step8：ポジショニング】\n選択した歯冠形態を歯列上の適切な位置に配置する。大きさ・位置・向きを調整する。\n\n【Step9：形態調整】\nワックスナイフツール、モーフィングツール等を使用して、歯冠形態を細部まで調整する。咬合接触・隣接面コンタクト・連続性・清掃性を考慮。\n\n【Step10：咬合チェック】\nバーチャル咬合器で咬合運動をシミュレートし、干渉や不正咬合がないか確認する。\n\n【Step11：完了・STL出力】\nデザインが完了したらSTL形式で出力し、CAMソフトに送る。\n\n■ デザインソフトの操作\n【ショートカットキー】効率的なデザインのためにショートカットキーを活用する。回転・ズーム・パン・ツール切替等の基本操作を素早く行えるようにする。\n【ツール類】モーフィング（形態の滑らかな変形）、ワックスナイフ（局所的な盛り・削り）、フォーム（大きな形態変更）、ビュー方向の統一（常に一定方向から確認する習慣）。\n\n■ セメントスペースの詳細\nセメントスペースはクラウンの内面と支台歯の間に設ける隙間であり、合着用セメントの流入経路となる。適切なセメントスペースは補綴物の適合と維持に直結する。\n\n【セメントスペースの基本パラメーター】\n・セメント間隙（Cement Gap）：デフォルト0.010mm。クラウン内面全体に設ける基本的な隙間。\n・追加セメント間隙（Additional Cement Gap）：0.045mm。セメントの流出を助けるための追加隙間。\n・マージンラインまでの距離（Distance to Margin Line）：0.80mm。マージンラインから何mm上までセメントスペースを設けるか。マージン付近はスペースを設けないことで辺縁封鎖性を確保する。\n・スムージング距離（Smoothing Distance）：0.20mm。セメントスペースありとなしの境界を滑らかにつなぐ距離。\n\n【支台歯形状に合わせた調整】\n・テーパーがきつい場合：セメントの流出が困難になるため、スペースを増やす。\n・テーパーが緩い場合：維持力が低下するため、スペースは標準値か少なめに設定。\n・鋭利な箇所：ドリル半径をケースバイケースで設定する。ミリングバーの直径より小さい凹みは加工できないため、CAD段階でリリーフ（逃がし）処理を行う。\n・アンダーカット部：必ずリリーフ処理を行い、加工時の削り残しエラーを防止する。リリーフしないとミリングマシンがアンダーカット部を削れず、不適合の原因になる。\n\n【ドリル半径・ドリル補正オフセット】\nミリングバーの半径（例：0.3mm、0.5mm）より小さいディテールは物理的に加工できない。CAMソフトが自動補正するが、CADデザイン段階からドリル半径を意識してセメントスペースやマージン付近の形態を設計することが重要。\n\n[KEY: セメントスペースの値とマージンタイプがCADデザインの最初の重要決定]\n[TIP: デフォルト値でスタートして医院の指示で調整するのが効率的]\n[WARN: セメントスペースの値が大きすぎると隣接面コンタクトが失われる]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ セメントスペースの科学的根拠\nセメントスペースの適正値は、使用するセメントの粒子径と流動性に依存する。レジン系セメントは粒子径5-20μmで、最小スペースは30μm程度が必要。グラスアイオノマーセメントはやや粒子が粗く、40-60μmが推奨される。スペースが狭すぎると装着時にセメントが流れず浮き上がり、広すぎると維持力低下やマイクロリーケージのリスクが増加する。最近の研究では、マージン部は20-30μm、咬合面は50-80μmの段階的設定が推奨されている。\n\n◆ 11ステップの各工程詳細\nCADデザインの11ステップそれぞれについて、つまずきやすいポイントと対処法を解説する。特に重要なのは、マージンライン設定（Step1）、挿入方向決定（Step3）、セメントスペース設定（Step4）の3ステップである。マージンラインはスキャンデータ上で最も薄い部分を検出する自動検出機能を使い、手動で微調整するのが効率的。挿入方向は平行測定器の代わりにCAD上のアンダーカット表示で確認する。\n\n◆ 支台歯の評価と前処置の判断\nCADデザインを始める前に、支台歯の状態を評価する能力が必要である。テーパー角（収束角）は全周で6-12度が理想的。テーパー角が大きすぎる（20度以上）と維持力が低下し、小さすぎる（3度以下）と挿入が困難になる。支台歯の高さは最低3mm（小臼歯）から4mm（大臼歯）が必要。これらの条件を満たさない場合は、歯科医師に支台歯の再形成を依頼する判断も重要である。\n\n◆ CADデザインの品質基準\n完成したCADデザインの品質を自己評価するためのチェック項目を紹介する。マージン適合性（ギャップ50μm以内）、咬合接触点の位置と強さ、隣接面コンタクトの適切さ（50-100μmの食い込み量）、歯冠形態の自然さ（対合歯・隣在歯との調和）、セメントスペースの均一性、壁厚の最小値確保（ジルコニア0.5mm以上、e.max0.8mm以上）。",
                    teachingId: "[TABLE]\nRuang Semen|Ketebalan|Bahan\nSemen Otomatis|30-50μm|Resin\nPegangan Sekrup|0-20μm|Logam\n[/TABLE]\n【Part4①②③ Alur Desain CAD dan Ruang Semen】\n\n■ Alur Keseluruhan Desain CAD (11 Langkah)\nDesain CAD berkembang dalam urutan berikut. Memahami setiap langkah dengan benar dan melanjutkan dalam urutan yang tepat adalah dasar dari pembuatan protesa berkualitas tinggi.\n\n【Langkah1：Input Pesanan】\nMasukkan informasi pasien, nomor gigi (lokasi protesa), material, dan nama kantor gigi. Verifikasi dengan pesanan (instruksi) dan pastikan tidak ada kesalahan.\n\n【Langkah2：Membaca Data Pindai】\nMembaca data STL dan sejenisnya yang dipindai ke dalam perangkat lunak CAD. Membaca data gigi penyangga, data gigi berlawanan, dan data gigitan secara terpisah.\n\n【Langkah3：Pengaturan Sumbu Model】\nMengatur arah model (atas-bawah, kiri-kanan) dengan benar. Ini menentukan arah permukaan gigitan dan menjadi dasar untuk pekerjaan berikutnya.\n\n【Langkah4：Menentukan Gigi Penyangga dan Gigi Berlawanan】\nMemberitahu perangkat lunak gigi mana yang merupakan gigi penyangga dan yang merupakan gigi berlawanan. Tentukan semua gigi penyangga jika ada beberapa.\n\n【Langkah5：Pengaturan Garis Margin】\nMenelusuri garis batas pembentukan gigi penyangga (garis margin) pada layar perangkat lunak. Deteksi otomatis → perbaikan manual adalah metode yang umum. Pengaturan yang akurat di seluruh margin adalah dasar dari presisi penyesuaian.\n\n【Langkah6：Pengaturan Arah Penyisipan (Arah Pelepasan)】\nMengatur arah pemasangan protesa ke gigi penyangga. Pastikan tidak ada undercut pada arah ini. Untuk jembatan, atur arah penyisipan yang sama untuk semua gigi penyangga.\n\n【Langkah7：Pilihan Bentuk Mahkota Gigi】\nPilih dari perpustakaan (bentuk mahkota dalam perangkat lunak), salinan (salinan bentuk dari model referensi), atau cermin (inversi gigi dengan nama yang sama di sisi berlawanan).\n\n【Langkah8：Penentuan Posisi】\nTempatkan bentuk mahkota yang dipilih pada posisi yang sesuai di barisan gigi. Sesuaikan ukuran, posisi, dan arah.\n\n【Langkah9：Penyesuaian Bentuk】\nGunakan alat seperti pisau lilin, alat morfing, dll. untuk menyesuaikan bentuk mahkota hingga detail terkecil. Pertimbangkan kontak gigitan, kontak wajah proksimal, kontinuitas, dan kemampuan pembersihan.\n\n【Langkah10：Pemeriksaan Gigitan】\nMeniru gerakan gigitan dengan simulator gigitan virtual dan memverifikasi bahwa tidak ada gangguan atau gigitan yang salah.\n\n【Langkah11：Selesai dan Output STL】\nSetelah desain selesai, keluarkan dalam format STL dan kirim ke perangkat lunak CAM.\n\n■ Operasi Perangkat Lunak Desain\n【Tombol Pintas】Memanfaatkan tombol pintas untuk desain yang efisien. Melakukan operasi dasar seperti rotasi, zoom, pan, dan alihan alat dengan cepat.\n【Alat-alat】Morfing (transformasi bentuk yang halus), pisau lilin (penumpukan dan penghapusan lokal), bentuk (perubahan bentuk besar), penyatuan arah tampilan (kebiasaan melihat dari arah yang konsisten).\n\n■ Detail Ruang Semen\nRuang semen adalah celah antara permukaan dalam mahkota dan gigi penyangga, yang berfungsi sebagai jalur aliran semen perekat. Ruang semen yang tepat berhubungan langsung dengan penyesuaian dan retensi protesa.\n\n【Parameter Ruang Semen Dasar】\n・Celah Semen (Cement Gap): Default 0,010mm. Celah dasar yang diberikan di seluruh permukaan dalam mahkota.\n・Celah Semen Tambahan (Additional Cement Gap): 0,045mm. Celah tambahan untuk membantu aliran keluar semen.\n・Jarak ke Garis Margin (Distance to Margin Line): 0,80mm. Seberapa banyak mm di atas garis margin untuk memberi ruang semen. Dekat margin tidak ada spasi untuk memastikan penyegelan tepi.\n・Jarak Pelancaran (Smoothing Distance): 0,20mm. Jarak untuk menghubungkan dengan mulus antara tempat ada dan tidak ada ruang semen.\n\n【Penyesuaian Sesuai Bentuk Gigi Penyangga】\n・Jika kerucut sangat ketat: Aliran semen menjadi sulit, jadi tingkatkan spasi.\n・Jika kerucut longgar: Daya retensi menurun, jadi atur spasi ke nilai standar atau lebih rendah.\n・Area yang tajam: Atur jari-jari bor berdasarkan kasus per kasus. Lekukan yang lebih kecil dari diameter bar penggilingan tidak dapat diproses, jadi lakukan pemrosesan relief pada tahap CAD.\n・Bagian Undercut: Selalu lakukan pemrosesan relief untuk mencegah kesalahan sisa penghapusan selama pemrosesan. Jika tidak dikurangi, mesin penggilingan tidak dapat menghapus bagian undercut, yang menjadi penyebab kesalahan penyesuaian.\n\n【Jari-jari Bor dan Offset Koreksi Bor】\nDetail yang lebih kecil dari jari-jari bar penggilingan (misalnya, 0,3mm, 0,5mm) secara fisik tidak dapat diproses. Perangkat lunak CAM melakukan koreksi otomatis, tetapi penting untuk mempertimbangkan jari-jari bor dari tahap desain CAD dan merancang bentuk ruang semen dan area margin dengan kesadaran ini.\n\n[KEY: Nilai ruang semen dan jenis margin adalah keputusan penting pertama desain CAD]\n[TIP: Mulai dengan nilai default dan sesuaikan berdasarkan instruksi klinik adalah pendekatan efisien]\n[WARN: Ruang semen terlalu besar menyebabkan hilangnya kontak permukaan proksimal]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Dasar Ilmiah Cement Space\nNilai optimal cement space bergantung pada ukuran partikel dan fluiditas semen yang digunakan. Semen berbasis resin memiliki ukuran partikel 5-20μm, memerlukan ruang minimal sekitar 30μm. Glass ionomer cement memiliki partikel sedikit lebih kasar, direkomendasikan 40-60μm. Jika terlalu sempit, semen tidak mengalir saat pemasangan menyebabkan terangkat; jika terlalu lebar, risiko penurunan retensi dan microleakage meningkat.\n\n◆ Detail Setiap Langkah dari 11 Langkah\nMenjelaskan poin-poin yang sering menjadi kesulitan dan cara mengatasinya untuk setiap langkah desain CAD. Yang paling penting adalah pengaturan garis margin (Langkah 1), penentuan arah insersi (Langkah 3), dan pengaturan cement space (Langkah 4). Untuk garis margin, efisien menggunakan fungsi deteksi otomatis yang mendeteksi bagian tertipis pada data scan, lalu menyesuaikan secara manual.\n\n◆ Evaluasi Abutment dan Keputusan Pra-perawatan\nKemampuan mengevaluasi kondisi abutment diperlukan sebelum memulai desain CAD. Sudut taper (sudut konvergensi) idealnya 6-12 derajat di seluruh keliling. Jika terlalu besar (lebih dari 20 derajat) retensi menurun, jika terlalu kecil (kurang dari 3 derajat) insersi menjadi sulit. Tinggi abutment minimal 3mm (premolar) hingga 4mm (molar).\n\n◆ Standar Kualitas Desain CAD\nMemperkenalkan item pemeriksaan untuk evaluasi diri kualitas desain CAD yang telah selesai. Kesesuaian margin (gap di bawah 50μm), posisi dan kekuatan titik kontak oklusal, kesesuaian kontak proksimal (kedalaman penetrasi 50-100μm), kealamian bentuk mahkota, keseragaman cement space, jaminan ketebalan dinding minimum (zirkonia 0,5mm atau lebih, e.max 0,8mm atau lebih)."

                    title: "歯冠概形の選択とポジショニング",
                    whatYouLearn: "歯冠の概形（ライブラリー）選択と、正しいポジショニング方法を学びます。",
                    learningObjectives: "適切な歯冠形態を選択し、正確にポジショニングできる状態を目指します。",
                    goodExample: "歯冠形態の選択が適切で、ポジショニングが正確。",

                    evaluationCriteria: "形態選択、ポジショニング精度、全体バランス。",
                    teaching: "■ 歯の基本解剖：各部名称と構造\n歯科CADデザインを正確に行うためには、歯の解剖学的構造を正しく理解することが不可欠である。\n\n【歯の各部名称】\n・歯冠（しかん）：歯肉より上に露出している部分。表面はエナメル質で覆われており、人体で最も硬い組織（硬度6〜7）である。\n・歯頸部（しけいぶ）：歯冠と歯根の境界部分。エナメル質とセメント質が接する領域。CEJ（Cemento-Enamel Junction：セメントエナメル境）とも呼ぶ。\n・歯根（しこん）：歯槽骨内に埋まっている部分。表面はセメント質（Cementum）で覆われる。歯根膜（PDL）が歯槽骨と歯根を繋ぐ。\n・歯髄腔（しずいくう）：歯の中心部にある空間。歯髄（血管・神経・リンパ管を含む軟組織）が存在する。\n\n[TABLE]\n部位|組織|主な役割\n歯冠|エナメル質（表層）・象牙質（内層）|咀嚼・審美\n歯頸部|CEJ（エナメル質とセメント質の境界）|マージン設定の基準点\n歯根|セメント質・象牙質|歯槽骨への固定\n歯髄腔|歯髄（血管・神経）|栄養・感覚・防御\n[/TABLE]\n\n■ 歯の5つの面\n各歯には5方向の面があり、CADデザインでの視点設定と形態確認の基準となる。\n・唇側面（しんそくめん）／頬側面（きょうそくめん）：唇・頬に面する外側面。前歯では「唇側面」、臼歯では「頬側面」と呼ぶ。\n・舌側面（ぜつそくめん）：舌に面する内側面。上顎の舌側面は「口蓋側（こうがいそく）」とも呼ぶ。\n・近心面（きんしんめん）：正中線（口の中央）に近い側面。\n・遠心面（えんしんめん）：正中線から遠い側面。\n・切縁（せつえん）／咬合面（こうごうめん）：前歯では「切縁」（切る縁）、臼歯では「咬合面」（かみ合わせる面）。\n\n[KEY: 近心は正中に近い側、遠心は正中から遠い側と覚える]\n\n■ 歯種の識別と特徴\n歯列は前歯群（切歯・犬歯）と臼歯群（小臼歯・大臼歯）に大別される。ライブラリー選択時に歯種の特徴を理解していると、適切な歯冠形態の選択が容易になる。\n\n【切歯（前歯）の特徴】\n・切縁が直線的で薄い。咬合面でなく「切縁」を持つ。\n・根は単根。\n・上顎中切歯（#11・#21）は全歯種中で歯冠幅が最大の前歯。\n・下顎切歯（#31・#32・#41・#42）は最も小さい歯。\n\n【犬歯の特徴】\n・歯冠が尖った形態（犬歯尖頭）を持つ。\n・単根であり、全歯種中で歯根が最も長い（平均16〜17mm）。\n・犬歯誘導（Canine Guidance）：側方運動時に犬歯が接触してガイドする機能。\n\n【小臼歯（プレモーラー）の特徴】\n・咬頭が2つ（頬側咬頭・舌側咬頭）。\n・歯冠はコンパクトで奥行きが少ない。\n・上顎第1小臼歯（#14・#24）のみ2根（頬側根・口蓋根）が多い。その他の小臼歯は基本的に単根。\n\n【大臼歯（モーラー）の特徴】\n・咬頭が4〜5つ（歯種により異なる）。歯冠面積が最大で咀嚼効率が最高。\n・上顎大臼歯：3根（近心頬側根・遠心頬側根・口蓋根）。\n・下顎大臼歯：2根（近心根・遠心根）。\n・第三大臼歯（親知らず）は形態のバリエーションが多く、CADライブラリーでの再現が難しい。\n\n[TABLE]\n歯種|咬頭数|根の数|特徴\n上顎中切歯|切縁（1）|1根|最大の前歯\n犬歯|1（犬歯尖頭）|1根（最長）|犬歯誘導\n上顎第1小臼歯|2（頬側・口蓋側）|2根が多い|小臼歯唯一の2根\n上顎大臼歯|4〜5|3根|最多根数\n下顎大臼歯|4〜5|2根（近心・遠心）|最大の咬合力\n[/TABLE]\n\n■ 上顎・下顎の形態の違いと左右の識別\n\n【上顎と下顎の違い】\n・上顎歯は頬側面が膨らんでいる（特に上顎第一大臼歯の近心頬側咬頭が大きい）。\n・下顎歯は舌側面が内側に傾斜する傾向がある。\n・上顎前歯は唇側に傾斜（前傾）している。下顎前歯は垂直か若干内側に傾斜。\n\n【左右の識別ポイント】\n・前歯の識別：上顎中切歯と側切歯の遠心隅角（えんしんぐうかく）はやや丸みがあり、近心隅角は直角に近い。\n・臼歯の識別：上顎大臼歯は近心頬側咬頭が最も大きく発達している（「頬側の大きい方が近心」）。\n・模型を見て「正中はどちら側か」「頬側はどちらか」を確認してから選択する。\n\n[TIP: CADライブラリー選択時は、歯種の根の数や咬頭数を念頭に置くと形態選択ミスが減る]\n[WARN: 上顎と下顎を間違えてライブラリーを選択すると咬合が崩れる原因になる]\n\n■ CADデザインへの活用\nライブラリー選択の際に歯種特有の解剖学的特徴を理解していると、より解剖形態に忠実なデザインが可能になる。\n・切歯：切縁が薄く直線的なライブラリーを選ぶ。\n・犬歯：尖った歯冠形態と長い歯根に対応したポジショニングが必要。\n・小臼歯：咬頭が2つという点を意識し、頬側咬頭と舌側咬頭の位置を対合歯と合わせる。\n・大臼歯：咬頭の数・位置・形状が多様なため、対合歯・隣在歯との咬合関係を優先して選択する。\n\n[TABLE]\n歯型|特徴|用途\nナチュラル|天然歯に近い形態|前歯、小臼歯\nブロック型|短縮された歯冠|古い補綴物\nカスタム|患者の形態に合わせ|個別対応\n[/TABLE]\n【Part4④⑤ 歯冠概形の選択とポジショニング】\n\n■ 歯冠概形の3つの選択方法\n\n【①ライブラリー（Library）】\nCADソフトに内蔵された歯冠形態のデータベースから選択する方法。各歯種（上顎中切歯、下顎第一大臼歯等）ごとに複数の形態が用意されている。\n・臼歯のライブラリー選択：咬合面形態（溝の走行、咬頭の数と位置）が適切かを確認して選択する。日本人の歯の形態には特徴があるため、日本人向けのライブラリーが用意されている場合はそちらを優先する。\n・前歯のライブラリー選択：唇面の豊隆、切縁の形態、ラインアングルの位置が自然か確認する。\n・ライブラリーの限界：万能ではなく、患者固有の歯の特徴を完全に再現するのは難しい。選択後の形態調整が必須。\n\n【②コピー（Copy）】\n参考模型や対合歯、または過去のデータから歯冠形態をコピーする方法。\n・参考模型からのコピー：形成前の歯のスキャンデータがある場合、その形態をコピーして使用する。元の歯の形態を忠実に再現できるため、患者の個性を活かしたデザインが可能。\n・過去データからのコピー：以前製作した補綴物のデータを活用する。再製作時や隣在歯のデータの活用に有効。\n・対合歯からのコピー：対合歯の形態を参考にして歯冠形態を決める場合に使用。\n\n【③ミラー（Mirror）】\n反対側の同名歯の形態を左右反転してコピーする方法。\n・適用条件：反対側の同名歯が健全で、形態が参考になる場合に有効。左右対称性を活かしたデザインが可能。\n・注意点：完全な左右対称は自然界には存在しないため、ミラー後に微調整が必要。また、反対側の歯が修復済みや摩耗が進んでいる場合は参考にならない。\n\n■ ポジショニングの基本原則\nポジショニングとは、選択した歯冠概形を歯列上の正しい位置に配置する作業。適切なポジショニングは咬合・審美・機能のすべてに影響する最も重要な工程の一つ。\n\n【基本的な態度】\n・一定の方向で形態を確認する：常に同じ方向（例：頬側から）から確認することで、不均一を見つけやすくする。形態の確認時にビュー方向がバラバラだと、歪みや不調和を見落としやすい。\n・歯冠の大きさを歯列に合わせる：隣在歯との調和を考慮し、歯冠の近遠心幅・頬舌幅・高さを適切に設定する。\n\n【臼歯部のポジショニング】\n・頬舌的位置：頬側咬頭と舌側咬頭の位置を歯列弓に合わせる。\n・近遠心的位置：隣在歯との間隔（隣接面コンタクト）を考慮して配置。\n・咬頭傾斜：歯列内の他の臼歯の咬頭傾斜に合わせる。急な咬頭傾斜の歯列に緩い咬頭傾斜の歯冠を置くと不調和になる。\n・咬合面の高さ：辺縁隆線の高さを隣在歯と合わせる。\n\n【前歯部のポジショニング】\n・唇面の位置：口唇の形態との調和を最優先する。過度な唇側傾斜は口唇が閉じにくくなる。\n・切縁の位置：スマイルラインとの調和を考慮する。切縁の高さと形態が笑顔の審美性を左右する。\n・歯軸（歯の傾き）：隣在歯の歯軸に合わせて自然な傾きにする。歯軸がずれると不自然に見える。\n・歯頚部ライン：歯頚部（歯と歯肉の境目）の位置を隣在歯と連続させる。歯頚部ラインが不連続だと審美的に問題になる。\n・対合歯列弓との調和：上下の歯列弓の関係を考慮してオーバージェット（水平被蓋）とオーバーバイト（垂直被蓋）を適切に設定する。\n\n[KEY: 歯冠概形の選択と位置決めが最終補綴物の審美性と機能性を大きく左右する]\n[TIP: 隣在歯の形態を参考に選択することで自然な仕上がりが実現する]\n[WARN: 歯軸の角度が大きく異なるとポジショニングが不適切になりやすい]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ ライブラリー歯冠形態の人種差\n歯冠形態は人種によって大きく異なる。日本人（モンゴロイド）の特徴として、上顎中切歯のシャベル形（舌側辺縁隆線の発達）、小臼歯のCara-belli結節の頻度が低いこと、大臼歯の咬頭パターン（Y-5パターンが多い）がある。ライブラリー選択時は、患者の人種的特徴に合った歯冠形態を選ぶことで、より自然な補綴物を製作できる。\n\n◆ バイオミメティックデザインの概念\nバイオミメティック（生体模倣）デザインとは、天然歯の微細構造を可能な限り再現するアプローチである。エナメル質のペリキマタ（横走条）、マメロン（切歯の発育葉痕）、歯頸部ラインの自然な曲線など、細部まで再現することで審美性が向上する。CADソフトのスカルプティング機能やテクスチャ付与機能を活用して、個性的で自然な歯冠形態を作り出す。\n\n◆ ポジショニングの精密調整\n歯冠概形のポジショニングは、頬舌的位置、近遠心的位置、歯冠軸の傾斜、回転の4つのパラメータを調整する。咬合平面に対する歯冠の傾斜角度（アンギュレーション）と傾き（トルク）は、アンドリュースの6つの鍵に基づいて設定すると機能的に理想的な咬合が得られる。\n\n◆ デジタルワックスアップとの連携\nデジタルワックスアップ（診断用ワックスアップ）をCADデザインの参照データとして活用する方法を解説する。まず理想的な歯冠形態をデジタルワックスアップで設計し、それをテンプレートとして最終的な補綴物の形態に反映させる。特にフルマウスリハビリテーションのケースでは、デジタルワックスアップが全体の設計指針として不可欠である。",
                    teachingId: "[TABLE]\nTipe Gigi|Fitur|Penggunaan\nAlami|Bentuk mirip gigi alami|Gigi depan, premolar\nBlok|Mahkota gigi yang diperpendek|Prostetik lama\nKustom|Disesuaikan dengan bentuk pasien|Respons Individual\n[/TABLE]\n【Part4④⑤ Pilihan Bentuk Mahkota Gigi dan Penentuan Posisi】\n\n■ Tiga Metode Pemilihan Bentuk Mahkota Gigi\n\n【①Perpustakaan (Library)】\nMetode pemilihan dari basis data bentuk mahkota dalam perangkat lunak CAD. Beberapa bentuk disediakan untuk setiap jenis gigi (gigi seri tengah maksila, gigi molar pertama mandibula, dll.).\n・Pemilihan perpustakaan molar: Verifikasi bahwa bentuk permukaan oklusal (jalur alur, jumlah dan posisi cuspid) sudah sesuai sebelum dipilih. Karena gigi orang Jepang memiliki karakteristik khusus, perpustakaan untuk Jepang harus diprioritaskan jika tersedia.\n・Pemilihan perpustakaan gigi depan: Periksa apakah daya tarik labial, bentuk tepi pemotong, dan posisi line angle terlihat alami.\n・Keterbatasan perpustakaan: Bukan universal, dan sulit untuk sepenuhnya mereproduksi karakteristik gigi unik pasien. Penyesuaian bentuk setelah pemilihan sangat penting.\n\n【②Salinan (Copy)】\nMetode menyalin bentuk mahkota dari model referensi, gigi berlawanan, atau data masa lalu.\n・Salinan dari model referensi: Jika ada data pindai gigi sebelum pembentukan, gunakan bentuk tersebut. Memungkinkan desain yang setia terhadap bentuk gigi asli dan memanfaatkan individualitas pasien.\n・Salinan dari data masa lalu: Memanfaatkan data protesa yang dibuat sebelumnya. Efektif untuk remediasi dan penggunaan data gigi yang berdekatan.\n・Salinan dari gigi berlawanan: Gunakan ketika bentuk mahkota ditentukan dengan merujuk pada bentuk gigi berlawanan.\n\n【③Cermin (Mirror)】\nMetode menyalin bentuk gigi dengan nama yang sama di sisi berlawanan dengan membalikkannya kiri-kanan.\n・Kondisi penerapan: Efektif ketika gigi dengan nama yang sama di sisi berlawanan sehat dan bentuknya dapat dijadikan referensi. Memungkinkan desain yang memanfaatkan simetri kiri-kanan.\n・Poin perhatian: Simetri sempurna tidak ada di alam, jadi penyesuaian mikro diperlukan setelah mirroring. Selain itu, jika gigi di sisi berlawanan telah diperbaiki atau aus parah, itu tidak dapat dijadikan referensi.\n\n■ Prinsip Dasar Penentuan Posisi\nPenentuan posisi adalah tindakan menempatkan bentuk mahkota yang dipilih pada posisi yang tepat di barisan gigi. Penentuan posisi yang tepat adalah salah satu tahap paling penting yang mempengaruhi gigitan, estetika, dan fungsi.\n\n【Sikap Dasar】\n・Konfirmasi bentuk dari arah yang konsisten: Selalu konfirmasi dari arah yang sama (misalnya, dari pipi) untuk membuat ketidakseragaman lebih mudah ditemukan. Jika arah tampilan beragam saat mengkonfirmasi bentuk, distorsi dan ketidakselarasan mudah terlewatkan.\n・Sesuaikan ukuran mahkota dengan barisan gigi: Pertimbangkan harmoni dengan gigi yang berdekatan dan atur lebar mesio-distal, lebar bukko-lingual, dan tinggi mahkota dengan tepat.\n\n【Penentuan Posisi Bagian Molar】\n・Posisi bucco-lingual: Selaraskan posisi cuspid bucal dan cuspid lingual dengan lengkung barisan gigi.\n・Posisi mesio-distal: Tempatkan dengan mempertimbangkan jarak dengan gigi yang berdekatan (kontak wajah proksimal).\n・Kemiringan cuspid: Sesuaikan dengan kemiringan cuspid dari molar lain dalam barisan gigi. Penempatan mahkota dengan kemiringan cuspid lembut pada barisan gigi dengan kemiringan cuspid curam akan terlihat tidak harmonis.\n・Tinggi permukaan oklusal: Selaraskan tinggi ridge gingival dengan gigi yang berdekatan.\n\n【Penentuan Posisi Bagian Gigi Depan】\n・Posisi permukaan labial: Prioritaskan harmoni dengan bentuk bibir. Kemiringan labial yang berlebihan membuat bibir sulit ditutup.\n・Posisi tepi pemotong: Pertimbangkan harmoni dengan garis senyum. Tinggi dan bentuk tepi pemotong menentukan keindahan senyum.\n・Poros gigi (kemiringan gigi): Sesuaikan dengan poros gigi gigi yang berdekatan untuk menciptakan kemiringan alami. Pergeseran poros gigi terlihat tidak alami.\n・Garis servical: Jaga kontinuitas garis servical (batas antara gigi dan gingiva) dengan gigi yang berdekatan. Jika garis servical tidak berkelanjutan, ini menjadi masalah estetika.\n・Harmoni dengan Lengkung Gigi Berlawanan: Pertimbangkan hubungan antara lengkung barisan gigi atas dan bawah dan atur overbite (horizontal overlap) dan overjet (vertical overlap) dengan tepat.\n\n[KEY: Pilihan bentuk mahkota dan penentuan posisi sangat mempengaruhi estetika dan fungsionalitas prostetik akhir]\n[TIP: Memilih berdasarkan bentuk gigi yang berdekatan menghasilkan penyelesaian yang alami]\n[WARN: Perbedaan besar dalam sudut panjang gigi dapat menyebabkan penentuan posisi yang tidak tepat]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Perbedaan Ras dalam Bentuk Mahkota Library\nBentuk mahkota sangat berbeda berdasarkan ras. Karakteristik orang Asia termasuk bentuk sekop (shovel-shaped) pada insisivus sentral rahang atas, frekuensi rendah tonjolan Carabelli pada premolar, dan pola cusp molar. Memilih bentuk mahkota yang sesuai dengan karakteristik rasial pasien dalam pemilihan library menghasilkan protesa yang lebih alami.\n\n◆ Konsep Desain Biomimetik\nDesain biomimetik adalah pendekatan untuk mereproduksi struktur mikro gigi alami sebanyak mungkin. Mereproduksi detail seperti perikymata enamel, mamelon (bekas lobulus perkembangan insisivus), dan kurva alami garis serviks meningkatkan estetika. Manfaatkan fungsi sculpting dan pemberian tekstur perangkat lunak CAD.\n\n◆ Penyesuaian Presisi Positioning\nPositioning bentuk mahkota menyesuaikan 4 parameter: posisi bukolingual, posisi mesiodistal, kemiringan aksis mahkota, dan rotasi. Sudut kemiringan mahkota terhadap bidang oklusal (angulasi) dan kemiringan (torque) menghasilkan oklusi fungsional yang ideal jika diatur berdasarkan 6 kunci Andrews.\n\n◆ Integrasi dengan Digital Wax-Up\nMenjelaskan metode menggunakan digital wax-up (wax-up diagnostik) sebagai data referensi untuk desain CAD. Pertama desain bentuk mahkota ideal dengan digital wax-up, kemudian refleksikan sebagai template untuk bentuk protesa akhir. Terutama dalam kasus rehabilitasi full mouth, digital wax-up sangat penting sebagai panduan desain keseluruhan."

                    teaching: "■ 咬合（こうごう）の基本\n咬合とは上下の歯が接触する関係のことである。CADデザインにおいて咬合接触を適切に設定するために、基本的な概念を理解することが不可欠である。\n\n【オーバーバイト（垂直被蓋）】\n上顎前歯が下顎前歯を覆う垂直的な量をいう。正常値は約2〜3mm（上顎前歯の切縁が下顎前歯の切縁より2〜3mm上方にある状態）。\nオーバーバイトが0mmだと「切縁咬合」となり前歯の機能負担が増す。大きすぎると下顎前歯の舌側エナメル質摩耗が多くなる。\n\n【オーバージェット（水平被蓋）】\n上顎前歯が下顎前歯より前方に出る水平的な量。正常値は約2〜3mm。\nオーバージェットが大きいと切縁接触が弱まり前歯の咀嚼効率が低下する。小さすぎる（逆咬合）と顎関節問題や下顎前歯の唇側傷害のリスクがある。\n\n[TABLE]\n項目|正常値|差異時の影響\nオーバーバイト（垂直被蓋）|2〜3mm|大きい：舌側摩耗 / 小さい：前歯負担増大\nオーバージェット（水平被蓋）|2〜3mm|大きい：咀嚼効率低下 / 逆：顎関節問題\n[/TABLE]\n\n【咬合接触点】\n咬合接触は歯種によって異なる。\n・臼歯部：面での接触（咬頭頂が対合歯の窩や辺縁隆線に入る）。隣接隆線とウォッシャー効果により咀嚼力が発揮される。\n・前歯部：点または線での接触。前歯に大きな咬合力がかかるとクラックリスクが高まる。\n\n【咬合高径（バーティカルダイメンション）】\n上下顎間の垂直距離。咬合高径が適切でないと咀嚼および顎関節に影響する。\n・高すぎる場合：筋肉の緊張・頭痛・顎関節痛の原因になる可能性がある。\n・低すぎる場合：恐性開口状態・筋肉萎縮・顔面が平坦に見える・音声障害などが起きる可能性がある。\n\n【隣接面コンタクト】\n隣接面コンタクトは歯と歯が隣接する部位である。コンタクトがなければ食渣（食べ物のかす）が詰まり、歯肉炎症・歯周疾患のリスクが高まる。コンタクトが強すぎると装着時にぴったり接触がなくなる（高駄きの原因）。\n\n【CADでの設定】\nコンタクトの強さは補綴物の種類によって調整する。\nクラウン：軽接触（コンタクト弱め）→切値目安は-0.050〜-0.080mm\nブリッジ：通常接触（コンタクト標準）→切値目安は-0.060〜-0.100mm\n最後臼歯遠心面：コンタクト不要（隣在歯なし）\n動揺歯が隣在歯の場合：コンタクト強め（歯を支える効果）\n\n【マージンラインとの関係】\n咬合力が適切でないとマージン破折リスクが上がる。特に咬合過強の場合、マージン部に応力が集中してクラックが入りやすくなる。適切な咬合設定は補綴物の長期耐久性に直結する。\n\n[KEY: オーバーバイトとオーバージェットの正常値（2〜3mm）は必ず覚える]\n[TIP: CADでは切端表示（接触色分布）を常に確認しながら調整することが重要]\n[WARN: 咬合接触が高すぎる場合、装着後に高駄きとなり返却の原因になる]\n\n[TABLE]\n項目|確認内容|調整範囲\n歯の連続性|隣在歯との形態一致|0-0.5mm\n咬合接触|対合歯との干渉確認|0-50μm\nコンタクト|隣接面の接触|適切な圧力範囲\n[/TABLE]\n【Part4⑥⑦⑧ 歯の連続性・咬合接触・隣接面コンタクト】\n\n■ 歯の連続性\n自然な歯列は隣り合う歯が調和のとれた連続性を持っている。補綴物も歯列の中で自然に調和する形態であることが重要。\n\n【チェックすべき連続性の要素】\n・歯列弓の連続性：頬側から見た歯列のアーチが滑らかにつながっているか。\n・辺縁隆線の高さ：隣在歯の辺縁隆線と同じ高さになっているか。高低差があると食片圧入の原因になる。\n・外形線（輪郭線）の連続性：頬側の外形線が隣在歯と連続しているか。突出や陥凹がないか。\n・頬側咬頭頂の連続性：臼歯部で頬側咬頭の頂点を結んだラインが連続しているか。\n・舌側咬頭頂の連続性：同様に舌側咬頭の頂点の連続性を確認。\n・歯頚部の豊隆の連続性：歯頚部1/3の膨らみが隣在歯と調和しているか。\n\n■ 咬合接触の設定\n咬合接触は上下の歯が接触する点・面のことで、補綴物の機能的品質を決定する最も重要な要素の一つ。\n\n【基本原則】\n・咬頭対窩（cusp-to-fossa）：咬頭の先端が対合歯の窩（くぼみ）に入る接触形態。安定した咬合を得られる。\n・咬頭対辺縁隆線（cusp-to-ridge）：咬頭が対合歯の辺縁隆線上に接触する形態。\n・点接触：接触面積は小さく（点で接触）、咬合力が集中しすぎないようにする。広すぎる面接触は側方力の原因になる。\n・被覆（coverage）：咬合接触が歯冠の適切な範囲に分散しているか確認する。\n\n【CADでの設定手順】\n①基準値の設定：干渉量（交差量）の基準値を数値で設定する（例：-0.020mm＝20μmの干渉）。\n②自動設定：CADソフトが基準値に基づいて咬合面形態を自動調整する。\n③断面図での確認：前後左右の断面図を表示し、接触点の位置と強さを確認する。\n④手動微調整：ワックスナイフツール等を使い、必要に応じて接触点を追加・削除・調整する。\n⑤運動チェック：バーチャル咬合器で側方運動・前方運動をシミュレートし、運動時の干渉がないか確認する。\n\n【ケースごとの調整】\n交差量（干渉量）をケースごとに測り、基準値と照らし合わせる。歯科医院からのフィードバック（咬合が高い/低い等）を記録し、次回以降に基準値を調整していく。\n\n■ 隣接面コンタクトの設定\n隣接面コンタクトは隣り合う歯の接触部分で、歯列の安定と食片圧入の防止に重要。\n\n【基本原則】\n・面接触：点ではなく、ある程度の面積で接触する。点接触では食片圧入を防げない。\n・最大豊隆部の位置：コンタクトは歯冠の最大豊隆部付近に設定する。\n・上部鼓形空隙と下部鼓形空隙：コンタクト上方の歯間空隙（パピラが入るスペース）と下方の歯間空隙。適切なサイズでないと歯間ブラシが通らない、またはプラークが溜まりやすくなる。\n\n【CADでの設定手順】\n①基準値の設定：接触量の基準値を設定する。\n②自動設定：CADソフトが基準値に基づいてコンタクトを自動設定。\n③断面図での確認：近遠心の断面図を表示し、コンタクトの位置・面積・強さを確認する。\n④手動微調整：隣在歯の状態に合わせて調整する。動揺歯が隣在歯の場合は強めのコンタクト（歯を支える効果）、最後臼歯の遠心面はコンタクトが不要。\n\n【歯科医院ごとの基準値】\n歯科医院（歯科医師）ごとにコンタクトの好みの強さが異なる。最初は標準値で製作し、フィードバックを受けて基準値を調整していく。「〇〇先生はコンタクト強め」「△△先生はコンタクト標準」など、歯科医院別の基準値管理が重要。\n\n[KEY: 3つの要素（連続性、咬合、隣接面）の調和が天然歯に見える補綴物の鍵]\n[TIP: スライダーを少しずつ調整し、プレビューで確認することで効率的に調整できる]\n[WARN: 咬合接触が強すぎるとCAM加工時に削り取られず、装着後に外れる]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ 咬合理論とデジタル設計\n咬合設計には複数の理論的フレームワークがある。相互保護咬合（Mutually Protected Occlusion）では、中心咬合位で臼歯が均等に接触し、偏心運動時は前歯がガイドする。グループファンクションでは、側方運動時に作業側の複数歯が同時に接触する。CADソフトの咬合シミュレーション機能を使い、これらの咬合様式に応じた接触パターンを設計する。バーチャル咬合器のパラメータ設定が結果に大きく影響する。\n\n◆ 隣接面コンタクトの力学\n隣接面コンタクトは、食物圧入の防止と歯列の安定維持に重要な役割を果たす。コンタクトの位置は歯冠の頬舌幅の頬側1/3、咬合面から約1mmの位置が標準的。コンタクトの強さ（食い込み量）は、デンタルフロスが軽い抵抗感を伴って通過する程度（50-100μm）が適切。CADソフトでは数値的にコンタクト量を設定でき、0.05-0.10mmの範囲で調整する。\n\n◆ MOD修復物の設計特有の注意点\nMOD（近心-咬合面-遠心）インレーは、歯冠の3面に及ぶ広範囲の修復物である。設計上の注意点として、残存歯質の壁厚が薄い場合（1.5mm以下）はクラウンへの変更を検討する。イスムス幅（頬舌的な橋渡し部分の幅）は機能咬頭の幅の1/3以下に抑え、応力集中を回避する。特に二ケイ酸リチウム（e.max）やジルコニアなどのセラミック材料では、角部にRを付けて応力集中を緩和する設計が重要である。\n\n◆ FEA（有限要素解析）の基礎\n最先端のCADデザインでは、FEA（Finite Element Analysis）を用いて補綴物の応力分布をシミュレーションすることが可能になっている。咬合荷重（100-800N）をかけた際の応力分布を可視化し、破折リスクの高い部位を事前に特定する。この技術はまだ研究段階だが、将来的にはCADソフトに統合される可能性がある。",
                    teachingId: "[TABLE]\nItem|Isi Verifikasi|Jangkauan Penyesuaian\nKontinuitas Gigi|Pencocokan bentuk dengan gigi berdekatan|0-0.5mm\nKontak Oklusal|Verifikasi Gangguan dengan Gigi Antagonis|0-50μm\nKontak|Kontak Permukaan Proksimal|Rentang Tekanan yang Tepat\n[/TABLE]\n【Part4⑥⑦⑧ Kontinuitas Gigi, Kontak Gigitan, dan Kontak Wajah Proksimal】\n\n■ Kontinuitas Barisan Gigi\nBarisan gigi alami memiliki kontinuitas harmonis antara gigi-gigi yang berdekatan. Protesa harus memiliki bentuk yang selaras secara alami dalam barisan gigi.\n\n【Elemen Kontinuitas yang Harus Diperiksa】\n・Kontinuitas lengkung barisan gigi: Apakah lengkung barisan gigi terlihat dari sisi pipi menghubung dengan mulus?\n・Tinggi ridge gingival: Apakah ridge gingival sama tinggi dengan gigi yang berdekatan? Perbedaan tinggi menjadi penyebab impaksi fragmen makanan.\n・Kontinuitas garis luar (garis kontur): Apakah garis luar pipi berkelanjutan dengan gigi yang berdekatan? Apakah ada tonjolan atau lekukan?\n・Kontinuitas puncak cuspid pipi: Dalam bagian molar, apakah garis yang menghubungkan puncak cuspid pipi berkelanjutan?\n・Kontinuitas puncak cuspid lingual: Demikian pula, periksa kontinuitas puncak cuspid lingual.\n・Kontinuitas daya tarik daerah servical: Apakah pembengkakan 1/3 servical selaras dengan gigi yang berdekatan?\n\n■ Pengaturan Kontak Gigitan\nKontak gigitan adalah titik dan permukaan kontak antara gigi atas dan bawah, dan merupakan salah satu elemen paling penting yang menentukan kualitas fungsional protesa.\n\n【Prinsip Dasar】\n・Cuspid ke Fossa (cusp-to-fossa): Puncak cuspid memasuki cekungan (fossa) gigi berlawanan. Menghasilkan gigitan yang stabil.\n・Cuspid ke Ridge Gingival (cusp-to-ridge): Cuspid berkontak di atas ridge gingival gigi berlawanan.\n・Kontak Titik: Luas kontak kecil (kontak pada titik), jangan biarkan gaya gigitan terlalu terkonsentrasi. Kontak permukaan yang terlalu luas menjadi penyebab gaya lateral.\n・Cakupan (coverage): Verifikasi bahwa kontak gigitan tersebar di seluruh rentang mahkota yang sesuai.\n\n【Prosedur Pengaturan di CAD】\n①Pengaturan nilai dasar: Atur nilai dasar jumlah gangguan (jumlah persimpangan) (misalnya: -0,020mm = 20μm gangguan).\n②Pengaturan otomatis: Perangkat lunak CAD secara otomatis menyesuaikan bentuk permukaan oklusal berdasarkan nilai dasar.\n③Verifikasi gambar penampang: Tampilkan gambar penampang depan-belakang dan kiri-kanan, dan verifikasi posisi dan kekuatan titik kontak.\n④Penyesuaian manual mikro: Gunakan alat seperti pisau lilin, dll., dan sesuaikan titik kontak jika diperlukan.\n⑤Pemeriksaan Gerakan: Simulasikan gerakan lateral dan gerakan depan dengan simulator gigitan virtual dan verifikasi bahwa tidak ada gangguan selama gerakan.\n\n【Penyesuaian Untuk Setiap Kasus】\nUkur jumlah gangguan (jumlah persimpangan) untuk setiap kasus, dan bandingkan dengan nilai dasar. Catat umpan balik dari kantor gigi (gigitan tinggi/rendah, dll.), dan sesuaikan nilai dasar di masa depan.\n\n■ Pengaturan Kontak Wajah Proksimal\nKontak wajah proksimal adalah bagian kontak antara gigi-gigi yang berdekatan, penting untuk stabilitas barisan gigi dan pencegahan impaksi fragmen makanan.\n\n【Prinsip Dasar】\n・Kontak Permukaan: Bukan kontak titik, tetapi kontak dengan area tertentu. Kontak titik tidak dapat mencegah impaksi fragmen makanan.\n・Posisi Bagian Pembengkakan Maksimum: Atur kontak dekat bagian pembengkakan maksimum mahkota.\n・Ruang Fissure Atas dan Bawah: Ruang interdental di atas kontak (tempat papila masuk) dan ruang di bawah. Jika ukurannya tidak sesuai, sikat gigi interdental tidak akan melalui, atau plak mudah menumpuk.\n\n【Prosedur Pengaturan di CAD】\n①Pengaturan nilai dasar: Atur nilai dasar jumlah kontak.\n②Pengaturan otomatis: Perangkat lunak CAD secara otomatis mengatur kontak berdasarkan nilai dasar.\n③Verifikasi gambar penampang: Tampilkan gambar penampang mesio-distal dan verifikasi posisi, luas, dan kekuatan kontak.\n④Penyesuaian manual mikro: Sesuaikan sesuai kondisi gigi yang berdekatan. Jika gigi yang berdekatan bergerak, atur kontak lebih kuat (efek dukungan gigi), dan kontak tidak diperlukan pada permukaan distal molar terakhir.\n\n【Nilai Dasar Untuk Setiap Kantor Gigi】\nKekuatan kontak yang disukai berbeda-beda untuk setiap kantor gigi (dokter gigi). Awalnya, diproduksi dengan nilai standar, dan nilai dasar disesuaikan berdasarkan umpan balik. Manajemen nilai dasar per kantor gigi penting, seperti \"Dr. OO lebih suka kontak kuat\" \"Dr. XX lebih suka kontak standar\".\n\n[KEY: Keselarasan tiga elemen (kontinuitas, oklusi, proksimal) adalah kunci prostetik yang terlihat seperti gigi alami]\n[TIP: Penyesuaian bertahap dengan slider dan verifikasi preview meningkatkan efisiensi penyesuaian]\n[WARN: Kontak oklusal yang terlalu kuat tidak akan terpotong selama pemrosesan CAM dan akan terlepas setelah pemasangan]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Teori Oklusi dan Desain Digital\nDesain oklusi memiliki beberapa kerangka teoretis. Pada Mutually Protected Occlusion, gigi posterior berkontak merata pada posisi oklusi sentral, dan gigi anterior menjadi panduan saat gerakan eksentrik. Pada Group Function, beberapa gigi sisi kerja berkontak bersamaan selama gerakan lateral. Gunakan fungsi simulasi oklusi perangkat lunak CAD untuk merancang pola kontak sesuai gaya oklusi ini.\n\n◆ Mekanika Kontak Proksimal\nKontak proksimal memainkan peran penting dalam mencegah impaksi makanan dan menjaga stabilitas lengkung gigi. Posisi kontak standar adalah 1/3 bukal dari lebar bukolingual mahkota, sekitar 1mm dari permukaan oklusal. Kekuatan kontak yang tepat adalah ketika benang gigi melewati dengan resistensi ringan (50-100μm). Dalam perangkat lunak CAD, jumlah kontak dapat diatur secara numeris dalam kisaran 0,05-0,10mm.\n\n◆ Perhatian Khusus Desain Restorasi MOD\nInlay MOD (mesial-oklusal-distal) adalah restorasi yang mencakup 3 permukaan mahkota. Poin perhatian desain: jika ketebalan dinding gigi yang tersisa tipis (kurang dari 1,5mm), pertimbangkan perubahan ke mahkota. Lebar isthmus (lebar bagian jembatan bukolingual) dijaga di bawah 1/3 lebar cusp fungsional untuk menghindari konsentrasi tegangan.\n\n◆ Dasar FEA (Analisis Elemen Hingga)\nDalam desain CAD tercanggih, simulasi distribusi tegangan protesa menggunakan FEA (Finite Element Analysis) telah dimungkinkan. Memvisualisasikan distribusi tegangan saat beban oklusal (100-800N) diterapkan untuk mengidentifikasi area dengan risiko fraktur tinggi sebelumnya. Teknologi ini masih dalam tahap penelitian namun berpotensi diintegrasikan ke perangkat lunak CAD di masa depan.",
