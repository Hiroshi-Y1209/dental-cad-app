                    evaluationCriteria: "組織調和、審美性、エマージェンスプロファイル、前歯デザイン。",
                    teaching: "[TABLE]\nエリア|確認項目|調整方法\n歯肉|マージンの位置と形態|エッジポジション\n口蓋|口蓋側厚さ|コンタリング調整\nラビアル|唇側曲率|プロファイル選択\n[/TABLE]\n【Part4⑨⑩ 周囲組織との調和と前歯デザイン】\n\n■ 周囲組織との調和\n補綴物は歯だけでなく、周囲の歯肉組織との調和も重要。清掃性（プラークコントロール）を考慮したデザインが歯周組織の健康維持に不可欠。\n\n【鼓形空隙の設計】\n鼓形空隙とは隣り合う歯の間にできる空間で、上部鼓形空隙（歯間乳頭が入るスペース）と下部鼓形空隙（歯頚部側のスペース）がある。\n・上部鼓形空隙：適切な大きさでないと歯間乳頭（歯肉のV字型の突出部）が入りきらず、ブラックトライアングル（黒い三角形の隙間）が生じる。左右対称的なサイズに設計する。\n・下部鼓形空隙：歯間ブラシが通る程度の適切な空間を確保する。狭すぎるとプラークが停滞し、広すぎると食片圧入の原因になる。\n\n【マージンからの立ち上がり（エマージェンスプロファイル）】\nマージン（形成限界）から歯冠の最大豊隆部までの立ち上がりの形態をエマージェンスプロファイルという。自然歯のように滑らかに立ち上がる形態が理想。急激な立ち上がりは歯肉を圧迫し、炎症の原因になる。\n\n【歯頚部1/3の形態】\n歯頚部1/3（歯の根元に近い部分）は丸い形態にする。角張った形態はプラークが付着しやすく、歯肉を刺激する。丸みのある形態は清掃性が高く、歯肉との調和が良い。\n\n【根分岐部の形態】\n大臼歯の根分岐部（根が分かれる部分）付近はスムーズな形態にする。凹凸があるとプラークの停滞部位になる。\n\n【最後臼歯遠心面】\n最後臼歯の遠心面（一番奥の面）は清掃しにくい部位。適切な傾斜をつけることで清掃性を向上させる。\n\n【ポンティック基底面（ブリッジの場合）】\nポンティック（欠損部を補う人工歯）の基底面は歯肉と接触する面。過度な圧迫は潰瘍の原因になり、離れすぎると食片が停滞する。軽い接触（リッジラップ型、オベイド型等）で清掃可能な形態にする。\n\n■ 前歯のデザイン\n前歯は審美性が最も重要な部位。機能（咬合・発音）と審美性の両立が求められる。\n\n【前歯のサイズバランス】\n・長さ：隣在歯との調和、スマイルラインとの関係。上顎中切歯が最も長く、側切歯は少し短く、犬歯は中切歯とほぼ同じか少し短い。\n・幅：中切歯の幅対長さの比率は約75-80%が理想的。\n・出具合：唇面の豊隆が適切であること。突出しすぎると口唇が閉じにくい。\n\n【外形線とラインアングル】\n・外形線（輪郭線）：頬側から見た歯の輪郭。丸みのある自然な輪郭が理想。\n・ラインアングル：歯の面と面が交わる稜線。ラインアングルの位置で歯の印象（幅広く見える、細く見える等）が変わる。ラインアングルを外側に設定すると歯が大きく見え、内側に設定すると小さく見える。\n\n【トランジショナルエリア】\n歯の唇面から隣接面に移行する部分。この部分の形態（豊隆の程度、移行の滑らかさ）が審美性に大きく影響する。\n\n【犬歯の特徴】\n犬歯は他の前歯と異なる特徴を持つ：唇面の豊隆が大きい、切縁が尖っている、歯根が長く歯冠も比較的長い。犬歯をデザインする際はこれらの特徴を考慮する。\n\n【正中線（ミッドライン）】\n上顎中切歯間の正中線が顔面の正中線と一致していることが理想。左右の歯の対称性を確認する重要な基準線。\n\n[KEY: 周囲組織との調和が前歯補綴物の審美成功の最重要因]\n[TIP: リアルタイムプレビューを活用して歯肉の見え方を確認しながら設計する]\n[WARN: マージンが歯肉に埋まりすぎるとブルーシャドウが出現する]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ 前歯部審美の科学\n前歯の審美設計には、Golden Proportion（黄金比1:1.618）やRecurring Esthetic Dental Ratio（RED比）の概念が使われる。正面観で見た場合、中切歯:側切歯:犬歯の幅の比率は62%:62%程度（RED比）が自然に見える。また、スマイルラインとの関係も重要で、上顎前歯の切端ラインが下唇のカーブに沿う「コンソナントスマイル」が理想的とされる。\n\n◆ 歯肉との調和（エマージェンスプロファイル）\n補綴物が歯肉から立ち上がる部分のプロファイル（エマージェンスプロファイル）は、審美性と歯周健康に直接影響する。天然歯のエマージェンスプロファイルは歯肉縁下でほぼ垂直に立ち上がり、歯肉縁上で外方に膨らむ。クラウンの設計では、このプロファイルを再現するように歯頸部の輪郭を調整する。過度に膨らんだプロファイルは歯肉の炎症を引き起こし、凹みすぎると食物の停滞を招く。\n\n◆ 色調設計とレイヤリング\nデジタル設計において色調を考慮する場面が増えている。多層ジルコニアディスク（マルチレイヤー）では、CAMソフトでの補綴物の配置位置によって色調が変わる。象牙質層（デンティン色）の上にエナメル層が重なるように配置することで、自然なグラデーションが得られる。カットバックデザインでは、表面のポーセレン層の厚さを確保するために0.5-1.0mmの削除が必要である。\n\n◆ デジタルスマイルデザイン（DSD）\nDigital Smile Design（DSD）は、患者の顔貌写真・動画をベースに理想的なスマイルラインをデジタルで設計する手法である。顔の正中線、瞳孔間線、スマイルラインを基準に歯の位置・大きさ・形態を決定する。DSDで作成したデザインをCADソフトに転送し、補綴物の設計に反映させることで、患者の期待に合った審美修復が実現できる。",
                    teachingId: "[TABLE]\nArea|Item Verifikasi|Metode Penyesuaian\nGinggiva|Posisi dan Bentuk Margin|Posisi Tepi\nPalatum|Ketebalan sisi palatal|Penyesuaian Kontur\nLabial|Kelengkungan labial|Pilihan Profil\n[/TABLE]\n【Part4⑨⑩ Harmoni Jaringan Sekitar dan Desain Gigi Depan】\n\n■ Harmoni dengan Jaringan Sekitar\nProtesa harus selaras tidak hanya dengan gigi tetapi juga dengan jaringan gingiva sekitarnya. Desain dengan mempertimbangkan kemampuan pembersihan (kontrol plak) sangat penting untuk mempertahankan kesehatan jaringan periodontal.\n\n【Rancangan Ruang Fissure】\nRuang fissure adalah ruang yang terbentuk antara gigi-gigi yang berdekatan, dengan ruang fissure atas (tempat papila gingiva masuk) dan ruang fissure bawah (ruang di sisi servical).\n・Ruang fissure atas: Jika ukurannya tidak sesuai, papila gingiva (bagian menonjol berbentuk V dari gingiva) tidak pas, mengakibatkan segitiga hitam (celah berbentuk segitiga hitam). Rancang ukuran yang simetris kiri-kanan.\n・Ruang fissure bawah: Pastikan ada ruang yang cukup untuk sikat gigi interdental. Jika terlalu sempit, plak akan menumpuk; jika terlalu lebar, menjadi penyebab impaksi fragmen makanan.\n\n【Profil Kemunculan (Emergence Profile)\nBentuk penonjolan dari garis margin (batas pembentukan) ke bagian pembengkakan maksimum mahkota disebut profil kemunculan. Bentuk yang halus seperti gigi alami adalah ideal. Penonjolan tajam memberikan tekanan pada gingiva dan menjadi penyebab inflamasi.\n\n【Bentuk 1/3 Servical】\nBagian 1/3 servical (bagian dekat akar gigi) harus memiliki bentuk bulat. Bentuk bersudut menjadi mudah menempel plak dan mengiritasi gingiva. Bentuk yang bulat memiliki kemampuan pembersihan yang tinggi dan harmoni yang baik dengan gingiva.\n\n【Bentuk Area Percabangan Akar】\nDi dekat area percabangan akar (tempat akar memisah) dari molar besar, bentuk menjadi halus. Jika ada lekukan, ini menjadi lokasi penumpukan plak.\n\n【Permukaan Distal Molar Terakhir】\nPermukaan distal molar terakhir (bagian paling belakang) sulit dibersihkan. Memberikan kemiringan yang sesuai meningkatkan kemampuan pembersihan.\n\n【Permukaan Dasar Pontik (Untuk Jembatan)】\nPermukaan dasar pontik (gigi buatan yang melengkapi area yang hilang) adalah permukaan yang berkontak dengan gingiva. Tekanan yang berlebihan menjadi penyebab ulserasi, dan jarak yang terlalu jauh menyebabkan penumpukan makanan. Bentuk dengan kontak ringan (tipe ridge wrap, tipe ovoid, dll.) untuk memungkinkan pembersihan.\n\n■ Desain Gigi Depan\nGigi depan adalah area di mana estetika paling penting. Membutuhkan keseimbangan antara fungsi (gigitan, pengucapan) dan estetika.\n\n【Keseimbangan Ukuran Gigi Depan】\n・Panjang: Harmoni dengan gigi yang berdekatan, hubungan dengan garis senyum. Gigi seri tengah atas paling panjang, gigi seri samping sedikit lebih pendek, dan gigi taring sama panjang atau sedikit lebih pendek dari gigi seri tengah.\n・Lebar: Rasio lebar-panjang gigi seri tengah ideal sekitar 75-80%.\n・Derajat Tonjolan: Pembengkakan permukaan labial harus sesuai. Tonjolan yang berlebihan membuat bibir sulit ditutup.\n\n【Garis Luar dan Line Angle】\n・Garis Luar (garis kontur): Kontur gigi yang terlihat dari sisi pipi. Kontur alami yang bulat adalah ideal.\n・Line Angle: Ridge di mana permukaan gigi bertemu. Posisi line angle mengubah kesan gigi (terlihat lebar, terlihat sempit, dll.). Mengatur line angle ke arah luar membuat gigi terlihat besar, ke dalam membuat terlihat kecil.\n\n【Area Transisi】\nBagian transisi dari permukaan labial ke permukaan proksimal. Bentuk bagian ini (derajat pembengkakan, kelancaran transisi) sangat mempengaruhi estetika.\n\n【Karakteristik Gigi Taring】\nGigi taring memiliki karakteristik berbeda dari gigi depan lainnya: pembengkakan permukaan labial besar, tepi pemotong runcing, akar panjang, dan mahkota relatif panjang. Saat merancang gigi taring, pertimbangkan karakteristik ini.\n\n【Garis Midline (Garis Tengah)】\nGaris midline antara gigi seri tengah atas ideal adalah sejajar dengan garis midline wajah. Poin penting untuk memverifikasi simetri gigi kiri-kanan.\n\n[KEY: Keselarasan dengan jaringan sekitarnya adalah faktor terpenting kesuksesan estetika gigi depan]\n[TIP: Menggunakan pratinjau real-time untuk memverifikasi tampilan ginggiva saat merancang]\n[WARN: Margin yang tertanam terlalu dalam di gingiva menyebabkan bayangan biru]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Ilmu Estetika Gigi Anterior\nDesain estetik gigi anterior menggunakan konsep Golden Proportion (rasio emas 1:1,618) dan Recurring Esthetic Dental Ratio (rasio RED). Dilihat dari depan, rasio lebar insisivus sentral:lateral:kaninus sekitar 62%:62% (rasio RED) terlihat alami. Hubungan dengan smile line juga penting - \"consonant smile\" di mana tepi insisal gigi anterior rahang atas mengikuti kurva bibir bawah dianggap ideal.\n\n◆ Harmoni dengan Gingiva (Emergence Profile)\nProfil bagian protesa yang muncul dari gingiva (emergence profile) langsung mempengaruhi estetika dan kesehatan periodontal. Emergence profile gigi alami hampir vertikal hingga 1mm di bawah tepi gingiva, kemudian melengkung ke luar di atasnya. Dalam desain mahkota, kontur servikal disesuaikan untuk mereproduksi profil ini. Profil yang terlalu cembung menyebabkan inflamasi gingiva, terlalu cekung menyebabkan stagnasi makanan.\n\n◆ Desain Warna dan Layering\nSituasi mempertimbangkan warna dalam desain digital semakin meningkat. Pada disk zirkonia multi-layer, warna berubah tergantung posisi penempatan protesa di perangkat lunak CAM. Menempatkan lapisan enamel di atas lapisan dentin menghasilkan gradasi alami. Dalam desain cutback, pengurangan 0,5-1,0mm diperlukan untuk memastikan ketebalan lapisan porselen permukaan.\n\n◆ Digital Smile Design (DSD)\nDigital Smile Design (DSD) adalah metode merancang smile line ideal secara digital berdasarkan foto dan video wajah pasien. Posisi, ukuran, dan bentuk gigi ditentukan berdasarkan garis tengah wajah, garis interpupila, dan smile line. Desain DSD ditransfer ke perangkat lunak CAD dan direfleksikan dalam desain protesa untuk mewujudkan restorasi estetik sesuai harapan pasien."

                    id: "4-1",
                    title: "カットバック・連結・モデルビルダー",
                    whatYouLearn: "カットバックテクニック、連結デザイン、モデルビルダーの使い方を学びます。",
                    learningObjectives: "カットバックとレイヤリングの概念を理解し、連結やモデルビルダーを使いこなせるようにします。",
                    goodExample: "カットバック量が適切で、連結部が強固、モデルビルダーを正しく使える。",
                    badExample: "カットバックが過剰/不足、連結部が弱い。",
                    evaluationCriteria: "カットバック量、連結強度、モデルビルダー操作。",
                    teaching: "[TABLE]\n機能|説明|用途\nカットバック|咬合面の形態削除|金属色隠蔽\n連結|複数歯の一体化|ブリッジ構造強化\nモデルビルダー|複雑な形態自動生成|効率化\n[/TABLE]\n【Part4⑪⑫⑬ カットバック・連結・モデルビルダー】\n\n■ カットバック（Cutback）\nカットバックとは、築盛（ポーセレンの積層焼成）やプレス（加圧鋳造）のために、フルコンターの歯冠形態から一部を削り取ってフレーム形態にするデザイン手法。\n\n【前歯のカットバック】\n審美性が求められる前歯部では、唇面を中心にカットバックを行い、ポーセレンの築盛スペースを確保する。カットバックの量は築盛する材料の厚みを考慮して決定する。カットバック量が多すぎるとフレームの強度が不足し、少なすぎると築盛材の厚みが確保できず審美性や色調再現が困難になる。\n\n【臼歯のカットバック】\n臼歯部では咬合面を中心にカットバックを行う。咬頭部分にポーセレンの厚みを確保し、咬合接触時の破折を防ぐ。機能咬頭（上顎の口蓋側咬頭、下顎の頬側咬頭）の部分は特に十分な厚みが必要。\n\n【CAD操作】\nワックスナイフツールを使用して適量をカットする。モーフィング（形態の滑らかな変形）がスムーズに移行するように、カットバック面の境界が滑らかであることを確認する。ジルコニアフレームの場合は陶材焼き付け面の表面積を確保する設計にする。\n\n【セラミック破折リスク】\nカットバック設計で最も注意すべきはセラミック破折のリスク。フレームとセラミック層の界面に応力が集中しないよう、均一な厚みを確保し、鋭角な形態を避ける。\n\n■ 連結（Connection / Connector Design）\nブリッジの支台歯とポンティックをつなぐ部分が連結部（コネクター）。連結部の設計は強度と審美性のバランスが重要。\n\n【コネクターの断面形態】\n・前歯部：垂直楕円形の断面。高さを確保して強度を得る。幅は審美性を考慮して最小限に抑える。\n・臼歯部：水平楕円形の断面。幅を確保して強度を得る。高さは咬合クリアランスに制限される。\n\n【コネクターの設計原則】\n・対称的な配置：連結部はポンティックと支台歯の間で対称的に配置する。非対称だと応力集中が起こる。\n・断面積の確保：材料ごとに必要な最小断面積がある（例：ジルコニアは約9mm²以上）。断面積不足は破折の直接原因になる。\n・歯の独立性：連結されていても個々の歯が独立して見えるよう、コネクターの位置と形態を工夫する。\n\n【ポンティックの基底面】\nポンティックの下部（粘膜に接する面）の形態設計。軽い圧接で清掃可能な形態にする。\n\n【3歯以上のブリッジ】\n3歯以上のブリッジでは全体のたわみと応力分布を考慮する。長いスパンのブリッジは中間部に大きなたわみが生じるため、コネクターの断面積を十分に確保する。6歯以上の長大ブリッジではスタビライザー（4ユニット以上のジルコニアブリッジの場合の安定装置）の使用を検討する。\n\n■ モデルビルダー（Model Builder）\nCADソフトのモデルビルダー機能は、デジタルデータから作業用模型を設計し、3Dプリントするための機能。\n\n【モデルビルダーの用途】\n・アーチモデル（歯列弓模型）の作成：IOS症例で石膏模型がない場合に、デジタルデータから模型を3Dプリントする。\n・支台歯ダイの作成：支台歯部分を分離可能なダイ（独立した支台歯模型）として設計する。\n・アタッチメントの設計：デンチャー用のアタッチメント部分を模型に付加する。\n\n【操作手順】\n①スキャンデータの読込→②模型の外形設定→③ダイの分割線設定→④ダイの脱着機構（維持孔など）設定→⑤基底面の設計→⑥STL出力→⑦3Dプリント\n\n【トリミング・分割】\n模型の不要な部分をトリミング（切除）し、必要に応じてダイを分割する。分割模型では各ダイが独立して脱着できるよう、嵌合機構を設計する。\n\n[KEY: カットバック、連結、モデルビルダーの3つの高度な技術が大臼歯補綴物とブリッジ設計の鍵]\n[TIP: テンプレートライブラリの連結プリセットを活用すると設計時間が大幅短縮]\n[WARN: カットバック設定を誤るとセラミックが剥離する原因になる]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ カットバックの材料学的根拠\nカットバック（形態削除）は、金属やジルコニアのコーピング上にポーセレンやレジンを築盛するための空間を確保する技法である。カットバック量は築盛材料の厚さに依存し、ポーセレン層は最低0.5mm、推奨0.8-1.0mmの厚さが必要。薄すぎると色の透過で暗くなり、厚すぎると強度が低下する。機能咬頭はフルコンター（一層構造）のまま残し、咬合面の非機能部分と頬側面をカットバックする設計が安全である。\n\n◆ 連結設計の力学\n複数歯を連結するブリッジの設計では、連結部（コネクター）の断面積が強度を決定する。最小断面積の目安は、ジルコニアで9mm²（3mm×3mm）、メタルで6mm²（2mm×3mm）である。コネクターの形状は涙滴型が応力集中を最小化する。3ユニット以上のロングスパンブリッジではたわみ量の計算も重要で、材料のヤング率と断面二次モーメントから算出できる。\n\n◆ モデルビルダーの活用\nモデルビルダーは、CADデータから加工用模型やチェック用模型を自動生成する機能である。デジタル上で設計した補綴物を実際の模型で確認することで、デジタルとアナログの品質管理を橋渡しする。3Dプリントした模型上での適合確認は、特に複雑なインプラントケースで重要性が高い。プリント模型の寸法精度は±50μm程度で、精密な適合確認には十分な精度がある。\n\n◆ タイムトライアルの意義と改善法\nCADデザインの効率性を高めるために、タイムトライアル（時間計測付き練習）は非常に効果的である。単冠クラウンは目標20-30分、インレーは15-25分、3ユニットブリッジは40-60分が一般的な目標時間。作業時間を記録し、どのステップに時間がかかっているかを分析することで、具体的な改善ポイントが見える。ショートカットキーの活用、テンプレートの利用、効率的なワークフロー（手順の最適化）が時間短縮の3つの柱である。",
                    teachingId: "[TABLE]\nFungsi|Penjelasan|Kegunaan\nPemotong Balik|Penghapusan Bentuk Permukaan Oklusal|Penyembunyian Warna Logam\nKoneksi|Integrasi Beberapa Gigi|Penguatan Struktur Jembatan\nPembangun Model|Pembuatan Bentuk Otomatis Kompleks|Peningkatan Efisiensi\n[/TABLE]\n【Part4⑪⑫⑬ Cutback, Penyambungan, dan Model Builder】\n\n■ Cutback\nCutback adalah teknik desain untuk menghilangkan sebagian dari bentuk mahkota lengkap dan membuat bentuk kerangka kerja untuk keperluan penumpukan (pemasakan lapis porselen) atau penekan (peleburan tekanan).\n\n【Cutback Gigi Depan】\nUntuk gigi depan yang membutuhkan estetika, cutback dilakukan terutama pada permukaan labial untuk menjamin ruang penumpukan porselen. Jumlah cutback ditentukan dengan mempertimbangkan ketebalan material yang akan diumpuk. Jika jumlah cutback terlalu besar, kekuatan kerangka kerja tidak mencukupi; jika terlalu kecil, ketebalan material penumpukan tidak dapat dijamin, sehingga reproduksi estetika dan warna menjadi sulit.\n\n【Cutback Gigi Molar】\nUntuk bagian molar, cutback dilakukan terutama pada permukaan oklusal. Pastikan ketebalan porselen di bagian cuspid dan cegah fraktur saat kontak gigitan. Bagian cuspid fungsi (cuspid palatal pada maxilla, cuspid pipi pada mandibula) memerlukan ketebalan yang cukup.\n\n【Operasi CAD】\nGunakan alat pisau lilin untuk memotong jumlah yang sesuai. Verifikasi bahwa morfing (transformasi bentuk yang halus) melewati dengan lancar dan batas permukaan cutback halus.\n\n【Risiko Fraktur Seramik】\nHal yang paling perlu diperhatikan dalam desain cutback adalah risiko fraktur seramik. Untuk menghindari konsentrasi stres di antarmuka antara kerangka kerja dan lapisan seramik, pastikan ketebalan yang seragam dan hindari bentuk bersudut tajam.\n\n■ Penyambungan (Connection / Connector Design)\nBagian yang menghubungkan gigi penyangga dan pontik jembatan adalah bagian penyambungan (konektor). Desain bagian penyambungan memerlukan keseimbangan antara kekuatan dan estetika.\n\n【Bentuk Penampang Konektor】\n・Bagian gigi depan: Penampang elips vertikal. Pastikan tinggi untuk mendapatkan kekuatan. Lebar diminimalkan dengan mempertimbangkan estetika.\n・Bagian molar: Penampang elips horizontal. Pastikan lebar untuk mendapatkan kekuatan. Tinggi dibatasi oleh clearance oklusal.\n\n【Prinsip Desain Konektor】\n・Penempatan simetris: Bagian penyambungan ditempatkan secara simetris antara pontik dan gigi penyangga. Asimetris menyebabkan konsentrasi stres.\n・Memastikan luas penampang: Ada luas penampang minimum yang diperlukan untuk setiap material (misalnya, zirconia memerlukan sekitar 9mm² atau lebih). Luas penampang yang tidak cukup adalah penyebab langsung dari fraktur.\n・Kemandirian gigi: Meskipun terhubung, setiap gigi harus terlihat mandiri, dengan merancang posisi dan bentuk konektor dengan cermat.\n\n【Permukaan Dasar Pontik】\nRancangan bentuk bagian bawah pontik (permukaan yang berkontak dengan mukosa). Bentuk dengan kontak ringan untuk memungkinkan pembersihan.\n\n【Jembatan 3 Gigi atau Lebih】\nUntuk jembatan 3 gigi atau lebih, pertimbangkan defleksi keseluruhan dan distribusi stres. Jembatan dengan rentang panjang mengalami defleksi besar di bagian tengah, jadi pastikan luas penampang konektor mencukupi. Untuk jembatan panjang 6 gigi atau lebih, pertimbangkan penggunaan stabilizer (perangkat stabilisasi untuk jembatan zirconia 4 unit atau lebih).\n\n■ Model Builder\nFungsi model builder dari perangkat lunak CAD adalah kemampuan untuk merancang model kerja dari data digital dan untuk 3D print.\n\n【Penggunaan Model Builder】\n・Pembuatan Arch Model (model lengkung gigi): Ketika tidak ada model batu dalam kasus IOS, cetak data digital sebagai model.\n・Pembuatan Die Gigi Penyangga: Rancang bagian gigi penyangga sebagai die terpisah (model gigi penyangga independen).\n・Desain Attachment: Rancang bagian attachment untuk dentur tambahan ke model.\n\n【Prosedur Operasi】\n①Membaca data pindai → ②Pengaturan garis luar model → ③Pengaturan garis pembagian die → ④Pengaturan mekanisme pelepasan die (lubang retensi, dll.) → ⑤Desain permukaan dasar → ⑥Output STL → ⑦3D Print\n\n【Pemangkasan dan Pembagian】\nPotong bagian yang tidak perlu dari model dan bagikan die sesuai kebutuhan. Dalam model bagi, rancang mekanisme interlocking sehingga setiap die dapat dipasang dan dilepas secara mandiri.\n\n[KEY: Tiga teknik canggih (potong balik, koneksi, pembangun model) adalah kunci desain prostetik molar dan jembatan]\n[TIP: Menggunakan preset koneksi dari perpustakaan template secara signifikan mengurangi waktu desain]\n[WARN: Pengaturan potong balik yang salah menyebabkan pengelupasan keramik]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Dasar Ilmu Material Cutback\nCutback (pengurangan bentuk) adalah teknik untuk menyediakan ruang bagi pembangunan porselen atau resin di atas coping logam atau zirkonia. Jumlah cutback bergantung pada ketebalan material yang akan dibangun - lapisan porselen memerlukan minimal 0,5mm, direkomendasikan 0,8-1,0mm. Terlalu tipis menyebabkan tampilan gelap karena penetrasi warna, terlalu tebal menurunkan kekuatan.\n\n◆ Mekanika Desain Konektor\nDalam desain jembatan yang menghubungkan beberapa gigi, luas penampang konektor menentukan kekuatan. Luas penampang minimum: zirkonia 9mm2 (3mm x 3mm), logam 6mm2 (2mm x 3mm). Bentuk konektor tetesan air meminimalkan konsentrasi tegangan. Untuk jembatan long-span 3 unit atau lebih, perhitungan defleksi juga penting.\n\n◆ Pemanfaatan Model Builder\nModel builder adalah fungsi yang secara otomatis menghasilkan model pengolahan atau model pengecekan dari data CAD. Memverifikasi protesa yang dirancang secara digital pada model aktual menjembatani kontrol kualitas digital dan analog. Konfirmasi kesesuaian pada model cetak 3D sangat penting terutama untuk kasus implan kompleks.\n\n◆ Signifikansi dan Metode Peningkatan Time Trial\nTime trial (latihan dengan pengukuran waktu) sangat efektif untuk meningkatkan efisiensi desain CAD. Target waktu umum: mahkota tunggal 20-30 menit, inlay 15-25 menit, jembatan 3 unit 40-60 menit. Dengan mencatat waktu kerja dan menganalisis langkah mana yang memakan waktu lama, poin perbaikan spesifik menjadi terlihat."

                    id: "4-2",
                    title: "クラウン・ブリッジの統合実践",
                    whatYouLearn: "Part4の総合演習として、クラウンとブリッジの統合的な実践を行います。",
                    learningObjectives: "これまでの知識を統合し、実際のケースに対応できる設計力を養います。",
                    goodExample: "各工程を統合的に実行でき、品質の高い補綴物を設計できる。",

                    evaluationCriteria: "統合力、ワークフロー効率、最終品質。",
                    teaching: "[FLOW: 複数症例の設計 → 技術統合 → 総合評価]\n【Part4総合演習 クラウン・ブリッジの統合実践】\n\n■ 総合演習の目的\nDay11〜15で学んだCADデザインのすべてのスキルを統合し、実践的なケースで一連のワークフローを通して実行する。タイムトライアル形式で効率性も身につける。\n\n■ CADデザインの全工程チェックリスト\n以下の順序ですべての工程を確実に実行する：\n\n①着脱方向の確認：アンダーカートがない方向に設定。ブリッジの場合は全支台歯の共通挿入方向を確認。\n②ガイドの確認：各種ガイド（挿入方向ガイド、アンダーカットガイド等）を表示して問題がないか確認。\n③マージンライン設定：自動検出→手動修正。全周にわたって正確に設定。\n④歯冠概形の選択：ライブラリー/コピー/ミラーからケースに最適な方法を選択。\n⑤ポジショニング：歯列弓に合わせた適切な位置・大きさ・角度に配置。\n⑥連続性の調整：辺縁隆線・外形線・咬頭頂の連続性を隣在歯に合わせる。\n⑦咬合接触の設定：基準値設定→自動→断面図確認→手動微調整→運動チェック。\n⑧隣接面コンタクトの設定：基準値設定→自動→断面図確認→手動微調整。\n⑨周囲組織との調和：鼓形空隙・エマージェンスプロファイル・歯頚部形態の確認。\n⑩カットバック（必要な場合）：築盛/プレス用にフレーム形態をデザイン。\n⑪モデルビルダー（必要な場合）：作業用模型のSTLデータ作成。\n\n■ 品質チェックリスト（6項目）\nすべてのデザインで以下の6項目を確認する：\n①マージン適合：マージンライン全周で補綴物がぴったり合っているか。\n②セメントスペース：支台歯形状に合わせた適切な値が設定されているか。\n③咬合接触：接触点の位置・強さが適切か。運動時の干渉がないか。\n④隣接面コンタクト：面接触で適切な強さか。断面図で確認。\n⑤歯の連続性：辺縁隆線・外形線が隣在歯と連続しているか。\n⑥清掃性：鼓形空隙のサイズ、歯頚部の形態、エマージェンスプロファイルが適切か。\n\n■ ツールの活用\n・ワックスナイフ：局所的な盛り・削りで微細な形態調整。\n・モーフィング：広い範囲の形態を滑らかに変形。\n・フォーム：大きな形態変更。\n・ビュー方向の統一：常に同じ方向から確認して不調和を見逃さない。\n\n■ 臼歯部の重要ポイント\n・咬頭傾斜を歯列に合わせる。\n・連結形態（ブリッジ）：水平楕円形のコネクター、十分な断面積。\n・ポンティック基底面の清掃性確保。\n\n■ 前歯部の重要ポイント\n・審美性（長さ・幅・出具合・対称性・ラインアングル）と機能性の両立。\n・連結形態（ブリッジ）：垂直楕円形のコネクター、歯の独立性を保つ。\n・口唇との調和、スマイルラインの確認。\n\n■ タイムトライアルの目標時間\n・臼歯単冠クラウン：30分以内\n・前歯単冠クラウン：30分以内\n・3歯ブリッジ：45分以内\n\n[KEY: Part4総合演習はPart1～3で習得した全技術を統合した最終実践課題]\n[TIP: 複数の参考症例を見比べることで設計の多様性を学べる]\n[WARN: 短時間での設計では精度が低下するため、時間をかけた段階的調整が重要]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ 総合演習での自己評価ポイント\n統合実践における自己評価の基準を詳しく解説する。まず時間効率（目標時間内に完成できたか）、次に精度（マージン適合、咬合接触、コンタクトの各項目）、そして審美性（形態の自然さ、対称性）を総合的に評価する。記録シートを作成し、各ケースの結果を蓄積することで、自分の強みと弱みを客観的に把握できる。\n\n◆ 複雑症例へのアプローチ\n実臨床では、理想的でない支台歯や困難な咬合条件に対応する必要がある。極端に短い支台歯のクラウン設計、大きな傾斜を持つ支台歯のブリッジ設計、対合歯が過萌出したケースの咬合面設計など、教科書通りにいかない症例への対応力を養う。各ケースに対して、複数のデザインオプションを検討し、最善の解決策を選択するプロセスを実践する。\n\n◆ チームワークと分業の考え方\nデジタル技工所では、スキャン担当・CADデザイン担当・CAM加工担当・仕上げ担当と分業されることが多い。各担当者間の正確な情報伝達が品質の鍵となる。デジタルジョブシート（電子指示書）を活用し、各工程の設定値・注意事項・特記事項を確実に伝達する仕組みを構築する。\n\n◆ 今後の学習ロードマップ\nPart4で学んだCADデザインの基礎をベースに、Part5以降ではインプラント補綴やデンチャーなどのより高度な設計技術を学ぶ。各Partの関連性を理解し、知識を体系的に積み上げていくことが重要である。日々の練習量の目安として、最低1日2ケース以上のCADデザイン練習を継続することを推奨する。",
                    teachingId: "[FLOW: Desain Kasus Berganda → Integrasi Teknik → Evaluasi Komprehensif]\n【Part4 Latihan Komprehensif Mahkota dan Jembatan Terintegrasi】\n\n■ Tujuan Latihan Komprehensif\nMengintegrasikan semua keterampilan desain CAD yang dipelajari di Day11 hingga 15 dan melaksanakannya dalam kasus praktis di seluruh alur kerja. Mendapatkan efisiensi dalam format timed trial.\n\n■ Checklist Verifikasi Semua Tahap Desain CAD\nLaksanakan semua tahap berikut dalam urutan ini:\n\n①Verifikasi arah pelepasan: Atur ke arah tanpa undercut. Untuk jembatan, verifikasi arah penyisipan bersama untuk semua gigi penyangga.\n②Verifikasi panduan: Tampilkan berbagai panduan (panduan arah penyisipan, panduan undercut, dll.) dan verifikasi tidak ada masalah.\n③Pengaturan garis margin: Deteksi otomatis → perbaikan manual. Pengaturan yang akurat di seluruh margin.\n④Pilihan bentuk mahkota gigi: Pilih metode yang paling optimal untuk kasus (perpustakaan/salinan/cermin).\n⑤Penentuan posisi: Tempatkan pada posisi, ukuran, dan sudut yang sesuai dengan lengkung barisan gigi.\n⑥Penyesuaian kontinuitas: Selaraskan kontinuitas ridge gingival, garis luar, dan puncak cuspid dengan gigi yang berdekatan.\n⑦Pengaturan kontak gigitan: Pengaturan nilai dasar → otomatis → verifikasi gambar penampang → penyesuaian manual mikro → pemeriksaan gerakan.\n⑧Pengaturan kontak wajah proksimal: Pengaturan nilai dasar → otomatis → verifikasi gambar penampang → penyesuaian manual mikro.\n⑨Harmoni dengan jaringan sekitar: Verifikasi ruang fissure, profil kemunculan, bentuk 1/3 servical.\n⑩Cutback (jika perlu): Rancang bentuk kerangka kerja untuk penumpukan/penekan.\n⑪Model Builder (jika perlu): Buat data STL model kerja.\n\n■ Checklist Verifikasi Kualitas (6 Item)\nVerifikasi 6 item berikut untuk semua desain:\n①Penyesuaian Margin: Apakah protesa pas sempurna di seluruh margin?\n②Ruang Semen: Apakah nilai yang sesuai dengan bentuk gigi penyangga telah ditetapkan?\n③Kontak Gigitan: Apakah posisi dan kekuatan titik kontak sesuai? Apakah ada gangguan saat gerakan?\n④Kontak Wajah Proksimal: Apakah kontak permukaan dengan kekuatan yang sesuai? Verifikasi dengan gambar penampang.\n⑤Kontinuitas Gigi: Apakah ridge gingival dan garis luar berkelanjutan dengan gigi yang berdekatan?\n⑥Kemampuan Pembersihan: Apakah ukuran ruang fissure, bentuk 1/3 servical, profil kemunculan sesuai?\n\n■ Penggunaan Alat\n・Pisau Lilin: Penyesuaian bentuk mikro dengan penumpukan dan penghapusan lokal.\n・Morfing: Deformasi bentuk dalam rentang luas dengan halus.\n・Bentuk: Perubahan bentuk besar.\n・Penyatuan Arah Tampilan: Selalu konfirmasi dari arah yang sama untuk menghindari ketidakselarasan.\n\n■ Poin Penting Bagian Molar\n・Selaraskan kemiringan cuspid dengan barisan gigi.\n・Bentuk penyambungan (jembatan): Konektor elips horizontal dengan luas penampang yang cukup.\n・Pastikan kemampuan pembersihan permukaan dasar pontik.\n\n■ Poin Penting Bagian Gigi Depan\n・Keseimbangan antara estetika (panjang, lebar, derajat tonjolan, simetri, line angle) dan fungsi.\n・Bentuk penyambungan (jembatan): Konektor elips vertikal dengan kemandirian gigi terjaga.\n・Harmoni dengan bibir, verifikasi garis senyum.\n\n■ Target Waktu untuk Timed Trial\n・Mahkota gigi molar tunggal: Dalam 30 menit\n・Mahkota gigi depan tunggal: Dalam 30 menit\n・Jembatan 3 gigi: Dalam 45 menit\n\n[KEY: Latihan komprehensif Part 4 adalah tugas praktik akhir yang mengintegrasikan semua teknik yang dipelajari di Part 1-3]\n[TIP: Membandingkan berbagai contoh kasus membantu mempelajari keragaman desain]\n[WARN: Desain singkat menghasilkan akurasi rendah, penyesuaian bertahap yang memakan waktu sangat penting]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Poin Evaluasi Diri dalam Latihan Komprehensif\nMenjelaskan secara detail kriteria evaluasi diri dalam praktik integrasi. Pertama efisiensi waktu (apakah selesai dalam target waktu), kemudian akurasi (setiap item kesesuaian margin, kontak oklusal, kontak), dan estetika (kealamian bentuk, simetri) dievaluasi secara komprehensif. Buat lembar catatan dan akumulasikan hasil setiap kasus untuk memahami kekuatan dan kelemahan secara objektif.\n\n◆ Pendekatan untuk Kasus Kompleks\nDalam praktik klinis nyata, perlu menangani abutment yang tidak ideal atau kondisi oklusal yang sulit. Kembangkan kemampuan menangani kasus seperti desain mahkota pada abutment yang sangat pendek, desain jembatan pada abutment dengan kemiringan besar, dan desain permukaan oklusal ketika gigi antagonis mengalami over-eruption.\n\n◆ Pemikiran tentang Kerja Tim dan Pembagian Kerja\nDi laboratorium digital, pekerjaan sering dibagi menjadi penanggung jawab scan, desain CAD, pengolahan CAM, dan penyelesaian. Transfer informasi yang akurat antar penanggung jawab menjadi kunci kualitas. Bangun sistem menggunakan lembar kerja digital (instruksi kerja elektronik) untuk memastikan penyampaian nilai pengaturan, catatan perhatian, dan catatan khusus setiap proses.\n\n◆ Peta Jalan Pembelajaran Selanjutnya\nBerdasarkan dasar desain CAD yang dipelajari di Part 4, Part 5 dan seterusnya akan mempelajari teknik desain lebih lanjut seperti protesa implan dan denture. Memahami keterkaitan setiap Part dan membangun pengetahuan secara sistematis sangat penting. Sebagai pedoman jumlah latihan harian, direkomendasikan melanjutkan minimal 2 kasus latihan desain CAD per hari."

                    id: "5-1",
                    title: "データマッチングとインプラントスキャン",
                    whatYouLearn: "スキャンデータのマッチング方法とインプラントスキャンの手順を学びます。",
                    learningObjectives: "正確なデータマッチングとインプラントスキャンの基本を習得します。",
                    goodExample: "マッチング精度が高く、インプラントスキャンの手順を正確に実行できる。",
                    badExample: "マッチングがずれている、インプラントスキャンの手順が不正確。",
                    evaluationCriteria: "マッチング精度、リファレンスポイント設定、インプラントスキャン技術。",
                    teaching: "[TABLE]\nデータ処理|説明|用途\nデータマッチング|複数スキャンデータを統合|顎模型と歯模型の結合\nインプラント位置決め|インプラント体の3D座標設定|インプラント補綴物設計\n[/TABLE]\n【Part2④⑤⑥ データマッチングとインプラントスキャン】\n\n■ データマッチングとは\nマッチングとは、2つの別々にスキャンしたデータ（例：上顎と下顎、支台歯とバイト）を正確に重ね合わせて合成する作業である。正確なマッチングが補綴物の適合精度を左右する重要な工程。\n\n■ リファレンスポイントの設定方法\n2つのスキャンデータの同一箇所（同じ場所）にリファレンスポイント（基準点）を設定し、ソフトウェアがその点を基に2つのデータを位置合わせする。\n・基本は1点設定：角や気泡など、特徴的な凹凸にリファレンスポイントを設定する。平坦な面ではなく、識別しやすい特徴的な形状の部分を選ぶ。\n・リファレンスポイントの選び方：歯列の角（咬頭の先端）、石膏の気泡跡、歯牙の特徴的な形態など、2つのデータで明確に同一箇所と判別できる部分を選ぶ。\n\n■ マッチングがうまくいかない場合の4つの対処法\n①3点設定：1点では合わない場合、3点にリファレンスポイントを増やして精度を上げる。\n②特徴的な部分を作る：模型上に小さなマークや特徴を付けて（例：模型にわずかな切り込みを入れる）、識別しやすくする。\n③広い範囲でスキャンを撮り直す：アーチスキャンやバイトスキャンの範囲が狭すぎると合わないことがある。より広い範囲で再スキャンする。\n④形状の異なる箇所を削除：2つのデータで形状が一致しない部分（例：舌の位置が変わった部分、唾液の付着部分）を削除してからマッチングを再実行する。\n\n■ バイトスキャンのマッチング注意点\nバイトスキャンは頬側面だけのスキャンになることが多いため、微妙なズレが起こりやすい。バイトマッチングのズレは咬合のズレに直結するため、マッチング後に必ず複数方向から咬合関係を確認する。ズレている場合はCADソフト上で再マッチングを行う。\n\n■ インプラントスキャン\n\n【スキャンボディとは】\nスキャンボディは、インプラントフィクスチャーの位置と方向をスキャナーに伝えるための専用治具。スキャンボディを使用することで、CADソフトが正確なインプラント位置を認識し、カスタムアバットメントや上部構造を設計できる。\n\n【スキャンボディの選択】\nスキャンボディはインプラントメーカーとフィクスチャーサイズ（直径・規格）に合わせて選択する。メーカー・サイズが異なるスキャンボディを使用すると、位置情報が不正確になる。\n\n【スキャンボディの装着】\n・スリット面（溝のある面）を頬側に向けて装着する。スリットの方向によりCADソフトが回転方向を認識する。\n・浮き上がり確認：スキャンボディがフィクスチャー（またはマルチユニットアバットメント）にしっかり嵌合しているか確認する。浮き上がりがあると高さ方向の誤差が生じる。プラットフォーム（接合部）を確認し、隙間がないことを確かめる。\n・ネジの締結：スキャンボディのネジを適切なトルクで締結する。緩みがあるとスキャン中に動いてしまう。\n\n【スキャンボディ不使用の場合】\nアバットメントやチタンベースが既に装着されている場合は、それらを直接スキャンすることもある。金属面はスキャンスプレーを塗布して反射を抑える。直接スキャンの場合はCADソフト上でアバットメント形状を手動でトレースする必要がある場合がある。\n\n【ガム模型の取り扱い】\nインプラント症例ではガム模型を使用する場合が多い。ガム模型の脱着時に模型本体がずれないよう注意する。スキャンボディ装着時はガム（歯肉部分）を外してからスキャンし、ガム装着状態でもスキャンして歯肉形態のデータを取得する。\n\n[KEY: マッチング精度とインプラント位置の正確性が最終的な補綴物の適合を左右する]\n[TIP: 事前に基準点をマーキングしておくとマッチング作業が迅速になる]\n[WARN: マッチングズレはCAD段階では補正困難で、加工後の不適合の原因となる]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ データマッチングのアルゴリズム\nマッチング（位置合わせ）は、ICP（Iterative Closest Point）アルゴリズムが最も広く使用されている。ICPは2つの点群間の距離を反復的に最小化する手法で、初期位置合わせ（粗い合わせ）→ 精密位置合わせ（微調整）の2段階で行われる。マッチング精度は通常5-20μmだが、参照点が少なかったり形態が単純すぎると精度が低下する。3点以上の明確な特徴点があることが安定したマッチングの条件である。\n\n◆ インプラントスキャンの特殊性\nインプラントスキャンでは、スキャンボディ（スキャンアバットメント）の選択が重要である。各インプラントメーカーごとにスキャンボディが異なり、CADソフトのライブラリーとの互換性を確認する必要がある。チタン製スキャンボディは反射が強いため、パウダー塗布またはスキャンスプレーの使用が推奨される。マルチユニットアバットメント上のスキャンでは、アバットメントの角度補正データの入力が必要となる場合がある。\n\n◆ 咬合記録のデジタル化\nバイトレジストレーション（咬合記録）のデジタル化について解説する。従来はシリコンバイトを使用していたが、IOSでは上顎・下顎・バイト（咬合状態）の3つのスキャンを行い、ソフトウェアで自動マッチングする。フルアーチの咬合記録では、前歯部・臼歯部の両側でバイトスキャンを行い、正確なインターカスパルポジションを記録する。\n\n◆ デジタル咬合器の活用\nバーチャル咬合器は、実際の半調節性咬合器のパラメータ（顆路角・ベネット角・切歯路角）をソフトウェア上で再現する。パントグラフやゴシックアーチ描記法のデジタル版として、顎運動データを直接取り込めるシステムも登場している。デジタル咬合器により、機能咬合を考慮した補綴物設計が可能となる。",
                    teachingId: "[TABLE]\nPemrosesan Data|Penjelasan|Kegunaan\nPencocokan Data|Mengintegrasikan data pemindaian ganda|Penggabungan model rahang dan gigi\nPenentuan Posisi Implan|Pengaturan koordinat 3D badan implan|Desain prostetik implan\n[/TABLE]\n【Part2④⑤⑥ Pencocokan Data dan Pemindaian Implant】\n\n■ Apa itu Pencocokan (Matching)\nMatching adalah proses untuk secara akurat menyelaraskan dan menggabungkan dua data pemindaian terpisah (misalnya: rahang atas dan bawah, gigi penyangga dan gigitan). Pencocokan akurat mempengaruhi presisi adaptasi protesa - ini adalah tahap penting.\n\n■ Metode Pengaturan Poin Referensi\nDua data pemindaian diselaraskan dengan mengatur poin referensi (poin dasar) di lokasi identik, dan perangkat lunak memposisikan dua data berdasarkan poin tersebut.\n・Pengaturan titik tunggal dasar: Mengatur satu poin referensi di tepi tajam atau gelembung - tempat dengan bentuk yang sangat karakteristik dan mudah diidentifikasi. Hindari permukaan datar yang sulit dibedakan.\n・Pemilihan lokasi: Pilih lokasi di zona yang akan terlibat dalam protesa, bukan di daerah yang jauh. Dengan cara ini, jika pencocokan gagal, area penting akan terpengaruh dan terdeteksi dengan mudah.\n・Penyesuaian manual: Jika pencocokan otomatis gagal, sesuaikan posisi secara manual dengan melihat hasil pencocokan dari berbagai sudut.\n\n■ Penilaian Keberhasilan Pencocokan\n・Tepi margin: Periksa apakah tepi gigi penyangga dan margin model sekunder selaras sempurna.\n・Kontak titik kontak: Verifikasi bahwa zona kontak antara gigi tetangga dan gigi penyangga selaras.\n・Posisi gigitan: Periksa apakah hubungan gigitan antara gigi penyangga atas dan bawah benar.\n\n■ Empat Strategi Ketika Pencocokan Gagal\n①Pengaturan tiga titik (Three-Point Registration): Alih-alih satu titik, atur tiga poin di lokasi terpisah. Ini meningkatkan akurasi positioning.\n②Membuat fitur karakteristik: Jika model tidak memiliki fitur yang berbeda, buat fitur artifisial (seperti lubang kecil atau tanda) pada model untuk dijadikan poin referensi.\n③Ulang pengambilan scan (arch/bite scan yang lebih luas): Ulang pemindaian dengan cakupan lebih luas untuk mendapatkan data dengan fitur lebih banyak untuk pencocokan.\n④Menghapus bagian dengan bentuk berbeda: Jika pencocokan tetap gagal, identifikasi area yang bentuknya sangat berbeda dan hapus area tersebut dari data, kemudian coba matching lagi.\n\n■ Pemindaian Implant Menggunakan Scan Body\n【Scan body】 adalah komponen khusus yang dipasang pada implant screw untuk memfasilitasi pemindaian. Scan body memiliki bentuk yang sangat karakteristik (biasanya silinder dengan slot unik), sehingga mudah diidentifikasi oleh perangkat lunak CAD.\n\n【Pemilihan Scan Body】: Pilih scan body yang sesuai dengan sistem implant (berbagai produsen memiliki scan body yang berbeda).\n\n【Pemasangan Scan Body】:\n・Pasang scan body ke implant screw dengan torsi yang tepat (biasanya 35 Ncm).\n・Verifikasi orientasi slot scan body. Slot harus menghadap ke arah yang konsisten untuk pemindaian yang akurat.\n\n【Pemindaian】:\n・Pindai dengan fokus pada scan body dan area sekitarnya.\n・Pastikan slot scan body terlihat jelas dari berbagai sudut.\n・Periksa hasil untuk memastikan tidak ada distorsi atau data yang hilang di area implant.\n\n【Metode Alternatif tanpa Scan Body】:\nJika scan body tidak tersedia, abutment implant dapat dipindai secara langsung.\n・Periksa posisi dan fiksasi abutment. Abutment harus benar-benar tersangkut dan tidak bergerak.\n・Untuk permukaan logam, aplikasikan semprotan khusus untuk memfasilitasi pemindaian (karena logam reflektif).\n\n[KEY: Akurasi pencocokan dan presisi posisi implan menentukan adaptasi prostetik akhir]\n[TIP: Menandai titik referensi sebelumnya membuat pekerjaan pencocokan lebih cepat]\n[WARN: Kesalahan pencocokan sulit diperbaiki di tahap CAD dan menjadi penyebab ketidaksesuaian pasca-pemrosesan]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Algoritma Pencocokan Data\nPencocokan (registrasi) paling banyak menggunakan algoritma ICP (Iterative Closest Point). ICP meminimalkan jarak antara dua kumpulan titik secara iteratif, dilakukan dalam 2 tahap: registrasi awal (pencocokan kasar) → registrasi presisi (penyesuaian halus). Akurasi pencocokan biasanya 5-20μm, namun menurun jika titik referensi sedikit atau bentuknya terlalu sederhana.\n\n◆ Kekhususan Pemindaian Implan\nDalam pemindaian implan, pemilihan scan body (scan abutment) sangat penting. Scan body berbeda untuk setiap produsen implan, dan kompatibilitas dengan library perangkat lunak CAD perlu diperiksa. Scan body titanium memiliki refleksi kuat, sehingga direkomendasikan menggunakan bubuk atau spray scan. Untuk scan pada multi-unit abutment, input data koreksi sudut abutment mungkin diperlukan.\n\n◆ Digitalisasi Pencatatan Oklusi\nMenjelaskan digitalisasi bite registration (pencatatan oklusi). Secara konvensional menggunakan silikon bite, namun dengan IOS dilakukan 3 scan (rahang atas, rahang bawah, dan oklusi), kemudian pencocokan otomatis oleh perangkat lunak. Untuk pencatatan oklusi full arch, scan bite dilakukan di kedua sisi anterior dan posterior untuk merekam posisi interkuspal yang akurat.\n\n◆ Pemanfaatan Artikulator Digital\nArtikulator virtual mereproduksi parameter artikulator semi-adjustable (sudut kondilus, sudut Bennett, sudut insisivus) di perangkat lunak. Sistem yang dapat langsung mengimpor data gerakan mandibula sebagai versi digital pantograf dan pencatatan gothic arch juga telah muncul. Artikulator digital memungkinkan desain protesa yang mempertimbangkan oklusi fungsional."

                {
                    id: "5-2",
                    title: "IOSコミュニケーションとデータ確認",
                    whatYouLearn: "歯科医院とのIOS連携と、受け取ったデータの確認方法を学びます。",
                    learningObjectives: "IOSデータの品質確認と、歯科医院への適切なフィードバックができる状態を目指します。",
                    goodExample: "データ品質を正確に判定し、問題点を明確にフィードバックできる。",

                    evaluationCriteria: "データ品質判定、コミュニケーション能力、問題解決力。",
                    teaching: "[FLOW: IOS接続 → デバイス認証 → コミュニケーションテスト → ファイル転送]\n【Part3①②③ IOSコミュニケーションとデータ確認】\n\n■ 歯科医院との連携（テクニカルレポート）\nIOS症例では石膏模型がないため、歯科医師とのコミュニケーションがより重要になる。テクニカルレポートはデジタル技工における情報共有の要である。\n\n【テクニカルレポートの内容】\n・セメントスペース：設定値を10μm単位で報告（例：「セメント間隙0.040mm、追加間隙0.050mm」）\n・咬合接触：咬合接触点の位置と強さ（干渉量）を報告。スクリーンショットにマーキングして視覚的に説明する。\n・隣接面コンタクト：コンタクトの位置と強さを数値で報告。面で接触しているか、点接触になっていないかを確認。\n・その他：マージンの位置、歯冠の概形、着脱方向、使用材料などを記載。\n\n【デザイン確認の3つの方法】\n①3Dデータの送信：CADデザインの3Dデータをそのまま歯科医院に送り、確認してもらう。専用ビューアが必要。\n②TeamViewer等の遠隔操作：リアルタイムで画面共有し、歯科医師と一緒にデザインを確認・修正できる。コミュニケーションの質が高い。\n③スクリーンショット：デザインの各方向からのスクリーンショットを撮影し、メール等で送付する。最も手軽だが、3D的な確認はできない。\n\n■ ラボ内連携（取り違え防止）\nIOS症例は物理的な模型がないため、患者の取り違えリスクがある。対策として：\n・シリコーンコア：製作した補綴物のシリコーン印象を取り、患者名を記載して管理する。\n・3Dプリント模型：CADデータから3Dプリントした模型に患者名を記載。物理的な模型として適合確認にも使用できる。\n・デザイン担当者と仕上げ担当者の間でのイメージ共有：CADデザインのスクリーンショットやテクニカルレポートを使い、完成イメージを共有する。\n\n■ データ受け取り時の確認事項（6項目）\nIOSデータを受け取った際、CADデザインに入る前に以下の6項目を必ず確認する：\n\n①クリアランス確認：対合歯との間隔が十分か数値で計測する。クリアランス不足は材料の厚みが確保できず、破折や脱離のリスクになる。\n\n②アーチの変形確認：IOSデータにバリ（不要な突起）やハレーション（光の異常反射によるデータ異常）がないか確認。アーチ全体の形態が不自然に歪んでいないか確認する。広範囲のIOSスキャンでは累積誤差による変形が起こり得る。\n\n③マージンの鮮明さ：カラー画像とモノクロ画像を切り替えて確認する。カラーでは歯質と歯肉の色の違いでマージンを判別、モノクロでは形状の変化でマージンを判別する。裏側（舌側/口蓋側）からも確認する。歯肉縁下のマージンや出血・唾液の影響でマージンが不鮮明な場合は再スキャンを依頼する。\n\n④咬合確認：多方向から咬合関係を確認する。バイトスキャンのマッチングがずれていないか、対合歯との接触関係が自然か確認する。\n\n⑤着脱方向確認：アンダーカットがないか確認する。ブリッジの場合は支台歯間の平行性を確認。着脱方向にアンダーカットがあると、加工時に削り残しが発生したり、補綴物が適合しない原因になる。\n\n⑥スキャンボディの変形チェック：インプラント症例の場合、スキャンボディのデータに変形がないか確認。スキャンボディが浮いた状態でスキャンされていないか、隣在歯との干渉がないか確認する。\n\n[KEY: IOS通信の安定性とデータ確認が遠隔治療ワークフローの信頼性を確保する]\n[TIP: 医院とのコミュニケーション窓口を明確にしておくと問題解決が迅速]\n[WARN: データ転送中の中断またはノイズはデータ破損の原因になる]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ IOSデータの通信プロトコル\nIOS（口腔内スキャナー）から技工所へのデータ転送には、クラウドベースとローカルの2つの方式がある。クラウドベース（3Shape Communicate、Medit Link等）では暗号化されたサーバーを経由し、症例情報とスキャンデータを一括管理できる。ローカル転送（USB、メール添付）は即座に利用できるが、大容量データの場合は転送時間に注意。ファイルサイズの目安は、3歯程度で10-30MB、フルアーチで50-100MB程度である。\n\n◆ テクニカルレポートの書き方\n歯科医院とのコミュニケーションツールとして、テクニカルレポート（技工指示書の返信）の書き方を学ぶ。報告すべき内容：支台歯の状態評価（マージンの明瞭さ、テーパー角、高さ）、推奨する補綴デザイン、材料選択の提案、予想される技術的課題。写真やスクリーンショットを添付して視覚的にわかりやすく伝えることが重要。\n\n◆ IOSデータの修復と加工\n受け取ったIOSデータに問題がある場合の対処法を解説する。部分的なデータ欠損にはメッシュ修復ツール（MeshLab、Meshmixer等）が使用できる。ノイズ除去にはラプラシアンスムージングが有効だが、過度なスムージングは形態の精度を損なう。対合歯データとのバイト確認は、咬合面のカラーマップ（接触点表示）で行う。\n\n◆ マルチケース管理の効率化\n複数のケースを並行して処理する技工所では、ケース管理が重要な課題となる。デジタル管理ソフト（exocad PartialCAD Manager等）やグループウェアを活用し、各ケースの進捗・納期・担当者を一元管理する。バーコードやQRコードを模型に付与し、デジタルデータとの紐付けを確実にする運用も普及している。",
                    teachingId: "[FLOW: Koneksi IOS → Autentikasi Perangkat → Uji Komunikasi → Transfer File]\n【Part3①②③ Komunikasi IOS dan Verifikasi Data】\n\n■ Integrasi Klinik Gigi (Laporan Teknis)\nDalam kasus IOS (pemindaian intra oral), tidak ada model gipsum, jadi komunikasi dengan dokter gigi menjadi sangat penting. Laporan teknis adalah elemen kunci untuk berbagi informasi dalam pemrosesan gigi digital.\n\n【Isi Laporan Teknis】\n・Ruang semen: Laporkan nilai pengaturan ke unit 10μm (contoh: \"celah semen 0.040mm, celah tambahan 0.050mm\").\n・Kontak oklusi: Laporkan lokasi dan kekuatan (jumlah interferensi) titik kontak oklusi. Tangkap screenshot dengan penanda untuk penjelasan visual.\n・Kontak titik kontak: Laporkan lokasi dan kekuatan kontak area. Tentukan apakah kontak adalah kontak area atau kontak titik.\n・Anatomi gingiva: Untuk kasus IOS, verifikasi bahwa kontur gingiva di margin cocok dengan kontur gingiva ideal.\n・Potongan melintang margin: Kirim potongan melintang untuk verifikasi bahwa margin diadaptasi dengan benar ke gigi penyangga.\n\n【Metode Verifikasi Desain Tiga Macam】\n①Pengiriman data 3D: Kirim file data 3D lengkap ke klinik gigi sehingga dokter gigi dapat melihat desain 3D dari berbagai sudut di PC mereka.\n②Penggunaan TeamViewer: Lakukan konferensi video dengan TeamViewer untuk menunjukkan desain secara real-time dan menerima umpan balik langsung.\n③Screenshot dengan anotasi: Kirim screenshot dari desain CAD dengan penanda penjelasan untuk verifikasi desain tertentu.\n\n■ Pencegahan Kesalahan Identifikasi Kasus IOS\nKarena tidak ada model fisik, kesalahan identifikasi kasus sangat mungkin terjadi.\n・Verifikasi identitas pasien: Sebelum mulai desain, verifikasi nama pasien, tanggal lahir, dan ID pasien dari data IOS.\n・Verifikasi gigi penyangga: Verifikasi nomor gigi yang akan dibuat protesa. Periksa lokasi posisi gigi (menggunakan sistem nomor FDI atau serupa).\n・Verifikasi catatan klinik: Hubungi klinik jika ada ambiguitas dalam catatan atau jika info kurang jelas.\n\n■ Poin Inspeksi Data IOS\n①Kelengkapan geometri: Periksa apakah semua gigi yang diperlukan ada dalam data (tidak ada gigi yang terlewatkan atau data yang dipotong).\n②Kesalahan orientasi: Verifikasi apakah data berada dalam orientasi yang benar (atas-bawah, depan-belakang benar).\n③Kualitas data permukaan: Periksa apakah permukaan gigi halus tanpa noise atau cacat pemindaian besar.\n④Kehadiran kontur gingiva: Untuk IOS, verifikasi bahwa data mencakup kontur gingiva yang jelas di sekitar gigi penyangga.\n⑤Ketajaman margin: Periksa kejelasan margin; jika margin kabur, hubungi klinik untuk mengulang pemindaian.\n\n[KEY: Stabilitas komunikasi IOS dan verifikasi data memastikan keandalan alur kerja medis jarak jauh]\n[TIP: Menetapkan saluran komunikasi yang jelas dengan klinik mempercepat penyelesaian masalah]\n[WARN: Gangguan atau bising selama transfer data dapat menyebabkan kerusakan data]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Protokol Komunikasi Data IOS\nTransfer data dari IOS ke laboratorium memiliki dua metode: berbasis cloud dan lokal. Berbasis cloud (3Shape Communicate, Medit Link, dll.) mentransfer melalui server terenkripsi dan dapat mengelola informasi kasus dan data scan secara terpadu. Transfer lokal (USB, lampiran email) dapat segera digunakan namun perhatikan waktu transfer untuk data berukuran besar. Perkiraan ukuran file: 10-30MB untuk 3 gigi, 50-100MB untuk full arch.\n\n◆ Cara Menulis Laporan Teknis\nMempelajari cara menulis laporan teknis sebagai alat komunikasi dengan klinik gigi. Konten yang harus dilaporkan: evaluasi kondisi abutment (kejelasan margin, sudut taper, tinggi), rekomendasi desain protesa, saran pemilihan material, tantangan teknis yang diprediksi. Penting untuk melampirkan foto atau tangkapan layar agar mudah dipahami secara visual.\n\n◆ Perbaikan dan Pengolahan Data IOS\nMenjelaskan cara menangani masalah pada data IOS yang diterima. Untuk kekurangan data parsial, alat perbaikan mesh (MeshLab, Meshmixer, dll.) dapat digunakan. Smoothing Laplacian efektif untuk penghapusan noise, namun smoothing berlebihan akan menurunkan akurasi bentuk. Verifikasi bite dengan data antagonis dilakukan melalui peta warna (tampilan titik kontak) pada permukaan oklusal.\n\n◆ Efisiensi Manajemen Multi-Kasus\nDi laboratorium yang memproses beberapa kasus secara paralel, manajemen kasus menjadi masalah penting. Gunakan perangkat lunak manajemen digital dan groupware untuk mengelola progres, tenggat waktu, dan penanggung jawab setiap kasus secara terpusat. Penggunaan barcode atau kode QR pada model untuk memastikan keterkaitan dengan data digital juga semakin umum.",

                    teaching: "[TABLE]\nデータ種類|処理方法|注意点\nIOS直接データ|CADソフトで直接読込|ファイル形式の確認\n医院から転送|形式変換の場合あり|データロス防止\n[/TABLE]\n【Part3④⑤ IOSデータ受取とCADデザイン】\n\n■ IOSデータの4つの受取方法\n\n【①IOSメーカークラウド】\n各IOSメーカーが提供するクラウドサービスを経由してデータを受け取る方法。\n・3Shape Communicate：TRIOS使用の歯科医院からデータ受信。3ox形式。3Shape Dental Designerとシームレスに連携。\n・iTero（Align Technology）：iTeroスキャナーからのデータ受信。\n・Dentsply Sirona Connect：CEREC Primescan等からのデータ受信。DXD形式。\n・MEDIT Link：MEDITスキャナーからのデータ受信。DCM形式。STLエクスポートも可能。\nメリット：セキュリティが高い、データの品質管理がされている。デメリット：メーカーごとにアカウント登録が必要、対応CADが限定される場合がある。\n\n【②その他クラウドサービス】\nGoogle Drive、Dropbox等の汎用クラウドサービスを経由してデータを受け取る。STL等の汎用形式でのやり取りが多い。メリット：メーカーに依存しない。デメリット：データのセキュリティ管理は送受信者の責任。\n\n【③メール】\nSTLファイル等を直接メール添付で受け取る。小さなファイルには便利だが、大きなデータは送受信に時間がかかる。セキュリティ面でも注意が必要。\n\n【④記録媒体（USB/SDカード）】\nUSBメモリやSDカードで物理的にデータを受け渡す。オフライン環境でも対応可能。紛失・破損のリスクがある。\n\n■ IOS CADデザインの基本\nIOSデータでのCADデザインはモデルレス（石膏模型なし）で行う。石膏模型に比べて物理的な確認ができないため、デジタルデータ上での精密な設定が求められる。\n\n【マージン設定】\nマージンライン（形成限界線）の設定はCADデザインの基本中の基本。IOSデータでのマージン設定手順：\n①モノクロ画像での判別：形状の変化（角度の変化）でマージンラインを大まかに判別する。\n②カラー画像での確認：歯質の色と歯肉の色の境目を確認し、マージン位置を修正する。\n③裏側からの最終確認：舌側/口蓋側からもマージンを確認し、全周にわたってマージンが正確に設定されていることを確認する。\n不鮮明な部分がある場合は歯科医院に確認を取る（歯肉縁下マージンや出血・唾液の影響で不鮮明になることがある）。\n\n【セメントスペース設定】\nセメントスペースはクラウンと支台歯の間に設ける隙間で、合着用セメントが入るスペースである。\n・基準値例：セメント間隙0.010mm、追加セメント間隙0.045mm、マージンラインまでの距離0.80mm、スムージング距離0.20mm\n・支台歯形状に合わせた調整：テーパーがきつい支台歯→スペースを増やす（セメントの流出が困難なため）。鋭利な箇所→ドリル半径をケースバイケースで設定しリリーフ処理。アンダーカット部→必ずリリーフして加工時の削り残しエラーを防止。\n・ドリル半径・ドリル補正オフセット：ミリングバーの半径より小さいディテールは加工できない。CAMソフトが自動補正するが、セメントスペース設定段階でも意識する。\n\n【隣接面コンタクト・咬合接触点の設定】\n①基準値の設定：歯科医院ごとに好みの強さが異なるため、まずは標準的な基準値を設定する。\n②自動設定：CADソフトが基準値に基づいて自動的にコンタクト・咬合を設定する。\n③断面図での微調整：断面図を表示し、実際のコンタクト・咬合の状態を確認して手動で微調整する。\n④フィードバック後の基準値調整：歯科医院からのフィードバック（強すぎる/弱すぎる等）を受けて、次回以降の基準値を調整する。\n\n【着脱方向の確認】\n補綴物が支台歯にスムーズに装着・脱離できる方向を確認する。アンダーカット部分がある場合はリリーフ処理を行い、加工時のエラーや装着時の問題を防ぐ。\n\n[KEY: データ受け取りから設計開始までのスムーズな流れが納期短縮を実現する]\n[TIP: 標準的なワークフローテンプレートを用意すると新規案件への対応が迅速]\n[WARN: 形式変換時の品質ロスはCAD段階で補正不可]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ IOSデータの受取ワークフロー比較\n4つの受取方法（クラウド・直接転送・メール添付・物理メディア）それぞれのメリット・デメリットを詳しく比較する。クラウドは利便性が高いがインターネット環境に依存する。直接転送は高速だがネットワーク構築が必要。メール添付は簡便だがファイルサイズ制限がある。物理メディアはオフライン環境でも使えるが紛失リスクがある。技工所の規模と取引先数に応じて最適な方法を選択する。\n\n◆ CADデザインの効率化テクニック\nショートカットキーの活用はCADデザインの効率を大幅に向上させる。exocadでは、Ctrlキー+マウスホイールでツールサイズ変更、Spaceキーで視点リセット、Tabキーでステップ切替など、頻繁に使用する操作を覚える。また、テンプレート機能を使い、よく使う設定（セメントスペース値、マージン幅など）をプリセットとして保存しておくと、ケースごとの設定時間を短縮できる。\n\n◆ データ形式変換の注意点\n異なるCADソフト間でデータをやり取りする場合、形式変換が必要になることがある。STL→STLの変換は基本的に問題ないが、メッシュの細分化やデシメーション（メッシュ削減）処理が入ると精度が変化する。独自形式（.3oxz、.dcm等）からオープン形式への変換時は、マージンライン情報やダイスペーサー設定などのメタデータが失われる場合があるため注意が必要。\n\n◆ IOSケースでの印象評価基準\nIOSデータの品質を客観的に評価する基準を紹介する。表面のメッシュ密度が均一か、穴（ホール）がないか、ノイズが過剰でないか、支台歯マージンが明瞭に記録されているか、対合歯のデータが十分な範囲をカバーしているか。品質基準を満たさない場合は、歯科医院に再スキャンを依頼する判断も重要なスキルである。",
                    teachingId: "[TABLE]\nJenis Data|Metode Pemrosesan|Catatan Penting\nData IOS Langsung|Baca langsung di perangkat lunak CAD|Verifikasi format file\nTransfer dari Klinik|Mungkin diperlukan konversi format|Pencegahan kehilangan data\n[/TABLE]\n【Part3④⑤ Penerimaan Data IOS dan Desain CAD】\n\n■ Empat Metode Penerimaan Data IOS\n\n【①Cloud Produsen IOS】\nMetode menerima data melalui layanan cloud yang disediakan oleh produsen IOS.\n・3Shape Communicate: Menerima data dari klinik gigi yang menggunakan TRIOS. Format 3ox. Integrasi mulus dengan 3Shape Dental Designer.\n・iTero (Align Technology): Menerima data dari scanner iTero. Layanan cloud Align Technology.\n・Dentsply Sirona Connect: Menerima data dari CEREC Primescan dan sejenisnya. Format DXD.\n・MEDIT Link: Untuk scanner MEDIT i700 dan sejenisnya.\n\n【②Email dan Transfer File Langsung】\nData diterima sebagai lampiran email atau ditransfer melalui protokol FTP/cloud storage umum (Google Drive, Dropbox, OneDrive, dll).\n・Fleksibel untuk berbagai perangkat IOS.\n・Namun memerlukan verifikasi manual terhadap format file dan kompatibilitas.\n\n【③SDK/API Integrasi Sistem Klinik】\nUntuk klinik yang menggunakan software manajemen pasien, data dapat diintegrasikan langsung ke sistem klinik, dan sistem secara otomatis mengirimnya ke lab.\n・Integrasi mulus tanpa proses manual.\n・Namun memerlukan setup teknis yang lebih kompleks.\n\n【④Penyimpanan Cloud Hybrid】\nKombinasi dari metode di atas, di mana klinik mengunggah data ke server lab melalui portal web.\n・Keamanan terjaga dengan autentikasi login.\n・Mudah diakses oleh lab kapan saja.\n\n■ Desain CAD untuk Data IOS (Model-less Design)\nDesain CAD untuk data IOS berbeda dengan desain berbasis model karena tidak ada model gipsum sekunder untuk referensi.\n\n【Pengaturan Garis Margin】\nMargin adalah batas antara gigi penyangga dan mahkota. Penentuan posisi margin yang akurat sangat penting untuk adaptasi.\n・Penggunaan data monokrom: Gunakan tampilan monokrom untuk mengidentifikasi garis margin dengan jelas.\n・Penggunaan data berwarna: Gunakan data berwarna untuk membedakan tepi gigi dari gingiva.\n・Verifikasi sisi belakang: Periksa sisi belakang (lingual/palatal) margin untuk memastikan margin tidak tertanam di gingiva.\n・Toleransi margin: Tentukan margin berada 0.1-0.3mm di bawah puncak gingiva (subgingival margin).\n\n【Pengaturan Ruang Semen (Cement Space)】\nRuang semen adalah celah antara gigi penyangga dan bagian dalam mahkota untuk memungkinkan semen masuk dan kompensasi untuk material gigi penyangga yang sedikit berbeda dari model yang diharapkan.\n・Nilai dasar ruang semen: Biasanya 30-50 μm direkomendasikan sebagai standar.\n・Radius bor dan pengaturan offset bor: Gunakan radius bor yang tepat dan offset untuk menciptakan ruang semen yang konsisten.\n・Pertimbangan bentuk gigi penyangga: Penyangga dengan undercut atau bentuk kompleks mungkin memerlukan ruang semen yang lebih besar.\n・Nilai numerik diferensial: Atur nilai lebih tinggi di area cervical (leher gigi) dan nilai lebih rendah di area tip untuk mencegah keretakan.\n\n【Pengaturan Kontak Titik Kontak dan Kontak Oklusi】\nBerdasarkan panduan yang ditetapkan di awal proyek.\n・Kontak titik kontak: Tentukan lokasi kontak (apakah di papilla area atau lebih ke aspect buccal/lingual).\n・Kontak oklusi: Tentukan lokasi kontak dengan gigi lawan dan kekuatan kontak (interference).\n・Penampilan cross-section: Gunakan tampilan cross-section untuk fine-tune posisi kontak.\n・Guidance references: Pastikan semua panduan reference tersedia untuk verifikasi.\n\n■ Poin Penting untuk Desain IOS\n・Tidak ada model sekunder: Tanpa model gipsum, verifikasi detail hanya melalui data digital.\n・Komunikasi dengan dokter gigi: Jika ada keraguan, verifikasi dengan dokter gigi melalui laporan teknis atau konferensi video.\n・Kualitas data: Jika data IOS rusak atau tidak lengkap, hubungi klinik untuk mengulang pemindaian.\n\n[KEY: Aliran lancar dari penerimaan data hingga awal desain merealisasikan pengurangan waktu penyelesaian]\n[TIP: Menyiapkan template alur kerja standar memungkinkan respons cepat terhadap proyek baru]\n[WARN: Kehilangan kualitas selama konversi format tidak dapat diperbaiki di tahap CAD]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Perbandingan Alur Kerja Penerimaan Data IOS\nMembandingkan secara detail kelebihan dan kekurangan 4 metode penerimaan (cloud, transfer langsung, lampiran email, media fisik). Cloud memiliki kenyamanan tinggi namun bergantung pada lingkungan internet. Transfer langsung cepat namun memerlukan konstruksi jaringan. Lampiran email sederhana namun memiliki batasan ukuran file. Media fisik dapat digunakan di lingkungan offline namun memiliki risiko kehilangan.\n\n◆ Teknik Efisiensi Desain CAD\nPenggunaan tombol pintas sangat meningkatkan efisiensi desain CAD. Di exocad, Ctrl+mouse wheel untuk mengubah ukuran alat, Space untuk reset tampilan, Tab untuk beralih langkah. Juga, gunakan fungsi template untuk menyimpan pengaturan yang sering digunakan (nilai cement space, lebar margin, dll.) sebagai preset untuk mengurangi waktu pengaturan per kasus.\n\n◆ Catatan Konversi Format Data\nSaat bertukar data antara perangkat lunak CAD yang berbeda, konversi format mungkin diperlukan. Konversi STL ke STL pada dasarnya tidak bermasalah, namun akurasi dapat berubah jika pemrosesan subdivisi mesh atau desimasi (pengurangan mesh) dilakukan. Saat mengkonversi dari format proprietary (.3oxz, .dcm, dll.) ke format terbuka, metadata seperti informasi garis margin dan pengaturan die spacer mungkin hilang.\n\n◆ Kriteria Evaluasi Kesan IOS\nMemperkenalkan kriteria untuk mengevaluasi kualitas data IOS secara objektif. Apakah kepadatan mesh permukaan seragam, tidak ada lubang, noise tidak berlebihan, margin abutment terekam dengan jelas, dan data antagonis mencakup area yang memadai. Kemampuan untuk memutuskan meminta re-scan ke klinik jika kriteria kualitas tidak terpenuhi juga merupakan keterampilan penting."

                    title: "IOSトラブルシューティング",
                    whatYouLearn: "IOSデータに問題がある場合の対処方法と、トラブルシューティングを学びます。",
                    learningObjectives: "IOSデータの一般的な問題を特定し、適切に対処できるようにします。",
                    goodExample: "問題を素早く特定し、適切な解決策を実施できる。",
                    badExample: "問題の原因がわからず、対処に時間がかかりすぎる。",
                    evaluationCriteria: "問題特定能力、解決策の適切さ、対応速度。",
                    teaching: "[TABLE]\n問題|原因|対処方法\nスキャン失敗|デバイス接続|USB/WiFi再接続\nファイル破損|転送中断|再送信要求\nデータ不整合|スキャンノイズ|医院に再スキャン依頼\n[/TABLE]\n【Part3⑥⑦⑧ IOSトラブルシューティング】\n\n■ 加工精度と不適合の問題\nIOS症例はモデルレス（石膏模型なし）で製作するため、加工後の補綴物を模型上でチェックできない場合がある。多少の加工ブレや削り残しがあっても、模型がなければラボ側では気づきにくく、チェアサイド（歯科医院）で調整対応となる。これが多すぎると再製作リスクが高まるため、データ通りに正確に加工できることが非常に重要。\n\n■ 不適合の主な原因と対策\n\n【①ミリングバーの消耗】\nミリングバー（切削工具）が消耗すると、加工精度が低下する。特にマージン部分やコンタクト部分の精度に影響する。\n対策：マイクロスコープ（顕微鏡）でバーの先端状態を定期的に確認する。折れ・欠け・異常な摩耗がないか確認し、早期に交換する。\n\n【②アンダーカット】\nCAMソフトで補綴物の向き（加工軸方向）を決める際に、アンダーカット部分があると削り残しが発生する。\n対策：CADデザインの段階で着脱方向を確認し、確実にアンダーカットがない向きに設定する。アンダーカット部分にはリリーフ処理を行う。\n\n【③インプラントのクリアランス不足と回転防止機構】\nインプラント上部構造の適合で最も重要なのは、チタンベースの回転防止機構の位置関係の再現である。回転防止機構がCADデータと実際のチタンベースで位置が合っていないと、上部構造がチタンベース上で回転してしまい、残存歯との位置関係にズレが発生する。\n対策：スキャンボディの装着方向（スリット面を頬側）を正確に守る。CAMプログラムで回転防止機構の位置を確認し、必要に応じてCAMプログラムを変更して適合精度を詰める。\n\n【④ジルコニアのチッピング】\nジルコニアは硬く脆い材料であり、加工時や調整時にチッピング（欠け）が発生しやすい。\n対策：半焼結状態での加工時は適切な回転数と送り速度を守る。焼結後の調整は最小限にとどめる。低速回転のソフトタッチで研磨する。グラインディングバーを使用する場合は細粒度のものを使う。\n\n■ バイトデータの問題\nIOSのバイトスキャン（咬合関係のスキャン）は、マッチングの精度に問題が出やすい。\n\n【バイトずれの原因】\n・IOSのバイトスキャンは頬側面のみの撮影になることが多く、情報量が少ないためマッチング精度が低くなりやすい。\n・患者の開閉口運動中のブレや、唾液・頬粘膜の映り込みが精度を低下させる。\n\n【バイトずれの確認方法】\n製作部位の隣接歯に咬合接触がない（本来あるべき接触が見られない）場合は、バイトスキャンのマッチングがずれている可能性が高い。この場合、CADソフト上でバイトデータの再マッチングを行う。\n\n【3Shapeでの再マッチング手順】\n①準備タブを開く→②「咬合に位置合わせ」を選択→③3点法位置合わせ（上顎と下顎のデータの同一箇所3点を指定して再マッチング）\n\n【exocadでの再マッチング手順】\nexocadでは「対合歯の位置合わせ」機能を使用してバイトデータの再マッチングを行う。対合歯データを手動で移動・回転させて最適な咬合関係に調整する。\n\n【Dental Wingsでの再マッチング】\nDental Wingsでは独自の手順でバイトの再マッチングを行う。各ソフトの手順を覚えておくことが重要。\n\n■ IOSデータの欠損問題\nIOSデータで特に問題になるのがマージン付近のデータ欠損である。原因として：\n・歯肉縁下マージン：歯肉の下にマージンがあり、スキャナーが届かない。\n・出血：出血があるとスキャンデータにノイズが入り、マージンが不鮮明になる。\n・唾液：唾液の反射でハレーションが発生し、データ品質が低下する。\nこれらの場合は歯科医院に再スキャンを依頼する。不鮮明なマージンのまま設計すると不適合のリスクが非常に高い。\n\n[KEY: トラブルシューティングの体系的アプローチが作業停止を最小化する]\n[TIP: ログファイルを保存しておくことで問題の原因特定が容易になる]\n[WARN: 医院との報告連絡がないままCAD進行すると手戻りが発生する]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ 加工精度と不適合の系統的分析\n補綴物の不適合が発生した場合、原因を系統的に特定する能力が重要である。原因は大きく分けて、スキャン誤差（10-50μm）、CADデザイン設定ミス（セメントスペース不適切など）、CAM加工誤差（ツール摩耗・クランプずれなど）、仕上げ工程の問題（過度な研磨・焼成変形など）に分類される。各工程での累積誤差を理解し、総合精度を管理することが重要である。\n\n◆ IOS特有のトラブルパターン\nIOSデータに起因するトラブルの典型パターンを詳しく解説する。スティッチングエラー（複数スキャン画像の結合ずれ）は特にフルアーチ症例で発生しやすく、累積誤差により遠心部の精度が低下する。咬合記録のずれはバイトスキャン時の顎位の不安定さに起因することが多い。軟組織の動きによるノイズ（舌・頬粘膜の侵入）は、スキャン手順の改善で軽減できる。\n\n◆ クレーム対応と品質改善サイクル\n技工物に対するクレームが発生した場合の対応フローを解説する。クレーム内容の記録→原因分析→是正措置→再製作→再発防止策の立案→フィードバック、というPDCAサイクルを確立する。品質記録はデータベース化し、統計的に傾向を分析することで、根本的な品質改善につなげる。\n\n◆ デジタル技工のリスクマネジメント\nデータロストのリスク管理として、自動バックアップシステムの構築が不可欠である。ハードウェア故障に備えて、CAD用ワークステーションはRAID構成にし、外部バックアップも毎日実行する。ソフトウェアのライセンス管理も重要で、ドングル（USBキー）の紛失は業務停止に直結する。停電対策としてUPS（無停電電源装置）を導入し、加工中のデータ損失を防ぐ。",
                    teachingId: "[TABLE]\nMasalah|Penyebab|Metode Penanganan\nGagal Pemindaian|Koneksi Perangkat|Sambungkan Kembali USB/WiFi\nFile Rusak|Transfer Terputus|Minta Pengiriman Ulang\nData Tidak Konsisten|Gangguan Pemindaian|Minta Pemindaian Ulang ke Klinik\n[/TABLE]\n【Part3⑥⑦⑧ Pemecahan Masalah IOS】\n\n■ Masalah Presisi Pemrosesan dan Ketidaksesuaian\nKarena kasus IOS adalah model-less (tanpa model gipsum), protesa yang sudah diproses tidak dapat diperiksa di atas model di lab. Meskipun ada sedikit deviasi pemrosesan atau sisa material, pihak lab mungkin tidak menyadarinya, dan penyesuaian akan dilakukan di ruang perawatan (chairside). Jika ini terjadi terlalu banyak, risiko pembuatan ulang meningkat. Oleh karena itu, mampu memproses dengan presisi tinggi sesuai dengan desain data adalah sangat penting.\n\n■ Penyebab Utama Ketidaksesuaian dan Strategi Perbaikan\n\n【①Keausan Bur Milling (Milling Bar Wear)】\nBur milling (alat potong) yang aus mengakibatkan penurunan presisi pemrosesan, terutama mempengaruhi presisi area margin dan area kontak.\n対策: Inspeksi visual bur milling menggunakan mikroskop (ideal menggunakan mikroskop dengan perbesaran 10x atau lebih), dan ganti bur sebelum aus secara berlebihan. Untuk bur yang digunakan untuk margin dan kontak, perhatian khusus diperlukan. Buat log pemeliharaan bur untuk melacak siklus penggunaan.\n\n【②Area Undercut (Undercut Area)】\nArea undercut adalah daerah yang tertutup dalam arah penyisipan protesa. Jika area undercut ada, material akan terperangkap dan protesa tidak dapat disisipkan atau akan memerlukan adjustment paksa yang dapat merusak gigi penyangga.\n対策: Dalam pengaturan arah penyisipan CAD, pastikan arah penyisipan dipilih sehingga tidak ada undercut. Jika undercut terdeteksi dalam preview, ubah arah penyisipan atau lakukan modifikasi desain untuk menghilangkan undercut. Untuk kasus IOS, pemeriksaan undercut sangat penting karena tidak ada model fisik untuk verifikasi manual.\n\n【③Kekurangan Ruang Aman untuk Implant (Implant Clearance)】\nUntuk protesa implant, ruang antara bagian dalam protesa dan bodi implant harus cukup untuk mencegah interferensi. Ruang yang tidak mencukupi dapat menyebabkan protesa tidak dapat dipasang.\n対策: Atur nilai minimum ruang aman implant (biasanya 0.3-0.5mm tergantung sistem implant). Verifikasi dalam tampilan 3D sebelum pengiriman ke mesin pemrosesan. Periksa lokasi mekanisme anti-rotasi implant dan pastikan tidak ada interferensi.\n\n【④Chipping Zirkonia (Kerusakan Material Zirkonia)】nUntuk zirkonia, tepi yang tipis atau pengurangan yang terlalu tajam dapat menyebabkan chipping (pecah) selama pemrosesan atau penyisipan.\n対策: Tentukan ketebalan minimum untuk edge (biasanya 0.5mm atau lebih), dan atur offset bor untuk menghindari pemangkasan yang terlalu tajam. Gunakan parameter pemrosesan yang sesuai untuk zirkonia (kecepatan spindle, feed rate). Pastikan bur milling tajam dan tidak aus.\n\n■ Masalah Data Gigitan (Bite Data) dan Perbaikan\nData gigitan (bite scan) menunjukkan hubungan antara gigi atas dan bawah. Jika data gigitan tidak akurat, adaptasi protesa akan bermasalah.\n\n【Identifikasi Masalah Data Gigitan】\n・Jika gigi tetangga dari gigi penyangga menunjukkan tidak ada kontak oklusi, itu adalah tanda bahwa data gigitan mungkin tidak akurat.\n・Jika area kontak oklusi tidak sesuai dengan harapan klinis, data gigitan mungkin menyimpang.\n\n【Perbaikan Melalui Ulang Pencocokan】\nDalam perangkat lunak CAD tertentu, jika data gigitan curiga, Anda dapat memuat ulang data gigitan dan mengulangi pencocokan (matching) untuk memperbaiki alignment.\n\n【Penggunaan Data Gigitan Alternatif】\nJika data gigitan dari klinik tidak dapat diperbaiki, gunakan data gigitan dari kasus sebelumnya (jika tersedia) atau minta klinik untuk mengulang pemindaian gigitan.\n\n■ Proses Troubleshooting Sistematis\n①Verifikasi desain: Periksa desain CAD untuk undercut, ruang aman implant, chipping zirkonia.\n②Verifikasi parameter pemrosesan: Pastikan parameter pemrosesan (kecepatan spindle, feed rate) sesuai dengan material dan bur milling.\n③Inspeksi bur milling: Periksa kondisi bur milling dengan mikroskop; ganti jika diperlukan.\n④Uji pemrosesan: Jika masalah persisten, lakukan pemrosesan test dengan material dummy untuk mengidentifikasi masalah eksak.\n⑤Dokumentasi: Catat masalah dan solusi untuk referensi proyek di masa depan.\n\n[KEY: Pendekatan sistematis terhadap pemecahan masalah meminimalkan henti kerja]\n[TIP: Menyimpan file log memudahkan identifikasi penyebab masalah]\n[WARN: Melanjutkan CAD tanpa laporan kepada klinik menyebabkan rework besar-besaran]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Analisis Sistematis Akurasi Pengolahan dan Ketidaksesuaian\nKetika terjadi ketidaksesuaian protesa, kemampuan mengidentifikasi penyebab secara sistematis sangat penting. Penyebab secara garis besar diklasifikasikan menjadi: kesalahan scan (10-50μm), kesalahan pengaturan desain CAD (cement space tidak tepat, dll.), kesalahan pengolahan CAM (keausan alat, pergeseran clamp, dll.), dan masalah proses penyelesaian (pemolesan berlebihan, deformasi pembakaran, dll.).\n\n◆ Pola Masalah Khas IOS\nMenjelaskan secara detail pola masalah tipikal yang berasal dari data IOS. Stitching error (ketidaksesuaian penggabungan gambar scan) terutama mudah terjadi pada kasus full arch, dengan akurasi menurun di bagian distal akibat kesalahan kumulatif. Pergeseran pencatatan oklusi sering disebabkan oleh ketidakstabilan posisi mandibula saat bite scan. Noise dari gerakan jaringan lunak (lidah, mukosa bukal) dapat dikurangi dengan perbaikan prosedur scan.\n\n◆ Penanganan Keluhan dan Siklus Peningkatan Kualitas\nMenjelaskan alur penanganan ketika terjadi keluhan terhadap hasil kerja teknis. Pencatatan keluhan → Analisis penyebab → Tindakan perbaikan → Pembuatan ulang → Perencanaan pencegahan terulang → Umpan balik, membentuk siklus PDCA. Database catatan kualitas dan analisis statistik tren untuk peningkatan kualitas mendasar.\n\n◆ Manajemen Risiko Pemrosesan Digital\nUntuk manajemen risiko kehilangan data, pembangunan sistem backup otomatis sangat penting. Workstation CAD dikonfigurasi RAID untuk mengantisipasi kerusakan perangkat keras, dan backup eksternal dijalankan setiap hari. UPS (Uninterruptible Power Supply) dipasang untuk mencegah kehilangan data saat pemadaman listrik."

                    id: "7-1",
                    title: "カスタムアバットメントとチタンベース",
                    whatYouLearn: "インプラント用カスタムアバットメントとチタンベースの設計を学びます。",
                    learningObjectives: "カスタムアバットメントの設計原則と、チタンベースの適切な使用方法を理解します。",
                    goodExample: "アバットメント形態が適切で、チタンベースとの適合が良い。",
                    badExample: "形態が不適切、チタンベースとの整合性が悪い。",
                    evaluationCriteria: "アバットメント設計、チタンベース適合、エマージェンスプロファイル。",
                    teaching: "[TABLE]\nコンポーネント|材料|利点\nカスタムアバットメント|チタン/ジルコニア|生体親和性\nチタンベース|チタン合金|強度と耐蝕性\n[/TABLE]\n【Part5①②③ カスタムアバットメントとチタンベース】\n\n■ カスタムアバットメントの設計\nカスタムアバットメントとは、インプラント体の上に装着する患者固有の支台（アバットメント）をCADで個別設計したもの。既製アバットメントでは対応できない症例（角度補正が必要、歯肉形態が特殊等）に使用する。\n\n【方向（Direction）の設定】\nインプラント体の埋入方向と補綴物の装着方向が異なる場合、カスタムアバットメントで角度を補正する。方向の設定はアバットメント設計の最初のステップであり、以降のすべての設計に影響する。\n\n【テーパー（Taper）の設定】\nアバットメントの軸面のテーパー（傾斜角度）は、アバットメントの高さによって基準値が異なる：\n・高さ2.5〜4mm → テーパー2°（緩い傾斜＝維持力が高い）\n・高さ4〜5mm → テーパー4°\n・高さ5mm以上 → テーパー6°（急な傾斜＝着脱しやすい）\n高さが低いほどテーパーを緩くして維持力を確保し、高いほどテーパーをつけて着脱しやすくする。\n\n【マージン位置・深度の設定】\nアバットメントのマージン（上部構造との接合部の位置）を設定する。歯肉縁下にマージンを設定する場合は深度を指定する。深すぎると歯肉への圧迫や清掃困難の原因になる。歯肉のスキャロップ（歯肉の山谷）に沿わせた位置が理想的。\n\n【クリアランスの設定】\n対合歯との間隔（クリアランス）を確認する。上部構造の材料厚みを確保するために必要なクリアランスを設定する。\n\n【軸面・溝（Groove）・スムージング】\n軸面は滑らかで均一な形態にする。必要に応じて回転防止溝を付与する。軸面のスムージング処理でバリや段差を除去する。\n\n■ 歯肉貫通部（Gingival Penetration）のデザイン\n歯肉貫通部とは、アバットメントが歯肉を貫通する部分の形態。自然な歯のようなエマージェンスプロファイルを再現する。\n\n【基本形態】\n基本はストレート（直線的な）形態。歯肉形態に合わせて唇側/頬側を膨らませたり、舌側/口蓋側を絞ったりする。\n\n【圧迫領域】\n歯肉縁から約1mm下の領域で歯肉に軽い圧迫をかけ、適切な歯肉形態を誘導する。過度な圧迫は炎症の原因。\n\n【骨レベルタイプの注意】\nボーンレベルインプラントでは、歯肉貫通部の形態が歯肉形態を大きく左右する。適切なプロファイルで健康な歯肉形態を維持する。\n\n【ジルコニアアバットメントの注意】\nジルコニア製アバットメントは審美性に優れるが、チタン製に比べて破折リスクが高い。薄い部分や応力集中部がないように設計する。\n\n■ チタンベース\nチタンベースは、ジルコニアやセラミックの上部構造をインプラント体に接続するための金属製のコネクター。\n\n【選択基準】\n・クリアランスに基づく選択：利用可能なスペースに合ったGH（Gingival Height：歯肉高さ）のチタンベースを選択する。\n・フィクスチャーサイズとの適合：インプラントメーカーとフィクスチャーの規格に合ったチタンベースを選択する。\n\n【回転防止機構（最重要）】\n回転防止機構の位置関係の正確な再現がチタンベースの適合で最も重要。チタンベース上で上部構造が回転すると、残存歯との位置関係にズレが発生し、コンタクトや咬合のずれにつながる。\n・回転防止機構のグルーピング（1.5mm単位のグループ分け）を理解する。\n・単独歯か連結かで回転防止の重要性が異なる（単独歯の方がよりシビア）。\n・パラレリズム（平行性）：複数のインプラントブリッジの場合、チタンベース間の平行性を確認する。\n\n【CAMプログラムでの適合精度の追い込み】\nCAMプログラムを変更して、チタンベースとの接合面の加工精度を向上させることが可能。微調整によって回転防止機構の位置精度を詰める。\n\n[KEY: カスタムアバットメントとチタンベースの設計がインプラント補綴物の長期成功を決定する]\n[TIP: インプラントメーカーの規格を確認して設計することで互換性問題を回避]\n[WARN: アバットメント角度が大きすぎるとレジンセメントの流出が起こりやすい]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ インプラント補綴の全体像\nインプラント補綴は、フィクスチャー（インプラント体）→アバットメント→上部構造の3層構造である。カスタムアバットメントの役割は、既製アバットメントでは対応できない角度補正や歯肉貫通プロファイルの最適化にある。マルチユニットアバットメントを使用する場合は、角度補正（最大30度まで）のデータをCADソフトに正確に入力する必要がある。\n\n◆ チタンベースの接合設計\nチタンベースは、ジルコニアやハイブリッドセラミックスの上部構造をスクリュー固定するためのインターフェースである。接合面（ボンディングインターフェース）の設計では、回転防止機構（アンチローテーション）の方向、接着面のギャップ（20-50μm）、セメント溢出防止のための内部設計が重要。接着にはレジン系セメントまたは自己接着性レジンセメントを使用する。\n\n◆ インプラント周囲の軟組織管理\nカスタムアバットメントの歯肉貫通部分（トランスミューコサルゾーン）の形態設計は、インプラント周囲の軟組織の健康維持に直結する。凹面プロファイルは歯肉の厚みを確保し、凸面プロファイルは軟組織を圧迫する。理想的には、歯肉縁下1mmまでは凹面、その上方は天然歯のエマージェンスプロファイルに類似した凸面とする。\n\n◆ デジタルインプラントプランニング\nサージカルガイドのCAD設計も技工士の重要な業務になりつつある。CT（CBCT）データとIOSデータをマッチングし、理想的なインプラント埋入位置を3Dでプランニングする。トップダウンアプローチ（最終補綴物の位置から逆算してインプラント位置を決定）の考え方が基本であり、技工士の視点からの補綴設計の提案が求められる。",
                    teachingId: "[TABLE]\nKomponen|Bahan|Keuntungan\nAbutmen Kustom|Titanium/Zirkonia|Biokompatibilitas\nBasis Titanium|Paduan Titanium|Kekuatan dan Ketahanan Korosi\n[/TABLE]\n【Part5①②③ Abutmen Khusus dan Titanium Base】\n\n■ Desain Abutmen Khusus\nAbutmen khusus adalah abutmen yang dipasang di atas implan yang dirancang secara individual untuk setiap pasien. Digunakan dalam kasus di mana abutmen standar tidak dapat mengatasi (misalnya, koreksi sudut diperlukan, bentuk gingiva unik).\n\n【Pengaturan Arah】\nKetika arah penyisipan implan dan arah pemasangan protesa berbeda, abutmen khusus mengoreksi sudut. Pengaturan arah adalah langkah pertama dalam desain abutmen dan mempengaruhi semua desain berikutnya.\n\n【Pengaturan Kerucut】\nKerucut (sudut kemiringan) permukaan aksial abutmen berbeda-beda tergantung tinggi abutmen:\n・Tinggi 2,5-4mm → Kerucut 2° (kemiringan lembut = daya retensi tinggi)\n・Tinggi 4-5mm → Kerucut 4°\n・Tinggi 5mm atau lebih → Kerucut 6° (kemiringan curam = mudah dipasang/dilepas)\nSemakin rendah tingginya, semakin lembut kerutnya untuk memastikan daya retensi; semakin tinggi, semakin banyak kerucut untuk memudahkan pelepasan.\n\n【Pengaturan Posisi dan Kedalaman Margin】\nMengatur posisi margin abutmen (posisi sambungan dengan struktur atas) dan kedalaman margin ketika ditetapkan di bawah pinggir gingiva. Jika terlalu dalam, tekanan pada gingiva dan kesulitan pembersihan menjadi penyebab masalah. Posisi ideal adalah mengikuti scallop gingiva (gunung dan lembah gingiva).\n\n【Pengaturan Clearance】\nMemverifikasi jarak antara gigi berlawanan. Mengatur clearance yang diperlukan untuk memastikan ketebalan material struktur atas.\n\n【Permukaan Aksial, Alur (Groove), dan Pelancaran】\nPermukaan aksial harus halus dan berbentuk seragam. Jika diperlukan, tambahkan alur anti-rotasi. Menghilangkan burr dan step dengan pemrosesan pelancaran permukaan aksial.\n\n■ Desain Bagian Gigi yang Menembus Gingiva (Gingival Penetration)\nBagian gingival penetration adalah bentuk bagian di mana abutmen menembus gingiva. Mereproduksi profil kemunculan alami seperti gigi alami.\n\n【Bentuk Dasar】\nBentuk dasar adalah bentuk lurus (linear). Sesuaikan dengan bentuk gingiva, tonjolkan/kurangi sisi labial/pipi, kentalkan sisi lingual/palatal.\n\n【Area Tekanan】\nDi area sekitar 1mm di bawah margin gingiva, berikan tekanan ringan pada gingiva untuk menginstruksikan bentuk gingiva yang sesuai. Tekanan berlebihan menjadi penyebab inflamasi.\n\n【Perhatian untuk Tipe Bone Level】\nUntuk implan bone level, bentuk bagian gingival penetration sangat mempengaruhi bentuk gingiva. Pertahankan bentuk gingiva yang sehat dengan profil yang sesuai.\n\n【Perhatian untuk Abutmen Zirconia】\nAbutmen zirconia memiliki estetika superior tetapi risiko fraktur lebih tinggi dibandingkan titanium. Rancang tanpa bagian tipis atau area konsentrasi stres.\n\n■ Titanium Base\nTitanium base adalah konektor logam yang menghubungkan struktur atas zirconia atau seramik ke implan.\n\n【Kriteria Pemilihan】\n・Pemilihan berdasarkan clearance: Pilih titanium base dengan GH (Gingival Height: tinggi gingiva) yang sesuai dengan ruang yang tersedia.\n・Keselarasan dengan ukuran fixture: Pilih titanium base yang cocok dengan standar merek implan dan fixture.\n\n【Mekanisme Anti-Rotasi (Sangat Penting)】\nReproduktifitas akurat dari hubungan posisi mekanisme anti-rotasi adalah yang paling penting dalam keselarasan titanium base. Jika struktur atas berputar di atas titanium base, terjadi pergeseran dalam hubungan posisi dengan gigi sisa, menyebabkan ketidakselarasan kontak dan gigitan.\n・Memahami pengelompokan mekanisme anti-rotasi (pengelompokan unit 1,5mm).\n・Penting berbeda antara gigi tunggal dan jembatan (gigi tunggal lebih sensitif).\n・Paralelisme (keselarasan): Untuk jembatan implan multi-implan, verifikasi keselarasan antara titanium base.\n\n【Penyesuaian Presisi Keselarasan dalam Program CAM】\nMungkin untuk meningkatkan presisi keselarasan permukaan sambungan dengan titanium base dengan mengubah program CAM. Penyesuaian halus untuk menyelesaikan presisi posisi mekanisme anti-rotasi.\n\n[KEY: Desain abutmen kustom dan basis titanium menentukan kesuksesan jangka panjang prostetik implan]\n[TIP: Periksa spesifikasi pabrikan implan sebelum merancang untuk menghindari masalah kompatibilitas]\n[WARN: Sudut abutmen yang terlalu besar menyebabkan aliran semen resin yang mudah]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Gambaran Umum Protesa Implan\nProtesa implan memiliki struktur 3 lapis: fixture (badan implan) → abutment → suprastruktur. Peran custom abutment adalah mengoptimalkan koreksi sudut dan profil penetrasi gingiva yang tidak dapat ditangani oleh abutment prefabrikasi. Saat menggunakan multi-unit abutment, data koreksi sudut (hingga 30 derajat) harus diinput secara akurat ke perangkat lunak CAD.\n\n◆ Desain Koneksi Titanium Base\nTitanium base adalah antarmuka untuk fiksasi sekrup suprastruktur zirkonia atau hybrid ceramic. Dalam desain permukaan koneksi (bonding interface), penting memperhatikan arah mekanisme anti-rotasi, gap permukaan adhesi (20-50μm), dan desain internal untuk mencegah kelebihan semen.\n\n◆ Manajemen Jaringan Lunak Peri-implan\nDesain bentuk bagian penetrasi gingiva (zona transmukosal) custom abutment langsung berkaitan dengan pemeliharaan kesehatan jaringan lunak peri-implan. Profil cekung memastikan ketebalan gingiva, profil cembung menekan jaringan lunak. Idealnya, cekung hingga 1mm di bawah tepi gingiva, dan di atasnya cembung menyerupai emergence profile gigi alami.\n\n◆ Perencanaan Implan Digital\nDesain CAD panduan bedah juga menjadi tugas penting teknisi gigi. Mencocokkan data CT (CBCT) dengan data IOS dan merencanakan posisi pemasangan implan yang ideal secara 3D. Pemikiran pendekatan top-down (menentukan posisi implan dari posisi protesa akhir secara terbalik) merupakan dasar."

                    id: "7-2",
                    title: "インプラントブリッジの設計",
                    whatYouLearn: "インプラントを支台としたブリッジの設計方法を学びます。",
                    learningObjectives: "天然歯ブリッジとの違いを理解し、インプラントブリッジ特有の設計を習得します。",
                    goodExample: "インプラント特有の設計要件を満たし、力学的に安定したブリッジが設計できる。",
                    badExample: "天然歯ブリッジと同じ設計をしてしまい、インプラント特有の配慮が欠けている。",
                    evaluationCriteria: "インプラント設計知識、力学的安定性、コネクター設計。",
                    teaching: "[TABLE]\nポンティック型|特徴|材料適性\nハイジェニック型|清掃性優先|レジン、セラミック\nセミコンター|美観重視|ジルコニア\n[/TABLE]\n【Part5④ インプラントブリッジの設計】\n\n■ インプラントブリッジとは\n複数のインプラント体を支台として、連結された上部構造（ブリッジ）を装着する補綴形態。天然歯のブリッジと異なり、インプラント体の埋入位置・角度に制約されるため、特有の設計上の配慮が必要。\n\n■ 排列計画\nインプラントブリッジの設計は排列計画から始まる。\n・補綴位置の決定：最終的な歯冠の位置（審美的・機能的に最適な位置）をまず決定する。\n・インプラント体の角度補正：インプラント体の埋入角度が歯冠の最適な位置と一致しない場合が多い。カスタムアバットメントで角度を補正する。\n・各ユニットの配分：ポンティック（架橋部）とアバットメント支持部の配分を計画する。\n\n■ ポジショニング\n各歯冠ユニットを適切な位置に配置する。天然歯のブリッジと同様に、歯列弓との調和、隣在歯との連続性、咬合関係を考慮する。インプラント体の位置が理想的でない場合は、歯冠の形態で補正する（カントレバー、歯冠の傾斜等）。\n\n■ サポート形態（基底面形態）\nインプラントブリッジのポンティック部分の基底面（粘膜に接する面）の形態設計は、清掃性とメンテナンスに直結する。\n\n【材料による基底面形態の違い】\n・ジルコニア：滑沢な表面で清掃性が良い。基底面を粘膜に軽く接触させる設計が可能。\n・ハイブリッドレジン/PMMA：ジルコニアに比べてプラーク付着しやすい。基底面の清掃性をより重視した設計が必要。\n・金属：金属面は研磨可能で清掃性は良いが、審美性に劣る。\n\n■ 清掃性の確保（メンテナンス設計）\nインプラントブリッジの長期的な成功は、患者によるメンテナンス（清掃）ができるかどうかにかかっている。\n\n【下部鼓形空隙の設計】\n歯間ブラシが通る程度の空隙を確保する。狭すぎると歯間ブラシが通らず、プラークが蓄積する。広すぎると食片が停滞する。患者の清掃能力に合わせた空隙サイズの設定が重要。\n\n【基底面と粘膜の関係】\n基底面が粘膜に強く圧迫すると炎症の原因になる。離れすぎると食物残渣が溜まる。適度な接触（コンベックス型またはモディファイドリッジラップ型）で自浄性を確保する。\n\n■ アクセスホールの位置\nスクリュー固定式インプラントブリッジでは、スクリューアクセスホール（ネジを締めるための穴）の位置が重要。\n・理想的な位置：咬合面や舌側/口蓋側の目立たない位置。\n・位置が不適切な場合の対応：インプラント体の角度によりアクセスホールが頬側等に出てしまう場合、CAMプログラムで補正する。アングルスクリュードライバーの使用を前提とした設計も可能。\n\n【スクリューホールのリリーフ】\nアクセスホール周囲に十分なスペース（リリーフ）を設けて、スクリュードライバーの操作性を確保する。リリーフが不十分だとスクリューの締結が困難になる。\n\n■ 連結部の設計と強度確保\nインプラントブリッジの連結部は天然歯のブリッジ以上に強度が求められる。インプラントは天然歯と異なり歯根膜がなく、衝撃をクッションする機能がないため、連結部への応力が直接的になる。十分な断面積の確保と、応力集中を避ける滑らかな形態が必須。\n\n[KEY: インプラント本数とブリッジスパンのバランスが構造設計を左右する]\n[TIP: 可能な限りインプラント数を多くすることで長期成功率が向上する]\n[WARN: 1つのインプラントで3本以上のブリッジはスパン過長になりやすい]\n\n■ 【時間があれば】さらに深く学ぶ\n\n◆ インプラントブリッジの力学\nインプラントブリッジは天然歯ブリッジとは異なる力学的挙動を示す。天然歯には歯根膜による生理的動揺（25-100μm）があるが、インプラントにはオッセオインテグレーション（骨結合）による剛性結合しかなく、動揺量は5-10μm程度である。この違いにより、天然歯とインプラントの混合支台は避けるべきとされる。ブリッジの設計ではパッシブフィット（応力のない適合）が最重要課題となる。\n\n◆ ポンティックデザインの種類と選択\nポンティック基底面の形態は、審美性と清掃性のバランスで選択する。衛生型（Hygienic/Sanitary）は基底面が凸面で清掃容易だが審美性に劣る。リッジラップ型は唇側の歯肉との接触面が広く審美性に優れるが清掃が難しい。修正リッジラップ型は両者の中間。オベイト型は歯肉にくぼみを作り、あたかも歯が生えているように見せる最も審美的な形態だが、外科的な歯肉形成が必要となる場合がある。\n\n◆ スクリューリテンションとセメントリテンション\nインプラント上部構造の固定方式の選択は、審美性・メンテナンス性・設計の複雑さに影響する。スクリュー固定はリトリーバビリティ（取り外し可能性）に優れ、メンテナンスが容易だが、アクセスホールの位置が審美的に問題となることがある。セメント固定は天然歯クラウンと同様の手技で装着でき審美性に優れるが、余剰セメントの除去が不十分だとインプラント周囲炎のリスクがある。\n\n◆ デジタルでのフレームワーク設計\nインプラントブリッジのフレームワーク（下部構造）は、CADソフトで精密に設計できる。フレームの断面設計では、アイビーム構造（I字型断面）が最も高い曲げ剛性を提供する。フレーム厚さはジルコニアで最低0.7mm、チタンで0.5mmを確保する。ポンティック部のフレーム形態はフルコンターまたはカットバックから選択し、築盛材料の厚さを考慮して設計する。",
                    teachingId: "[TABLE]\nJenis Pontik|Fitur|Kesesuaian Bahan\nTipe Higienis|Prioritas Pembersihan|Resin, Keramik\nSemi Kontur|Fokus Estetika|Zirkonia\n[/TABLE]\n【Part5④ Desain Jembatan Implan】\n\n■ Apa Itu Jembatan Implan\nForma protesa di mana beberapa implan digunakan sebagai penyangga dan struktur atas yang terhubung (jembatan) dipasang. Berbeda dengan jembatan gigi alami, jembatan implan memiliki batasan posisi dan sudut penyisipan implan, sehingga memerlukan pertimbangan desain unik.\n\n■ Perencanaan Pengaturan\nDesain jembatan implan dimulai dari perencanaan pengaturan.\n・Penentuan posisi protesa: Pertama-tama tentukan posisi akhir mahkota (posisi optimal secara estetika dan fungsional).\n・Koreksi sudut implan: Posisi penyisipan implan sering tidak sesuai dengan posisi optimal mahkota. Abutmen khusus mengoreksi sudut.\n・Alokasi unit: Rencanakan alokasi antara bagian pontik (bagian jembatan) dan bagian yang didukung abutmen.\n\n■ Penentuan Posisi\nTempatkan setiap unit mahkota pada posisi yang sesuai. Pertimbangkan harmoni dengan lengkung barisan gigi, kontinuitas dengan gigi yang berdekatan, dan hubungan gigitan seperti jembatan gigi alami. Ketika posisi implan tidak ideal, koreksi dengan bentuk mahkota (cantilever, kemiringan mahkota, dll.).\n\n■ Bentuk Dukungan (Bentuk Permukaan Dasar)\nDesain bentuk dasar pontik (permukaan yang berkontak dengan mukosa) jembatan implan berhubungan langsung dengan kemampuan pembersihan dan pemeliharaan.\n\n【Perbedaan Bentuk Dasar Berdasarkan Material】\n・Zirconia: Permukaan halus dengan kemampuan pembersihan yang baik. Desain dengan permukaan dasar berkontak ringan dengan mukosa memungkinkan.\n・Hybrid Resin/PMMA: Dibandingkan dengan zirconia, lebih mudah menempel plak. Desain harus lebih menekankan kemampuan pembersihan permukaan dasar.\n・Logam: Permukaan logam dapat diperhalus dengan kemampuan pembersihan yang baik, tetapi estetika kurang.\n\n■ Memastikan Kemampuan Pembersihan (Desain Pemeliharaan)\nKesuksesan jangka panjang jembatan implan tergantung pada kemampuan pasien untuk memelihara (membersihkan).\n\n【Desain Ruang Fissure Bawah】\nPastikan ruang yang cukup untuk sikat gigi interdental. Jika terlalu sempit, sikat gigi interdental tidak melalui dan plak menumpuk. Jika terlalu lebar, makanan tertahan. Pengaturan ukuran ruang fissure sesuai kemampuan pembersihan pasien penting.\n\n【Hubungan Permukaan Dasar dan Mukosa】\nJika permukaan dasar memberikan tekanan kuat pada mukosa, menjadi penyebab inflamasi. Jika terlalu jauh, sisa makanan menumpuk. Kontak sedang (tipe cembung atau tipe ridge wrap yang dimodifikasi) untuk memastikan pembersihan diri.\n\n■ Posisi Access Hole\nUntuk jembatan implan fixed dengan screw, posisi akses hole screw (lubang untuk memutar baut) penting.\n・Posisi ideal: Posisi tidak terlihat pada permukaan oklusal atau lingual/palatal.\n・Jika posisi tidak ideal: Ketika akses hole keluar ke sisi pipi, dll. karena sudut implan, kompensasi melalui program CAM memungkinkan. Desain dengan asumsi penggunaan screwdriver bersudut juga memungkinkan.\n\n【Reliefs Sekitar Screw Hole】\nBeri ruang yang cukup (relief) di sekitar akses hole untuk memastikan operabilitas screwdriver. Jika relief tidak cukup, penjepitan screw menjadi sulit.\n\n■ Desain Bagian Penyambungan dan Memastikan Kekuatan\nBagian penyambungan jembatan implan memerlukan kekuatan yang lebih besar dari jembatan gigi alami. Karena implan berbeda dengan gigi alami dalam hal tidak memiliki ligamen periodontal, kekuatan gigitan langsung ke bagian penyambungan. Memastikan luas penampang yang cukup dan bentuk yang halus menghindari konsentrasi stres sangat penting.\n\n[KEY: Keseimbangan jumlah implan dan rentang jembatan menentukan desain struktural]\n[TIP: Meningkatkan jumlah implan meningkatkan tingkat kesuksesan jangka panjang]\n[WARN: Jembatan 3+ gigi pada 1 implan mudah melebihi batas rentang]\n\n■ 【Jika Ada Waktu】Pelajari Lebih Dalam\n\n◆ Mekanika Jembatan Implan\nJembatan implan menunjukkan perilaku mekanis yang berbeda dari jembatan gigi alami. Gigi alami memiliki mobilitas fisiologis melalui ligamen periodontal (25-100μm), sedangkan implan hanya memiliki koneksi rigid melalui osseointegrasi dengan mobilitas 5-10μm. Karena perbedaan ini, abutment campuran gigi alami dan implan sebaiknya dihindari. Passive fit (kesesuaian tanpa tegangan) menjadi masalah terpenting dalam desain jembatan.\n\n◆ Jenis dan Pemilihan Desain Pontik\nBentuk dasar pontik dipilih berdasarkan keseimbangan estetika dan kemudahan pembersihan. Tipe higienis memiliki dasar cembung yang mudah dibersihkan namun kurang estetis. Tipe ridge lap memiliki area kontak luas dengan gingiva labial dengan estetika baik namun sulit dibersihkan. Tipe ovate membuat cekungan pada gingiva sehingga terlihat seolah gigi tumbuh - bentuk paling estetis namun mungkin memerlukan pembentukan gingiva bedah.\n\n◆ Retensi Sekrup dan Retensi Semen\nPemilihan metode fiksasi suprastruktur implan mempengaruhi estetika, kemudahan perawatan, dan kompleksitas desain. Fiksasi sekrup unggul dalam retrievability dan perawatan mudah, namun posisi access hole dapat menjadi masalah estetis. Fiksasi semen mirip teknik mahkota gigi alami dengan estetika baik, namun risiko peri-implantitis meningkat jika penghapusan semen berlebih tidak memadai.\n\n◆ Desain Framework Digital\nFramework (substruktur) jembatan implan dapat didesain secara presisi dengan perangkat lunak CAD. Dalam desain penampang frame, struktur I-beam memberikan kekakuan lentur tertinggi. Ketebalan frame minimal 0,7mm untuk zirkonia dan 0,5mm untuk titanium."
